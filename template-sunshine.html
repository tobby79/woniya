  }

  // ── 원 시설 (배지 + 폴라로이드 콜라주, 인라인 펼치기) ──
  // fac.items(원장 콘솔 "시설 소개" 입력값)가 실제 시설 항목 배열. 사진은 같은 인덱스의
  // album.items[i]와 매칭(모달 시절 로직과 동일한 짝짓기 규칙 재사용).
  const fac = data.center.facilities;
  const albumImgs = data.album?.items || [];
  // 기본 노출 개수는 PC 2x2(4장)/모바일 1열 3장으로 브레이크포인트에 따라 다르다 —
  // teachers/TEACHER_INITIAL_COUNT와 동일하게 렌더 시점 뷰포트 폭으로 판단.
  const FAC_INITIAL_COUNT = (window.matchMedia && window.matchMedia('(max-width:719px)').matches) ? 3 : 4;
  // placeholder 캡션: 실제 앨범 라벨(it.label)이 있으면 그대로 쓰고, 없을 때만 대체
  const FAC_CAPTION_PLACEHOLDERS = ['놀이실', '미술 시간', '바깥 놀이터', '음악 시간'];
  // 라이트박스에서 순환 탐색할 전체 목록(숨겨진 펼치기 항목 포함) — facPolaroidHtml 호출 시 채워진다.
  const facLightboxItems = [];
  function facPolaroidHtml(f, i, isOddLast){
    const img = albumImgs[i] || {};
    const caption = (img.label && img.label.trim()) ? img.label
      : (f && f.name) ? f.name
      : FAC_CAPTION_PLACEHOLDERS[i % FAC_CAPTION_PLACEHOLDERS.length];
    const lbIndex = facLightboxItems.length;
    facLightboxItems.push({ photo: img.photo || '', caption });
    return `
      <div class="fac-polaroid${isOddLast ? ' fac-odd-last' : ''}">
        <div class="pic" data-lb-index="${lbIndex}"><img data-src="${esc(img.photo || '')}" alt="${esc(caption)}"></div>
        <div class="cap">${esc(caption)}</div>
      </div>`;
  }
  if (fac) {
    const hasFacItems = !!(fac.items && fac.items.length);
    // 앨범 사진 폴백은 "미리보기 전용"이다: ?preview= 샘플 데이터 렌더링(isPreviewMode)일 때만
    // fac.items가 비어있어도 album.items로 시설 콜라주를 채운다.
    // 실제 운영 중인 원(isPreviewMode=false)이 아직 시설 항목을 입력하지 않은 경우에는
    // 앨범 사진을 시설 사진인 것처럼 보여주면 안 되므로, 폴백을 쓰지 않고 중립 문구만 표시한다.
    const useAlbumFallback = !hasFacItems && (isPreviewMode || !!fac.__useAlbumMediaFallback);
    const items = hasFacItems ? fac.items
      : useAlbumFallback ? albumImgs.map(it => ({ name: it.label || '' }))
      : [];
    // 배지는 실제 시설 카테고리(fac.items)가 있을 때만 의미가 있어, 폴백/빈 상태에서는 생략
    const badgesHtml = hasFacItems ? items.map(f=>
      `<span class="fac-badge">${esc(f.name)}</span>`).join('') : '';
    const initialItems = items.slice(0, FAC_INITIAL_COUNT);
    const restItems = items.slice(FAC_INITIAL_COUNT);
    const isOdd = items.length % 2 === 1;
    const initialHtml = initialItems.map((f,i)=>facPolaroidHtml(f, i, isOdd && restItems.length === 0 && i === initialItems.length - 1)).join('');
    const restHtml = restItems.map((f,i)=>facPolaroidHtml(f, i + FAC_INITIAL_COUNT, isOdd && i === restItems.length - 1)).join('');
    const hasMore = restItems.length > 0;
    // 실서비스인데 시설 항목이 하나도 없는 경우: 콜라주 대신 중립 문구만 표시
    const isEmptyRealData = !hasFacItems && !useAlbumFallback;
    $('facilitiesSec').innerHTML = `
      <div class="section-eyebrow reveal">우리 원 시설</div>
      <h2 class="section-title reveal">안전하고 따뜻한 공간</h2>
      <p class="section-intro compact reveal">${escWithBr(fac.intro)}</p>
      ${isEmptyRealData ? `
      <p class="fac-empty-notice reveal">시설 정보를 준비 중입니다.</p>` : `
      <div class="fac-badges reveal">${badgesHtml}</div>
      <div class="fac-collage reveal">${initialHtml}</div>
      ${hasMore ? `<div class="fac-collage-more" id="facMoreGrid">${restHtml}</div>` : ''}
      ${hasMore ? `
      <button type="button" class="fac-more-btn reveal" id="facMoreToggleBtn" aria-expanded="false">
        <span class="cloud-link">시설 전체 보기</span>
      </button>` : ''}`}`;

    // 시설 항목이 초기 노출 개수보다 많을 때만 버튼이 존재 → 인라인 펼치기/접기 토글
    const moreBtn = document.getElementById('facMoreToggleBtn');
    const moreGrid = document.getElementById('facMoreGrid');
    if (moreBtn && moreGrid) {
      moreBtn.addEventListener('click', function(){
        const expanded = moreGrid.classList.toggle('is-expanded');
        moreBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        moreBtn.querySelector('.cloud-link').textContent = expanded ? '접기' : '시설 전체 보기';
        if (!expanded) {
          // 접을 때는 섹션 상단이 화면 밖으로 밀려나지 않게 부드럽게 스크롤 위치 보정
          const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          document.getElementById('facilitiesSec').scrollIntoView({ block: 'nearest', behavior: prefersReduced ? 'auto' : 'smooth' });
        }
      });
    }

    // 시설 사진 라이트박스 연결: 숨겨진(펼치기 뒤) 항목도 포함해 전체 목록 기준으로 순환 탐색
    document.querySelectorAll('#facilitiesSec .fac-polaroid .pic').forEach(function(pic){
      pic.addEventListener('click', function(){
        const idx = Number(pic.getAttribute('data-lb-index'));
        if (window.__openFacLightbox__) window.__openFacLightbox__(idx, facLightboxItems);
      });
    });
  } else {
    document.getElementById('facilitiesSec').hidden = true;
  }

  // ── 선생님 플립 카드 (햇살 테마) ──
  const t = data.teachers;
  // 반 이름 추출: role("만 3세 햇살반 담임")에서 "○○반"을 뽑아 색상 배지에 사용.
  function extractClassName(role){
    const m = (role || '').match(/([가-힣A-Za-z0-9]+반)/);
    return m ? m[1] : '';
  }
  // 반 구분 색상: sunshine 파스텔 팔레트를 "등장 순서"대로 배정한다.
  // 순서 기반이라 서로 다른 반은 항상 다른 색을 받고(팔레트 소진 전까지), 같은 반은 항상 같은 색.
  const CLASS_BADGE_PALETTE = [
    { bg:'#FFF1EA', text:'#D9724F', border:'#FFD7CB' }, // 웜 핑크/코랄
    { bg:'#F1ECFA', text:'#7C63B0', border:'#DED0F0' }, // 라벤더
    { bg:'#EEF6FB', text:'#4E8CB0', border:'#CFE6F2' }, // 하늘
    { bg:'#EDF6ED', text:'#5E9268', border:'#CFE6CF' }, // 세이지
    { bg:'#FFF6E6', text:'#C79338', border:'#F3E2BC' }  // 웜 골드
  ];
  const classColorMap = {};
  let classColorNext = 0;
  function classBadgeStyle(name){
    if (!name) return CLASS_BADGE_PALETTE[0];
    if (!(name in classColorMap)){
      classColorMap[name] = CLASS_BADGE_PALETTE[classColorNext % CLASS_BADGE_PALETTE.length];
      classColorNext++;
    }
    return classColorMap[name];
  }
  const TAP_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11.5V6a2 2 0 0 1 4 0v5"/><path d="M13 8.5a2 2 0 0 1 4 0V13"/><path d="M17 10.5a2 2 0 0 1 4 0V16a5 5 0 0 1-5 5h-2.5a4 4 0 0 1-3-1.4L6 15.5a2 2 0 0 1 3-2.6"/></svg>';
  function teacherCardHtml(tc){
    const className = extractClassName(tc.role);
    const bs = classBadgeStyle(className);
    const hasMessage = hasVisibleText(tc.message);
    const badgeHtml = className
      ? `<span class="class-badge" style="background:${bs.bg};color:${bs.text};border-color:${bs.border}">${esc(className)}</span>`
      : '';
    const flipAttrs = hasMessage
      ? ` tabindex="0" role="button" aria-label="${esc(tc.name)} 카드 뒤집기 — 한마디 보기"`
      : '';
    return `
      <div class="flip reveal${hasMessage ? '' : ' is-static'}"${flipAttrs}>
        <div class="flip-inner">
          <div class="face front">
            <div class="avatar"><div class="avatar-img"><img alt="${esc(tc.name)}" data-src="${esc(tc.photo)}"></div></div>
            <div class="name">${esc(tc.name)}</div>
            <div class="role">${esc(tc.role)}</div>
            ${badgeHtml}
            ${hasMessage ? `<div class="tap">${TAP_ICON}탭하여 한마디 보기</div>` : ''}
          </div>
          ${hasMessage ? `<div class="face back">${escWithBr(tc.message)}</div>` : ''}
        </div>
      </div>`;
  }
  // 시설 섹션과 동일한 인라인 펼치기 패턴. 기본 노출 개수는 PC 2x2(4명)/모바일 1x3(3명)로
  // 브레이크포인트에 따라 다르므로, 렌더 시점의 뷰포트 폭으로 판단해 슬라이스 개수를 정한다.
  const TEACHER_INITIAL_COUNT = (window.matchMedia && window.matchMedia('(max-width:719px)').matches) ? 3 : 4;
  const teacherItems = t?.items || [];
  const teacherInitial = teacherItems.slice(0, TEACHER_INITIAL_COUNT);
  const teacherRest = teacherItems.slice(TEACHER_INITIAL_COUNT);
  const teacherHasMore = teacherRest.length > 0;
  const teacherInitialHtml = teacherInitial.map(teacherCardHtml).join('');
  const teacherRestHtml = teacherRest.map(teacherCardHtml).join('');
  $('teachersSec').innerHTML = `
    <div class="section-eyebrow reveal">${escWithBr(t?.eyebrow)}</div>
    <h2 class="section-title reveal">${escWithBr(t?.title)}</h2>
    <div class="cards">${teacherInitialHtml}</div>
    ${teacherHasMore ? `<div class="cards-more" id="teacherMoreGrid">${teacherRestHtml}</div>` : ''}
    ${teacherHasMore ? `
    <button type="button" class="fac-more-btn reveal" id="teacherMoreToggleBtn" aria-expanded="false">
      <span class="cloud-link">선생님 전체 보기</span>
    </button>` : ''}`;

  // 선생님 인원이 기본 노출 개수보다 많을 때만 버튼 존재 → 인라인 펼치기/접기 토글
  (function(){
    const moreBtn = document.getElementById('teacherMoreToggleBtn');
    const moreGrid = document.getElementById('teacherMoreGrid');
    if (!moreBtn || !moreGrid) return;
    moreBtn.addEventListener('click', function(){
      const expanded = moreGrid.classList.toggle('is-expanded');
      moreBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      moreBtn.querySelector('.cloud-link').textContent = expanded ? '접기' : '선생님 전체 보기';
      if (!expanded) {
        const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        document.getElementById('teachersSec').scrollIntoView({ block: 'nearest', behavior: prefersReduced ? 'auto' : 'smooth' });
      }
    });
  })();

  // ── 교육프로그램 (원형 사진 + 지그재그 그리드, 인라인 펼치기) ──
  // 시설 콜라주(각진 폴라로이드)와 구분되는 톤으로, 사진을 원형으로 자르고 해살 점선 테두리를 두른다.
  // 시설 섹션이 album.items[0..3]을 이미 사용 중이므로, 겹치지 않게 [4..7] 인덱스를 우선 사용한다.
  // 기본 노출 개수: PC는 2열 기준 "2줄"(4개), 모바일은 1열 3개 — teachers/facilities와 동일한
  // 반응형 슬라이스 판단(렌더 시점 뷰포트 폭 기준).
  const prog = data.center.programs;
  const PROG_INITIAL_COUNT = (window.matchMedia && window.matchMedia('(max-width:719px)').matches) ? 3 : 4;
  function progCircleHtml(it, i, isOddLast){
    const img = albumImgs[i + 4] || albumImgs[i % Math.max(albumImgs.length,1)] || null;
    return `<div class="prog-circle-card reveal${isOddLast ? ' prog-odd-last' : ''}">
      <div class="prog-circle-pic">${img && img.photo ? `<img data-src="${esc(img.photo)}" alt="${esc(it.name)}">` : ''}</div>
      <div class="prog-circle-name">${esc(it.name)}</div>
      <div class="prog-circle-desc">${escWithBr(it.desc)}</div>
    </div>`;
  }
  if (prog) {
    const progItems = prog.items || [];
    if (albumImgs.length && albumImgs.length < 4 + progItems.length) {
      console.warn('[programSec] 앨범 이미지 부족, 반복 사용');
    }
    const initialItems = progItems.slice(0, PROG_INITIAL_COUNT);
    const restItems = progItems.slice(PROG_INITIAL_COUNT);
    const isOdd = progItems.length % 2 === 1;
    const initialHtml = initialItems.map((it,i)=>progCircleHtml(it, i, isOdd && restItems.length === 0 && i === initialItems.length - 1)).join('');
    const restHtml = restItems.map((it,i)=>progCircleHtml(it, i + PROG_INITIAL_COUNT, isOdd && i === restItems.length - 1)).join('');
    const hasMore = restItems.length > 0;
    $('programSec').innerHTML = `
      <div class="section-eyebrow reveal">골고루 배우는 하루</div>
      <h2 class="section-title reveal">우리 아이의 성장 프로그램</h2>
      <p class="section-intro reveal">${escWithBr(prog.intro)}</p>
      <div class="prog-circle-grid">${initialHtml}</div>
      ${hasMore ? `<div class="prog-circle-more" id="progMoreGrid">${restHtml}</div>` : ''}
      ${hasMore ? `
      <button type="button" class="fac-more-btn reveal" id="progMoreToggleBtn" aria-expanded="false">
        <span class="cloud-link">프로그램 전체 보기</span>
      </button>` : ''}`;

    // 시설 섹션과 동일한 인라인 펼치기/접기 토글
    const moreBtn = document.getElementById('progMoreToggleBtn');
    const moreGrid = document.getElementById('progMoreGrid');
    if (moreBtn && moreGrid) {
      moreBtn.addEventListener('click', function(){
        const expanded = moreGrid.classList.toggle('is-expanded');
        moreBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        moreBtn.querySelector('.cloud-link').textContent = expanded ? '접기' : '프로그램 전체 보기';
        if (!expanded) {
          const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          document.getElementById('programSec').scrollIntoView({ block: 'nearest', behavior: prefersReduced ? 'auto' : 'smooth' });
        }
      });
    }
  } else {
    document.getElementById('programSec').hidden = true;
  }

  // ── FAQ ──
  // FAQ 항목이 없으면 섹션을 숨긴다(overview/program/admissions 등 다른 빈 섹션과 동일한 처리).
  // 빈 상태로 렌더되면 pt56+pb36의 빈 밴드가 앞뒤 섹션 사이에 쌓여 여백이 과하게 벌어진다.
  const f = data.faqs;
  if (!(f && f.items && f.items.length)) {
    $('faq').hidden = true;
  } else {
    $('faq').innerHTML = `
      <div class="section-eyebrow reveal">${escWithBr(f?.eyebrow)}</div>
      <h2 class="section-title reveal">${escWithBr(f?.title)}</h2>
      <div class="faq-list">${(f?.items || []).map(it=>`
        <div class="faq-item reveal">
          <button class="faq-q" aria-expanded="false">${esc(it.q)}<span class="chev"></span></button>
          <div class="faq-a"><p>${escWithBr(it.a)}</p></div>
        </div>`).join('')}</div>`;
  }

  // ── 마무리 ──
  // 0단계 진단: centers.finale의 title/subtitle/cta가 빈 문자열로 들어오는 경우가 있어
  // (row.finale 자체는 존재해 JS 기본값 fallback이 발동하지 않음) 버튼에 텍스트가 전혀 안 보이는
  // 문제가 있었다. DB 값은 그대로 두고, 화면 표시 시점에만 빈 문자열일 때 기본 문구로 보완한다.
  const fin = data.finale || {};
  const finTitle = (fin.title || '').trim() ? fin.title : '함께해요, 우리 원';
  const finSubtitle = (fin.subtitle || '').trim() ? fin.subtitle : '궁금한 점이 있다면 언제든 편하게 문의해주세요.';
  const finCta = (fin.cta || '').trim() ? fin.cta : '입소상담 신청하기';
  $('finale').innerHTML = `
    <h2 class="reveal">${escWithBr(finTitle)}</h2>
    <p class="reveal">${escWithBr(finSubtitle)}</p>
    <button type="button" id="cslOpenBtn" class="btn-big btn-big-cta reveal">${esc(finCta)}</button>`;

  // ── 푸터 ──
  $('footerEl').innerHTML = `
    <div class="demo-tag">${esc(data.footer?.tag)}</div>
    <div>${escWithBr(data.footer?.text)}</div>`;

  document.title = `원이야 - ${esc(c.name) || '원이야'}`;

  // ─────────────────────────────────────────────
  // 2) 렌더가 끝난 뒤 인터랙션 초기화 (원본 동작 그대로)
  // ─────────────────────────────────────────────
  window.__directorData__ = c.director;
  window.__philosophyData__ = data.center.philosophy;
  window.__facilityData__ = data.center.facilities;
  if (isPreviewMode || isReviewMode){
    // 경고 모달은 "실제 신청/제출" 액션(입소상담·상담신청 버튼)에만 건다.
    // 정보 열람용 네비게이션 링크(자세히 보기·통학 안내)는 경고 대상에서 제외 —
    // 미리보기 모드에서도 admissions/directions 상세 페이지로 정상 이동해야 하므로.
    document.addEventListener('click', function(e){
      var action = e.target.closest('#cslOpenBtn, #askConsultBtn');
      if (!action) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      alert(isReviewMode ? REVIEW_MESSAGE : PREVIEW_MESSAGE);
    }, true);
  }
  initInteractions();
  renderInfoSections(data, c, esc, isPreviewMode, previewTemplateId, isReviewMode);
  if (isReviewMode) disableReviewDetailLinks();
  setupAskPanel(data.faqs);
  initConsultationForm(client, c.id);
})();

function initInteractions(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  initDeferredImages();

  // ── 원장 인사말 모달 ──
  (function(){
    var overlay = document.getElementById('directorModal');
    var closeBtn = document.getElementById('directorModalClose');
    var openBtn = document.getElementById('directorModalOpenBtn');
    if (!overlay) return;
    function open(){
      var d = window.__directorData__;
      var phil = window.__philosophyData__;
      if (d) {
        document.getElementById('directorModalMsg').textContent = (d.message || '').replace(/<br\s*\/?>/gi,'\n');
        var photoEl = document.getElementById('directorModalPhoto');
        if (photoEl) photoEl.innerHTML = d.photo ? '<img alt="'+esc(d.photo_alt||'')+'" src="'+esc(d.photo || '')+'">' : '';
      }
      var mottoEl = document.getElementById('directorModalMotto');
      var valEl = document.getElementById('directorModalValues');
      if (phil && mottoEl) {
        mottoEl.textContent = phil.motto || '';
        mottoEl.hidden = !phil.motto;
      }
      if (phil && valEl) {
        valEl.innerHTML = (phil.values||[]).map(function(v){
          return '<span class="info-modal-value">'+esc(v)+'</span>';
        }).join('');
      }
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); }
    if (openBtn) openBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // (시설 모달은 제거됨 — "시설 전체 보기"는 facilitiesSec 렌더 시점에 인라인 펼치기로 처리)
  // (교육프로그램 모달도 제거됨 — "프로그램 전체 보기"는 programSec 렌더 시점에 인라인 펼치기로 처리)

  // ── 라이트박스 ──
  (function(){
    var overlay = document.getElementById('lightbox');
    var closeBtn = document.getElementById('lightboxClose');
    var img = document.getElementById('lightboxImg');
    var cap = document.getElementById('lightboxCap');
    if (!overlay) return;
    function open(src, alt){
      img.src = src; img.alt = alt || '';
      cap.textContent = alt || '';
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); img.src=''; }
    window.__openLightbox__ = open;
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // ── 시설 사진 전용 라이트박스 (이전/다음 순환 탐색) ──
  // 위 공용 #lightbox와 완전히 분리된 독립 오버레이 — facilitiesSec 전용이며 programSec에는 연결하지 않는다.
  (function(){
    var overlay = document.getElementById('facLightbox');
    var closeBtn = document.getElementById('facLightboxClose');
    var prevBtn = document.getElementById('facLightboxPrev');
    var nextBtn = document.getElementById('facLightboxNext');
    var imgEl = document.getElementById('facLightboxImg');
    var capEl = document.getElementById('facLightboxCap');
    if (!overlay) return;
    var items = [];
    var current = 0;
    function render(){
      var it = items[current];
      if (!it) return;
      imgEl.src = it.photo || '';
      imgEl.alt = it.caption || '';
      capEl.textContent = it.caption || '';
    }
    function open(index, list){
      items = list || [];
      if (!items.length) return;
      current = ((index % items.length) + items.length) % items.length;
      render();
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); imgEl.src = ''; }
    function next(){ current = (current + 1) % items.length; render(); }
    function prev(){ current = (current - 1 + items.length) % items.length; render(); }
    window.__openFacLightbox__ = open;
    closeBtn.addEventListener('click', close);
    nextBtn.addEventListener('click', next);
    prevBtn.addEventListener('click', prev);
    overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });
    document.addEventListener('keydown', function(e){
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    });
  })();

  // ── '우리 반' 버튼 → ourclass.html ──
  var ourclassBtn = document.getElementById('ourclassBtn');
  if (ourclassBtn) ourclassBtn.addEventListener('click', function(e){
    e.preventDefault();
    location.href = 'ourclass.html';
  });

  // ── 앨범 이미지 라이트박스 연결 ──
  document.querySelectorAll('.polaroid img, .snap img, .art img, .photo-grid img').forEach(function(img){
    img.style.cursor = 'pointer';
    img.addEventListener('click', function(){
      if (window.__openLightbox__ && img.src) window.__openLightbox__(img.src, img.alt);
    });
  });

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:0.15});
  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });

  // (원장 인사말 줄 단위 페이드인은 섹션 통합으로 제거됨 — 책 페이지의 .reveal이 담당)

  var palettes = {
    'morning':   {top:'#FCE9D2',bot:'#FFF6EC',sx:'16%',sy:'20%',sc:'#FFE08A',glow:'rgba(255,210,130,.55)'},
    'mid-morning':{top:'#D8EEF6',bot:'#FBF6EE',sx:'40%',sy:'14%',sc:'#FFEFA8',glow:'rgba(255,225,150,.5)'},
    'noon':      {top:'#CDEAF2',bot:'#FFFDF6',sx:'50%',sy:'10%',sc:'#FFF6C2',glow:'rgba(255,240,170,.55)'},
    'afternoon': {top:'#E6E0F0',bot:'#FDEFE4',sx:'66%',sy:'18%',sc:'#FFD99A',glow:'rgba(255,200,140,.5)'},
    'dusk':      {top:'#F6C9A8',bot:'#FBE3D2',sx:'84%',sy:'30%',sc:'#FF9E66',glow:'rgba(255,150,90,.55)'}
  };
  var root = document.documentElement.style;
  function applyPalette(p){
    root.setProperty('--sky-top',p.top);
    root.setProperty('--sky-bottom',p.bot);
    root.setProperty('--sun-x',p.sx);
    root.setProperty('--sun-y',p.sy);
    root.setProperty('--sun-color',p.sc);
    root.setProperty('--sun-glow',p.glow);
  }

  // ── 동화책 페이지 전환 컨트롤러 (3D 힌지 플립 + 스토리북 배경음악) ──
  // 표지→원장→스토리→마무리를 왼쪽 책등 축 rotateY 힌지 플립으로 넘긴다.
  // 활성 페이지의 data-slot으로 기존 시간대 빛 흐름(palettes)을 재사용해 시그니처를 유지한다.
  (function(){
    var book = document.querySelector('.storybook');
    if (!book) return;
    var pages = Array.prototype.slice.call(book.querySelectorAll('.sb-page'));
    var dots  = Array.prototype.slice.call(book.querySelectorAll('.sb-dots button'));
    var prevBtn = book.querySelector('.sb-arrow.prev');
    var nextBtn = book.querySelector('.sb-arrow.next');
    var muteBtn = book.querySelector('.sb-mute');
    if (!pages.length) return;

    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var FLIP_MS = 440; // 3D 힌지 플립 전체 지속시간 (CSS transition과 일치)

    // reduced-motion 사용자는 기본 음소거(단, 토글로 다시 켤 수 있음).
    // 소리 on/off 상태(배경음+클릭 효과음 공통)는 WoniyaSound(page-flip-sound.js)가 관리한다.
    if (reduceMotion && localStorage.getItem('woniya_sound_muted') === null){
      WoniyaSound.setMuted(true);
    }
    function reflectMute(){
      if (!muteBtn) return;
      muteBtn.classList.toggle('is-muted', WoniyaSound.isMuted());
      muteBtn.setAttribute('aria-pressed', WoniyaSound.isMuted() ? 'true' : 'false');
    }

    // ── 스토리북 배경음악 (mp3 루프, 화면에 보이는 동안만 페이드 인/아웃) ──
    var bgm = book.parentElement ? book.parentElement.querySelector('.sb-bgm') : document.querySelector('.sb-bgm');
    var bgmSrcLoaded = false;
    var FADE_IN_MS = 700;
    var FADE_OUT_MS = 500;
    var TARGET_VOLUME = 0.25;
    var fadeTimer = null;
    var pendingPlay = false; // 자동재생이 막혔을 때 첫 사용자 제스처를 기다리는 플래그

    function ensureBgmLoaded(){
      if (bgmSrcLoaded || !bgm) return;
      var srcEl = bgm.querySelector('source[data-src]');
      if (srcEl){
        srcEl.setAttribute('src', srcEl.getAttribute('data-src'));
        bgm.load();
      }
      bgmSrcLoaded = true;
    }

    function fadeTo(targetVol, durationMs, onDone){
      if (!bgm) return;
      if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
      var steps = 16;
      var stepTime = durationMs / steps;
      var startVol = bgm.volume;
      var diff = targetVol - startVol;
      var i = 0;
      fadeTimer = setInterval(function(){
        i++;
        bgm.volume = Math.min(1, Math.max(0, startVol + diff * (i / steps)));
        if (i >= steps){
          clearInterval(fadeTimer); fadeTimer = null;
          if (onDone) onDone();
        }
      }, stepTime);
    }

    function tryPlayBgm(){
      if (!bgm || WoniyaSound.isMuted()) return;
      ensureBgmLoaded();
      bgm.volume = 0;
      var p = bgm.play();
      if (p && p.catch){
        p.then(function(){
          pendingPlay = false;
          fadeTo(TARGET_VOLUME, FADE_IN_MS);
        }).catch(function(){
          // 자동재생 차단됨 — 다음 사용자 제스처(클릭)에서 다시 시도
          pendingPlay = true;
        });
      } else {
        fadeTo(TARGET_VOLUME, FADE_IN_MS);
      }
    }

    function stopBgm(){
      if (!bgm) return;
      pendingPlay = false;
      fadeTo(0, FADE_OUT_MS, function(){ bgm.pause(); });
    }

    // 스토리북이 화면에 보이는 동안만 배경음 재생
    if ('IntersectionObserver' in window){
      var bgmIo = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if (entry.isIntersecting) tryPlayBgm();
          else stopBgm();
        });
      }, { threshold: 0.35 });
      bgmIo.observe(book);
    }

    // 자동재생이 막혔을 경우 첫 사용자 제스처(화살표/점 클릭)에서 재시도
    document.addEventListener('click', function retryOnGesture(){
      if (pendingPlay) tryPlayBgm();
    }, { passive: true });

    reflectMute();
    if (muteBtn) muteBtn.addEventListener('click', function(){
      WoniyaSound.setMuted(!WoniyaSound.isMuted());
      reflectMute();
      if (WoniyaSound.isMuted()) {
        stopBgm();
      } else {
        // 현재 스토리북이 보이는 상태라면 바로 재생 시도
        var rect = book.getBoundingClientRect();
        var inView = rect.top < window.innerHeight && rect.bottom > 0;
        if (inView) tryPlayBgm();
      }
    });

    WoniyaSound.onMuteChange(function(isMuted){
      // 다른 곳(예: 향후 추가될 다른 소리 컨트롤)에서 음소거가 바뀌어도 스토리북 BGM이 즉시 반응하도록
      if (isMuted) { stopBgm(); }
    });

    var idx = 0;
    var flipping = false;

    function render(next){
      if (next < 0 || next >= pages.length || next === idx || flipping) return;
      var incoming = pages[next];
      var outgoing = pages[idx];

      if (reduceMotion){
        outgoing.classList.remove('is-active');
        incoming.classList.add('is-active');
        idx = next; sync();
        return;
      }

      flipping = true;
      WoniyaSound.playFlip();
      var forward = next > idx;

      if (forward){
        // 들어오는 페이지를 먼저 바닥에 깔고, 나가는 페이지가 그 위에서 넘어간다
        incoming.classList.add('is-active');
        outgoing.classList.remove('is-active');
        outgoing.classList.add('sb-leave');
        void outgoing.offsetWidth; // 리플로우 후 트랜지션 시작
        outgoing.classList.add('sb-go');
      } else {
        // 나가는 페이지는 바닥에 그대로 두고, 들어오는 페이지가 접힌 채 위에서 펼쳐진다
        incoming.classList.add('sb-enter');
        void incoming.offsetWidth;
        incoming.classList.add('sb-go');
      }

      window.setTimeout(function(){
        if (forward){
          outgoing.classList.remove('sb-leave','sb-go');
        } else {
          incoming.classList.remove('sb-enter','sb-go');
          incoming.classList.add('is-active');
          outgoing.classList.remove('is-active');
        }
        idx = next; sync();
        flipping = false;
      }, FLIP_MS);
    }

    function sync(){
      dots.forEach(function(d,i){
        d.classList.toggle('on', i === idx);
        d.setAttribute('aria-selected', i === idx ? 'true' : 'false');
      });
      if (prevBtn) prevBtn.disabled = (idx === 0);
      if (nextBtn) nextBtn.disabled = (idx === pages.length - 1);
      var slot = pages[idx].getAttribute('data-slot');
      if (slot && palettes[slot]) applyPalette(palettes[slot]);
      pages.forEach(function(p,i){ p.setAttribute('aria-hidden', i === idx ? 'false' : 'true'); });
      predecodeNeighbors();
    }

    // 인접 페이지(이전/다음) 이미지를 미리 디코딩해 플립 도중 이미지 디코딩으로 인한
    // 지연이 생기지 않게 한다. img.decode()는 별도 스레드에서 비동기로 수행된다.
    // (참고: 실제로는 초기 로드 시 img[data-src]가 IntersectionObserver(rootMargin:200px)로
    // 이미 전부 src가 채워져 있어 이 단계에서는 디코딩만 남아있는 경우가 대부분이다.)
    function predecodeNeighbors(){
      [idx - 1, idx + 1].forEach(function(i){
        var p = pages[i];
        if (!p) return;
        var img = p.querySelector('img[src]');
        if (img && img.decode) img.decode().catch(function(){});
      });
    }

    pages[0].classList.add('is-active');
    sync();

    if (prevBtn) prevBtn.addEventListener('click', function(){ render(idx - 1); });
    if (nextBtn) nextBtn.addEventListener('click', function(){ render(idx + 1); });
    dots.forEach(function(d,i){ d.addEventListener('click', function(){ render(i); }); });

    // 키보드 화살표(←/→). 책이 뷰포트에 보일 때만 반응.
    document.addEventListener('keydown', function(e){
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      var r = book.getBoundingClientRect();
      var visible = r.top < window.innerHeight * 0.8 && r.bottom > window.innerHeight * 0.2;
      if (!visible) return;
      if (e.key === 'ArrowRight') render(idx + 1);
      else render(idx - 1);
    });

    // 모바일 스와이프
    var tx = 0, ty = 0;
    book.addEventListener('touchstart', function(e){
      tx = e.changedTouches[0].clientX; ty = e.changedTouches[0].clientY;
    }, {passive:true});
    book.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - tx;
      var dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
        if (dx < 0) render(idx + 1);
        else render(idx - 1);
      }
    }, {passive:true});
  })();

  var c1=document.getElementById('cloud1'), c2=document.getElementById('cloud2');
  var ticking=false;
  if(!reduce){
    window.addEventListener('scroll',function(){
      if(!ticking){ window.requestAnimationFrame(function(){
        var y=window.scrollY;
        c1.style.transform='translateX('+(-y*0.04)+'px)';
        c2.style.transform='translateX('+(y*0.05)+'px)';
        ticking=false;
      }); ticking=true; }
    },{passive:true});
  }

  document.querySelectorAll('.flip:not(.is-static)').forEach(function(card){
    function toggle(){ card.classList.toggle('flipped'); }
    card.addEventListener('click',toggle);
    card.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); toggle(); } });
  });

  var floatEl=document.getElementById('float');
  var hero=document.querySelector('.hero');
  var finale=document.getElementById('finale');
  var fio=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.target===hero){ if(e.isIntersecting){ floatEl.classList.remove('show'); } else { floatEl.classList.add('show'); } }
      if(e.target===finale){ if(e.isIntersecting){ floatEl.classList.add('hide'); } else { floatEl.classList.remove('hide'); } }
    });
  },{threshold:0.4});
  fio.observe(hero); fio.observe(finale);

  // 헤더 스크롤 전환 (투명 → 흰 배경). 순수 표시용 클래스 토글, 데이터/로직 아님.
  var topbarScrollEl=document.getElementById('topbar');
  if (topbarScrollEl){
    var handleTopbarScroll=function(){
      topbarScrollEl.classList.toggle('scrolled', window.scrollY > 24);
    };
    window.addEventListener('scroll', handleTopbarScroll, {passive:true});
    handleTopbarScroll();
  }

  var menuBtn=document.getElementById('menuBtn');
  var menuPanel=document.getElementById('menuPanel');
  function closeMenu(){ menuBtn.classList.remove('open'); menuPanel.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false'); }
  menuBtn.addEventListener('click',function(){
    var open=menuPanel.classList.toggle('open');
    menuBtn.classList.toggle('open',open);
    menuBtn.setAttribute('aria-expanded',open?'true':'false');
  });
  menuPanel.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',closeMenu); });
  document.addEventListener('click',function(e){
    if(!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) closeMenu();
  });

  document.querySelectorAll('.faq-item').forEach(function(item){
    var q=item.querySelector('.faq-q');
    var a=item.querySelector('.faq-a');
    q.addEventListener('click',function(){
      var open=item.classList.toggle('open');
      q.setAttribute('aria-expanded',open?'true':'false');
      a.style.maxHeight = open ? (a.scrollHeight+'px') : null;
    });
  });
}

function setupAskPanel(faqs){
  var fab = document.getElementById('askFab');
  var overlay = document.getElementById('askModal');
  var closeBtn = document.getElementById('askModalClose');
  var list = document.getElementById('askFaqList');
  var empty = document.getElementById('askFaqEmpty');
  var consultBtn = document.getElementById('askConsultBtn');
  if (!fab || !overlay || !list || !consultBtn) return;
  function askEsc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); }
  function askWithBr(s){ return askEsc(s).replace(/\n/g,'<br>'); }
  var items = (faqs && faqs.items) || [];
  list.innerHTML = items.map(function(it){
    return '<div class="ask-faq-item">'
      + '<button type="button" class="ask-faq-q" aria-expanded="false">' + askEsc(it.q) + '</button>'
      + '<div class="ask-faq-a"><p>' + askWithBr(it.a) + '</p></div>'
      + '</div>';
  }).join('');
  if (empty) empty.hidden = items.length > 0;
  function open(){ overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false'); }
  function close(){ overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true'); }
  fab.addEventListener('click', open);
  if (closeBtn) closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
  list.querySelectorAll('.ask-faq-item').forEach(function(item){
    var q = item.querySelector('.ask-faq-q');
    var a = item.querySelector('.ask-faq-a');
    q.addEventListener('click', function(){
      var openItem = item.classList.toggle('open');
      q.setAttribute('aria-expanded', openItem ? 'true' : 'false');
      a.style.maxHeight = openItem ? (a.scrollHeight + 'px') : null;
    });
  });
  consultBtn.addEventListener('click', function(){
    if (isPreviewMode || isReviewMode){
      alert(isReviewMode ? REVIEW_MESSAGE : PREVIEW_MESSAGE);
      return;
    }
    close();
    var target = document.getElementById('cslOpenBtn');
    if (target) target.click();
    else location.hash = '#finale';
  });
}

function initDeferredImages(){
  var imgs = document.querySelectorAll('img[data-src]');
  if (!imgs.length) return;
  function load(img){
    if (!img.dataset.src) return;
    img.src = img.dataset.src;
    img.removeAttribute('data-src');
  }
  if (!('IntersectionObserver' in window)){
    imgs.forEach(load);
    return;
  }
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (!entry.isIntersecting) return;
      load(entry.target);
      observer.unobserve(entry.target);
    });
  }, { rootMargin: '200px' });
  imgs.forEach(function(img){ observer.observe(img); });
}

function renderInfoSections(data, c, esc, isPreviewMode, previewTemplateId, isReviewMode){
  // M2: 입학안내·오시는 길은 공개형 새 페이지로 분리. 메인에는 요약+이동 버튼만 남긴다.

  // 실제 원(공개/관리자 미리보기)에서는 기존처럼 ?slug=<slug>로 연결한다.
  var qs = (isPreviewMode && previewTemplateId)
    ? ('?preview=' + encodeURIComponent(previewTemplateId))
    : (c.slug ? ('?slug=' + encodeURIComponent(c.slug)) : '');

    else {

      var admLinkHtml = isReviewMode
        ? '<span class="info-link-btn cloud-link">검수 모드에서는 별도 페이지 이동이 제한됩니다</span>'
        : '<a class="info-link-btn cloud-link" href="admissions.html' + qs + '">자세히 보기 →</a>';
      admSec.innerHTML = '<div class="section-eyebrow">함께해요</div>'
        + '<h2 class="info-title">입학안내</h2>'
        + '<div class="adm-preview">'
        + (adm.target ? '<div class="adm-preview-row"><span class="adm-icon">'+ADM_ICON_PERSON+'</span><div><div class="adm-preview-label">모집 대상</div><div class="adm-preview-value">'+esc(adm.target)+'</div></div></div>' : '')
        + (adm.period ? '<div class="adm-preview-row"><span class="adm-icon">'+ADM_ICON_CALENDAR+'</span><div><div class="adm-preview-label">모집 기간</div><div class="adm-preview-value">'+esc(adm.period)+'</div></div></div>' : '')
        + '</div>'
        + admLinkHtml;
    }
  }
  var dirSec = document.getElementById('directionsSec');
  if (dirSec){
    if (!(c.directions_text || '').trim()){ dirSec.hidden = true; }
    else {
      dirSec.hidden = false;
      dirSec.innerHTML = '<div class="section-eyebrow">오시는 길을 알려드려요</div>'
        + '<h2 class="info-title">오시는 길</h2>'
        + '<div class="dir-preview"><p class="info-lead" style="margin:0">지도와 교통편·주차 안내를 확인하세요.</p></div>'
        + '<a class="info-link-btn cloud-link" href="directions.html' + qs + '">통학 안내 →</a>';
    }
  }
}

// 카카오맵 JS SDK: 주소 검색 후 마커 표시. 키는 kakao-config.js(window.__KAKAO_CONFIG__)에서 주입.
function loadKakaoMap(address, containerId){
  var cfg = window.__KAKAO_CONFIG__;
  var container = document.getElementById(containerId);
  if (!container || !address) return;
  if (!cfg || !cfg.appkey){ console.warn('[kakao] appkey 없음 — 지도를 건너뜁니다.'); return; }
  function render(){
    kakao.maps.load(function(){
      var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 });
      var geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(address, function(result, status){
        if (status === kakao.maps.services.Status.OK){
          var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
          map.setCenter(coords);
          new kakao.maps.Marker({ map: map, position: coords });
        }
      });
    });
  }
  if (window.kakao && window.kakao.maps){ render(); return; }
  if (!window.__kakaoSDKPromise){
    window.__kakaoSDKPromise = new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(cfg.appkey) + '&libraries=services&autoload=false';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  window.__kakaoSDKPromise.then(render).catch(function(){ console.error('[kakao] SDK 로드 실패'); });
}

function initConsultationForm(client, centerId){
  var overlay = document.getElementById('cslOverlay');
  var openBtn = document.getElementById('cslOpenBtn');
  var closeBtn = document.getElementById('cslCloseBtn');
  var form = document.getElementById('cslForm');
  var errorEl = document.getElementById('cslError');
  var formWrap = document.getElementById('cslFormWrap');
  var doneWrap = document.getElementById('cslDoneWrap');

  function openModal(){
    if (isPreviewMode || isReviewMode){
      alert(isReviewMode ? REVIEW_MESSAGE : PREVIEW_MESSAGE);
      return;
    }
    overlay.classList.add('open');
    formWrap.hidden = false;
    doneWrap.hidden = true;
    form.reset();
    errorEl.textContent = '';
  }
  function closeModal(){ overlay.classList.remove('open'); }

  if (openBtn) openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorEl.textContent = '';
    if (isPreviewMode || isReviewMode){
      alert(isReviewMode ? REVIEW_MESSAGE : PREVIEW_MESSAGE);
      return;
    }

    var consentChecked = document.getElementById('csl-consent').checked;
    if (!consentChecked){
      errorEl.textContent = '개인정보 수집 동의가 필요해요.';
      return;
    }

    var payload = {
      center_id: centerId,
      parent_name: document.getElementById('csl-name').value,
      phone: document.getElementById('csl-phone').value,
      kind: document.getElementById('csl-kind').value,
      wish_class: document.getElementById('csl-class').value || null,
      wish_time: document.getElementById('csl-time').value || null,
      consent_at: new Date().toISOString()
    };

    var submitBtn = form.querySelector('.csl-submit');
    submitBtn.disabled = true;
    var { error } = await client.from('consultations').insert(payload);
    submitBtn.disabled = false;

    if (error){
      console.error(error);
      errorEl.textContent = '접수 중 문제가 생겼어요. 다시 시도해주세요.';
      return;
    }

    formWrap.hidden = true;
    doneWrap.hidden = false;
  });
}
