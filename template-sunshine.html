<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 햇살가득 어린이집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    /* 빛의 흐름: 스크롤에 따라 JS가 바꿔줌 */
    --sky-top:#FCE9D2;
    --sky-bottom:#FFF6EC;
    --sun-x:18%;
    --sun-y:22%;
    --sun-color:#FFE08A;
    --sun-glow:rgba(255,210,130,.55);
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
    --fs-hero:clamp(3rem,10vw,3.6rem);
    --fs-section-title:1.8rem;
    --fs-card-title:1.24rem;
    --fs-body:.98rem;
    --fs-caption:.9rem;
    --section-padding-default:72px 0 44px;
    --section-padding-tight:56px 0 36px;
    --section-padding-finale:84px 0 128px;
    --card-radius:20px;
    --card-radius-lg:22px;
    --card-shadow:0 16px 38px -22px rgba(120,80,60,.34);
    --card-shadow-hover:0 24px 48px -22px rgba(120,80,60,.46);
    --badge-bg:#FFF1EA;
    --badge-text:var(--coral-deep);
    --badge-border:#FFD7CB;
    --line-warm:#F1E2D8;
    --surface-pink:#FFF1EA;
    --surface-pink-soft:#FFF7F3;
    --status-warn:#D98A2B;
    --status-danger:#D85C57;

    /* ── T1 히어로 스크림 / 헤더 스크롤 / 원장 필 버튼 (M6.4~M6.5) ── */
    --topbar-bg-idle:rgba(255,255,255,.65);
    --topbar-bg-scrolled:rgba(255,255,255,.96);
    --topbar-blur-idle:8px;
    --topbar-blur-scrolled:10px;
    --topbar-text:var(--ink);
    --topbar-transition:background .35s ease,box-shadow .35s ease,backdrop-filter .35s ease;

    --hero-scrim-start:rgba(60,32,20,.72);
    --hero-scrim-mid:rgba(70,40,24,.32);
    --hero-scrim-end:rgba(80,46,28,0);

    --cloud-btn-bg:rgba(255,255,255,.92);
    --cloud-btn-text:var(--coral-deep);
    --cloud-btn-border:var(--badge-border);

    --day-frame-ratio:4/3;
    --day-frame-max-height:420px;

    --hero-glow-size:min(70vw,520px);
    --hero-glow-blur:60px;
    --hero-glow-duration:7s;

    --day-card-bg:var(--surface-pink-soft);
    --day-card-border:var(--badge-border);
    --day-text-gap:24px;

    --hero-fade-height:34%;
    --hero-glow-color:rgba(255,232,170,.5);
    --hero-text-shadow:0 2px 4px rgba(40,24,14,.5),0 8px 20px rgba(40,24,14,.4);
    --hero-text-stroke-width:.4px;

    --cloud-float-duration:3.6s;

    --day-badge-icon-size:14px;

    --mobile-side-padding:22px;
    --day-cloud-tail-size:18px;
  }

  @media (max-width:480px){
    :root{ --mobile-side-padding:20px; }
  }

  /* ── T2 차분한 내추럴 ── */
  [data-theme="natural"]{
    --cream:#F4F0E8;
    --ink:#2E2A1E;
    --ink-soft:#6B6347;
    --coral:#7EA86A;
    --coral-deep:#5C8A47;
    --sage:#A89060;
    --sky-top:#E8EFE0;
    --sky-bottom:#F4F0E8;
    --sun-color:#C8D89A;
    --sun-glow:rgba(160,200,120,.45);
  }
  [data-theme="natural"] .hero .eyebrow,
  [data-theme="natural"] .hero h1 .glow{ color:#5C8A47 }
  [data-theme="natural"] .cloud-link:hover{ color:#5C8A47 }
  [data-theme="natural"] .btn-big{ background:#7EA86A;box-shadow:0 16px 34px -10px #5C8A47 }
  [data-theme="natural"] .float a{ background:#3D5C2E }
  [data-theme="natural"] .float a .pulse{ background:#7EA86A;box-shadow:0 0 0 0 rgba(126,168,106,.6) }
  [data-theme="natural"] .menu-panel a.menu-cta{ background:#7EA86A }
  [data-theme="natural"] .tag-event{ background:#7EA86A }
  [data-theme="natural"] .day-cell.ev{ background:#EBF2E4;color:#5C8A47 }
  [data-theme="natural"] .day-cell.ev::after{ background:#7EA86A }
  [data-theme="natural"] .event-list .e-date{ color:#5C8A47 }
  [data-theme="natural"] .more-link{ color:#5C8A47 }
  [data-theme="natural"] .faq-q .chev{ border-color:#7EA86A }
  [data-theme="natural"] .section-eyebrow{ color:#A89060 }
  [data-theme="natural"] .topbar{ background:rgba(244,240,232,.72) }
  [data-theme="natural"] .back{ background:linear-gradient(135deg,#7EA86A,#5C8A47) }
  [data-theme="natural"] .frame{ background:linear-gradient(135deg,#d4e8c4,#b8d4a0) }
  [data-theme="natural"] .frame.alt{ background:linear-gradient(135deg,#e8d4a0,#d4bc80) }
  [data-theme="natural"] .frame.alt2{ background:linear-gradient(135deg,#c4d4b0,#a8c090) }
  [data-theme="natural"] .csl-field input:focus,
  [data-theme="natural"] .csl-field select:focus{ border-color:#7EA86A }

  /* ── T3 밝고 활기찬 ── */
  [data-theme="vivid"]{
    --cream:#F0F8FF;
    --ink:#1A2E3A;
    --ink-soft:#4A6070;
    --coral:#FF6B35;
    --coral-deep:#E8501A;
    --sage:#4AABCC;
    --sky-top:#C8E8F8;
    --sky-bottom:#F0F8FF;
    --sun-color:#FFE040;
    --sun-glow:rgba(255,210,60,.55);
  }
  [data-theme="vivid"] .hero .eyebrow,
  [data-theme="vivid"] .hero h1 .glow{ color:#E8501A }
  [data-theme="vivid"] .cloud-link:hover{ color:#E8501A }
  [data-theme="vivid"] .btn-big{ background:#FF6B35;box-shadow:0 16px 34px -10px #E8501A }
  [data-theme="vivid"] .float a{ background:#1A2E3A }
  [data-theme="vivid"] .float a .pulse{ background:#FF6B35;box-shadow:0 0 0 0 rgba(255,107,53,.6) }
  [data-theme="vivid"] .menu-panel a.menu-cta{ background:#FF6B35 }
  [data-theme="vivid"] .tag-event{ background:#FF6B35 }
  [data-theme="vivid"] .day-cell.ev{ background:#FFF0E8;color:#E8501A }
  [data-theme="vivid"] .day-cell.ev::after{ background:#FF6B35 }
  [data-theme="vivid"] .event-list .e-date{ color:#E8501A }
  [data-theme="vivid"] .more-link{ color:#E8501A }
  [data-theme="vivid"] .faq-q .chev{ border-color:#FF6B35 }
  [data-theme="vivid"] .section-eyebrow{ color:#4AABCC }
  [data-theme="vivid"] .topbar{ background:rgba(240,248,255,.72) }
  [data-theme="vivid"] .back{ background:linear-gradient(135deg,#FF6B35,#E8501A) }
  [data-theme="vivid"] .frame{ background:linear-gradient(135deg,#C8E8F8,#A0D4F0) }
  [data-theme="vivid"] .frame.alt{ background:linear-gradient(135deg,#FFE0A0,#FFD070) }
  [data-theme="vivid"] .frame.alt2{ background:linear-gradient(135deg,#C8F0D8,#A0E0BC) }
  [data-theme="vivid"] .csl-field input:focus,
  [data-theme="vivid"] .csl-field select:focus{ border-color:#FF6B35 }

  /* ── T4 모던 미니멀 ── */
  [data-theme="minimal"]{
    --cream:#F7F7F5;
    --ink:#1A1A1A;
    --ink-soft:#666660;
    --coral:#2B4C8C;
    --coral-deep:#1A3470;
    --sage:#8C8C8A;
    --sky-top:#E8E8E4;
    --sky-bottom:#F7F7F5;
    --sun-color:#D4D4CC;
    --sun-glow:rgba(180,180,170,.35);
  }
  [data-theme="minimal"] .hero .eyebrow,
  [data-theme="minimal"] .hero h1 .glow{ color:#1A3470 }
  [data-theme="minimal"] .cloud-link:hover{ color:#1A3470 }
  [data-theme="minimal"] .btn-big{ background:#2B4C8C;box-shadow:0 16px 34px -10px #1A3470 }
  [data-theme="minimal"] .float a{ background:#1A1A1A }
  [data-theme="minimal"] .float a .pulse{ background:#2B4C8C;box-shadow:0 0 0 0 rgba(43,76,140,.6) }
  [data-theme="minimal"] .menu-panel a.menu-cta{ background:#2B4C8C }
  [data-theme="minimal"] .tag-event{ background:#2B4C8C }
  [data-theme="minimal"] .day-cell.ev{ background:#E8EEF8;color:#1A3470 }
  [data-theme="minimal"] .day-cell.ev::after{ background:#2B4C8C }
  [data-theme="minimal"] .event-list .e-date{ color:#1A3470 }
  [data-theme="minimal"] .more-link{ color:#1A3470 }
  [data-theme="minimal"] .faq-q .chev{ border-color:#2B4C8C }
  [data-theme="minimal"] .section-eyebrow{ color:#8C8C8A }
  [data-theme="minimal"] .topbar{ background:rgba(247,247,245,.82) }
  [data-theme="minimal"] .back{ background:linear-gradient(135deg,#2B4C8C,#1A3470) }
  [data-theme="minimal"] .frame{ background:linear-gradient(135deg,#D8D8D4,#C4C4C0) }
  [data-theme="minimal"] .frame.alt{ background:linear-gradient(135deg,#D4D8E4,#B8C0D4) }
  [data-theme="minimal"] .frame.alt2{ background:linear-gradient(135deg,#D8E4D4,#C0D4BC) }
  [data-theme="minimal"] .csl-field input:focus,
  [data-theme="minimal"] .csl-field select:focus{ border-color:#2B4C8C }
  [data-theme="minimal"] .cloud-link{ filter:drop-shadow(0 6px 10px rgba(0,0,0,.12)) }
  [data-theme="minimal"] .sun{ opacity:0.3 }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    overflow-x:hidden;
    font-size:var(--fs-body);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 빛 배경 레이어 ── */
  .sky{
    position:fixed;inset:0;z-index:-2;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%);
    transition:background 1.2s ease;
  }
  .sun{
    position:fixed;z-index:-1;
    width:170px;height:170px;border-radius:50%;
    left:var(--sun-x);top:var(--sun-y);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 50%,var(--sun-color) 0%,var(--sun-color) 38%,transparent 70%);
    box-shadow:0 0 90px 50px var(--sun-glow);
    transition:left 1.4s ease,top 1.4s ease,background 1.4s ease,box-shadow 1.4s ease;
    pointer-events:none;
  }
  .cloud{
    position:fixed;z-index:-1;pointer-events:none;
    color:#fff;opacity:.7;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.04));
    transition:opacity 1.2s ease;
  }
  .cloud svg{display:block}

  /* ── 상단 메뉴바 — 기본부터 반투명 흰 배경, 스크롤 시 완전 불투명으로 전환. 텍스트는 항상 어두운 색 고정 ── */
  /* 헤더 하단을 구름 밑단(둥근 돌기 반복) 실루엣으로.
     mask: 하단에 원형 dip을 가로로 반복해 구름 돌기 모양으로 잘라낸다(backdrop-blur까지 함께 클립).
     돌기 깊이(--cloud-dip)만큼 아래로 더 내려오므로, 콘텐츠가 잘리지 않게 하단 패딩을 그만큼 더 준다.
     box-shadow는 잘린 실루엣을 못 따라가므로 filter:drop-shadow로 대체. */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:40;
    --cloud-dip:16px; --cloud-unit:64px;
    padding:12px 0 calc(12px + var(--cloud-dip));
    background:var(--topbar-bg-idle);
    backdrop-filter:blur(var(--topbar-blur-idle));-webkit-backdrop-filter:blur(var(--topbar-blur-idle));
    filter:drop-shadow(0 2px 3px rgba(180,140,110,.14));
    transition:var(--topbar-transition);
    -webkit-mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
    mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
  }
  .topbar.scrolled{background:var(--topbar-bg-scrolled);backdrop-filter:blur(var(--topbar-blur-scrolled));-webkit-backdrop-filter:blur(var(--topbar-blur-scrolled));filter:drop-shadow(0 3px 5px rgba(180,140,110,.2))}
  @media (max-width:719px){
    .topbar{--cloud-dip:12px; --cloud-unit:52px}
  }
  .topbar .brand{font-family:var(--display);font-size:var(--fs-card-title);color:var(--topbar-text);text-decoration:none;letter-spacing:-.5px}
  .menu-btn{visibility:hidden;width:40px;height:40px;border:none;background:transparent;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;border-radius:10px}
  .menu-btn span{width:22px;height:2.5px;background:var(--ink);border-radius:2px;transition:transform .3s ease,opacity .3s ease}
  .menu-btn.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .menu-btn.open span:nth-child(2){opacity:0}
  .menu-btn.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .menu-panel{position:fixed;top:62px;right:14px;left:14px;z-index:41;background:var(--paper);border-radius:var(--card-radius);box-shadow:var(--card-shadow-hover);padding:10px;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(-10px);transition:opacity .3s ease,transform .3s ease,visibility .3s}
  .menu-panel.open{opacity:1;visibility:visible;transform:none}
  .menu-panel a{padding:14px 16px;text-decoration:none;color:var(--ink);font-weight:600;border-radius:12px;font-size:1rem}
  .menu-panel a:hover{background:var(--cream)}
  .menu-panel a.menu-cta{background:var(--coral);color:#fff;text-align:center;margin-top:6px}
  /* PC: 메뉴 드롭다운이 화면 전체 폭으로 펼쳐지지 않도록 본문 컬럼(.wrap max-width:560px) 폭에 맞춤.
     .wrap이 가운데 정렬되므로, 메뉴는 그 컬럼의 오른쪽 가장자리에 맞춰 우측 정렬한다. 모바일은 기존 유지. */
  @media (min-width:600px){
    .menu-panel{
      left:auto;width:280px;max-width:calc(100vw - 28px);
      right:max(14px, calc((100vw - 560px) / 2 + 14px));
    }
  }

  /* ── 공통 ── */
  .wrap{max-width:560px;margin:0 auto;padding:0 var(--mobile-side-padding);position:relative}
  .reveal{opacity:0;transform:translateY(34px);transition:opacity .9s ease,transform .9s cubic-bezier(.22,.9,.3,1)}
  .reveal.in{opacity:1;transform:none}

  /* ── 히어로 ── */
  .hero{min-height:78vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:8vh var(--mobile-side-padding) 4vh;position:relative;overflow:hidden}
  .hero>*{position:relative;z-index:2}
  .hero .hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
  .hero .hero-bg img{width:100%;height:100%;object-fit:cover;display:block}
  /* 히어로 이미지 오버레이 — 텍스트가 위치한 하단에서부터 어두운 웜톤 스크림이 위로 퍼지는 형태.
     사진이 완전히 가려지지 않도록 상단 30%는 스크림이 거의 없게 유지. */
  .hero-bg::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
      0deg,
      var(--hero-scrim-start) 0%,
      var(--hero-scrim-mid) 45%,
      var(--hero-scrim-end) 75%
    );
    z-index:1;
  }
  .hero-bg img{position:relative;z-index:0}
  /* 히어로 → 다음 섹션 배경색으로 이어지는 하단 페이드. --hero-scrim-*(텍스트 가독성용)와는 별도 레이어. */
  .hero::after{
    content:'';
    position:absolute;left:0;right:0;bottom:0;
    height:var(--hero-fade-height);
    z-index:1;pointer-events:none;
    background:linear-gradient(to bottom,transparent,var(--cream));
  }
  /* 히어로 텍스트 색상 — 사진 있을 때만 */
  .hero.has-photo .eyebrow{ color:#FFD9A0; }
  .hero.has-photo h1{ color:#FFFCF6; }
  .hero.has-photo h1 .glow{ color:#FFD9A0; }
  .hero.has-photo p{ color:rgba(255,250,240,.92); }
  /* 햇살 빛줄기 — 사진 없을 때(폴백)만 적용. 사진 있을 때는 .hero-bg::after가
     텍스트 가독성용 어둡게 처리를 전담하므로, 이 웜톤 오버레이가 위에 겹쳐 가독성을 깎지 않게 분리. */
  .hero:not(.has-photo)::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(160deg,rgba(255,220,100,.35) 0%,transparent 40%),linear-gradient(175deg,rgba(255,200,80,.2) 10%,transparent 50%),linear-gradient(155deg,rgba(255,230,120,.25) 5%,transparent 35%)}
  /* 하단 페이드(.hero::after)는 사진 유무 공통으로 위에서 정의됨 */
  .hero .eyebrow{font-family:var(--hand);font-size:1.35rem;color:var(--coral-deep);letter-spacing:.5px;margin-bottom:10px;font-weight:700}
  .hero h1{font-family:var(--display);font-size:var(--fs-hero);font-weight:400;line-height:1.18;letter-spacing:-1px}
  .hero h1 .glow{color:var(--coral-deep)}
  .hero p{margin-top:20px;font-size:var(--fs-body);color:var(--ink-soft);max-width:340px}
  /* 사진 위 텍스트 가독성 — 반투명 카드 대신 다중 text-shadow + 얇은 text-stroke로 대비 확보.
     배경 사진을 가리지 않으면서 텍스트 자체의 윤곽을 또렷하게 만든다. */
  .hero.has-photo .eyebrow,
  .hero.has-photo h1,
  .hero.has-photo p{
    text-shadow:var(--hero-text-shadow);
  }
  .hero.has-photo h1{
    -webkit-text-stroke:var(--hero-text-stroke-width) rgba(60,32,20,.35);
  }

  /* ── 히어로 빛 번짐 (시그니처 "하루의 빛") — 텍스트(z-index:2)보다 아래, 스크림(z-index:1)보다 위.
     회전 없는 고정 원형 radial-gradient + blur. 아주 미세한 밝기 변화만 유지. ── */
  .hero-glow{
    position:absolute;top:42%;left:50%;
    width:var(--hero-glow-size);aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    z-index:1;pointer-events:none;
    border-radius:50%;
    background:radial-gradient(circle,var(--hero-glow-color) 0%,rgba(255,224,150,.22) 45%,transparent 72%);
    filter:blur(var(--hero-glow-blur));
    animation:hero-glow-breathe var(--hero-glow-duration) ease-in-out infinite;
  }
  .hero:not(.has-photo) .hero-glow{--hero-glow-color:rgba(255,190,110,.4)}
  @keyframes hero-glow-breathe{0%,100%{opacity:.9}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .hero-glow{animation:none;opacity:1}
  }
  .cloud-menu{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:42px;max-width:430px;margin-left:auto;margin-right:auto}
  .cloud-link{position:relative;background:#fff;color:var(--ink-soft);font-weight:700;font-size:var(--fs-caption);text-decoration:none;padding:14px 22px;border-radius:30px;filter:drop-shadow(0 10px 14px rgba(180,140,110,.32));display:inline-block;animation:cloud-float var(--cloud-float-duration) ease-in-out infinite;animation-delay:var(--cloud-float-delay,0s)}
  .cloud-link::before,.cloud-link::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud-link::before{width:24px;height:24px;top:-10px;left:24%}
  .cloud-link::after{width:34px;height:34px;top:-15px;right:22%}
  .cloud-link:hover,.cloud-link:focus-visible{color:var(--coral-deep)}
  @keyframes cloud-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @media (prefers-reduced-motion:reduce){
    .cloud-link{animation:none}
  }
  .scroll-cue{margin-top:46px;font-family:var(--hand);font-size:1.05rem;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:8px}
  .scroll-cue .dot{width:26px;height:42px;border:2px solid var(--coral);border-radius:14px;position:relative}
  .scroll-cue .dot::after{content:"";position:absolute;left:50%;top:8px;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translateX(-50%);animation:drop 1.6s infinite}
  @keyframes drop{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}80%{opacity:0;transform:translate(-50%,16px)}100%{opacity:0}}

  /* ── 원장 인사 섹션 CSS 제거됨 — "우리 원 스토리" 책 페이지(.sb-director)로 통합.
     책 페이지 스타일은 아래 .sb-director 규칙에서 정의한다. ── */

  /* ── 하루 스토리: 동화책(storybook) ──
     moment 1개 = 책 페이지 1장. 표지 → 스토리 → 마무리 순으로 넘겨보는 인터랙티브 책.
     mockup-storybook-page.html에서 확정된 디자인을 sunshine 공통 토큰과 통합.
     데이터 구조(day_story)·라우팅은 불변, 렌더링 방식만 동화책으로 교체. */
  .day{
    /* .wrap의 max-width(560)/좌우 패딩을 벗어나 책이 넉넉히 펼쳐지도록 재정의.
       진단①: overviewSec가 데이터에 따라 hidden될 수 있어(시설 stats 없음), 그 경우
       .day가 히어로 바로 아래 위치하게 되는데, --section-padding-tight(56px)를 쓰고 있어
       .teachers/.facilities/.programs 같은 주요 섹션(--section-padding-default, 72px)보다
       위쪽 여백이 좁아 보였다. 우리 원 스토리도 동급의 주요 섹션이므로 default로 통일.
       진단②: padding(shorthand)로 세로 토큰을 적용하면 토큰 자체가 "Xpx 0 Ypx" 형태라
       padding-left/right가 0으로 강제 재설정되어, 아래에 있는 .wrap{padding:0 var(--mobile-side-padding)}의
       좌우 여백을 완전히 덮어써 버린다(모든 섹션 공통 버그). padding-block으로 바꿔
       세로값만 지정하고 좌우는 .wrap 규칙이 그대로 담당하게 한다. */
    max-width:960px;
    padding-block:72px 44px;
    --page-paper:#FFFDFA;
    --page-line:#EBDFD4;
    --sb-lavender-deep:#D6C7EC;
    --fs-story-title:clamp(1.5rem,5vw,2rem);
  }
  .day .section-eyebrow{text-align:center}
  .day .day-head-title{
    font-family:var(--display);font-size:var(--fs-section-title);
    text-align:center;margin:6px 0 26px;letter-spacing:-.5px;
  }

  /* 책 펼침면 컨테이너: 한 화면 = 한 페이지 */
  .storybook{
    position:relative;width:100%;max-width:920px;margin:0 auto;
    aspect-ratio:16/10;max-height:min(78vh,660px);
  }
  /* 책장 두께(뒤에 겹친 페이지) 그림자 */
  .storybook::before,.storybook::after{
    content:"";position:absolute;inset:0;border-radius:22px;
    background:var(--page-paper);box-shadow:var(--card-shadow);
  }
  .storybook::before{transform:rotate(-1.4deg) translateY(6px);opacity:.5}
  .storybook::after{transform:rotate(.9deg) translateY(3px);opacity:.7}

  /* 페이지 트랙: 모든 sb-page를 겹쳐 두고 활성 페이지만 보인다 */
  .sb-stage{position:absolute;inset:0;z-index:2;overflow:visible;border-radius:22px;perspective:2400px}

  .sb-page{
    position:absolute;inset:0;
    background:var(--page-paper);border-radius:22px;box-shadow:var(--card-shadow);
    padding:44px;display:grid;
    grid-template-columns:1fr 36px 1fr;align-items:center;overflow:hidden;
    /* 3D 힌지 플립: 활성 페이지만 보이고, JS가 왼쪽 책등(transform-origin)을 축으로
       rotateY 회전시켜 페이지 넘김을 연출한다. 기본은 숨김(비활성).
       box-shadow는 transform과 별개로 정적으로 유지 — filter를 쓰지 않으므로
       매 프레임 재도색(repaint) 없이 transform만 컴포지터에서 처리된다. */
    opacity:0;pointer-events:none;
    transform-origin:center center;
    backface-visibility:hidden;
  }
  .sb-page.is-active{opacity:1;pointer-events:auto;z-index:2}
  /* 다음 페이지로: 나가는 페이지가 왼쪽 책등을 축으로 넘어간다 */
  .sb-page.sb-leave{
    opacity:1;pointer-events:none;z-index:6;
    transform-origin:left center;
    transform:rotateY(0deg);
    will-change:transform;
  }
  .sb-page.sb-leave.sb-go{
    transform:rotateY(-88deg);
    transition:transform .42s cubic-bezier(.5,.05,.7,.2);
  }
  /* 종이가 접히는 느낌의 은은한 명암 — filter:brightness 대신 opacity 오버레이로 구현.
     opacity는 transform과 함께 컴포지터에서만 처리되어 box-shadow 재도색을 유발하지 않는다. */
  .sb-page::before{
    content:"";position:absolute;inset:0;background:#000;border-radius:22px;
    opacity:0;pointer-events:none;transition:opacity .24s ease;will-change:opacity;
  }
  /* 넘어가는 동안 종이 명암 — 기존 ::before 검정 오버레이 재사용 */
  .sb-page.sb-leave.sb-go::before{
    opacity:.14;
    transition:opacity .42s ease;
  }
  /* 이전 페이지로: 들어오는 페이지가 접힌 상태에서 펼쳐져 내려온다 */
  .sb-page.sb-enter{
    opacity:1;z-index:6;
    transform-origin:left center;
    transform:rotateY(-88deg);
    will-change:transform;
  }
  .sb-page.sb-enter::before{opacity:.14}
  .sb-page.sb-enter.sb-go{
    transform:rotateY(0deg);
    transition:transform .42s cubic-bezier(.25,.7,.35,1);
  }
  .sb-page.sb-enter.sb-go::before{
    opacity:0;
    transition:opacity .42s ease;
  }
  /* 안쪽 종이 점선 테두리 (동화책 프레임) */
  .sb-page::after{
    content:"";position:absolute;inset:16px;border:1.5px dashed var(--page-line);
    border-radius:16px;pointer-events:none;
  }

  /* 책갈피 리본 마스코트 — 텍스트 없이 새싹만 */
  .sb-bookmark{
    position:absolute;top:-8px;right:38px;z-index:4;width:40px;
    display:flex;align-items:center;justify-content:center;
    height:62px;color:#fff;
    background:linear-gradient(180deg,var(--coral),var(--coral-deep));
    box-shadow:0 8px 16px -8px rgba(224,120,90,.7);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%);
    border-radius:3px 3px 0 0;
  }

  /* 사진(폴라로이드 액자) */
  .sb-photo{
    position:relative;z-index:1;width:100%;max-width:340px;justify-self:center;
    background:var(--paper);padding:12px 12px 14px;border-radius:6px;
    box-shadow:0 18px 34px -20px rgba(120,80,60,.5);transform:rotate(-1.5deg);
  }
  .sb-photo .pic{
    border-radius:4px;aspect-ratio:1/1;overflow:hidden;position:relative;
    background:linear-gradient(150deg,#ffe7d4,#ffd1bd 55%,var(--sb-lavender-deep));
    display:flex;align-items:flex-end;
  }
  .sb-photo .pic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .sb-photo .cap{
    position:relative;z-index:2;width:100%;padding:26px 16px 14px;
    background:linear-gradient(180deg,transparent,rgba(40,30,25,.5));
    color:#fff;font-family:var(--hand);font-size:1.15rem;line-height:1.4;
  }

  /* 책 펼침 중앙 접힘선 */
  .sb-fold{
    position:relative;align-self:stretch;z-index:1;
    background:linear-gradient(90deg,rgba(120,80,60,0) 0%,rgba(120,80,60,.05) 42%,
      rgba(120,80,60,.11) 50%,rgba(120,80,60,.05) 58%,rgba(120,80,60,0) 100%);
  }
  .sb-fold::before{
    content:"";position:absolute;top:6%;bottom:6%;left:50%;width:1px;
    background:linear-gradient(180deg,transparent,rgba(120,80,60,.16),transparent);
  }

  /* 텍스트 영역 */
  .sb-text{position:relative;z-index:1;padding:0 20px}
  .sb-text .time{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--hand);font-weight:700;font-size:var(--fs-caption);
    color:var(--badge-text);background:var(--badge-bg);border:1px solid var(--badge-border);
    border-radius:999px;padding:5px 14px;margin-bottom:16px;
  }
  .sb-text .time svg{width:15px;height:15px;flex:none}
  .sb-text .title{
    font-family:var(--display);font-size:var(--fs-story-title);
    line-height:1.28;letter-spacing:-.5px;margin-bottom:14px;
  }
  .sb-text .note{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.9}

  /* 표지 / 마무리 페이지: 단일 컬럼, 중앙 정렬 */
  .sb-page.sb-cover,.sb-page.sb-finale{
    grid-template-columns:1fr;text-align:center;justify-items:center;
    background:
      radial-gradient(120% 80% at 22% 12%, rgba(230,220,242,.7) 0%, transparent 55%),
      radial-gradient(120% 80% at 82% 90%, rgba(220,235,246,.7) 0%, transparent 55%),
      var(--page-paper);
  }
  .sb-cover .cover-eyebrow,.sb-finale .fin-eyebrow{
    font-family:var(--hand);font-size:1.15rem;color:var(--coral-deep);margin-bottom:6px;
  }
  .sb-cover .cover-title{
    font-family:var(--display);font-size:clamp(1.9rem,6vw,2.7rem);line-height:1.24;
    letter-spacing:-1px;margin-bottom:16px;
  }
  .sb-cover .cover-date{font-family:var(--hand);font-size:1.05rem;color:var(--ink-soft)}
  .sb-cover .cover-mascot,.sb-finale .fin-mascot{
    font-size:3.2rem;line-height:1;margin:28px 0 4px;
    filter:drop-shadow(0 8px 14px rgba(120,80,60,.28));
  }
  .sb-cover .cover-hint{
    margin-top:22px;font-family:var(--hand);font-size:var(--fs-caption);color:var(--ink-soft);opacity:.85;
  }
  .sb-finale .fin-title{
    font-family:var(--display);font-size:clamp(1.6rem,5vw,2.2rem);line-height:1.3;
    letter-spacing:-.5px;margin-bottom:14px;
  }
  .sb-finale .fin-text{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.8;max-width:360px}
  /* 통신문 연동 CTA 자리 — 이번엔 링크 없이 시각적 여백만 */
  .sb-finale .fin-cta-slot{
    margin-top:30px;min-height:52px;width:min(280px,80%);
    border:1.5px dashed var(--page-line);border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--hand);font-size:var(--fs-caption);color:var(--ink-soft);opacity:.7;
  }

  /* 원장 인사말 페이지: 원형 사진 + 이름/직함 + 인사말 + 더보기.
     스토리 페이지와 같은 폴라로이드+텍스트 톤을 유지하되, 사진만 원형으로. */
  .sb-director .sb-portrait{
    position:relative;z-index:1;justify-self:center;
    width:min(78%,220px);aspect-ratio:1/1;border-radius:50%;overflow:hidden;
    background:linear-gradient(135deg,#ffe7d4,#ffc4ac);
    box-shadow:0 0 0 10px rgba(255,255,255,.55),0 18px 34px -20px rgba(120,80,60,.5);
  }
  .sb-director .sb-portrait img{width:100%;height:100%;object-fit:cover;display:block}
  .sb-director .dir-badge{
    display:inline-block;font-family:var(--hand);font-weight:700;font-size:var(--fs-caption);
    color:var(--badge-text);background:var(--badge-bg);border:1px solid var(--badge-border);
    border-radius:999px;padding:5px 14px;margin-bottom:14px;
  }
  .sb-director .dir-sign{font-family:var(--body);font-size:var(--fs-caption);color:var(--ink-soft);line-height:1.4;margin-bottom:14px}
  .sb-director .dir-sign strong{display:block;font-family:var(--display);font-size:var(--fs-story-title);color:var(--ink);font-weight:400;letter-spacing:-.5px;margin-top:2px}
  .sb-director .dir-msg{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.85;margin-bottom:18px}
  .sb-director .dir-more{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    font-family:var(--body);font-weight:700;font-size:var(--fs-caption);
    color:var(--coral-deep);background:none;border:none;padding:0;
  }
  .sb-director .dir-more .btn-arrow{transition:transform .2s ease}
  .sb-director .dir-more:hover .btn-arrow{transform:translateX(3px)}

  /* 네비게이션: 원형 chevron 화살표 */
  .sb-arrow{
    width:48px;height:48px;border-radius:50%;border:1px solid var(--badge-border);cursor:pointer;
    background:linear-gradient(180deg,#fff,var(--badge-bg));
    box-shadow:0 10px 22px -10px rgba(224,120,90,.55),0 2px 5px -3px rgba(120,80,60,.3);
    color:var(--coral-deep);display:flex;align-items:center;justify-content:center;
    transition:background .2s ease,box-shadow .2s ease,transform .15s ease;
  }
  .sb-arrow svg{width:20px;height:20px;flex:none}
  .sb-arrow:hover{background:#fff;box-shadow:0 14px 28px -10px rgba(224,120,90,.6),0 2px 6px -3px rgba(120,80,60,.3);transform:scale(1.06)}
  .sb-arrow:active{transform:scale(.97)}
  .sb-arrow[disabled]{opacity:.35;cursor:default;box-shadow:none}
  .sb-arrow[disabled]:hover{transform:none;background:linear-gradient(180deg,#fff,var(--badge-bg))}

  /* 페이지 라벨: 스토리 페이지에만 "N번째 이야기 · 총 장수 중". 표지/마무리는 별도 표기 */
  .sb-label{
    position:absolute;left:34px;bottom:24px;z-index:3;
    display:flex;align-items:baseline;gap:7px;font-family:var(--hand);color:var(--ink-soft);
  }
  .sb-label .ord{font-size:1.05rem;color:var(--coral-deep)}
  .sb-label .total{font-size:.78rem;opacity:.75}

  .sb-dots{display:flex;gap:9px;z-index:5}
  .sb-dots button{
    width:10px;height:10px;padding:0;border:none;border-radius:50%;cursor:pointer;
    background:var(--sb-lavender-deep);
    transition:transform .2s ease,background .2s ease;
  }
  .sb-dots button.on{background:var(--coral);transform:scale(1.35)}

  /* 음소거 토글 (페이지 넘김 효과음) */
  .sb-mute{
    position:absolute;left:20px;top:20px;z-index:7;
    width:42px;height:42px;padding:0;border:1px solid rgba(235,194,172,.72);border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.86);color:var(--coral-deep);
    box-shadow:0 10px 22px -14px rgba(120,80,60,.55);
    display:flex;align-items:center;justify-content:center;
    transition:color .2s ease,background .2s ease,transform .15s ease,box-shadow .2s ease;
    backdrop-filter:blur(8px);
  }
  .sb-mute:hover{background:#fff;color:var(--coral-deep);box-shadow:0 14px 26px -14px rgba(224,120,90,.65);transform:translateY(-1px)}
  .sb-mute svg{width:19px;height:19px}
  .sb-mute .icon-muted{display:none}
  .sb-mute.is-muted .icon-on{display:none}
  .sb-mute.is-muted .icon-muted{display:block}

  /* 데스크톱: 화살표는 책 좌우 가장자리에 절대배치, 점은 책 아래 중앙 */
  @media (min-width:720px){
    .sb-controls .sb-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6}
    .sb-controls .sb-arrow.prev{left:-14px}
    .sb-controls .sb-arrow.next{right:-14px}
    .sb-controls .sb-dots{position:absolute;left:50%;bottom:-30px;transform:translateX(-50%)}
  }
  /* 모바일: 세로 스택. 컨트롤은 책 아래 한 행으로 */
  @media (max-width:719px){
    .day{padding-block:72px 44px}
    .storybook{aspect-ratio:auto;max-height:none}
    .storybook::before,.storybook::after{display:none}
    .sb-stage{position:relative;inset:auto;overflow:visible}
    /* 모바일에선 각 페이지가 흐름에 참여하되, 비활성은 숨김.
       표지·원장·스토리·마무리 모두 같은 카드 폭(100%)과 동일한 최소 높이를 공유해
       페이지를 넘겨도 카드 크기가 들쭉날쭉하지 않게 통일한다. */
    .sb-page{position:relative;inset:auto;grid-template-columns:1fr;gap:22px;
      padding:28px var(--mobile-side-padding) 34px;display:none;
      min-height:min(560px,78vh);align-content:center}
    .sb-page.is-active{display:grid}
    .sb-fold{display:none}
    .sb-photo{transform:rotate(-1deg);max-width:300px;margin:0 auto}
    .sb-text{padding:0 var(--mobile-side-padding)}
    .sb-label{position:static;justify-content:center;margin-top:14px}
    .sb-controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:20px;position:relative}
    .sb-arrow{width:40px;height:40px}
    /* 모바일: 음소거 버튼은 책 카드 안쪽 상단에 두어 하단 컨트롤과 분리 */
    .sb-mute{left:18px;top:18px;width:42px;height:42px}
    /* 모바일은 기존처럼 display 토글 방식 유지, 3D 힌지 플립 미적용 */
    .sb-page.sb-leave,.sb-page.sb-enter,
    .sb-page.sb-leave.sb-go,.sb-page.sb-enter.sb-go{
      transform:none;transition:none;
    }
  }
  /* prefers-reduced-motion: 플립 없이 단순 opacity 페이드만 */
  @media (prefers-reduced-motion: reduce){
    .sb-page.is-active{transition:opacity .2s ease;transform:none}
    .sb-page::before{transition:none}
    .sb-arrow,.sb-dots button{transition:none}
    .sb-page.sb-leave,.sb-page.sb-enter,
    .sb-page.sb-leave.sb-go,.sb-page.sb-enter.sb-go{
      transform:none;transition:none;
    }
  }

  /* ── 앨범 벽 ── */
  .album{padding-block:72px 44px;text-align:center}
  .section-eyebrow{font-family:var(--hand);font-size:1.2rem;color:var(--sage);font-weight:700}
  .section-title{font-family:var(--display);font-size:var(--fs-section-title);margin:6px 0 8px;letter-spacing:-.5px}
  .section-sub{color:var(--ink-soft);font-size:var(--fs-body);margin-bottom:34px}
  .polaroids{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .polaroid{
    background:var(--paper);padding:10px 10px 38px;border-radius:6px;
    box-shadow:var(--card-shadow);
    transition:transform .5s cubic-bezier(.22,.9,.3,1),box-shadow .4s ease;
    will-change:transform;
  }
  .polaroid .pic{border-radius:3px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:var(--fs-caption)}
  .polaroid .label{font-family:var(--hand);font-weight:700;font-size:var(--fs-body);margin-top:12px;color:var(--ink)}
  .polaroid:nth-child(1){transform:rotate(-3deg)}
  .polaroid:nth-child(2){transform:rotate(2.5deg);margin-top:22px}
  .polaroid:nth-child(3){transform:rotate(2deg)}
  .polaroid:nth-child(4){transform:rotate(-2.5deg);margin-top:-10px}
  .polaroid:nth-child(5){transform:rotate(-2deg)}
  .polaroid:nth-child(6){transform:rotate(3deg);margin-top:18px}
  .polaroid:hover,.polaroid:focus-within{transform:rotate(0) scale(1.04);box-shadow:var(--card-shadow-hover);z-index:2}
  .p1 .pic{background:linear-gradient(135deg,#ffd1bd,#ff9f86)}
  .p2 .pic{background:linear-gradient(135deg,#bfe0d2,#9CB89A)}
  .p3 .pic{background:linear-gradient(135deg,#ffe1a8,#ffc46b)}
  .p4 .pic{background:linear-gradient(135deg,#d6c7ec,#b59fe0)}
  .p5 .pic{background:linear-gradient(135deg,#a8d8e0,#7cc0cf)}
  .p6 .pic{background:linear-gradient(135deg,#ffc7c2,#ff9aa0)}

  /* ── 선생님 플립 카드 (햇살 테마) ──
     세로 리스트 → 그리드(PC 2열x2행/모바일 1열x3행). 앞면: 햇살 광배 원형 사진 + 이름 + 반 배지 + 힌트,
     뒷면: 한마디 메시지. 클릭 시 3D 국소 플립. 기존 --card-* 토큰 재사용.
     인원이 기본 노출 개수보다 많으면 "선생님 전체 보기" 인라인 펼치기(.cards-more)로 이어붙임 —
     시설 섹션(.fac-collage-more)과 동일한 max-height+opacity 전환 패턴. */
  .teachers{padding-block:72px 44px;text-align:center}
  /* flexbox(wrap)로 전환: 홀수 개수일 때 마지막 줄에 남는 카드가 grid처럼 왼쪽에 붙지 않고
     justify-content:center로 가운데 정렬된다.
     진단: 이 섹션은 .wrap(max-width:560px, 좌우 padding 22px)에 속해 있어 실제 사용 가능한
     폭은 516px인데, flex-basis를 고정 289px(600px 폭 기준 계산값)로 줘서 카드 2장+gap이
     600px가 되어 항상 516px를 초과 → 매번 줄바꿈되어 1열이 되던 버그.
     고정 px 대신 컨테이너 폭 기준 calc(50% - gap/2)로 바꿔 실제 가용 폭에 맞게 절반씩 차지하게 한다. */
  .cards{
    display:flex;flex-wrap:wrap;justify-content:center;gap:22px;
    margin:30px auto 0;max-width:600px;
  }
  .cards .flip{flex:0 1 calc(50% - 11px);max-width:289px}
  .cards-more{
    display:flex;flex-wrap:wrap;justify-content:center;gap:22px;
    max-width:600px;margin:0 auto;overflow:hidden;
    max-height:0;opacity:0;
    transition:max-height .45s ease,opacity .35s ease;
  }
  .cards-more .flip{flex:0 1 calc(50% - 11px);max-width:289px}
  .cards-more.is-expanded{max-height:3000px;opacity:1;margin-top:22px}
  @media (prefers-reduced-motion:reduce){
    .cards-more{transition:none}
  }
  .flip{perspective:1200px;min-height:320px}
  .flip-inner{position:relative;width:100%;height:100%;min-height:inherit;transition:transform .45s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;cursor:pointer}
  .flip.is-static .flip-inner{cursor:default}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;min-height:inherit;backface-visibility:hidden;
    border-radius:var(--card-radius-lg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 22px;box-shadow:var(--card-shadow);
  }
  /* 앞면: 순백 대신 따뜻한 크림/연핑크 톤 */
  .front{
    background:linear-gradient(170deg,var(--surface-pink-soft),var(--cream));
    text-align:center;gap:0;
  }
  /* 햇살 광배 — 히어로 광배와 같은 웜 골드/크림 radial glow 톤 재사용 */
  .front .avatar{
    position:relative;width:112px;height:112px;border-radius:50%;flex:none;
    margin:0 auto 16px;overflow:visible;
  }
  .front .avatar::before{
    content:"";position:absolute;inset:-26px;border-radius:50%;z-index:0;
    background:radial-gradient(circle,rgba(255,224,150,.6) 0%,rgba(255,210,150,.28) 46%,transparent 72%);
  }
  .front .avatar .avatar-img{
    position:relative;z-index:1;width:100%;height:100%;border-radius:50%;overflow:hidden;
    background:linear-gradient(135deg,#ffd1bd,#ff9f86);
    box-shadow:0 0 0 6px rgba(255,255,255,.65),var(--card-shadow);
  }
  .front .avatar .avatar-img img{width:100%;height:100%;object-fit:cover;display:block}
  .front .name{font-family:var(--display);font-size:1.3rem;position:relative;z-index:1}
  .front .role{color:var(--ink-soft);font-size:var(--fs-caption);margin-top:3px}
  /* 반 구분 색상 배지 — 파스텔 톤, JS가 반 이름 해시로 색을 인라인 지정 */
  .front .class-badge{
    display:inline-block;margin-top:12px;font-size:var(--fs-caption);font-weight:700;
    padding:5px 15px;border-radius:999px;border:1px solid transparent;
  }
  /* 클릭 힌트 — 기존 빨간 링크 대신 은은한 손글씨 톤 힌트 */
  .front .tap{
    display:inline-flex;align-items:center;gap:5px;
    font-family:var(--hand);color:var(--ink-soft);font-size:var(--fs-caption);
    margin-top:16px;font-weight:700;opacity:.75;
  }
  .front .tap svg{width:14px;height:14px}
  /* 뒷면: 한마디 메시지 */
  .back{
    background:linear-gradient(150deg,var(--coral),var(--coral-deep));
    color:#fff;transform:rotateY(180deg);
    font-family:var(--hand);font-size:1.22rem;font-weight:700;line-height:1.55;
  }
  .back::before{
    content:"“";font-family:var(--display);font-size:2.6rem;line-height:.6;
    display:block;margin-bottom:8px;opacity:.6;
  }

  /* ── 정보 메뉴 섹션 (공지/달력/FAQ) ── */
  [id]{scroll-margin-top:78px}
  .block{padding-block:56px 36px;text-align:center}
  .block .panel{background:var(--paper);border-radius:var(--card-radius-lg);padding:22px;box-shadow:var(--card-shadow);text-align:left;margin-top:24px}

  .notice-list{list-style:none;text-align:left;margin-top:24px}
  .notice-item{display:flex;align-items:center;gap:14px;background:var(--paper);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--card-shadow)}
  .notice-item .tag{flex:none;font-size:.74rem;font-weight:700;padding:5px 10px;border-radius:30px;color:#fff}
  .tag-event{background:var(--coral)}
  .tag-info{background:var(--sage)}
  .tag-must{background:var(--status-warn)}
  .notice-item .n-title{font-weight:600;font-size:1rem;line-height:1.4}
  .notice-item .n-date{color:var(--ink-soft);font-size:.82rem;margin-top:3px}
  .more-link{display:inline-block;margin-top:8px;color:var(--coral-deep);font-weight:700;text-decoration:none;font-size:var(--fs-caption)}

  .cal{background:var(--paper);border-radius:var(--card-radius-lg);padding:20px 18px;box-shadow:var(--card-shadow);margin-top:24px}
  .cal-head{font-family:var(--display);font-size:var(--fs-card-title);margin-bottom:14px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-grid .dow{font-size:.78rem;color:var(--ink-soft);padding:6px 0;font-weight:600}
  .cal-grid .dow:first-child{color:var(--coral-deep)}
  .day-cell{position:relative;padding:10px 0;font-size:var(--fs-caption);border-radius:10px}
  .day-cell.muted{color:#d8cfc7}
  .day-cell.ev{background:#FFF1EA;color:var(--coral-deep);font-weight:700}
  .day-cell.ev::after{content:"";position:absolute;left:50%;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translateX(-50%)}
  .event-list{list-style:none;text-align:left;margin-top:18px}
  .event-list li{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line-warm);font-size:var(--fs-body)}
  .event-list li:last-child{border-bottom:none}
  .event-list .e-date{font-weight:700;color:var(--coral-deep);font-size:.86rem;min-width:46px}

  .faq-list{text-align:left;margin-top:24px}
  .faq-item{background:var(--paper);border-radius:var(--card-radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--card-shadow)}
  .faq-q{width:100%;border:none;background:transparent;text-align:left;padding:18px 20px;font-size:var(--fs-body);font-weight:600;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:var(--body)}
  .faq-q .chev{flex:none;width:11px;height:11px;border-right:2.5px solid var(--coral);border-bottom:2.5px solid var(--coral);transform:rotate(45deg);transition:transform .35s ease;margin-top:-4px}
  .faq-item.open .faq-q .chev{transform:rotate(-135deg);margin-top:2px}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .faq-a p{padding:0 20px 20px;color:var(--ink-soft);font-size:var(--fs-caption);line-height:1.7}

  /* ── 마무리 CTA ── */
  .finale{padding-block:84px 128px;text-align:center}
  .finale h2{font-family:var(--display);font-size:var(--fs-section-title);line-height:1.3;letter-spacing:-.5px}
  .finale p{color:var(--ink-soft);margin:16px 0 34px;font-size:var(--fs-body)}
  .btn-big{display:inline-block;background:var(--coral);color:#fff;font-weight:700;font-size:1.1rem;padding:18px 44px;border-radius:50px;text-decoration:none;box-shadow:0 16px 34px -10px var(--coral-deep);transition:transform .3s ease,box-shadow .3s ease}
  .btn-big:hover{transform:translateY(-3px);box-shadow:0 22px 40px -10px var(--coral-deep)}

  /* ── 플로팅 CTA ── */
  .float{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);z-index:30;transition:transform .5s cubic-bezier(.22,.9,.3,1)}
  .float.show{transform:translateX(-50%) translateY(0)}
  .float.hide{transform:translateX(-50%) translateY(120px)}
  .float a{display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-weight:700;padding:14px 26px;border-radius:50px;text-decoration:none;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);font-size:.98rem}
  .float a .pulse{width:9px;height:9px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 0 rgba(255,138,107,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,138,107,.6)}70%{box-shadow:0 0 0 10px rgba(255,138,107,0)}100%{box-shadow:0 0 0 0 rgba(255,138,107,0)}}

  /* ── 상담·대기 신청 모달 ── */
  button.btn-big{font:inherit;border:none;cursor:pointer}
  /* 마무리 섹션의 입소상담 신청 버튼 — 이 페이지의 핵심 CTA임을 강조해 다른 btn-big보다 한 단계 크게.
     위 button.btn-big{font:inherit}과 명시도(선택자 개수)를 맞추기 위해 button.btn-big.btn-big-cta로 지정 */
  button.btn-big.btn-big-cta{font-size:1.2rem;padding:20px 52px;box-shadow:0 20px 40px -12px var(--coral-deep)}
  .btn-big-cta:hover{box-shadow:0 26px 46px -12px var(--coral-deep)}
  .csl-overlay{position:fixed;inset:0;z-index:50;background:rgba(64,55,51,.45);display:none;align-items:center;justify-content:center;padding:20px}
  .csl-overlay.open{display:flex}
  .csl-panel{position:relative;width:100%;max-width:380px;max-height:88vh;overflow-y:auto;background:var(--paper);border-radius:var(--card-radius-lg);padding:30px 26px;box-shadow:var(--card-shadow-hover)}
  .csl-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border:none;background:var(--cream);border-radius:50%;font-size:1.2rem;line-height:1;color:var(--ink-soft);cursor:pointer}
  .csl-title{font-family:var(--display);font-size:1.35rem;margin-bottom:20px;letter-spacing:-.5px}
  .csl-field{margin-bottom:16px;text-align:left}
  .csl-field label{display:block;font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .csl-field input[type=text],.csl-field input[type=tel],.csl-field select{
    width:100%;border:1.5px solid var(--line-warm);border-radius:14px;padding:12px 14px;
    font-family:var(--body);font-size:var(--fs-body);color:var(--ink);background:var(--cream);outline:none;
  }
  .csl-field input:focus,.csl-field select:focus{border-color:var(--coral)}
  .csl-consent label{display:flex;align-items:flex-start;gap:8px;font-size:.85rem;font-weight:400;color:var(--ink-soft);line-height:1.5}
  .csl-consent input{margin-top:3px;flex:none}
  .csl-submit{width:100%;margin-top:6px}
  .csl-msg.error{margin-top:12px;font-size:.85rem;color:var(--status-danger);text-align:center}
  .csl-done{text-align:center;font-family:var(--hand);font-size:1.25rem;font-weight:700;color:var(--ink);padding:30px 0;line-height:1.6}

  footer{text-align:center;padding:30px var(--mobile-side-padding) 40px;color:var(--ink-soft);font-size:.82rem}
  footer .demo-tag{display:inline-block;background:#fff;border:1px solid var(--line-warm);border-radius:30px;padding:6px 16px;margin-bottom:14px;font-family:var(--hand);font-weight:700;color:var(--coral-deep)}

  a:focus-visible,.flip-inner:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:8px}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;scroll-behavior:auto!important}
    .reveal{opacity:1;transform:none}
  }

  @media (max-width:420px){
    :root{
      --fs-hero:clamp(2.55rem,13vw,3rem);
      --fs-section-title:1.62rem;
      --fs-card-title:1.18rem;
    }
    .hero{min-height:76vh;padding:7vh 18px 4vh}
    .cloud-menu{gap:10px;margin-top:32px}
    .cloud-link{padding:12px 17px;font-size:var(--fs-caption)}
    .polaroids{gap:12px}
    .polaroid{padding:8px 8px 30px}
    .polaroid:nth-child(2),
    .polaroid:nth-child(6){margin-top:14px}
    .cards,.cards-more{gap:18px;max-width:360px}
    .cards .flip,.cards-more .flip{flex-basis:100%;max-width:360px}
    .cards-more.is-expanded{margin-top:18px}
    .flip{min-height:300px}
    .face{padding:26px 22px}
    .front .avatar{width:104px;height:104px}
    .back{font-size:1.18rem}
  }

  /* ── 이미지 채움 ── */
  .frame-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .polaroid .pic img{width:100%;height:100%;object-fit:cover;border-radius:3px;display:block}
  /* 미리보기 배지: isPreviewMode(또는 관리자 draft 미리보기)일 때만 노출되는 부가 안내.
     topbar.js가 만든 헤더 바(.topbar .wrap) 안 로고와 아이콘 사이 가운데 슬롯에 삽입된다.
     진한 배경 + 흰 텍스트로, 헤더가 스크롤 전(반투명)/후(불투명) 어떤 상태든 배지 자체는
     항상 동일한 진한 필 스타일을 유지(헤더 배경 변화와 독립). */
  .preview-banner{
    flex:none;background:var(--coral-deep);color:#fff;
    border:none;border-radius:999px;padding:7px 16px;
    font-size:.82rem;font-weight:800;letter-spacing:.2px;white-space:nowrap;
    box-shadow:0 6px 16px -8px rgba(120,80,60,.5);
    z-index:2;
  }
  .preview-banner[hidden]{display:none}
  @media (max-width:719px){
    .preview-banner{font-size:.74rem;padding:6px 13px}
  }

</style>
</head>
<body>

<!-- topbar.js가 nav(brand+홈아이콘+이 메뉴버튼)를 만들어 body 최상단에 삽입 -->
<button class="menu-btn" id="menuBtn" aria-label="메뉴 열기" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="menu-panel" id="menuPanel"></div>
<div class="preview-banner" id="previewBanner" hidden>템플릿 미리보기</div>
<span id="top"></span>

<div class="sky"></div>
<div class="sun"></div>
<div class="cloud" id="cloud1" style="top:14%;left:70%"><svg width="120" height="50" viewBox="0 0 120 50"><ellipse cx="40" cy="32" rx="34" ry="18" fill="white"/><ellipse cx="72" cy="26" rx="26" ry="20" fill="white"/><ellipse cx="92" cy="34" rx="22" ry="14" fill="white"/></svg></div>
<div class="cloud" id="cloud2" style="top:40%;left:8%"><svg width="90" height="40" viewBox="0 0 90 40"><ellipse cx="30" cy="26" rx="26" ry="13" fill="white"/><ellipse cx="56" cy="20" rx="20" ry="15" fill="white"/></svg></div>

<!-- 아래 섹션들은 비어있고, JS가 haetsal.json을 읽어 채웁니다 -->
<header class="hero" id="hero"></header>
<!-- 원장 인사말 섹션은 제거됨 → "우리 원 스토리" 책 2번째 페이지(.sb-director)로 통합 -->

<section class="overview wrap" id="overviewSec"></section>
<section class="day wrap" id="day"></section>
<section class="teachers wrap" id="teachersSec"></section>
<section class="facilities wrap" id="facilitiesSec"></section>
<section class="programs wrap" id="programSec"></section>
<section class="info-block wrap" id="admissionsSec" hidden></section>
<section class="block wrap" id="faq"></section>
<section class="info-block wrap" id="directionsSec" hidden></section>
<section class="finale wrap" id="finale"></section>
<footer id="footerEl"></footer>

<div class="float" id="float" hidden><a href="#finale"><span class="pulse"></span>입소 상담</a></div>

<button type="button" class="ask-fab" id="askFab" aria-label="무엇이든 물어보세요" title="무엇이든 물어보세요">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M6.8 18.2c1.35.86 3 1.3 4.82 1.3 4.55 0 8.24-3.02 8.24-6.75S16.17 6 11.62 6 3.38 9.02 3.38 12.75c0 1.62.7 3.11 1.87 4.27l-.5 2.98 2.05-1.8z"/>
    <path d="M8.3 11.4h6.6M8.3 14.1h4.25"/>
  </svg>
</button>

<div class="ask-modal-overlay" id="askModal" aria-hidden="true">
  <div class="ask-modal-panel" role="dialog" aria-modal="true" aria-labelledby="askModalTitle">
    <div class="ask-modal-header">
      <h3 class="ask-modal-title" id="askModalTitle">무엇이든 물어보세요</h3>
      <button type="button" class="ask-modal-close" id="askModalClose" aria-label="닫기">×</button>
    </div>
    <div class="ask-modal-body">
      <div class="ask-faq-list" id="askFaqList"></div>
      <p class="ask-empty" id="askFaqEmpty" hidden>궁금한 점은 상담으로 편하게 물어보세요.</p>
      <button type="button" class="ask-consult-btn" id="askConsultBtn">입소 상담</button>
    </div>
  </div>
</div>

<!-- 상담·대기 신청 모달 -->
<div class="csl-overlay" id="cslOverlay">
  <div class="csl-panel">
    <button type="button" class="csl-close" id="cslCloseBtn" aria-label="닫기">×</button>

    <div id="cslFormWrap">
      <h3 class="csl-title">입소 상담 신청</h3>
      <form id="cslForm">
        <div class="csl-field">
          <label for="csl-name">학부모 이름</label>
          <input type="text" id="csl-name" required>
        </div>
        <div class="csl-field">
          <label for="csl-phone">연락처</label>
          <input type="tel" id="csl-phone" placeholder="010-0000-0000" required>
        </div>
        <div class="csl-field">
          <label for="csl-kind">신청 종류</label>
          <select id="csl-kind" required>
            <option value="consult">상담</option>
            <option value="waiting">대기</option>
            <option value="info_session">설명회</option>
          </select>
        </div>
        <div class="csl-field">

  }

  .fac-polaroid .cap{
    position:relative;z-index:2;width:100%;padding:16px 8px 2px;
    font-family:var(--hand);font-weight:700;font-size:1.05rem;line-height:1.3;
    color:var(--ink);text-align:center;

     기울고, 위/아래 행이 서로 반대 방향 각도를 가져 리듬감을 준다 */
  .fac-polaroid:nth-child(4n+1){transform:rotate(-3deg)}
  .fac-polaroid:nth-child(4n+2){transform:rotate(2.5deg)}

<script>
// 모든 렌더 함수(async IIFE, initInteractions 등)가 공유하는 escape 헬퍼.
// 최상단 스크립트 스코프에 둬야 initInteractions처럼 async IIFE 바깥에서 정의된
// 함수에서도 클로저로 접근할 수 있다.
const esc = (s) => {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};

function escWithBr(text){
  var normalized = (text || '').replace(/<br\s*\/?>/gi, '\n');
  return esc(normalized).replace(/\n/g, '<br>');
}

function hasVisibleText(value){
  return String(value ?? '').trim().length > 0;
}

function heroTitleHtml(title, accent, accentClass){
  var titleHtml = escWithBr(title);
  var accentHtml = escWithBr(accent);
  if (!accentHtml) return titleHtml;
  var hasBreak = /<br\s*\/?>|\r?\n/i.test(title || '') || /^\s*(?:<br\s*\/?>|\r?\n)/i.test(accent || '');
  var joiner = hasBreak ? '' : (accentClass ? '<br>' : ' ');
  var cls = accentClass ? ' class="' + accentClass + '"' : '';
  return titleHtml + joiner + '<span' + cls + '>' + accentHtml + '</span>';
}

// center_media(행 단위)를 기존 haetsal.json 모양(day_story[]/album.items[]/teachers.items[])으로 되돌린다.
// album/teachers의 eyebrow·title·sub는 아직 centers 테이블에 컬럼이 없어 고정 문구로 채운다.
function mapRowToData(row, options = {}){
  const { allowTeacherSampleFallback = false } = options;
  const media = row.center_media || [];
  const byType = (type) => {
    const seen = new Set();
    return media
      .filter(m => m.media_type === type)
      .sort((a,b) => a.sort_order - b.sort_order)
      .filter(m => { // DB에 중복 sort_order 행이 들어간 경우 방어 (같은 사진이 2번 보이는 문제)
        if (seen.has(m.sort_order)) return false;
        seen.add(m.sort_order);
        return true;
      });
  };
  // sample-sunshine은 템플릿 미디어를 centers 쪽으로 복사한 공개 샘플이라
  // 실제 운영 원과 달리 기존 미리보기처럼 앨범 사진을 시설 콜라주로 재사용한다.
  const isTemplateSampleCopy = row.slug === 'sample-sunshine'
    && media.some(m => m.photo_url && String(m.photo_url).indexOf('/template-previews/sunshine/') !== -1);
  const teacherFallbacks = [
    { name: '김햇살 선생님', role: '만 3세 햇살반 담임', message: '"아이의 속도에<br>맞춰 기다려 줄게요."' },
    { name: '이초록 선생님', role: '만 4세 새싹반 담임', message: '"매일의 작은 성장을<br>놓치지 않을게요."' },
    { name: '박노을 선생님', role: '만 5세 열매반 담임', message: '"마음껏 궁금해하는<br>아이로 도울게요."' }
  ];
  const teacherItems = byType('teacher').map((m, i) => {
    const fallback = teacherFallbacks[i % teacherFallbacks.length];
    return {
      name: allowTeacherSampleFallback ? (m.title || fallback.name) : (m.title ?? ''),
      role: allowTeacherSampleFallback ? (m.subtitle || fallback.role) : (m.subtitle ?? ''),
      photo: m.photo_url,
      message: allowTeacherSampleFallback ? (m.caption || fallback.message) : (m.caption ?? '')
    };
  });

  return {
    heroPhoto: (byType('hero')[0] || {}).photo_url || null,
    center: {
      id: row.id,
      slug: row.slug,
      name: row.name,
      theme: row.theme,
      address: row.address,
      directions_text: row.directions_text,
      menu: row.menu || [],
      hero: row.hero || { eyebrow:'', title:'', title_accent:'', subtitle:'' },
      director: row.director || { badge:'', photo:'', photo_alt:'', message:'', sign_label:'', sign_name:'', scroll_cue:'' },
      philosophy: row.philosophy || null,
      programs: row.programs || null,
      facilities: isTemplateSampleCopy && row.facilities
        ? Object.assign({}, row.facilities, { __useAlbumMediaFallback: true })
        : row.facilities || null
    },
    day_story: byType('day_story').map(m => ({
      slot: m.slot,
      time: m.time_label,
      title: m.title,
      photo: m.photo_url,
      photo_alt: m.photo_alt,
      caption: m.caption,
      note: m.note
    })),
    album: {
      eyebrow: '우리 원의 추억',
      title: '사진으로 보는 일상',
      sub: '눌러서 더 가까이 들여다보세요',
      items: byType('album').map(m => ({ label: m.title, photo: m.photo_url }))
    },
    teachers: {
      eyebrow: '믿고 맡기는 사람들',
      title: '우리 반 선생님',
      items: teacherItems
    },
    notices: row.notices || { eyebrow:'', title:'', items:[], more:'' },
    schedule: row.schedule || { eyebrow:'', title:'', month_label:'', days_in_month:30, event_days:[], trailing_muted:0, events:[] },
    faqs: row.faqs || { eyebrow:'', title:'', items:[] },
    finale: row.finale || { title:'', subtitle:'', cta:'입소 상담' },
    admission: (row.admissions || [])[0] || null,
    footer: row.footer || { tag:'원이야', text:'' }
  };
}

(async function(){
  // ─────────────────────────────────────────────
  // 1) 데이터 불러오기 — Supabase에서 centers + center_media를 한 번에 조회
  // ─────────────────────────────────────────────
  let data;
  const cfg = window.__SUPABASE_CONFIG__;
  const client = supabase.createClient(cfg.url, cfg.anonKey);
  let isPreviewMode = false;
  let isReviewMode = false;
  let previewTemplateId = ''; // ?preview=<id> 미리보기일 때 상세 페이지 링크(admissions/directions)에 넘길 id
  const PREVIEW_TEMPLATE_IDS = ['sunshine', 'carnival', 'forest', 'gallery'];
  const PREVIEW_MESSAGE = '이것은 템플릿 미리보기입니다. 실제 신청은 접수되지 않습니다.';

  const REVIEW_MESSAGE = '공개 전 검수용 화면에서는 신청이 접수되지 않습니다.';

  function normalizePreviewId(value){
    return PREVIEW_TEMPLATE_IDS.includes(value) ? value : '';
  }

  function publicTemplateUrl(path){
    if (!path || /^https?:\/\//.test(path) || /^data:/i.test(path)) return path;
    const res = client.storage.from('template-previews').getPublicUrl(path);
    return res && res.data && res.data.publicUrl ? res.data.publicUrl : path;
  }

  function resolveTemplateAssets(row){
    if (Array.isArray(row.center_media)){
      row.center_media = row.center_media.map(function(m){
        if (!m || !m.photo_url) return m;
        return Object.assign({}, m, { photo_url: publicTemplateUrl(m.photo_url) });
      });
    }
    if (row.director && row.director.photo){
      row.director = Object.assign({}, row.director, { photo: publicTemplateUrl(row.director.photo) });
    }
    ['facilities', 'programs'].forEach(function(key){
      if (!row[key] || !Array.isArray(row[key].items)) return;
      row[key] = Object.assign({}, row[key], {
        items: row[key].items.map(function(item){
          if (!item || !item.photo_url) return item;
          return Object.assign({}, item, { photo_url: publicTemplateUrl(item.photo_url) });
        })
      });
    });
    return row;
  }

  async function loadTemplatePreview(templateId){
    const centerRes = await client.from('template_centers').select('*').eq('template_id', templateId).single();
    if (centerRes.error) throw centerRes.error;
    const row = centerRes.data;
    const mediaRes = await client.from('template_center_media').select('*').eq('template_center_id', row.id).order('sort_order', { ascending: true });
    if (mediaRes.error) throw mediaRes.error;
    const admissionRes = await client.from('template_admissions').select('*').eq('template_center_id', row.id).maybeSingle();
    if (admissionRes.error) throw admissionRes.error;
    row.center_media = mediaRes.data || [];
    row.admissions = admissionRes.data ? [admissionRes.data] : [];
    return mapRowToData(resolveTemplateAssets(row), { allowTeacherSampleFallback: true });
  }

  let isAdminPreviewMode = false;

  // Storage 경로를 한 번의 batch 서명 요청으로 변환
  async function signPaths(paths){
    const unique = Array.from(new Set(paths.filter(function(path){
      return path && !/^https?:\/\//.test(path);
    })));
    const signedMap = new Map();
    if (unique.length){
      const res = await fetch(cfg.url + '/storage/v1/object/sign/center-images', {
        method: 'POST',
        headers: {
          apikey: cfg.anonKey,
          Authorization: 'Bearer ' + cfg.anonKey,
          'content-type': 'application/json'
        },
        body: JSON.stringify({ paths: unique, expiresIn: 3600 })
      });
      if (!res.ok) throw new Error('Failed to sign center images');
      const signed = await res.json();
      (signed || []).forEach(function(item, index){
        const signedUrl = item.signedURL ? cfg.url + '/storage/v1' + item.signedURL : (item.signedUrl || unique[index]);
        signedMap.set(item.path || unique[index], signedUrl);
      });
    }
    return function(path){ return signedMap.get(path) || path; };
  }

  async function signCenterPhotos(data){
    const resolveSignedPath = await signPaths([]
      .concat((data.day_story || []).map(m => m.photo))
      .concat((data.album?.items || []).map(it => it.photo))
      .concat((data.teachers?.items || []).map(tc => tc.photo))
      .concat(data.center.director ? [data.center.director.photo] : [])
      .concat(data.heroPhoto ? [data.heroPhoto] : []));
    if (data.heroPhoto){ data.heroPhoto = resolveSignedPath(data.heroPhoto); }
    for (const m of data.day_story){ m.photo = resolveSignedPath(m.photo); }
    for (const it of data.album.items){ it.photo = resolveSignedPath(it.photo); }
    for (const tc of data.teachers.items){ tc.photo = resolveSignedPath(tc.photo); }
    if (data.center.director){ data.center.director.photo = resolveSignedPath(data.center.director.photo); }
  }

  try {
    const params = new URLSearchParams(location.search);
    const reviewToken = (params.get('review_token') || '').trim();
    const slugParam = reviewToken ? '' : params.get('slug');
    const previewCenterSlug = (!reviewToken && !slugParam) ? (params.get('preview_center') || '').trim() : '';
    const previewId = (reviewToken || slugParam || previewCenterSlug) ? '' : normalizePreviewId(params.get('preview'));

    if (reviewToken){
      const reviewRes = await client.rpc('get_center_by_review_token', { p_token: reviewToken });
      if (reviewRes.error){
        console.error('[review token RPC]', reviewRes.error.message, reviewRes.error);
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">검수 링크 데이터를 불러오지 못했습니다. 콘솔의 RPC 오류 메시지를 확인해주세요.</p>';
        return;
      }
      if (!reviewRes.data){
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">검수 링크가 만료되었거나 폐기되었습니다.</p>';
        return;
      }
      isReviewMode = true;
      data = mapRowToData(reviewRes.data);
      await signCenterPhotos(data);
    } else if (previewId){
      // ── 기존: 템플릿 샘플 미리보기 (?preview=sunshine 등) — 절대 변경 금지 ──
      isPreviewMode = true;
      previewTemplateId = previewId; // 상세 페이지 링크에서 ?preview= 로 이어가기 위해 보관
      data = await loadTemplatePreview(previewId);
    } else if (previewCenterSlug){
      // ── 신규: 관리자 draft 원 미리보기 (?preview_center=slug) ──
      const sessionRes = await client.auth.getSession();
      const session = sessionRes.data ? sessionRes.data.session : null;
      const isAdmin = !!(session && (session.user.email || '').toLowerCase() === 'tobby79@naver.com');
      if (!isAdmin){
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">관리자 로그인이 필요합니다.</p>';
        return;

      const previewRes = await client.rpc('get_center_preview', { p_slug: previewCenterSlug });

        return;

      isAdminPreviewMode = true;
      data = mapRowToData(previewRes.data);
      await signCenterPhotos(data);
    } else {
      // ── 기존: 공개 원 조회 (?slug=slug) — 절대 변경 금지 ──

      const { data: row, error } = await client
        .from('centers')
        .select('*, center_media(*), admissions(*), philosophy, programs, facilities')

  (function(){

  // ── 우리 원 현황 카드 ──

  const ovFac = data.center.facilities;
  const stats = (ovFac && ovFac.stats) || [];
  const OVERVIEW_LABEL_ALIASES = { '교직원':'선생님' };
  const overviewItems = stats.map(function(s){ return { label: OVERVIEW_LABEL_ALIASES[s.label] || s.label, value:s.value }; });

  // ── 하루 스토리 (동화책: 표지 → moment별 스토리 → 마무리) ──
  const SUN_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>';
  const MOON_ICON_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.4 14.7A8.5 8.5 0 1 1 9.3 3.6a7 7 0 0 0 11.1 11.1z"/></svg>';
  const CHEVRON_L = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 5 8 12 15 19"/></svg>';
  const CHEVRON_R = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 5 16 12 9 19"/></svg>';
  const BOOKMARK_HTML = '<div class="sb-bookmark" aria-hidden="true"></div>';
  const ORDINALS = ['첫','두','세','네','다섯','여섯','일곱','여덟','아홉','열'];
  function ordName(n){ return (ORDINALS[n-1] || (n + '')) + ' 번째 이야기'; }

  // "오전/오후 N시" 표기를 24시간제 시각(0~23)으로 정확히 변환.
  // 오전 12시=자정(0시), 오후 12시=정오(12시)라는 12시간제 규칙을 반영해야
  // "오후 12시"(정오)가 저녁으로 오판되지 않는다.
  function parseHour24(timeStr){
    const t = timeStr || '';
    const m = t.match(/(오전|오후)\s*(\d{1,2})시/);
    if (!m) return null;
    const period = m[1];
    let hour = Number(m[2]) % 12; // 12시는 0으로 정규화
    if (period === '오후') hour += 12;
    return hour;
  }
  // 06:00~17:59는 해, 18:00~05:59는 달. time 파싱 실패 시에만 slot(dusk)으로 폴백.
  function isDuskTime(m){
    const hour = parseHour24(m.time);
    if (hour != null) return hour >= 18 || hour < 6;
    return m.slot === 'dusk';
  }

  const dayMoments = data.day_story || [];
  const centerName = (c.name || '우리 원').replace(/\s*어린이집$/, '') || c.name;
  const todayLabel = (function(){
    const d = new Date();
    return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  })();

  // 원장 인사말: 기존 별도 섹션 대신 책 2번째 페이지로 통합. 데이터는 c.director 재사용.
  const dir = c.director || {};
  const dirMsgLines = (dir.message || '').replace(/<br\s*\/?>/gi, '\n').split('\n');
  const dirMsgPreview = dirMsgLines.slice(0, 4).join('\n');
  const hasDirector = !!(dir.photo || (dir.message || '').trim() || dir.sign_name);

  if (!dayMoments.length){
    // moment가 없으면 섹션 숨김 (기존 동작과 동일한 안전 처리)
    $('day').hidden = true;
  } else {
    const total = dayMoments.length;
    // 표지 페이지
    const coverPage = `

        ${BOOKMARK_HTML}
        <div>
          <div class="cover-eyebrow">그림책처럼 보는</div>
          <h3 class="cover-title">${esc(centerName)}의<br>우리 원 이야기</h3>
          <div class="cover-date">${esc(todayLabel)}</div>
          <div class="cover-mascot" aria-hidden="true">🐻</div>
          <div class="cover-hint">책장을 넘겨 보세요 →</div>
        </div>
      </article>`;
    // 원장 인사말 페이지 (표지 다음). 화면에 보이는 별도 텍스트 라벨은 없음(표지와 동일하게 라벨 생략).
    // 접근성 라벨(aria-label)만 페이지 성격을 알려준다.

      <article class="sb-page sb-director" data-slot="mid-morning" data-kind="director" aria-roledescription="book page" aria-label="원장님 이야기">
        ${BOOKMARK_HTML}

        <div class="sb-fold" aria-hidden="true"></div>
        <div class="sb-text">
          ${dir.badge ? `<span class="dir-badge">${esc(dir.badge)}</span>` : ''}
          <div class="dir-sign">${esc(dir.sign_label)}<strong>${esc(dir.sign_name)}</strong></div>
          <p class="dir-msg" id="sbDirectorMsg">${escWithBr(dirMsgPreview)}</p>

        </div>

    // 스토리 페이지들.
    // 데이터에 따라 note가 비어있고 caption에 설명 문장이 들어오는 경우가 있다.

    const storyPages = dayMoments.map((m,i)=>{

        <source data-src="audio/storybook-bgm-sunshine-01.mp3" type="audio/mpeg">
