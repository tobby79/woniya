<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 — 원이야</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{--coral:#FF8A6B;--ink:#403733;--ink-soft:#6E625B;--cream:#FBF6EE;--paper:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
  .badge{font-family:'Gaegu',cursive;font-size:1.1rem;font-weight:700;color:var(--coral);margin-bottom:24px}
  .mascot{font-size:5rem;margin-bottom:24px;line-height:1}
  h1{font-family:'Gaegu',cursive;font-size:2.4rem;font-weight:700;color:var(--ink);margin-bottom:16px;line-height:1.3}
  p{font-size:1.05rem;color:var(--ink-soft);line-height:1.8;max-width:340px;margin:0 auto 36px}
  .back-btn{display:inline-block;background:var(--coral);color:#fff;font-weight:700;font-size:1rem;padding:15px 36px;border-radius:50px;text-decoration:none;box-shadow:0 12px 28px -10px rgba(255,138,107,.6)}
  .coming{display:inline-block;background:var(--paper);border:2px dashed var(--coral);color:var(--coral);font-family:'Gaegu',cursive;font-size:1rem;font-weight:700;padding:10px 24px;border-radius:30px;margin-bottom:30px}
</style>
</head>
<body>
  <div class="badge">원이야</div>
  <div class="mascot">🌱</div>
  <span class="coming">준비 중이에요</span>
  <h1>우리 반 미니홈피가<br>곧 찾아와요!</h1>
  <p>담임 선생님과 함께하는<br>우리 반만의 특별한 공간을<br>준비하고 있어요.</p>
  <a href="javascript:history.back()" class="back-btn">돌아가기</a>
</body>
</html>
