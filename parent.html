<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 학부모 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    --line:#f1e9e0;
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  [hidden]{display:none!important}

  /* 상단 네비 (admissions.html/directions.html/template-sunshine.html과 동일한 구름 밑단 실루엣) */
  .topbar{
    position:sticky;top:0;z-index:20;
    --cloud-dip:16px; --cloud-unit:64px;
    padding:18px 0 calc(18px + var(--cloud-dip));
    background:var(--paper);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    filter:drop-shadow(0 4px 6px rgba(180,140,110,.28));
    -webkit-mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
    mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
  }
  @media (max-width:719px){ .topbar{--cloud-dip:12px; --cloud-unit:52px} }
  .topbar-inner{max-width:560px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .brand{font-family:var(--display);font-size:1.2rem;color:var(--ink);text-decoration:none;letter-spacing:-.5px}
  .topbar-actions{display:flex;align-items:center;gap:10px}
  .back-link{font-size:.85rem;color:var(--coral-deep);text-decoration:none;font-weight:700}

  .wrap{max-width:480px;margin:0 auto;padding:46px 22px 70px}
  .section-eyebrow{font-family:var(--hand);font-size:1.15rem;color:var(--sage);font-weight:700;text-align:center}
  .section-title{font-family:var(--display);font-size:1.72rem;margin:8px 0 22px;letter-spacing:-.5px;line-height:1.38;text-align:center}
  .lead{color:var(--ink-soft);font-size:.95rem;text-align:center;margin-bottom:24px}
  .panel{background:var(--paper);border-radius:24px;padding:26px;box-shadow:0 18px 44px -22px rgba(120,80,60,.35)}
  .field{margin-bottom:16px}
  label{display:block;font-size:.86rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  input[type=email],input[type=password],input[type=text],textarea{
    width:100%;border:1.5px solid var(--line);border-radius:14px;padding:13px 16px;
    font-family:var(--body);font-size:.98rem;color:var(--ink);background:var(--cream);
    outline:none;transition:border-color .2s ease;
  }
  textarea{min-height:104px;resize:vertical;line-height:1.6}
  input:focus,textarea:focus{border-color:var(--coral)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;width:100%;border:none;
    border-radius:30px;padding:14px;background:var(--coral);color:#fff;font-weight:700;
    font-size:1rem;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;
    box-shadow:0 14px 28px -10px var(--coral-deep);
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn.ghost{background:transparent;color:var(--ink-soft);box-shadow:none;border:1.5px solid #e7dccf}
  .btn.kakao{background:#FEE500;color:#191919;box-shadow:0 14px 28px -12px rgba(60,45,0,.35)}
  .btn.small{width:auto;padding:8px 16px;font-size:.84rem;box-shadow:none}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-soft);font-size:.82rem}
  .auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .switch-link{margin-top:16px;text-align:center;font-size:.9rem;color:var(--ink-soft)}
  .switch-link button{border:none;background:transparent;color:var(--coral-deep);font-weight:800;cursor:pointer;font-family:var(--body)}
  .msg{margin-top:14px;font-size:.88rem;text-align:center;color:var(--ink-soft)}
  .msg.error{color:#D9534F}
  .msg.ok{color:var(--sage)}
  .result-title{font-family:var(--display);font-size:1.28rem;text-align:center;margin-bottom:10px}
  .result-desc{text-align:center;color:var(--ink-soft);font-size:.94rem;line-height:1.7}
  .class-list{display:flex;flex-direction:column;gap:12px}
  .class-card{background:var(--cream);border:1.5px solid var(--line);border-radius:20px;padding:18px}
  .class-title{font-weight:800;font-size:1rem;color:var(--ink)}
  .class-meta{margin-top:4px;font-size:.84rem;color:var(--ink-soft)}
  .class-actions{margin-top:14px}
  .extra-invite{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
  body.mini-open .wrap{max-width:760px;padding-top:24px}
  .mini-panel{background:transparent;box-shadow:none;padding:0}
  .mini-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
  .mini-title{font-family:var(--display);font-size:1.26rem;line-height:1.35}
  .mini-cover{position:relative;min-height:230px;border-radius:30px;padding:18px;overflow:hidden;background:linear-gradient(135deg,#ffd8df,#d8c7ff);box-shadow:0 24px 60px -32px rgba(120,80,60,.55);border:2px solid rgba(255,255,255,.8)}
  .mini-cover::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.18),rgba(255,255,255,.72));pointer-events:none}
  .mini-cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .visit-pill{position:relative;z-index:1;display:inline-flex;border:2px dashed rgba(64,55,51,.42);border-radius:999px;padding:7px 12px;background:rgba(255,255,255,.82);font-size:.78rem;font-weight:800;color:var(--ink)}
  .month-sticker{position:absolute;z-index:1;right:18px;top:18px;transform:rotate(7deg);background:#fff0a8;border:2px solid rgba(64,55,51,.08);border-radius:12px;padding:10px 14px;font-family:var(--hand);font-size:1.22rem;font-weight:700;box-shadow:0 12px 24px -16px rgba(64,55,51,.45)}
  .cover-caption{position:absolute;z-index:1;left:20px;right:20px;bottom:18px}
  .cover-caption h2{font-family:var(--display);font-size:1.7rem;line-height:1.25;margin-bottom:6px}
  .cover-caption p{font-size:.9rem;color:var(--ink-soft);font-weight:700}
  .mini-info-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:18px 0}
  .teacher-note{display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:start;background:var(--paper);border-radius:28px;padding:18px;border:1.5px solid var(--line)}
  .teacher-avatar{width:72px;height:72px;border-radius:50%;border:2px dashed var(--coral);background:#fff8f5;display:flex;align-items:center;justify-content:center;font-family:var(--hand);font-size:1.12rem;color:var(--coral-deep);transform:rotate(-4deg)}
  .speech{position:relative;background:#fffaf3;border:1.5px solid #f1e2d4;border-radius:22px;padding:14px 16px;color:var(--ink-soft);font-size:.94rem}
  .speech::before{content:"";position:absolute;left:-9px;top:24px;width:16px;height:16px;background:#fffaf3;border-left:1.5px solid #f1e2d4;border-bottom:1.5px solid #f1e2d4;transform:rotate(45deg)}
  .event-teaser{position:relative;width:100%;text-align:left;border:1.5px dashed #ead7e7;background:#fff7fb;border-radius:28px;padding:18px 18px 52px;cursor:pointer;box-shadow:0 16px 42px -30px rgba(120,80,60,.45);overflow:hidden;font-family:var(--body);color:var(--ink)}
  .event-teaser::after{content:"";position:absolute;right:14px;top:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,138,107,.18);border:2px dashed rgba(255,138,107,.42)}
  .event-badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;background:#fff0a8;font-family:var(--hand);font-size:1rem;font-weight:700;transform:rotate(-3deg);margin-bottom:10px}
  .event-teaser-title{font-weight:900;font-size:1.04rem;line-height:1.45;margin-bottom:4px;word-break:break-word}
  .event-teaser-date{font-size:.84rem;color:var(--ink-soft);font-weight:800}
  .event-more{position:absolute;right:16px;bottom:14px;display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 10px;background:#fff;color:var(--coral-deep);font-size:.78rem;font-weight:900;box-shadow:0 10px 20px -16px rgba(242,113,90,.7);border:1px solid #f6d8cf}
  .event-more span{font-size:.9rem;line-height:1}
  .notice-alert{position:relative;width:100%;text-align:left;border:2px solid #ffb7c6;background:#fff4f7;border-radius:28px;padding:18px 18px 52px;cursor:pointer;box-shadow:0 18px 42px -30px rgba(242,113,90,.58);font-family:var(--body);color:var(--ink);overflow:hidden}
  .notice-alert::before{content:"";position:absolute;right:16px;top:16px;width:12px;height:12px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 6px rgba(255,138,107,.16)}
  .notice-alert-badge{display:inline-flex;border-radius:999px;padding:6px 10px;background:#fff;color:var(--coral-deep);font-size:.78rem;font-weight:900;margin-bottom:10px;border:1px solid #ffd7df}
  .notice-alert-title{font-weight:900;font-size:1.04rem;line-height:1.45;margin-bottom:4px;word-break:break-word}
  .notice-alert-date{font-size:.84rem;color:var(--ink-soft);font-weight:800}
  .mini-tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;margin-bottom:6px}
  .mini-tab{flex:0 0 auto;border:1.5px solid var(--line);background:var(--paper);color:var(--ink-soft);border-radius:999px;padding:9px 15px;font-family:var(--body);font-weight:800;cursor:pointer}
  .mini-tab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--coral);margin-left:6px;vertical-align:middle;box-shadow:0 0 0 3px rgba(255,138,107,.16)}
  .mini-tab.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 12px 22px -16px var(--coral-deep)}
  .mini-content{display:flex;flex-direction:column;gap:14px}
  .mini-card{position:relative;background:var(--paper);border:1.5px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 16px 42px -28px rgba(120,80,60,.35)}
  .mini-card::before{content:"";position:absolute;top:-9px;left:34px;width:64px;height:20px;background:rgba(255,226,167,.86);transform:rotate(-5deg);border-radius:4px;box-shadow:0 4px 10px -8px rgba(64,55,51,.6)}
  .mini-date{font-size:.78rem;color:var(--sage);font-weight:900;margin-bottom:6px}
  .mini-card-title{font-weight:900;font-size:1.04rem;margin-bottom:8px}
  .mini-body{color:var(--ink-soft);font-size:.94rem;line-height:1.75;word-break:break-word}
  .scrap-photo{position:relative;margin:6px 0 14px;padding:9px;background:#fff;border-radius:10px;box-shadow:0 14px 26px -22px rgba(64,55,51,.55);transform:rotate(-1deg)}
  .scrap-photo img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:7px;display:block}
  .album-grid-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .album-photo{border:none;padding:0;background:#fff;border-radius:16px;overflow:hidden;aspect-ratio:1;cursor:pointer;box-shadow:0 12px 26px -22px rgba(64,55,51,.55);transform:rotate(-1deg)}
  .album-photo:nth-child(2n){transform:rotate(1.5deg)}
  .album-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .comment-item{background:#fffdf8;border:1.5px dashed #eadccc;border-radius:22px;padding:16px}
  .comment-reply{margin-top:12px;margin-left:20px;background:#f7f0ff;border-radius:18px;padding:12px 14px;color:var(--ink-soft);font-size:.9rem}
  .comment-form{margin-top:4px;background:var(--paper);border-radius:24px;padding:18px;border:1.5px solid var(--line)}
  .event-calendar-card{background:var(--paper);border:1.5px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 16px 42px -28px rgba(120,80,60,.35)}
  .event-calendar-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .event-calendar-title{font-family:var(--display);font-size:1.16rem;font-weight:900}
  .event-nav{width:auto;min-width:44px;padding:8px 12px;box-shadow:none}
  .event-weekdays,.event-calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .event-weekdays{margin-bottom:6px;color:var(--ink-soft);font-size:.74rem;font-weight:900;text-align:center}
  .event-day{position:relative;min-height:62px;border:1.5px solid var(--line);border-radius:16px;background:#fffdf8;padding:8px;text-align:left;font-family:var(--body);color:var(--ink);cursor:pointer}
  .event-day.out{opacity:.38}
  .event-day.today{background:#fff7fb;border-color:#f6c5d8}
  .event-day.selected{outline:2px dashed var(--coral);outline-offset:2px}
  .event-day-num{font-size:.82rem;font-weight:900}
  .event-day-dot{position:absolute;left:8px;bottom:8px;min-width:18px;height:18px;border-radius:999px;background:var(--coral);color:#fff;font-size:.68rem;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .event-detail{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .event-detail-title{font-weight:900}
  .event-detail-item{background:#fff7fb;border:1.5px dashed #ead7e7;border-radius:18px;padding:14px}
  .empty-mini{background:rgba(255,255,255,.72);border:1.5px dashed var(--line);border-radius:22px;padding:22px;text-align:center;color:var(--ink-soft)}
  .image-modal{position:fixed;inset:0;background:rgba(64,55,51,.72);z-index:20;display:flex;align-items:center;justify-content:center;padding:22px}
  .image-modal[hidden]{display:none!important}
  .image-modal img{max-width:min(920px,100%);max-height:82vh;border-radius:18px;background:#fff;box-shadow:0 30px 80px -24px rgba(0,0,0,.65)}
  .image-modal button{position:absolute;right:20px;top:18px;width:auto;padding:9px 14px;box-shadow:none}
  @media (max-width:560px){
    .teacher-note{grid-template-columns:1fr}
    .teacher-avatar{width:64px;height:64px}
    .album-grid-mini{grid-template-columns:repeat(2,1fr)}
  }
  @media (min-width:768px){
    .mini-info-grid.has-cards{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));align-items:stretch}
    .mini-info-grid.has-cards .notice-alert,.mini-info-grid.has-cards .teacher-note,.mini-info-grid.has-cards .event-teaser{height:100%}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">원이야</a>
    <div class="topbar-actions">
      <button type="button" class="btn ghost small" id="logoutBtn" hidden>로그아웃</button>
      <a class="back-link" href="index.html">홈으로</a>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="section-eyebrow">학부모 공간</div>
  <h1 class="section-title">우리 반 소식을<br>안전하게 확인해요</h1>
  <p class="lead" id="leadText">로그인 후 초대 코드를 입력해주세요.</p>

  <section class="panel" id="loadingPanel">
    <p class="msg">세션을 확인하고 있어요.</p>
  </section>

  <section class="panel" id="authPanel" hidden>
    <button type="button" class="btn kakao" id="kakaoLoginBtn">카카오로 3초만에 시작하기</button>
    <div class="auth-divider" aria-hidden="true">또는</div>
    <form id="authForm">
      <div class="field">
        <label for="authEmail">이메일</label>
        <input type="email" id="authEmail" required autocomplete="email">
      </div>
      <div class="field">
        <label for="authPassword">비밀번호</label>
        <input type="password" id="authPassword" required minlength="6" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="authSubmit">로그인</button>
      <div class="msg error" id="authMsg"></div>
    </form>
    <div class="switch-link">
      <span id="authSwitchText">처음이신가요?</span>
      <button type="button" id="authModeBtn">회원가입</button>
    </div>
  </section>

  <section class="panel" id="invitePanel" hidden>
    <form id="inviteForm">
      <div class="field">
        <label for="inviteCode">초대 코드</label>
        <input type="text" id="inviteCode" required autocomplete="one-time-code" placeholder="선생님이 알려준 초대 코드">
      </div>
      <button type="submit" class="btn" id="inviteSubmit">연결 신청</button>
      <div class="msg error" id="inviteMsg"></div>
    </form>
  </section>

  <section class="panel" id="pendingPanel" hidden>
    <div class="result-title">승인 대기 중입니다</div>
    <p class="result-desc">연결 신청이 접수되었습니다. 선생님 또는 원장님 승인 후 우리 반 미니홈피를 볼 수 있어요.</p>
  </section>

  <section class="panel" id="classesPanel" hidden>
    <div class="result-title">연결된 반</div>
    <div class="class-list" id="classList"></div>
    <div class="extra-invite">
      <button type="button" class="btn ghost" id="showExtraInviteBtn">다른 반 초대 코드 입력하기</button>
      <div id="extraInviteBox" hidden style="margin-top:16px">
        <form id="extraInviteForm">
          <div class="field">
            <label for="extraInviteCode">초대 코드</label>
            <input type="text" id="extraInviteCode" required autocomplete="one-time-code">
          </div>
          <button type="submit" class="btn" id="extraInviteSubmit">연결 신청</button>
          <div class="msg error" id="extraInviteMsg"></div>
        </form>
      </div>
    </div>
  </section>

  <section class="mini-panel" id="miniPanel" hidden>
    <div class="mini-top">
      <div>
        <div class="section-eyebrow">우리 반 미니홈피</div>
        <div class="mini-title" id="miniTitle"></div>
      </div>
      <button type="button" class="btn ghost small" id="miniBackBtn">목록으로</button>
    </div>
    <div id="miniRoot"></div>
  </section>

  <section class="panel" id="noticePanel" hidden>
    <div class="result-title" id="noticeTitle"></div>
    <p class="result-desc" id="noticeDesc"></p>
  </section>
</main>

<div class="image-modal" id="imageModal" hidden>
  <button type="button" class="btn small" id="imageModalClose">닫기</button>
  <img id="imageModalImg" alt="">
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var cfg = window.__SUPABASE_CONFIG__;
  var client = supabase.createClient(cfg.url, cfg.anonKey);

  var leadText = document.getElementById('leadText');
  var logoutBtn = document.getElementById('logoutBtn');
  var loadingPanel = document.getElementById('loadingPanel');
  var authPanel = document.getElementById('authPanel');
  var invitePanel = document.getElementById('invitePanel');
  var pendingPanel = document.getElementById('pendingPanel');
  var classesPanel = document.getElementById('classesPanel');
  var miniPanel = document.getElementById('miniPanel');
  var noticePanel = document.getElementById('noticePanel');
  var noticeTitle = document.getElementById('noticeTitle');
  var noticeDesc = document.getElementById('noticeDesc');
  var miniTitle = document.getElementById('miniTitle');
  var miniBackBtn = document.getElementById('miniBackBtn');
  var miniRoot = document.getElementById('miniRoot');
  var imageModal = document.getElementById('imageModal');
  var imageModalImg = document.getElementById('imageModalImg');
  var imageModalClose = document.getElementById('imageModalClose');

  var authForm = document.getElementById('authForm');
  var authEmail = document.getElementById('authEmail');
  var authPassword = document.getElementById('authPassword');
  var authSubmit = document.getElementById('authSubmit');
  var authMsg = document.getElementById('authMsg');
  var authSwitchText = document.getElementById('authSwitchText');
  var authModeBtn = document.getElementById('authModeBtn');
  var kakaoLoginBtn = document.getElementById('kakaoLoginBtn');

  var inviteForm = document.getElementById('inviteForm');
  var inviteCode = document.getElementById('inviteCode');
  var inviteSubmit = document.getElementById('inviteSubmit');
  var inviteMsg = document.getElementById('inviteMsg');

  var classList = document.getElementById('classList');
  var showExtraInviteBtn = document.getElementById('showExtraInviteBtn');
  var extraInviteBox = document.getElementById('extraInviteBox');
  var extraInviteForm = document.getElementById('extraInviteForm');
  var extraInviteCode = document.getElementById('extraInviteCode');
  var extraInviteSubmit = document.getElementById('extraInviteSubmit');
  var extraInviteMsg = document.getElementById('extraInviteMsg');

  var currentSession = null;
  var authMode = 'login';
  var loadingState = false;
  var approvedClasses = [];
  var currentMiniClass = null;
  var currentEnrollment = null;
  var currentMini = null;
  var currentMiniTab = 'diary';
  var eventCalendarDate = firstOfMonth(new Date());
  var selectedEventDate = toDateInput(new Date());
  var miniCache = { posts: [], media: [], comments: [] };
  var BUCKET = 'center-images';

  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
    });
  }

  function escWithBr(s){
    return esc(s).replace(/\r?\n/g, '<br>');
  }

  function showPanel(panel){
    [loadingPanel, authPanel, invitePanel, pendingPanel, classesPanel, miniPanel, noticePanel].forEach(function(item){
      item.hidden = item !== panel;
    });
    document.body.classList.toggle('mini-open', panel === miniPanel);
  }

  function showNotice(title, desc){
    noticeTitle.textContent = title || '';
    noticeDesc.innerHTML = escWithBr(desc || '');
    showPanel(noticePanel);
  }

  function setAuthMode(mode){
    authMode = mode;
    authMsg.textContent = '';
    if (mode === 'signup') {
      authSubmit.textContent = '회원가입';
      authSwitchText.textContent = '이미 계정이 있으신가요?';
      authModeBtn.textContent = '로그인';
      authPassword.setAttribute('autocomplete', 'new-password');
    } else {
      authSubmit.textContent = '로그인';
      authSwitchText.textContent = '처음이신가요?';
      authModeBtn.textContent = '회원가입';
      authPassword.setAttribute('autocomplete', 'current-password');
    }
  }

  function classTitle(row){
    if (!row) return '이름 없는 반';
    if (row.name && row.age_label) return row.name + ' · ' + row.age_label;
    return row.name || row.age_label || '이름 없는 반';
  }

  function renderClassCard(row){
    return '<div class="class-card">' +
      '<div class="class-title">' + esc(classTitle(row)) + ' 미니홈피</div>' +
      '<div class="class-meta">담임 선생님이 전하는 우리 반 소식을 확인해요.</div>' +
      '<div class="class-actions"><button type="button" class="btn" data-open-class="' + esc(row.id) + '">반 미니홈피 열기</button></div>' +
    '</div>';
  }

  async function loadClassRows(ids){
    if (!ids.length) return [];
    var res = await client.from('classes').select('id,name,age_label,enrolled').in('id', ids);
    if (res.error) throw res.error;
    var rows = res.data || [];
    return ids.map(function(id){
      return rows.find(function(row){ return row.id === id; }) || { id:id };
    });
  }

  function formatDate(value){
    if (!value) return '';
    var date = new Date(value);
    if (isNaN(date.getTime())) return '';
    return (date.getMonth() + 1) + '월 ' + date.getDate() + '일';
  }

  function pad2(n){
    return String(n).padStart(2, '0');
  }

  function toDateInput(date){
    return date.getFullYear() + '-' + pad2(date.getMonth() + 1) + '-' + pad2(date.getDate());
  }

  function firstOfMonth(date){
    return new Date(date.getFullYear(), date.getMonth(), 1);
  }

  function dateKey(value){
    if (!value) return '';
    if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}/.test(value)) return value.slice(0, 10);
    var date = new Date(value);
    if (isNaN(date.getTime())) return '';
    return toDateInput(date);
  }

  function sameMonth(a, b){
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
  }

  function currentMonthLabel(){
    return (new Date().getMonth() + 1) + '월';
  }

  function safeThemeColor(value){
    var text = String(value || '').trim();
    return /^#[0-9a-fA-F]{3,8}$/.test(text) ? text : '#F7B7C8';
  }

  function visitLabel(row){
    var total = Number(row && row.enrolled ? row.enrolled : 0);
    if (!total) return '오늘 0 · 전체 0';
    var today = new Date().getDate() % total;
    if (today === 0) today = total;
    return '오늘 ' + today + ' · 전체 ' + total;
  }

  async function signedUrl(path){
    if (!path) return '';
    var res = await client.storage.from(BUCKET).createSignedUrl(path, 3600);
    if (res.error) throw res.error;
    return res.data ? res.data.signedUrl : '';
  }

  async function signedMediaRows(rows){
    var out = [];
    for (var i = 0; i < rows.length; i++) {
      var row = Object.assign({}, rows[i]);
      try { row.signed_url = await signedUrl(row.url); }
      catch (_err) { row.signed_url = ''; }
      out.push(row);
    }
    return out;
  }

  function enabledModules(){
    var enabled = currentMini && currentMini.modules_enabled ? currentMini.modules_enabled : {};
    var modules = [
      { key:'diary', label:'일지' },
      { key:'event', label:'행사' },
      { key:'album', label:'사진첩' },
      { key:'guestbook', label:'방명록' },
      { key:'notice', label:'공지' }
    ];
    return modules.filter(function(item){
      return enabled[item.key] !== false;
    });
  }

  function eventRows(){
    return miniCache.posts
      .filter(function(row){ return row.type === 'event' && row.event_date; })
      .sort(function(a, b){ return dateKey(a.event_date).localeCompare(dateKey(b.event_date)); });
  }

  function upcomingEvent(){
    var today = toDateInput(new Date());
    return eventRows().find(function(row){
      return dateKey(row.event_date) >= today;
    }) || null;
  }

  function noticeRows(){
    return miniCache.posts
      .filter(function(row){ return row.type === 'notice'; })
      .sort(function(a, b){ return new Date(b.created_at).getTime() - new Date(a.created_at).getTime(); });
  }

  function latestNotice(){
    return noticeRows()[0] || null;
  }

  function hasUnreadNotice(){
    var latest = latestNotice();
    if (!latest) return false;
    if (!currentEnrollment || !currentEnrollment.last_notice_read_at) return true;
    return new Date(latest.created_at).getTime() > new Date(currentEnrollment.last_notice_read_at).getTime();
  }

  function firstMediaForPost(postId){
    return miniCache.media.find(function(row){
      return row.post_id === postId && row.signed_url;
    });
  }

  async function openClassMini(classId){
    var row = approvedClasses.find(function(item){ return item.id === classId; });
    if (!row) return;
    currentMiniClass = row;
    currentEnrollment = {
      id: row.enrollment_id || null,
      last_notice_read_at: row.last_notice_read_at || null
    };
    currentMini = null;
    currentMiniTab = 'diary';
    miniCache = { posts: [], media: [], comments: [] };
    miniTitle.textContent = classTitle(row);
    miniRoot.innerHTML = '<div class="empty-mini">반 미니홈피를 불러오고 있어요.</div>';
    leadText.textContent = classTitle(row) + ' 소식입니다.';
    showPanel(miniPanel);

    try {
      var miniRes = await client.from('class_mini').select('*').eq('class_id', classId).maybeSingle();
      if (miniRes.error) throw miniRes.error;
      currentMini = miniRes.data || {
        class_id: classId,
        theme_color: '#F7B7C8',
        intro: '',
        teacher_message: '',
        modules_enabled: { diary:false, album:false, guestbook:false, notice:false }
      };

      var postsRes = await client.from('class_posts')
        .select('*')
        .eq('class_id', classId)
        .order('created_at', { ascending:false });
      if (postsRes.error) throw postsRes.error;

      var mediaRes = await client.from('class_media')
        .select('*')
        .eq('class_id', classId)
        .order('uploaded_at', { ascending:false });
      if (mediaRes.error) throw mediaRes.error;

      var commentsRes = await client.from('class_comments')
        .select('*')
        .eq('class_id', classId)
        .order('created_at', { ascending:false });
      if (commentsRes.error) throw commentsRes.error;

      miniCache.posts = postsRes.data || [];
      miniCache.media = await signedMediaRows(mediaRes.data || []);
      miniCache.comments = commentsRes.data || [];
      var next = upcomingEvent();
      if (next) {
        selectedEventDate = dateKey(next.event_date);
        eventCalendarDate = firstOfMonth(new Date(selectedEventDate + 'T00:00:00'));
      } else {
        selectedEventDate = toDateInput(new Date());
        eventCalendarDate = firstOfMonth(new Date());
      }
      renderMiniHome();
    } catch (err) {
      miniRoot.innerHTML = '<div class="empty-mini">' + escWithBr(err && err.message ? err.message : String(err)) + '</div>';
    }
  }

  async function renderMiniHome(){
    var modules = enabledModules();
    var coverStyle = '';
    var coverImg = '';
    if (currentMini.cover_image) {
      try {
        coverImg = await signedUrl(currentMini.cover_image);
      } catch (_err) {
        coverImg = '';
      }
    }
    if (!coverImg) {
      coverStyle = ' style="background:linear-gradient(135deg,' + safeThemeColor(currentMini.theme_color) + ',#D9C8FF)"';
    }

    if (modules.length && !modules.some(function(item){ return item.key === currentMiniTab; })) {
      currentMiniTab = modules[0].key;
    }
    var nextEvent = upcomingEvent();
    var unreadNotice = hasUnreadNotice();
    var latestUnreadNotice = unreadNotice ? latestNotice() : null;
    var hasInfoCards = !!(latestUnreadNotice || nextEvent);

    miniRoot.innerHTML =
      '<div class="mini-cover"' + coverStyle + '>' +
        (coverImg ? '<img class="mini-cover-img" src="' + esc(coverImg) + '" alt="">' : '') +
        '<div class="visit-pill">' + esc(visitLabel(currentMiniClass)) + '</div>' +
        '<div class="month-sticker">' + esc(currentMonthLabel()) + '</div>' +
        '<div class="cover-caption">' +
          '<h2>' + esc(currentMiniClass.name || '우리 반') + '</h2>' +
          '<p>' + esc(currentMiniClass.age_label || '오늘도 반짝이는 하루') + '</p>' +
        '</div>' +
      '</div>' +
      '<div class="mini-info-grid' + (hasInfoCards ? ' has-cards' : '') + '">' +
        (latestUnreadNotice ? '<button type="button" class="notice-alert" data-jump-notice="true">' +
          '<span class="notice-alert-badge">새 공지</span>' +
          '<div class="notice-alert-title">' + escWithBr(latestUnreadNotice.title || '공지사항') + '</div>' +
          '<div class="notice-alert-date">' + esc(formatDate(latestUnreadNotice.created_at)) + '</div>' +
          '<span class="event-more">더보기 <span aria-hidden="true">→</span></span>' +
        '</button>' : '') +
        '<section class="teacher-note">' +
          '<div class="teacher-avatar">담임</div>' +
          '<div class="speech">' + escWithBr(currentMini.teacher_message || currentMini.intro || '선생님의 한마디가 곧 올라올 예정이에요.') + '</div>' +
        '</section>' +
        (nextEvent ? '<button type="button" class="event-teaser" data-jump-event="true">' +
          '<span class="event-badge">다가오는 행사</span>' +
          '<div class="event-teaser-title">' + escWithBr(nextEvent.title || '행사') + '</div>' +
          '<div class="event-teaser-date">' + esc(formatDate(dateKey(nextEvent.event_date))) + '</div>' +
          '<span class="event-more">더보기 <span aria-hidden="true">→</span></span>' +
        '</button>' : '') +
      '</div>' +
      (modules.length
        ? '<div class="mini-tabs">' + modules.map(function(item){
            return '<button type="button" class="mini-tab' + (item.key === currentMiniTab ? ' active' : '') + '" data-mini-tab="' + esc(item.key) + '">' +
              esc(item.label) +
              (item.key === 'notice' && unreadNotice ? '<span class="mini-tab-dot" aria-label="안 읽은 공지"></span>' : '') +
            '</button>';
          }).join('') + '</div><div class="mini-content" id="miniContent"></div>'
        : '<div class="empty-mini">아직 준비 중이에요.</div>');

    if (modules.length) renderMiniTab();
  }

  function renderMiniTab(){
    var content = document.getElementById('miniContent');
    if (!content) return;
    if (currentMiniTab === 'diary') renderDiaryTab(content);
    if (currentMiniTab === 'event') renderEventTab(content);
    if (currentMiniTab === 'album') renderAlbumTab(content);
    if (currentMiniTab === 'guestbook') renderGuestbookTab(content);
    if (currentMiniTab === 'notice') renderNoticeTab(content);
  }

  function renderDiaryTab(content){
    var rows = miniCache.posts.filter(function(row){ return row.type === 'diary'; });
    if (!rows.length) {
      content.innerHTML = '<div class="empty-mini">아직 올라온 일지가 없어요.</div>';
      return;
    }
    content.innerHTML = rows.map(function(row){
      var media = firstMediaForPost(row.id);
      return '<article class="mini-card">' +
        '<div class="mini-date">' + esc(formatDate(row.created_at)) + '</div>' +
        '<div class="mini-card-title">' + esc(row.title || '오늘의 반 일지') + '</div>' +
        (media ? '<div class="scrap-photo"><img src="' + esc(media.signed_url) + '" alt=""></div>' : '') +
        '<div class="mini-body">' + escWithBr(row.body || '') + '</div>' +
      '</article>';
    }).join('');
  }

  function renderEventTab(content){
    var rows = eventRows();
    if (!rows.length) {
      content.innerHTML = '<div class="empty-mini">아직 등록된 행사가 없어요.</div>';
      return;
    }

    var monthEvents = rows.filter(function(row){
      var key = dateKey(row.event_date);
      return key && sameMonth(new Date(key + 'T00:00:00'), eventCalendarDate);
    });
    if (!selectedEventDate || !sameMonth(new Date(selectedEventDate + 'T00:00:00'), eventCalendarDate)) {
      var firstInMonth = monthEvents[0];
      selectedEventDate = firstInMonth ? dateKey(firstInMonth.event_date) : toDateInput(eventCalendarDate);
    }

    var start = new Date(eventCalendarDate);
    start.setDate(1 - eventCalendarDate.getDay());
    var today = toDateInput(new Date());
    var days = [];
    for (var i = 0; i < 42; i++) {
      var d = new Date(start);
      d.setDate(start.getDate() + i);
      var key = toDateInput(d);
      var count = rows.filter(function(row){ return dateKey(row.event_date) === key; }).length;
      days.push('<button type="button" class="event-day' +
        (sameMonth(d, eventCalendarDate) ? '' : ' out') +
        (key === today ? ' today' : '') +
        (key === selectedEventDate ? ' selected' : '') +
        '" data-event-date="' + esc(key) + '">' +
        '<span class="event-day-num">' + d.getDate() + '</span>' +
        (count ? '<span class="event-day-dot">' + count + '</span>' : '') +
      '</button>');
    }

    var selectedRows = rows.filter(function(row){ return dateKey(row.event_date) === selectedEventDate; });
    content.innerHTML =
      '<section class="event-calendar-card">' +
        '<div class="event-calendar-head">' +
          '<button type="button" class="btn ghost event-nav" data-event-month="-1">◀</button>' +
          '<div class="event-calendar-title">' + eventCalendarDate.getFullYear() + '년 ' + (eventCalendarDate.getMonth() + 1) + '월</div>' +
          '<button type="button" class="btn ghost event-nav" data-event-month="1">▶</button>' +
        '</div>' +
        '<div class="event-weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>' +
        '<div class="event-calendar-grid">' + days.join('') + '</div>' +
        '<div class="event-detail">' +
          '<div class="event-detail-title">' + esc(formatDate(selectedEventDate)) + ' 행사</div>' +
          (selectedRows.length ? selectedRows.map(function(row){
            return '<article class="event-detail-item">' +
              '<div class="mini-card-title">' + escWithBr(row.title || '행사') + '</div>' +
              '<div class="mini-body">' + escWithBr(row.body || '') + '</div>' +
            '</article>';
          }).join('') : '<div class="empty-mini">선택한 날짜에 등록된 행사가 없어요.</div>') +
        '</div>' +
      '</section>';
  }

  function renderAlbumTab(content){
    var rows = miniCache.media.filter(function(row){ return row.signed_url; });
    if (!rows.length) {
      content.innerHTML = '<div class="empty-mini">아직 올라온 사진이 없어요.</div>';
      return;
    }
    content.innerHTML = '<div class="album-grid-mini">' + rows.map(function(row){
      return '<button type="button" class="album-photo" data-open-image="' + esc(row.signed_url) + '">' +
        '<img src="' + esc(row.signed_url) + '" alt="' + esc(formatDate(row.taken_at || row.uploaded_at)) + '">' +
      '</button>';
    }).join('') + '</div>';
  }

  function renderGuestbookTab(content){
    var list = miniCache.comments.length
      ? miniCache.comments.map(function(row){
          return '<article class="comment-item">' +
            '<div class="mini-date">' + esc(formatDate(row.created_at)) + ' · 학부모</div>' +
            '<div class="mini-body">' + escWithBr(row.body || '') + '</div>' +
            (row.reply ? '<div class="comment-reply"><strong>선생님 답글</strong><br>' + escWithBr(row.reply) + '</div>' : '') +
          '</article>';
        }).join('')
      : '<div class="empty-mini">아직 방명록 글이 없어요.</div>';
    content.innerHTML = list +
      '<form class="comment-form" id="commentForm">' +
        '<label for="commentBody">방명록 남기기</label>' +
        '<textarea id="commentBody" required placeholder="선생님께 남길 말을 적어주세요."></textarea>' +
        '<button type="submit" class="btn" id="commentSubmit" style="margin-top:12px">등록</button>' +
        '<div class="msg" id="commentMsg"></div>' +
      '</form>';
  }

  function renderNoticeTab(content){
    var rows = noticeRows();
    if (!rows.length) {
      content.innerHTML = '<div class="empty-mini">아직 올라온 공지가 없어요.</div>';
      return;
    }
    content.innerHTML = rows.map(function(row){
      return '<article class="mini-card">' +
        '<div class="mini-date">' + esc(formatDate(row.created_at)) + '</div>' +
        '<div class="mini-card-title">' + esc(row.title || '공지사항') + '</div>' +
        '<div class="mini-body">' + escWithBr(row.body || '') + '</div>' +
      '</article>';
    }).join('');
  }

  async function markNoticesRead(){
    if (!currentEnrollment || !currentEnrollment.id || !currentSession || !currentSession.user) return;
    if (!hasUnreadNotice()) return;
    var now = new Date().toISOString();
    var cached = currentMiniClass ? approvedClasses.find(function(row){ return row.id === currentMiniClass.id; }) : null;
    var res = await client.from('class_enrollments')
      .update({ last_notice_read_at: now })
      .eq('id', currentEnrollment.id)
      .eq('parent_id', currentSession.user.id);
    if (res.error) {
      showNotice('공지 읽음 처리에 실패했습니다', res.error.message);
      return;
    }
    currentEnrollment.last_notice_read_at = now;
    if (currentMiniClass) currentMiniClass.last_notice_read_at = now;
    if (cached) cached.last_notice_read_at = now;
    renderMiniHome();
  }

  async function submitComment(form){
    var body = form.querySelector('#commentBody');
    var submit = form.querySelector('#commentSubmit');
    var msg = form.querySelector('#commentMsg');
    var text = body.value.trim();
    if (!text || !currentMiniClass || !currentSession || !currentSession.user) return;
    submit.disabled = true;
    msg.textContent = '등록 중입니다.';
    msg.className = 'msg';
    var res = await client.from('class_comments').insert({
      class_id: currentMiniClass.id,
      author_id: currentSession.user.id,
      body: text
    });
    submit.disabled = false;
    if (res.error) {
      msg.innerHTML = escWithBr(res.error.message);
      msg.className = 'msg error';
      return;
    }
    body.value = '';
    msg.textContent = '등록되었습니다.';
    var commentsRes = await client.from('class_comments')
      .select('*')
      .eq('class_id', currentMiniClass.id)
      .order('created_at', { ascending:false });
    if (commentsRes.error) {
      msg.innerHTML = escWithBr(commentsRes.error.message);
      msg.className = 'msg error';
      return;
    }
    miniCache.comments = commentsRes.data || [];
    renderGuestbookTab(document.getElementById('miniContent'));
  }

  async function loadParentState(session){
    if (!session || !session.user) {
      logoutBtn.hidden = true;
      leadText.textContent = '로그인 후 초대 코드를 입력해주세요.';
      showPanel(authPanel);
      return;
    }

    loadingState = true;
    logoutBtn.hidden = false;
    leadText.textContent = '반 연결 상태를 확인하고 있어요.';
    showPanel(loadingPanel);

    try {
      var res = await client
        .from('class_enrollments')
        .select('id, status, class_id, last_notice_read_at')
        .eq('parent_id', session.user.id);

      if (res.error) throw res.error;

      var enrollments = res.data || [];
      var approved = enrollments.filter(function(row){ return row.status === 'approved'; });
      var pending = enrollments.filter(function(row){ return row.status === 'pending'; });

      if (approved.length) {
        var rows = await loadClassRows(approved.map(function(row){ return row.class_id; }));
        rows = rows.map(function(row){
          var enrollment = approved.find(function(item){ return item.class_id === row.id; });
          return Object.assign({}, row, {
            enrollment_id: enrollment ? enrollment.id : null,
            last_notice_read_at: enrollment ? enrollment.last_notice_read_at : null
          });
        });
        approvedClasses = rows;
        if (currentMiniClass && !miniPanel.hidden) return;
        classList.innerHTML = rows.map(renderClassCard).join('');
        extraInviteBox.hidden = true;
        extraInviteMsg.textContent = '';
        extraInviteCode.value = '';
        leadText.textContent = '승인된 반 미니홈피 목록입니다.';
        showPanel(classesPanel);
        return;
      }

      if (pending.length) {
        leadText.textContent = '승인을 기다리고 있어요.';
        showPanel(pendingPanel);
        return;
      }

      inviteMsg.textContent = '';
      inviteCode.value = '';
      leadText.textContent = '선생님이 알려준 초대 코드를 입력해주세요.';
      showPanel(invitePanel);
    } catch (err) {
      showNotice('상태를 불러오지 못했습니다', err && err.message ? err.message : String(err));
    } finally {
      loadingState = false;
    }
  }

  async function redeemInvite(code, msgEl, submitBtn){
    msgEl.textContent = '';
    submitBtn.disabled = true;
    msgEl.textContent = '연결 신청 중입니다.';
    msgEl.className = 'msg';

    var res = await client.rpc('redeem_class_invite', { p_code: code });
    submitBtn.disabled = false;

    if (res.error) {
      msgEl.innerHTML = escWithBr(res.error.message);
      msgEl.className = 'msg error';
      return;
    }

    leadText.textContent = '연결 신청이 완료되었습니다.';
    showNotice('연결 신청이 완료되었습니다', '선생님 또는 원장님 승인을 기다려주세요.');
  }

  authModeBtn.addEventListener('click', function(){
    setAuthMode(authMode === 'login' ? 'signup' : 'login');
  });

  kakaoLoginBtn.addEventListener('click', async function(){
    authMsg.textContent = '';
    kakaoLoginBtn.disabled = true;

    try {
      var res = await client.auth.signInWithOAuth({
        provider: 'kakao',
        options: {
          redirectTo: window.location.origin + '/parent.html'
        }
      });
      if (res.error) throw res.error;
    } catch (err) {
      authMsg.innerHTML = escWithBr(err && err.message ? err.message : String(err));
      authMsg.className = 'msg error';
      kakaoLoginBtn.disabled = false;
    }
  });

  authForm.addEventListener('submit', async function(e){
    e.preventDefault();
    authMsg.textContent = '';
    authSubmit.disabled = true;

    try {
      if (authMode === 'signup') {
        var signUpRes = await client.auth.signUp({
          email: authEmail.value.trim(),
          password: authPassword.value
        });
        if (signUpRes.error) throw signUpRes.error;
        if (signUpRes.data && signUpRes.data.session) {
          currentSession = signUpRes.data.session;
          await loadParentState(currentSession);
        } else {
          leadText.textContent = '이메일 확인이 필요합니다.';
          showNotice('이메일을 확인해주세요', '가입 확인 메일을 열어 인증을 완료한 뒤 다시 로그인해주세요.');
        }
      } else {
        var loginRes = await client.auth.signInWithPassword({
          email: authEmail.value.trim(),
          password: authPassword.value
        });
        if (loginRes.error) throw loginRes.error;
        currentSession = loginRes.data.session;
        await loadParentState(currentSession);
      }
    } catch (err) {
      authMsg.innerHTML = escWithBr(err && err.message ? err.message : String(err));
      authMsg.className = 'msg error';
    } finally {
      authSubmit.disabled = false;
    }
  });

  inviteForm.addEventListener('submit', async function(e){
    e.preventDefault();
    await redeemInvite(inviteCode.value.trim(), inviteMsg, inviteSubmit);
  });

  showExtraInviteBtn.addEventListener('click', function(){
    extraInviteBox.hidden = !extraInviteBox.hidden;
    extraInviteMsg.textContent = '';
  });

  extraInviteForm.addEventListener('submit', async function(e){
    e.preventDefault();
    await redeemInvite(extraInviteCode.value.trim(), extraInviteMsg, extraInviteSubmit);
  });

  classList.addEventListener('click', function(e){
    var btn = e.target.closest('[data-open-class]');
    if (!btn) return;
    openClassMini(btn.dataset.openClass);
  });

  miniBackBtn.addEventListener('click', function(){
    leadText.textContent = '승인된 반 미니홈피 목록입니다.';
    showPanel(classesPanel);
  });

  miniRoot.addEventListener('click', async function(e){
    var jumpNotice = e.target.closest('[data-jump-notice]');
    if (jumpNotice) {
      currentMiniTab = 'notice';
      renderMiniHome();
      await markNoticesRead();
      var tabsForNotice = miniRoot.querySelector('.mini-tabs');
      if (tabsForNotice) tabsForNotice.scrollIntoView({ behavior:'smooth', block:'start' });
      return;
    }
    var jumpEvent = e.target.closest('[data-jump-event]');
    if (jumpEvent) {
      currentMiniTab = 'event';
      var next = upcomingEvent();
      if (next) {
        selectedEventDate = dateKey(next.event_date);
        eventCalendarDate = firstOfMonth(new Date(selectedEventDate + 'T00:00:00'));
      }
      renderMiniHome();
      var tabs = miniRoot.querySelector('.mini-tabs');
      if (tabs) tabs.scrollIntoView({ behavior:'smooth', block:'start' });
      return;
    }
    var tab = e.target.closest('[data-mini-tab]');
    if (tab) {
      currentMiniTab = tab.dataset.miniTab;
      renderMiniHome();
      if (currentMiniTab === 'notice') await markNoticesRead();
      return;
    }
    var monthBtn = e.target.closest('[data-event-month]');
    if (monthBtn) {
      var delta = Number(monthBtn.dataset.eventMonth || 0);
      eventCalendarDate = new Date(eventCalendarDate.getFullYear(), eventCalendarDate.getMonth() + delta, 1);
      selectedEventDate = toDateInput(eventCalendarDate);
      renderMiniTab();
      return;
    }
    var dateBtn = e.target.closest('[data-event-date]');
    if (dateBtn) {
      selectedEventDate = dateBtn.dataset.eventDate;
      eventCalendarDate = firstOfMonth(new Date(selectedEventDate + 'T00:00:00'));
      renderMiniTab();
      return;
    }
    var imageBtn = e.target.closest('[data-open-image]');
    if (imageBtn) {
      imageModalImg.src = imageBtn.dataset.openImage;
      imageModal.hidden = false;
    }
  });

  miniRoot.addEventListener('submit', async function(e){
    if (e.target && e.target.id === 'commentForm') {
      e.preventDefault();
      await submitComment(e.target);
    }
  });

  imageModalClose.addEventListener('click', function(){
    imageModal.hidden = true;
    imageModalImg.removeAttribute('src');
  });

  imageModal.addEventListener('click', function(e){
    if (e.target === imageModal) {
      imageModal.hidden = true;
      imageModalImg.removeAttribute('src');
    }
  });

  logoutBtn.addEventListener('click', async function(){
    var res = await client.auth.signOut();
    if (res.error) {
      showNotice('로그아웃하지 못했습니다', res.error.message);
      return;
    }
    currentSession = null;
    currentMiniClass = null;
    logoutBtn.hidden = true;
    setAuthMode('login');
    leadText.textContent = '로그인 후 초대 코드를 입력해주세요.';
    showPanel(authPanel);
  });

  client.auth.onAuthStateChange(function(_event, session){
    currentSession = session;
    if (!loadingState) loadParentState(session);
  });

  client.auth.getSession().then(function(res){
    currentSession = res.data ? res.data.session : null;
    loadParentState(currentSession);
  });

  setAuthMode('login');
})();
</script>
</body>
</html>
