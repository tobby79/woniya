<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 우리 동네 원 검색</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --base:#FFF5F1;
    --blush:#FBE0D9;
    --paper:#FFFFFF;
    --ink:#3F2A2C;
    --ink-soft:#8A7370;
    --coral:#EE8C7B;
    --coral-deep:#DB6B54;
    --rose:#F4A7A0;
    --lilac:#B9A6E0;
    --lilac-soft:#E6E0F0;
    --sky:#9DC6E0;
    --sky-soft:#D8EEF6;
    --butter:#FFD9A3;
    /* 검색 페이지는 시간 흐름 없이 여명(dawn) 상태로 고정 */
    --sky-top:#FDE3DA;
    --sky-bottom:#FFF5F1;
    --sun-x:18%;
    --sun-y:14%;
    --sun-color:#FFD9B0;
    --sun-glow:rgba(255,200,170,.5);
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;overflow-x:hidden}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--base);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
    position:relative;
  }

  /* ── 빛의 흐름 배경: dawn 고정 ── */
  .stage{position:fixed;inset:0;overflow:hidden;z-index:-1}
  .sky{position:absolute;inset:0;background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%)}
  .sun{
    position:absolute;width:220px;height:220px;border-radius:50%;
    left:var(--sun-x);top:var(--sun-y);transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 50%,var(--sun-color) 0%,var(--sun-color) 38%,transparent 70%);
    box-shadow:0 0 110px 60px var(--sun-glow);pointer-events:none;
  }
  .cloud{position:absolute;pointer-events:none;color:#fff;opacity:.75;filter:drop-shadow(0 6px 14px rgba(0,0,0,.04))}
  .cloud svg{display:block}

  .wrap{max-width:560px;margin:0 auto;padding:0 22px;position:relative}
  .head-wrap{max-width:560px;margin:0 auto;padding:0 22px;position:relative}
  .hero-wrap{position:relative;padding:0 22px}

  /* ── 검색 헤더 ── */
  .search-head{display:flex;align-items:center;justify-content:space-between;padding:18px 0 6px}
  .search-head .logo{display:flex;align-items:center;gap:8px;font-family:var(--display);font-size:1.2rem;color:var(--ink)}
  .search-head .logo .pin{width:26px;height:26px;border-radius:9px;background:var(--coral-deep);display:flex;align-items:center;justify-content:center}
  .search-head .logo .pin::after{content:"";width:9px;height:9px;border-radius:50% 50% 50% 0;transform:rotate(45deg);background:#fff;margin-top:-2px}
  .search-head .reg{
    font-family:var(--body);font-weight:700;font-size:.88rem;
    color:var(--coral-deep);text-decoration:none;
    border:1.5px solid var(--coral-deep);border-radius:50px;
    padding:8px 18px;
    background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    transition:background .2s ease,color .2s ease;
  }
  .search-head .reg:hover{background:var(--coral-deep);color:#fff}

  /* ── 히어로 ── */
  .search-hero{text-align:center;padding:24px 0 6px}
  .search-hero .eyebrow{font-family:var(--hand);font-weight:700;color:var(--coral-deep);font-size:1.15rem;margin-bottom:6px}
  .search-hero h1{font-family:var(--display);font-weight:400;font-size:1.8rem;line-height:1.32;letter-spacing:-.5px}
  .search-hero h1 .hl{color:var(--coral-deep)}
  .search-hero p{margin-top:12px;color:var(--ink-soft);font-size:.93rem}

  /* ── 검색바 ── */
  .search-bar{display:flex;gap:8px;background:var(--paper);border-radius:18px;padding:8px 8px 8px 16px;margin:22px 0 0;box-shadow:0 16px 36px -20px rgba(150,90,80,.5);align-items:center}
  .search-bar .loc{color:var(--coral-deep);font-size:1.1rem}
  .search-bar input{flex:1;border:none;background:transparent;font-family:var(--body);font-size:1rem;color:var(--ink);outline:none}
  .search-bar button{flex:none;background:var(--coral-deep);color:#fff;border:none;border-radius:13px;padding:11px 18px;font-family:var(--body);font-weight:700;font-size:.95rem;cursor:pointer}

  /* ── 필터 칩 ── */
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:14px 0 0}
  .chip{background:var(--paper);border:.5px solid rgba(63,42,44,.12);color:var(--ink);font-size:.84rem;padding:8px 14px;border-radius:30px;cursor:pointer}
  .chip.on{background:var(--blush);border-color:transparent;color:var(--coral-deep);font-weight:700}

  /* ── 결과 헤더 ── */
  .results-head{display:flex;align-items:baseline;gap:8px;padding:26px 0 4px}
  .results-head b{font-family:var(--display);font-size:1.15rem;color:var(--coral-deep)}
  .results-head span{color:var(--ink-soft);font-size:.86rem}

  /* ── 원 카드 ── */
  .cardlist{padding:12px 0 30px;display:flex;flex-direction:column;gap:14px}
  .ocard{
    background:var(--paper);border-radius:20px;overflow:hidden;
    box-shadow:0 16px 38px -22px rgba(150,90,80,.45);
    display:flex;flex-direction:column;text-decoration:none;color:var(--ink);
    transition:transform .25s ease,box-shadow .25s ease;
  }
  .ocard:hover,.ocard:focus-visible{transform:translateY(-3px);box-shadow:0 22px 46px -18px rgba(150,90,80,.55)}
  .ocard .photo{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--blush)}
  .ocard .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .ocard .body{padding:14px 16px 16px}
  .ocard .name{font-family:var(--display);font-size:1.18rem}
  .ocard .meta{color:var(--ink-soft);font-size:.84rem;margin-top:2px}
  .ocard .badges{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0}
  .ocard .badges span{font-size:.72rem;color:var(--ink);background:var(--base);border:.5px solid rgba(63,42,44,.1);padding:4px 9px;border-radius:30px}
  .ocard .badges .availability{font-weight:700}
  .ocard .badges .availability.available{color:#2F6F4E;background:#E7F4EC;border-color:rgba(47,111,78,.16)}
  .ocard .badges .availability.waitlist{color:#8A641A;background:#FFF3CC;border-color:rgba(138,100,26,.18)}
  .ocard .badges .availability.closed{color:#6E625B;background:#ECE8E1;border-color:rgba(110,98,91,.16)}
  .ocard .actions{display:flex;gap:8px;margin-top:14px}
  .ocard .go{flex:1;text-align:center;text-decoration:none;font-family:var(--body);font-weight:700;font-size:.96rem;padding:13px 10px;border-radius:14px}
  .ocard .go.primary{background:var(--coral-deep);color:#fff}
  .ocard .go.secondary{background:#fff;color:var(--coral-deep);border:1.5px solid rgba(242,113,90,.32)}
  .ocard .go.secondary:hover{background:#fff8f5}

  .search-foot{text-align:center;color:var(--ink-soft);font-size:.78rem;padding:6px 0 36px;line-height:1.6}

  .empty{text-align:center;color:var(--ink-soft);padding:60px 0;font-size:.96rem}

  a:focus-visible,.ocard:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:8px}

  /* ══════════════════ PC 레이아웃 (768px 이상) ══════════════════ */
  @media (min-width:768px){
    .head-wrap{max-width:1100px;padding:0 40px}

    .sun{width:340px;height:340px}

    .hero-wrap{min-height:52vh;display:flex;align-items:center;justify-content:center;padding:0 40px}
    .search-hero{max-width:640px;width:100%}
    .search-hero .eyebrow{font-size:1.3rem}
    .search-hero h1{font-size:2.4rem}
    .search-hero p{font-size:1rem}
    .search-bar{margin:30px auto 0;max-width:480px}
    .chips{justify-content:center;margin:0 auto}

    .wrap{max-width:1100px;padding:0 40px}
    .results-head{padding:36px 0 14px}
    .cardlist{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .search-foot{padding:24px 0 44px}
  }

</style>
</head>
<body>

<div class="stage" aria-hidden="true">
  <div class="sky"></div>
  <div class="sun"></div>
  <div class="cloud" style="top:13%;left:70%"><svg width="110" height="46" viewBox="0 0 120 50"><ellipse cx="40" cy="32" rx="34" ry="18" fill="white"/><ellipse cx="72" cy="26" rx="26" ry="20" fill="white"/><ellipse cx="92" cy="34" rx="22" ry="14" fill="white"/></svg></div>
  <div class="cloud" style="top:38%;left:6%"><svg width="84" height="38" viewBox="0 0 90 40"><ellipse cx="30" cy="26" rx="26" ry="13" fill="white"/><ellipse cx="56" cy="20" rx="20" ry="15" fill="white"/></svg></div>
</div>

<div class="head-wrap">
  <div class="search-head">
    <div class="logo"><span class="pin"></span>원이야</div>
    <a class="reg" href="register.html">어린이집 등록</a>
  </div>
</div>

<section class="hero-wrap">
  <div class="search-hero">
    <div class="eyebrow">정답은, 원이야</div>
    <h1>우리 동네 어린이집,<br><span class="hl">원이야</span>에서 한눈에</h1>
    <p>흩어져 있던 동네 어린이집·유치원을 한곳에서<br>사진과 정보로 비교해 보세요.</p>

    <div class="search-bar">
      <span class="loc">◎</span>
      <input id="regionInput" type="search" placeholder="지역명으로 검색 (예: 강남구)" aria-label="지역명 검색">
      <button type="button" id="searchBtn">검색</button>
    </div>

    <div class="chips" id="chips"></div>
  </div>
</section>

<div class="wrap">
  <div class="results-head" id="resultsHead"></div>
  <div class="cardlist" id="cardList"></div>

  <div class="search-foot">공개 화면에는 원 정보만 보여요.<br>아이 정보는 신청 후 안전하게 받습니다.</div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async function(){
  // 사실 배지(badges)의 내부 key → 화면 표시 라벨. 있다/없다만 표시, 등급·점수 없음.
  const BADGE_LABELS = {
    licensed: '정식 인가',
    cctv: 'CCTV',
    meal_open: '식단 공개',
    shuttle: '통학 차량',
    extended_care: '시간 연장 보육',
    evaluated: '평가인증'
  };

  const TEMPLATE_FILES = {
    sunshine: 'template-sunshine.html',
    forest: 'template-forest.html',
    carnival: 'template-carnival.html',
    gallery: 'template-gallery.html'
  };
  const AVAILABILITY_LABELS = {
    available: '빈자리 있음',
    waitlist: '대기 문의',
    closed: '정원 마감'
  };

  const listEl    = document.getElementById('cardList');
  const headEl    = document.getElementById('resultsHead');
  const chipsEl   = document.getElementById('chips');
  const input     = document.getElementById('regionInput');
  const searchBtn = document.getElementById('searchBtn');
  const pageCache = window.__WONIYA_INDEX_CACHE || (window.__WONIYA_INDEX_CACHE = {
    centers: null,
    signedUrls: new Map()
  });

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
    });
  }

  let centers = [];
  try {
    if (pageCache.centers) {
      centers = pageCache.centers;
    } else {
      const cfg = window.__SUPABASE_CONFIG__;
      const client = supabase.createClient(cfg.url, cfg.anonKey);
      const { data, error } = await client
        .from('centers')
        .select('id, slug, name, region, address, lat, lng, badges, tags, director, template, card_image, admissions(id)')
        .eq('status', 'published')
        .order('name'); // 위치 권한이 없을 때는 거리·품질이 아닌 중립 기준(이름순).
      if (error) throw error;
      centers = data || [];

      const centerIds = centers.map(function(center){ return center.id; }).filter(Boolean);
      if (centerIds.length) {
        const classRes = await client
          .from('classes')
          .select('center_id, status')
          .in('center_id', centerIds);
        if (classRes.error) {
          console.warn('classes load failed', classRes.error);
        } else {
          const classesByCenter = {};
          (classRes.data || []).forEach(function(row){
            if (!row.center_id) return;
            if (!classesByCenter[row.center_id]) classesByCenter[row.center_id] = [];
            classesByCenter[row.center_id].push(row);
          });

          centers.forEach(function(center){
            center.availability = availabilityOf(classesByCenter[center.id]);
          });
        }
      }

      function imagePathOf(center) {
        return center.card_image || (center.director && center.director.photo) || '';
      }
      function needsSigning(path) {
        return path && !/^https?:\/\//.test(path);
      }
      async function signPaths(paths) {
        const missing = Array.from(new Set(paths.filter(needsSigning)))
          .filter(function(path){ return !pageCache.signedUrls.has(path); });
        if (!missing.length) return;

        const res = await fetch(cfg.url + '/storage/v1/object/sign/center-images', {
          method: 'POST',
          headers: {
            apikey: cfg.anonKey,
            Authorization: 'Bearer ' + cfg.anonKey,
            'content-type': 'application/json'
          },
          body: JSON.stringify({ paths: missing, expiresIn: 3600 })
        });
        if (!res.ok) throw new Error('Failed to sign center card images');
        const signed = await res.json();
        (signed || []).forEach(function(item, index) {
          const signedUrl = item.signedURL ? cfg.url + '/storage/v1' + item.signedURL : (item.signedUrl || missing[index]);
          pageCache.signedUrls.set(item.path || missing[index], signedUrl);
        });
      }

      await signPaths(centers.map(imagePathOf));
      for (const center of centers) {
        if (center.card_image && pageCache.signedUrls.has(center.card_image)) {
          center.card_image = pageCache.signedUrls.get(center.card_image);
        }
        if (center.director && center.director.photo && pageCache.signedUrls.has(center.director.photo)) {
          center.director.photo = pageCache.signedUrls.get(center.director.photo);
        }
      }
      pageCache.centers = centers;
    }
  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<p class="empty">원 목록을 불러오지 못했어요. supabase-config.js의 URL/키를 확인해주세요.</p>';
    return;
  }

  function buildChips(){
    var regions = [];
    centers.forEach(function(c){
      var r = (c.region || '').trim();
      if (r && regions.indexOf(r) === -1) regions.push(r);
    });
    regions = regions.slice(0, 6);
    chipsEl.innerHTML = '<span class="chip" data-region="">전체</span>' +
      regions.map(function(r){
        return '<span class="chip" data-region="' + escapeHtml(r) + '">' + escapeHtml(r) + '</span>';
      }).join('');
  }

  function syncChipActive(){
    var q = input.value.trim();
    chipsEl.querySelectorAll('.chip').forEach(function(el){
      el.classList.toggle('on', el.getAttribute('data-region') === q);
    });
  }

  function renderResultsHead(query, count){
    headEl.innerHTML = query
      ? '<b>' + escapeHtml(query) + '</b><span>근처 어린이집·유치원 ' + count + '곳</span>'
      : '<span>' + (hasLocationDistances() ? '가까운 순 · ' : '') + '등록된 어린이집·유치원 ' + count + '곳</span>';
  }

  function render(list, query){
    renderResultsHead(query, list.length);
    if (list.length === 0){
      listEl.innerHTML = '<p class="empty">조건에 맞는 원이 없어요.</p>';
      return;
    }
    listEl.innerHTML = list.map(function(c){
      var badgeChips = Object.keys(c.badges || {})
        .filter(function(k){ return c.badges[k]; })
        .map(function(k){ return '<span>' + escapeHtml(BADGE_LABELS[k] || k) + '</span>'; })
        .join('');
      var tagChips = (c.tags || [])
        .map(function(t){ return '<span>' + escapeHtml(t) + '</span>'; })
        .join('');
      var availabilityChip = c.availability
        ? '<span class="availability ' + c.availability + '">' + escapeHtml(AVAILABILITY_LABELS[c.availability]) + '</span>'
        : '';
      var photo = c.card_image || (c.director && c.director.photo) || '';
      var locationText = [c.region, c.address].filter(Boolean).join(' · ');
      var distanceText = typeof c.distanceKm === 'number' ? '약 ' + c.distanceKm.toFixed(1) + ' km' : '';
      var metaText = [locationText, distanceText].filter(Boolean).join(' · ');
      var templateFile = TEMPLATE_FILES[c.template] || 'template-sunshine.html';
      var homeUrl = templateFile + '?slug=' + encodeURIComponent(c.slug);
      var admissionsUrl = 'admissions.html?slug=' + encodeURIComponent(c.slug);
      var admissionsButton = (c.admissions || []).length
        ? '<a class="go secondary" href="' + admissionsUrl + '">입학안내 보기</a>'
        : '';
      return '' +
        '<article class="ocard" role="link" tabindex="0" data-href="' + homeUrl + '">' +
          '<div class="photo">' + (photo ? '<img src="' + photo + '" alt="' + escapeHtml(c.name) + '">' : '') + '</div>' +
          '<div class="body">' +
            '<div class="name">' + escapeHtml(c.name) + '</div>' +
            '<div class="meta">' + escapeHtml(metaText) + '</div>' +
            '<div class="badges">' + availabilityChip + badgeChips + tagChips + '</div>' +
            '<div class="actions">' +
              '<a class="go primary" href="' + homeUrl + '">홈페이지 보기</a>' +
              admissionsButton +
            '</div>' +
          '</div>' +
        '</article>';
    }).join('');
  }

  function availabilityOf(classes){
    if (!classes || classes.length === 0) return null;
    if (classes.some(function(row){ return row.status === 'open'; })) return 'available';
    if (classes.every(function(row){ return row.status === 'closed'; })) return 'closed';
    return 'waitlist';
  }

  function toRad(deg){
    return deg * Math.PI / 180;
  }

  function distanceKmBetween(aLat, aLng, bLat, bLng){
    var earthKm = 6371;
    var dLat = toRad(bLat - aLat);
    var dLng = toRad(bLng - aLng);
    var lat1 = toRad(aLat);
    var lat2 = toRad(bLat);
    var h = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1) * Math.cos(lat2) *
      Math.sin(dLng / 2) * Math.sin(dLng / 2);
    return earthKm * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
  }

  function hasLocationDistances(){
    return centers.some(function(c){ return typeof c.distanceKm === 'number'; });
  }

  function sortByDistance(list){
    return list.slice().sort(function(a, b){
      var ad = typeof a.distanceKm === 'number' ? a.distanceKm : Number.POSITIVE_INFINITY;
      var bd = typeof b.distanceKm === 'number' ? b.distanceKm : Number.POSITIVE_INFINITY;
      return ad - bd;
    });
  }

  function defaultList(){
    return hasLocationDistances() ? sortByDistance(centers) : centers;
  }

  function applyUserLocation(position){
    var coords = position && position.coords;
    if (!coords) return;
    centers.forEach(function(c){
      var lat = Number(c.lat);
      var lng = Number(c.lng);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
      c.distanceKm = distanceKmBetween(coords.latitude, coords.longitude, lat, lng);
    });
    applyFilter();
  }

  function requestUserLocation(){
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(applyUserLocation, function(){}, {
      enableHighAccuracy: false,
      timeout: 8000,
      maximumAge: 300000
    });
  }

  function applyFilter(){
    var q = input.value.trim().toLowerCase();
    var filtered = !q ? defaultList() : centers.filter(function(c){
      return (c.region || '').toLowerCase().includes(q) ||
             (c.address || '').toLowerCase().includes(q);
    });
    render(filtered, input.value.trim());
    syncChipActive();
  }

  buildChips();
  render(defaultList(), '');
  syncChipActive();
  requestUserLocation();

  input.addEventListener('input', applyFilter);
  searchBtn.addEventListener('click', applyFilter);
  listEl.addEventListener('click', function(e){
    if (e.target.closest('a')) return;
    var card = e.target.closest('.ocard');
    if (card && card.dataset.href) location.href = card.dataset.href;
  });
  listEl.addEventListener('keydown', function(e){
    if (e.key !== 'Enter' && e.key !== ' ') return;
    if (e.target.closest('a')) return;
    var card = e.target.closest('.ocard');
    if (!card || !card.dataset.href) return;
    e.preventDefault();
    location.href = card.dataset.href;
  });
  chipsEl.addEventListener('click', function(e){
    var chip = e.target.closest('.chip');
    if (!chip) return;
    input.value = chip.getAttribute('data-region') || '';
    applyFilter();
  });
})();
</script>
</body>
</html>
