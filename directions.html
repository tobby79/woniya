<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오시는 길 | 원이야</title>
<meta name="description" content="원이야 오시는 길 안내입니다. 주소, 교통편, 주차 정보를 확인하세요.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ad-serif:'Gowun Batang',serif;
    --ad-sans:'Pretendard','Gowun Dodum',sans-serif;
  }

  body.theme-sunshine{
    --ad-bg:#FBF6EE;
    --ad-ink:#4A3F35;
    --ad-muted:#8B7C6A;
    --ad-hairline:#E8DCC8;
    --ad-accent:#C97B5F;
    --ad-accent-deep:#A76048;
    --ad-card:#FFFDF8;
    --ad-card-soft:#FFF9F1;
    --ad-label:#B59768;
    --ad-shadow:0 20px 50px -34px rgba(74,63,53,.42);
    --cream:var(--ad-bg);
    --ink:var(--ad-ink);
    --ink-soft:var(--ad-muted);
    --coral:var(--ad-accent);
    --coral-deep:var(--ad-accent-deep);
    --paper:var(--ad-card);
    --line:var(--ad-hairline);
    --display:var(--ad-serif);
    --body:var(--ad-sans);
  }

  body.theme-forest{
    --ad-bg:#FBF6EE;
    --ad-ink:#4A3F35;
    --ad-muted:#8B7C6A;
    --ad-hairline:#E8DCC8;
    --ad-accent:#C97B5F;
    --ad-accent-deep:#A76048;
    --ad-card:#FFFDF8;
    --ad-card-soft:#FFF9F1;
    --ad-label:#B59768;
  }

  body.theme-carnival{
    --ad-bg:#FBF6EE;
    --ad-ink:#4A3F35;
    --ad-muted:#8B7C6A;
    --ad-hairline:#E8DCC8;
    --ad-accent:#C97B5F;
    --ad-accent-deep:#A76048;
    --ad-card:#FFFDF8;
    --ad-card-soft:#FFF9F1;
    --ad-label:#B59768;
  }

  body.theme-gallery{
    --ad-bg:#FBF6EE;
    --ad-ink:#4A3F35;
    --ad-muted:#8B7C6A;
    --ad-hairline:#E8DCC8;
    --ad-accent:#C97B5F;
    --ad-accent-deep:#A76048;
    --ad-card:#FFFDF8;
    --ad-card-soft:#FFF9F1;
    --ad-label:#B59768;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--ad-sans);
    color:var(--ad-ink);
    background:
      linear-gradient(180deg,rgba(255,253,248,.68),rgba(255,253,248,0) 160px),
      var(--ad-bg);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    padding-bottom:44px;
    overflow-x:hidden;
  }
  a{color:inherit}
  button{font:inherit}

  .topbar{
    position:sticky;top:0;z-index:20;
    --cloud-dip:16px; --cloud-unit:64px;
    padding-bottom:var(--cloud-dip);
    background:var(--paper);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    filter:drop-shadow(0 4px 6px rgba(180,140,110,.28));
    -webkit-mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
    mask:radial-gradient(var(--cloud-dip) at 50% 100%, #0000 96%, #000) 50% 0 / var(--cloud-unit) 100% repeat-x;
  }
  @media (max-width:719px){ .topbar{--cloud-dip:12px; --cloud-unit:52px} }
  .topbar .inner{width:100%;max-width:560px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .topbar .brand{font-family:var(--ad-serif);font-size:1.05rem;color:var(--ad-ink);text-decoration:none;letter-spacing:-.2px}
  .topbar .brand .brand-text{opacity:0;transition:opacity .25s ease}
  .topbar .brand.is-ready .brand-text{opacity:1}
  .topbar .brand.is-ready .brand-skel{display:none}
  .topbar .brand-skel{display:inline-block;width:96px;height:1.1em;border-radius:6px;background:rgba(120,90,70,.1);vertical-align:middle}
  .topbar .back{display:inline-flex;align-items:center;gap:6px;color:var(--ad-muted);text-decoration:none;font-weight:700;font-size:.9rem;border:1.5px solid var(--ad-hairline);border-radius:50px;padding:8px 16px;background:rgba(255,255,255,.6);transition:color .2s ease,border-color .2s ease}
  .topbar .back:hover{color:var(--ad-accent-deep);border-color:var(--ad-accent)}

  .wrap{width:100%;max-width:560px;margin:0 auto;padding:0 22px;position:relative}
  .section{opacity:0;transform:translateY(12px);transition:opacity .6s ease,transform .6s ease}
  .section.is-visible{opacity:1;transform:translateY(0)}
  .section + .section{margin-top:52px}
  .section-label{
    margin:0 0 16px;
    font-size:11px;
    line-height:1.4;
    letter-spacing:3.6px;
    text-transform:uppercase;
    color:var(--ad-label);
    font-weight:700;
    text-align:center;
  }

  .cover{text-align:center;padding:62px 22px 44px}
  .cover-title{
    font-family:var(--ad-serif);
    font-size:2rem;
    line-height:1.34;
    letter-spacing:0;
    font-weight:400;
    color:var(--ad-ink);
    word-break:keep-all;
  }
  .cover-sub{margin-top:18px;color:var(--ad-muted);font-size:.95rem}

  .map-card{
    overflow:hidden;
    width:100%;
    max-width:100%;
    padding:10px;
    border:1px solid var(--ad-hairline);
    border-radius:18px;
    background:var(--ad-card);
    box-shadow:var(--ad-shadow);
  }
  .dir-map{
    height:320px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(232,220,200,.9);
    background:var(--ad-card-soft);
  }
  .dir-map-placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 24px;
    color:var(--ad-muted);
    font-size:.95rem;
    background:var(--ad-card-soft);
  }
  .addr{
    width:100%;
    max-width:100%;
    margin-top:14px;
    background:var(--ad-card);
    border:1px solid var(--ad-hairline);
    border-radius:14px;
    padding:15px 16px;
    font-size:1rem;
    color:var(--ad-ink);
    display:flex;
    align-items:flex-start;
    gap:10px;
  }
  .addr .pin{flex:none;color:var(--ad-accent-deep);font-weight:700}

  .dir-text{
    overflow:hidden;
    width:100%;
    max-width:100%;
    border:1px solid var(--ad-hairline);
    border-radius:16px;
    background:var(--ad-card);
    box-shadow:var(--ad-shadow);
  }
  .dir-line{
    display:grid;
    grid-template-columns:32px 1fr;
    align-items:flex-start;
    gap:13px;
    padding:17px 18px;
    border-top:1px solid rgba(232,220,200,.85);
    font-family:var(--ad-serif);
    font-size:1.01rem;
    color:var(--ad-ink);
    line-height:1.75;
  }
  .dir-line:first-child{border-top:0}
  .dir-line .ic{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--ad-card-soft);
    border:1px solid var(--ad-hairline);
    color:var(--ad-accent-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:1px;
  }
  .dir-line .ic svg{width:17px;height:17px;display:block;stroke-width:1.8}
  .dir-line span:last-child{min-width:0;overflow-wrap:anywhere}

  .bus-card{
    overflow:hidden;
    border:1px solid var(--ad-hairline);
    border-radius:16px;
    background:var(--ad-card);
    box-shadow:var(--ad-shadow);
  }
  .bus-route{border-top:1px solid rgba(232,220,200,.85)}
  .bus-route:first-child{border-top:0}
  .bus-route-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:17px 18px 10px;
    font-family:var(--ad-serif);
    font-size:1.08rem;
    color:var(--ad-ink);
  }
  .bus-color-dot{
    width:14px;
    height:14px;
    border-radius:50%;
    border:1px solid rgba(74,63,53,.14);
    background:var(--ad-accent);
    flex:none;
  }
  .bus-table{width:100%;border-collapse:collapse;font-size:.94rem;color:var(--ad-ink)}
  .bus-table th,.bus-table td{padding:11px 14px;border-top:1px solid rgba(232,220,200,.7);text-align:left;vertical-align:top}
  .bus-table th{font-size:11px;letter-spacing:2px;color:var(--ad-label);font-weight:700;text-transform:uppercase;background:var(--ad-card-soft)}
  .bus-table td:first-child{font-family:var(--ad-serif);line-height:1.55}
  .bus-time{white-space:nowrap;color:var(--ad-muted)}

  .cta{text-align:center;padding:50px 22px 10px;width:100%;max-width:560px;margin:0 auto}
  .cta-line{width:28px;height:1px;margin:0 auto 26px;background:var(--ad-hairline)}
  .cta h2{
    margin:0 auto 24px;
    max-width:310px;
    font-family:var(--ad-serif);
    font-size:1.24rem;
    line-height:1.8;
    font-weight:400;
    color:var(--ad-ink);
  }
  .btn-big{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:52px;
    border:0;
    background:var(--ad-accent);
    color:#fff;
    font-weight:700;
    font-size:1rem;
    padding:14px 32px;
    border-radius:999px;
    text-decoration:none;
    box-shadow:0 14px 26px -18px var(--ad-accent-deep);
    cursor:pointer;
    transition:transform .25s ease,background .25s ease;
  }
  .btn-big:hover{transform:translateY(-2px);background:var(--ad-accent-deep)}

  .state{text-align:center;color:var(--ad-muted);padding:80px 22px;font-size:1rem}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(201,123,95,.35);outline-offset:3px}

  .csl-overlay{
    position:fixed;
    inset:0;
    z-index:60;
    display:none;
    align-items:flex-end;
    justify-content:center;
    padding:18px;
    background:rgba(43,35,29,.34);
  }
  .csl-overlay.is-open{display:flex}
  .csl-panel{
    position:relative;
    width:min(100%,460px);
    max-height:min(86vh,720px);
    overflow:auto;
    border:1px solid var(--ad-hairline);
    border-radius:22px;
    background:var(--ad-card);
    padding:28px 22px 24px;
    box-shadow:0 24px 70px -28px rgba(74,63,53,.55);
  }
  .csl-close{
    position:absolute;
    top:12px;
    right:12px;
    width:34px;
    height:34px;
    border:1px solid var(--ad-hairline);
    border-radius:50%;
    background:var(--ad-card-soft);
    color:var(--ad-muted);
    cursor:pointer;
    font-size:1.35rem;
    line-height:1;
  }
  .csl-title{
    margin:2px 38px 8px;
    font-family:var(--ad-serif);
    font-size:1.35rem;
    font-weight:400;
    text-align:center;
  }
  .csl-sub{margin:0 0 22px;color:var(--ad-muted);font-size:.93rem;text-align:center;line-height:1.65}
  .csl-form{display:grid;gap:14px}
  .csl-field{display:grid;gap:7px;text-align:left}
  .csl-field label,.csl-kind-label{font-size:.82rem;font-weight:700;color:var(--ad-muted)}
  .csl-field input,.csl-field select,.csl-field textarea{
    width:100%;
    border:1px solid var(--ad-hairline);
    border-radius:12px;
    background:#fff;
    color:var(--ad-ink);
    padding:12px 13px;
    font-size:1rem;
  }
  .csl-field textarea{min-height:88px;resize:vertical}
  .csl-kind{border:0;padding:0;margin:0;display:grid;gap:9px}
  .csl-kind-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .csl-kind-options label{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    border:1px solid var(--ad-hairline);
    border-radius:999px;
    background:#fff;
    color:var(--ad-muted);
    font-size:.92rem;
    cursor:pointer;
  }
  .csl-kind-options input{position:absolute;opacity:0;pointer-events:none}
  .csl-kind-options label:has(input:checked){border-color:var(--ad-accent);background:rgba(201,123,95,.1);color:var(--ad-accent-deep);font-weight:700}
  .csl-consent{display:flex;gap:9px;align-items:flex-start;color:var(--ad-muted);font-size:.86rem;line-height:1.55}
  .csl-consent input{margin-top:4px}
  .csl-submit{width:100%;margin-top:4px}
  .csl-error{min-height:1.3em;color:#B4513E;font-size:.88rem;text-align:center}
  .csl-done{text-align:center;padding:20px 4px 8px}
  .csl-done h3{font-family:var(--ad-serif);font-weight:400;font-size:1.35rem;margin-bottom:10px}
  .csl-done p{color:var(--ad-muted);line-height:1.7}
  .csl-done[hidden],.csl-form-wrap[hidden]{display:none}

  @media (min-width:720px){
    .cover{padding-top:78px}
    .cover-title{font-size:2.55rem}
    .dir-map{height:360px}
    .csl-overlay{align-items:center}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .section{opacity:1;transform:none;transition:none}
    .topbar .brand .brand-text,.btn-big{transition:none}
  }
</style>
</head>
<body class="theme-sunshine">

<nav class="topbar">
  <div class="inner">
    <a class="brand" id="brandLink" href="index.html"><span class="brand-skel" id="brandSkel"></span><span class="brand-text" id="brandText"></span></a>
    <a class="back" id="backLink" href="index.html">홈으로</a>
  </div>
</nav>

<header class="cover section">
  <p class="section-label">MAP</p>
  <h1 class="cover-title">이렇게 오시면 돼요</h1>
  <p class="cover-sub" id="coverSub"></p>
</header>

<main class="wrap" id="content"></main>

<section class="cta section" id="ctaSec" hidden>
  <div class="cta-line" aria-hidden="true"></div>
  <h2>궁금한 점이 있다면 언제든 편하게 문의해 주세요</h2>
  <button type="button" class="btn-big" id="cslOpenBtn">입소 상담 신청하기</button>
</section>

<div class="csl-overlay" id="cslOverlay" aria-hidden="true">
  <div class="csl-panel" role="dialog" aria-modal="true" aria-labelledby="cslTitle">
    <button type="button" class="csl-close" id="cslCloseBtn" aria-label="닫기">×</button>
    <div class="csl-form-wrap" id="cslFormWrap">
      <h2 class="csl-title" id="cslTitle">입소 상담 신청</h2>
      <p class="csl-sub">남겨주신 연락처로 확인 후 안내드릴게요.</p>
      <form class="csl-form" id="cslForm">
        <div class="csl-field">
          <label for="cslName">보호자 성함</label>
          <input id="cslName" name="name" type="text" autocomplete="name" required>
        </div>
        <div class="csl-field">
          <label for="cslPhone">연락처</label>
          <input id="cslPhone" name="phone" type="tel" autocomplete="tel" placeholder="010-0000-0000" required>
        </div>
        <fieldset class="csl-kind">
          <legend class="csl-kind-label">상담 유형</legend>
          <div class="csl-kind-options">
            <label><input type="radio" name="kind" value="입소 상담" checked>입소 상담</label>
            <label><input type="radio" name="kind" value="방문 상담">방문 상담</label>
          </div>
        </fieldset>
        <div class="csl-field">
          <label for="cslClass">희망 반 또는 연령</label>
          <input id="cslClass" name="className" type="text" placeholder="예: 만 3세, 5세반">
        </div>
        <div class="csl-field">
          <label for="cslTime">희망 상담 시간</label>
          <textarea id="cslTime" name="time" placeholder="통화 가능한 시간이나 궁금한 점을 적어주세요."></textarea>
        </div>
        <label class="csl-consent">
          <input id="cslConsent" type="checkbox" required>
          <span>상담 신청을 위한 개인정보 수집 및 이용에 동의합니다.</span>
        </label>
        <p class="csl-error" id="cslError" aria-live="polite"></p>
        <button type="submit" class="btn-big csl-submit">신청 내용 보내기</button>
      </form>
    </div>
    <div class="csl-done" id="cslDoneWrap" hidden>
      <h3>신청이 접수되었습니다</h3>
      <p>확인 후 편하신 시간에 연락드릴게요.</p>
    </div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="kakao-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var TEMPLATE_FILES = { sunshine:'template-sunshine.html', forest:'template-forest.html', carnival:'template-carnival.html', gallery:'template-gallery.html' };

function loadKakaoMap(address, containerId){
  var cfg = window.__KAKAO_CONFIG__;
  var container = document.getElementById(containerId);
  if (!container || !address) return;
  function showMapFallback(){
    container.classList.add('dir-map-placeholder');
    container.textContent = '지도 미리보기는 실제 등록 후 확인 가능합니다.';
  }
  if (!cfg || !cfg.appkey){ console.warn('[kakao] appkey 없음. 지도를 건너뜁니다.'); showMapFallback(); return; }
  function render(){
    kakao.maps.load(function(){
      var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 });
      var geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(address, function(result, status){
        if (status === kakao.maps.services.Status.OK){
          var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
          map.setCenter(coords);
          new kakao.maps.Marker({ map: map, position: coords });
        } else {
          showMapFallback();
        }
      });
    });
  }
  if (window.kakao && window.kakao.maps){ render(); return; }
  if (!window.__kakaoSDKPromise){
    window.__kakaoSDKPromise = new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(cfg.appkey) + '&libraries=services&autoload=false';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  window.__kakaoSDKPromise.then(render).catch(function(){ console.error('[kakao] SDK 로드 실패'); });
}

(async function(){
  var content = document.getElementById('content');
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); };
  var client;
  var isPreviewMode = false;

  function normalizeTemplate(value){
    var templateId = String(value || '').trim().toLowerCase();
    return TEMPLATE_FILES[templateId] ? templateId : 'sunshine';
  }

  function applyThemeClass(center){
    var templateId = normalizeTemplate(center && center.template);
    document.body.classList.remove('theme-sunshine','theme-forest','theme-carnival','theme-gallery');
    document.body.classList.add('theme-' + templateId);
    return templateId;
  }

  function setupReveal(){
    var sections = document.querySelectorAll('.section');
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      sections.forEach(function(el){ el.classList.add('is-visible'); });
      return;
    }
    if (!('IntersectionObserver' in window)) {
      sections.forEach(function(el){ el.classList.add('is-visible'); });
      return;
    }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold:.14, rootMargin:'0px 0px -8% 0px' });
    sections.forEach(function(el){ io.observe(el); });
  }

  function iconSvg(type){
    var attrs = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"';
    if (type === 'parking') return '<svg ' + attrs + '><path d="M7 21V3h7a5 5 0 0 1 0 10H7"/><path d="M7 13h7"/></svg>';
    if (type === 'bus') return '<svg ' + attrs + '><path d="M6 17h12"/><path d="M6 6h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"/><path d="M8 6V4h8v2"/><path d="M7 10h10"/><circle cx="8" cy="18" r="1"/><circle cx="16" cy="18" r="1"/></svg>';
    if (type === 'transit') return '<svg ' + attrs + '><path d="M6 3h12a2 2 0 0 1 2 2v9a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V5a2 2 0 0 1 2-2Z"/><path d="M8 21l2-4"/><path d="M16 21l-2-4"/><path d="M8 8h8"/><circle cx="8" cy="13" r="1"/><circle cx="16" cy="13" r="1"/></svg>';
    return '<svg ' + attrs + '><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2"/></svg>';
  }

  function getDirectionIconType(text){
    var value = String(text || '');
    if (/\[주차\]|주차/.test(value)) return 'parking';
    if (/\[통학차량\]|통학차량|셔틀/.test(value)) return 'bus';
    if (/\[대중교통\]|지하철|버스|도보/.test(value)) return 'transit';
    return 'pin';
  }

  function cleanDirectionText(text){
    return String(text || '').replace(/\[[^\]]+\]\s*/g, '').trim();
  }

  function escWithBr(text){
    return esc(text).replace(/\r?\n/g, '<br>');
  }

  function safeBusColor(value){
    return /^#[0-9a-f]{6}$/i.test(value || '') ? value : '#C97B5F';
  }

  function timeText(value){
    return value ? String(value).slice(0, 5) : '-';
  }

  async function loadBusScheduleSection(center, isPreviewMode){
    if (isPreviewMode || !center || !center.slug) return '';
    var centerRes = await client.from('centers').select('id').eq('slug', center.slug).maybeSingle();
    if (centerRes.error || !centerRes.data || !centerRes.data.id) {
      if (centerRes.error) console.error('[bus/center]', centerRes.error);
      return '';
    }
    var routeRes = await client.from('bus_routes')
      .select('id,center_id,route_name,route_color,sort')
      .eq('center_id', centerRes.data.id)
      .order('sort', { ascending:true })
      .order('created_at', { ascending:true });
    if (routeRes.error) {
      console.error('[bus/routes]', routeRes.error);
      return '';
    }
    var routes = routeRes.data || [];
    if (!routes.length) return '';
    var stopRes = await client.from('bus_stops')
      .select('id,route_id,stop_name,pickup_time,dropoff_time,sort')
      .in('route_id', routes.map(function(route){ return route.id; }))
      .order('sort', { ascending:true })
      .order('created_at', { ascending:true });
    if (stopRes.error) {
      console.error('[bus/stops]', stopRes.error);
      return '';
    }
    var stopsByRoute = {};
    (stopRes.data || []).forEach(function(stop){
      if (!stopsByRoute[stop.route_id]) stopsByRoute[stop.route_id] = [];
      stopsByRoute[stop.route_id].push(stop);
    });
    var routeHtml = routes.map(function(route){
      var stops = stopsByRoute[route.id] || [];
      if (!stops.length) return '';
      var rows = stops.map(function(stop){
        return '<tr><td>' + escWithBr(stop.stop_name || '') + '</td><td class="bus-time">' + esc(timeText(stop.pickup_time)) + '</td><td class="bus-time">' + esc(timeText(stop.dropoff_time)) + '</td></tr>';
      }).join('');
      return '<article class="bus-route">'
        + '<div class="bus-route-head"><span class="bus-color-dot" style="background:' + esc(safeBusColor(route.route_color)) + '"></span><span>' + escWithBr(route.route_name || '통학 노선') + '</span></div>'
        + '<table class="bus-table"><thead><tr><th>정류장</th><th>등원</th><th>하원</th></tr></thead><tbody>' + rows + '</tbody></table>'
        + '</article>';
    }).filter(Boolean).join('');
    if (!routeHtml) return '';
    return '<section class="section" aria-label="통학차량 시간표">'
      + '<p class="section-label">SCHOOL BUS</p>'
      + '<div class="bus-card">' + routeHtml + '</div>'
      + '</section>';
  }

  function initConsultationForm(centerId){
    var overlay = document.getElementById('cslOverlay');
    var openBtn = document.getElementById('cslOpenBtn');
    var closeBtn = document.getElementById('cslCloseBtn');
    var form = document.getElementById('cslForm');
    var errorEl = document.getElementById('cslError');
    var formWrap = document.getElementById('cslFormWrap');
    var doneWrap = document.getElementById('cslDoneWrap');
    if (!overlay || !openBtn || !closeBtn || !form || !errorEl || !formWrap || !doneWrap) return;

    function openModal(){
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden','false');
      errorEl.textContent = '';
      formWrap.hidden = false;
      doneWrap.hidden = true;
      setTimeout(function(){
        var first = document.getElementById('cslName');
        if (first) first.focus();
      }, 30);
    }
    function closeModal(){
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden','true');
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeModal(); });

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      errorEl.textContent = '';
      if (isPreviewMode) {
        errorEl.textContent = '템플릿 미리보기에서는 실제 신청이 접수되지 않아요.';
        return;
      }
      if (!centerId) {
        errorEl.textContent = '원 정보를 불러오지 못했어요. 다시 시도해주세요.';
        return;
      }
      var fd = new FormData(form);
      var kind = fd.get('kind') || '입소 상담';
      var className = (fd.get('className') || '').trim();
      var time = (fd.get('time') || '').trim();
      var messageParts = [];
      if (className) messageParts.push('희망 반/연령: ' + className);
      if (time) messageParts.push('희망 상담 시간 및 문의: ' + time);
      var payload = {
        center_id: centerId,
        parent_name: (fd.get('name') || '').trim(),
        phone: (fd.get('phone') || '').trim(),
        child_name: '',
        child_age: '',
        consultation_type: kind,
        message: messageParts.join('\n')
      };
      var submitBtn = form.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;
      try {
        var result = await client.from('consultations').insert(payload);
        if (result.error) throw result.error;
        form.reset();
        formWrap.hidden = true;
        doneWrap.hidden = false;
      } catch (err) {
        console.error(err);
        errorEl.textContent = '신청을 보내지 못했어요. 잠시 후 다시 시도해주세요.';
      } finally {
        if (submitBtn) submitBtn.disabled = false;
      }
    });
  }

  var cfg = window.__SUPABASE_CONFIG__;
  client = supabase.createClient(cfg.url, cfg.anonKey);
  var params = new URLSearchParams(location.search);
  var slug = params.get('slug') || 'haetsal';
  var PREVIEW_IDS = ['sunshine', 'carnival', 'forest', 'gallery'];
  var previewId = params.get('slug') ? '' : ((params.get('preview') || '').trim().toLowerCase());
  if (previewId && PREVIEW_IDS.indexOf(previewId) < 0) previewId = '';
  isPreviewMode = !!previewId;

  var center;
  try {
    if (isPreviewMode) {
      var tcRes = await client.from('template_centers').select('name, address, directions_text, theme, template, slug').eq('template_id', previewId).single();
      if (tcRes.error) throw tcRes.error;
      center = tcRes.data;
    } else {
      var res = await client.from('centers').select('name, address, directions_text, theme, template, slug').eq('slug', slug).single();
      if (res.error) throw res.error;
      center = res.data;
    }
  } catch (e) {
    console.error(e);
    var brandLinkErr = document.getElementById('brandLink');
    document.getElementById('brandText').textContent = '원이야';
    brandLinkErr.classList.add('is-ready');
    content.innerHTML = '<p class="state">오시는 길을 불러오지 못했어요.</p>';
    setupReveal();
    return;
  }

  applyThemeClass(center);

  var mainFile = TEMPLATE_FILES[center.template] || 'template-sunshine.html';
  var mainUrl = isPreviewMode
    ? (mainFile + '?preview=' + encodeURIComponent(previewId))
    : (mainFile + '?slug=' + encodeURIComponent(center.slug));
  var brandLinkEl = document.getElementById('brandLink');
  brandLinkEl.href = mainUrl;
  document.getElementById('brandText').textContent = (center.name || '원이야').replace(/\s*(어린이집|유치원)$/,'') || center.name;
  brandLinkEl.classList.add('is-ready');
  document.getElementById('backLink').href = mainUrl;
  document.getElementById('coverSub').textContent = (center.name || '원') + ' 오시는 길';
  initConsultationForm(isPreviewMode ? null : center.id);

  document.title = (center.name || '원') + ' - 오시는 길 | 원이야';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', (center.name || '원') + ' 오시는 길 안내입니다. 주소, 교통편, 주차 정보를 확인하세요.');

  var dirText = (center.directions_text || '').trim();
  if (!center.address && !dirText) {
    content.innerHTML = '<p class="state">오시는 길 정보가 아직 등록되지 않았어요.</p>';
    setupReveal();
    return;
  }

  var mapId = 'kakao-map-' + (center.slug || 'center');
  var html = '';
  html += '<section class="section map-section" aria-label="지도">';
  if (center.address) {
    html += '<div class="map-card"><div class="dir-map" id="' + mapId + '"></div></div>';
    html += '<div class="addr"><span class="pin">주소</span><span>' + esc(center.address) + '</span></div>';
  } else {
    html += '<div class="map-card"><div class="dir-map dir-map-placeholder">지도 미리보기는 실제 등록 후 확인 가능합니다.</div></div>';
  }
  html += '</section>';
  if (dirText){
    var lines = dirText.split('/').map(function(s){ return s.trim(); }).filter(Boolean);
    html += '<section class="section" aria-label="오시는 길 정보">'
      + '<p class="section-label">ROUTE</p>'
      + '<div class="dir-text">' + lines.map(function(l){
        var iconType = getDirectionIconType(l);
        return '<div class="dir-line" data-icon="' + esc(iconType) + '"><span class="ic">' + iconSvg(iconType) + '</span><span>' + esc(cleanDirectionText(l)) + '</span></div>';
      }).join('') + '</div></section>';
  }
  html += await loadBusScheduleSection(center, isPreviewMode);
  content.innerHTML = html;

  if (center.address) loadKakaoMap(center.address, mapId);
  document.getElementById('ctaSec').hidden = false;
  setupReveal();
})();
</script>
