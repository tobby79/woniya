<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입학안내 | 원이야</title>
<meta name="description" content="원이야 입학안내입니다. 모집 대상, 입소 절차, 준비물을 확인하세요.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ── 기본(웜 핑크) 팔레트 = template-sunshine.html :root 상속 ── */
  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    --line:#f0d9d9;
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }
  /* ── data-theme 변수 블록 (template-sunshine.html과 동일 — 원 theme 값 상속) ── */
  [data-theme="natural"]{ --cream:#F4F0E8;--ink:#2E2A1E;--ink-soft:#6B6347;--coral:#7EA86A;--coral-deep:#5C8A47;--sage:#A89060 }
  [data-theme="vivid"]{ --cream:#F0F8FF;--ink:#1A2E3A;--ink-soft:#4A6070;--coral:#FF6B35;--coral-deep:#E8501A;--sage:#4AABCC }
  [data-theme="minimal"]{ --cream:#F7F7F5;--ink:#1A1A1A;--ink-soft:#666660;--coral:#2B4C8C;--coral-deep:#1A3470;--sage:#8C8C8A }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);color:var(--ink);background:var(--cream);line-height:1.7;-webkit-font-smoothing:antialiased;padding-bottom:40px}

  /* ── 상단 네비 ── */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,250,243,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 1px 0 rgba(180,140,110,.12)}
  .topbar .inner{max-width:560px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .topbar .brand{font-family:var(--display);font-size:1.15rem;color:var(--ink);text-decoration:none;letter-spacing:-.5px}
  .topbar .back{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft);text-decoration:none;font-weight:700;font-size:.9rem;border:1.5px solid var(--line);border-radius:50px;padding:8px 16px;background:rgba(255,255,255,.6);transition:color .2s ease,border-color .2s ease}
  .topbar .back:hover{color:var(--coral-deep);border-color:var(--coral)}

  .wrap{max-width:560px;margin:0 auto;padding:0 22px;position:relative}

  /* ── 페이지 히어로 ── */
  .page-hero{text-align:center;padding:48px 22px 26px}
  .page-hero .eyebrow{font-family:var(--hand);font-size:1.25rem;color:var(--coral-deep);font-weight:700;margin-bottom:8px}
  .page-hero h1{font-family:var(--display);font-size:clamp(2.1rem,9vw,2.8rem);font-weight:400;letter-spacing:-1px}
  .page-hero p{margin-top:14px;color:var(--ink-soft);font-size:.98rem}

  /* ── 항목 카드 ── */
  .adm-list{display:flex;flex-direction:column;gap:16px;margin-top:8px}
  .adm-item{background:var(--paper);border-radius:20px;padding:22px 22px 24px;box-shadow:0 16px 40px -24px rgba(120,80,60,.4)}
  .adm-item .head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .adm-item .num{flex:none;width:34px;height:34px;border-radius:50%;background:var(--coral);color:#fff;font-family:var(--display);font-size:1rem;display:flex;align-items:center;justify-content:center}
  .adm-item .label{font-family:var(--display);font-size:1.2rem;color:var(--ink);letter-spacing:-.3px}
  .adm-item .value{font-size:1.02rem;color:var(--ink);line-height:1.65;white-space:pre-line}

  /* 입소 절차 스텝 */
  .steps{display:flex;flex-direction:column;gap:0}
  .step{display:flex;gap:14px;position:relative;padding-bottom:18px}
  .step:last-child{padding-bottom:0}
  .step .dot{flex:none;width:26px;height:26px;border-radius:50%;background:var(--cream);border:2px solid var(--coral);color:var(--coral-deep);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;z-index:1}
  .step:not(:last-child)::before{content:"";position:absolute;left:12px;top:26px;bottom:0;width:2px;background:var(--line)}
  .step .txt{padding-top:2px;font-size:1rem;color:var(--ink);line-height:1.55}

  /* 준비물 칩 */
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chips span{background:var(--cream);border:1px solid var(--line);border-radius:30px;padding:8px 15px;font-size:.92rem;color:var(--ink)}

  /* 기타 안내(옅게) */
  .adm-item.notes{background:transparent;box-shadow:none;border:1px dashed var(--line)}
  .adm-item.notes .value{color:var(--ink-soft);font-size:.95rem}

  /* ── 하단 CTA ── */
  .cta{text-align:center;padding:46px 22px 10px}
  .cta h2{font-family:var(--display);font-size:1.5rem;letter-spacing:-.5px}
  .cta p{color:var(--ink-soft);margin:10px 0 24px;font-size:.96rem}
  .btn-big{display:inline-block;background:var(--coral);color:#fff;font-weight:700;font-size:1.05rem;padding:16px 40px;border-radius:50px;text-decoration:none;box-shadow:0 16px 34px -10px var(--coral-deep);transition:transform .3s ease}
  .btn-big:hover{transform:translateY(-3px)}

  .state{text-align:center;color:var(--ink-soft);padding:80px 22px;font-size:1rem}
  a:focus-visible,.btn-big:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:10px}
</style>
</head>
<body data-theme="">

<nav class="topbar">
  <div class="inner">
    <a class="brand" id="brandLink" href="index.html">원이야</a>
    <a class="back" id="backLink" href="index.html">← 홈으로</a>
  </div>
</nav>

<header class="page-hero">
  <div class="eyebrow" id="heroEyebrow"></div>
  <h1>입학안내</h1>
  <p id="heroSub">모집 대상·정원·입소 절차·준비물을 확인하세요.</p>
</header>

<main class="wrap" id="content"></main>

<section class="cta" id="ctaSec" hidden>
  <h2>입소를 고민 중이신가요?</h2>
  <p>궁금한 점은 상담으로 편하게 물어보세요.</p>
  <a class="btn-big" id="consultLink" href="index.html">상담 신청하기</a>
</section>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 템플릿 → 메인 페이지 파일 (index.html과 동일 매핑)
var TEMPLATE_FILES = { sunshine:'template-sunshine.html', forest:'template-forest.html', carnival:'template-carnival.html', gallery:'template-gallery.html' };

(async function(){
  var content = document.getElementById('content');
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); };

  var cfg = window.__SUPABASE_CONFIG__;
  var client = supabase.createClient(cfg.url, cfg.anonKey);
  var params = new URLSearchParams(location.search);
  var slug = params.get('slug') || 'haetsal';
  // ?preview=<id>: 템플릿 미리보기(template_centers/template_admissions 샘플 데이터).
  // slug가 명시되면 실제 원 조회가 우선. preview는 slug가 없을 때만 인식.
  var PREVIEW_IDS = ['sunshine', 'carnival', 'forest', 'gallery'];
  var previewId = params.get('slug') ? '' : ((params.get('preview') || '').trim().toLowerCase());
  if (previewId && PREVIEW_IDS.indexOf(previewId) < 0) previewId = '';
  var isPreviewMode = !!previewId;

  var center;
  try {
    if (isPreviewMode) {
      // ── 미리보기: template_centers + template_admissions에서 조회 (실제 centers 경로와 분리) ──
      var tcRes = await client.from('template_centers').select('name, slug, theme, template, id').eq('template_id', previewId).single();
      if (tcRes.error) throw tcRes.error;
      center = tcRes.data;
      var taRes = await client.from('template_admissions').select('*').eq('template_center_id', center.id).maybeSingle();
      if (taRes.error) throw taRes.error;
      center.admissions = taRes.data ? [taRes.data] : [];
    } else {
      // ── 기존: 실제 centers/admissions 조회 (변경 없음) ──
      var res = await client.from('centers').select('name, slug, theme, template, admissions(*)').eq('slug', slug).single();
      if (res.error) throw res.error;
      center = res.data;
    }
  } catch (e) {
    console.error(e);
    content.innerHTML = '<p class="state">입학안내를 불러오지 못했어요.</p>';
    return;
  }

  // 테마 상속
  if (center.theme) document.body.setAttribute('data-theme', center.theme);

  // 메인 페이지 경로 (홈으로 / 상담 신청). 미리보기 모드에서는 ?preview=로 이어간다.
  var mainFile = TEMPLATE_FILES[center.template] || 'template-sunshine.html';
  var mainUrl = isPreviewMode
    ? (mainFile + '?preview=' + encodeURIComponent(previewId))
    : (mainFile + '?slug=' + encodeURIComponent(center.slug));
  document.getElementById('brandLink').href = mainUrl;
  document.getElementById('brandLink').textContent = (center.name || '원이야').replace(/\s*(어린이집|유치원)$/,'') || center.name;
  document.getElementById('backLink').href = mainUrl;
  document.getElementById('consultLink').href = mainUrl + '#finale';
  document.getElementById('heroEyebrow').textContent = center.name || '';

  // SEO 메타 동적 생성
  document.title = (center.name || '원') + ' - 입학안내 | 원이야';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', (center.name || '원') + ' 입학안내입니다. 모집 대상, 입소 절차, 준비물을 확인하세요.');

  var adm = (center.admissions || [])[0] || null;
  if (!adm) {
    document.getElementById('heroSub').textContent = '';
    content.innerHTML = '<p class="state">입학안내가 아직 등록되지 않았어요.</p>';
    return;
  }

  // 항목별 렌더 (순서: 모집 대상 → 정원 → 기간 → 절차 → 준비물 → 기타)
  var html = '<div class="adm-list">';
  var n = 0;
  function item(label, valueHtml, extraCls){
    n++;
    return '<div class="adm-item ' + (extraCls||'') + '">'
      + '<div class="head"><span class="num">' + n + '</span><span class="label">' + esc(label) + '</span></div>'
      + valueHtml + '</div>';
  }
  if (adm.target)        html += item('모집 대상', '<div class="value">' + esc(adm.target) + '</div>');
  if (adm.capacity_info) html += item('정원 정보', '<div class="value">' + esc(adm.capacity_info) + '</div>');
  if (adm.period)        html += item('모집 기간', '<div class="value">' + esc(adm.period) + '</div>');
  if (adm.process){
    var steps = adm.process.split('→').map(function(s){ return s.trim(); }).filter(Boolean);
    var stepsHtml = '<div class="steps">' + steps.map(function(s, i){
      return '<div class="step"><span class="dot">' + (i+1) + '</span><span class="txt">' + esc(s.replace(/^\d+\.\s*/,'')) + '</span></div>';
    }).join('') + '</div>';
    html += item('입소 절차', stepsHtml);
  }
  if (adm.supplies){
    var sup = adm.supplies.split('/').map(function(s){ return s.trim(); }).filter(Boolean);
    var chipsHtml = '<div class="chips">' + sup.map(function(s){ return '<span>' + esc(s) + '</span>'; }).join('') + '</div>';
    html += item('준비물', chipsHtml);
  }
  if (adm.notes) html += item('기타 안내', '<div class="value">' + esc(adm.notes) + '</div>', 'notes');
  html += '</div>';
  content.innerHTML = html;

  document.getElementById('ctaSec').hidden = false;
})();
</script>
</body>
</html>
