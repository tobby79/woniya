<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 템플릿 고르기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --cream:#FBF6EE;
    --cream-strong:#F6EFE5;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    --line:#f1e9e0;
    --line-strong:#eadfd3;
    --shadow-soft:0 18px 44px -30px rgba(120,80,60,.38);
    --shadow-card:0 22px 58px -34px rgba(120,80,60,.48);
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:60px;
  }

  [hidden]{display:none!important}

  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}

  .page-toolbar{
    display:flex;align-items:center;justify-content:flex-start;gap:16px;
    padding:22px 0 6px;
  }
  .back-link{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    min-height:38px;padding:8px 14px;border:1.5px solid var(--line);
    border-radius:999px;background:#fff;color:var(--ink);font-family:var(--body);
    font-size:.86rem;font-weight:800;cursor:pointer;
    box-shadow:0 12px 28px -24px rgba(120,80,60,.45);
    transition:transform .16s ease,border-color .16s ease,background .16s ease,color .16s ease;
  }
  .back-link:hover{transform:translateY(-1px);border-color:rgba(255,138,107,.38);background:#fff8f5;color:var(--coral-deep)}
  .head{padding:18px 0 28px;text-align:center}
  .section-eyebrow{font-family:var(--hand);font-size:1.15rem;color:var(--sage);font-weight:700}
  .section-title{font-family:var(--display);font-size:clamp(1.7rem,3vw,2.18rem);margin:6px auto 10px;letter-spacing:-.5px;line-height:1.22;max-width:720px}
  .section-sub{color:var(--ink-soft);font-size:.96rem}

  .tpl-list{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
    gap:22px;margin:8px auto 0;align-items:start;max-width:980px;
  }
  .tpl-card{
    position:relative;background:rgba(255,255,255,.92);border-radius:24px;overflow:hidden;
    box-shadow:var(--shadow-card);border:1.5px solid rgba(241,233,224,.96);
    transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease;
    display:flex;flex-direction:column;
  }
  .tpl-card:hover,.tpl-card:focus-within{
    transform:translateY(-3px);border-color:rgba(255,138,107,.48);
    box-shadow:0 26px 62px -34px rgba(120,80,60,.58);
  }
  .tpl-card.selected{border-color:var(--coral);box-shadow:0 26px 62px -32px rgba(242,113,90,.42)}

  .card-hero{
    position:relative;aspect-ratio:3/4;max-height:520px;
    display:flex;align-items:center;justify-content:center;
    background-size:cover;background-position:center;overflow:hidden;
  }
  .card-hero:before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(64,55,51,.18));
  }
  .card-hero:after{
    content:"";position:absolute;inset:18px;border:1px solid rgba(255,255,255,.52);
    border-radius:18px;pointer-events:none;
  }
  .card-hero.hero-sunshine{background:radial-gradient(circle at 26% 22%,#fff7c8 0 18%,transparent 19%),linear-gradient(135deg,#FFE5D8,#FFB89E 52%,#F6C66E)}
  .card-hero.hero-forest{background:radial-gradient(circle at 74% 18%,#eef8dd 0 16%,transparent 17%),linear-gradient(135deg,#DDEED7,#A9CFA3 50%,#6F9D89)}
  .card-hero.hero-carnival{background:radial-gradient(circle at 24% 24%,#fff1a9 0 15%,transparent 16%),linear-gradient(135deg,#FFDDA3,#FF9CB6 48%,#8FA7F1)}
  .card-hero.hero-gallery{background:radial-gradient(circle at 78% 24%,#ffffff 0 14%,transparent 15%),linear-gradient(135deg,#E8E5DF,#BDB7AE 48%,#777E89)}
  .card-hero .hero-name{
    position:absolute;left:50%;bottom:18px;z-index:2;transform:translateX(-50%);
    font-family:var(--display);font-size:1.18rem;color:#fff;white-space:nowrap;
    text-shadow:0 3px 18px rgba(64,55,51,.32);letter-spacing:-.3px;
    padding:6px 14px;border-radius:999px;background:rgba(64,55,51,.18);
    border:1px solid rgba(255,255,255,.34);backdrop-filter:blur(8px);
  }
  .hero-preview{
    position:relative;z-index:1;width:min(78%,260px);aspect-ratio:3/4;
    border-radius:18px;background:rgba(255,255,255,.86);
    box-shadow:0 22px 46px -24px rgba(64,55,51,.5);
    overflow:hidden;border:1px solid rgba(255,255,255,.62);
  }
  .hero-preview:before{
    content:"";position:absolute;left:0;right:0;top:0;height:24px;
    background:rgba(255,255,255,.72);border-bottom:1px solid rgba(64,55,51,.08);
  }
  .hero-preview:after{
    content:"";position:absolute;left:14px;top:9px;width:7px;height:7px;border-radius:50%;
    background:#ff8a6b;box-shadow:13px 0 0 #f6c66e,26px 0 0 #9cb89a;
  }
  .hero-preview-main{position:absolute;left:14px;right:14px;top:38px;bottom:14px;display:grid;grid-template-rows:1.1fr .9fr;gap:12px}
  .hero-preview-visual{border-radius:14px;background:rgba(255,255,255,.55);position:relative;overflow:hidden}
  .hero-preview-copy{display:flex;flex-direction:column;justify-content:center;gap:8px}
  .hero-preview-line{display:block;height:8px;border-radius:99px;background:rgba(64,55,51,.16)}
  .hero-preview-line.short{width:62%}
  .hero-preview-line.mid{width:82%}
  .hero-preview-pill{width:56px;height:18px;border-radius:99px;margin-top:2px;background:var(--coral)}
  .hero-sunshine .hero-preview-visual{background:radial-gradient(circle at 32% 34%,#fff8c9 0 22%,transparent 23%),linear-gradient(135deg,#ffe6dc,#ffb49b)}
  .hero-forest .hero-preview-visual{background:radial-gradient(circle at 36% 36%,#dff1d5 0 18%,transparent 19%),linear-gradient(135deg,#b9d9ad,#638f78)}
  .hero-carnival .hero-preview-visual{background:radial-gradient(circle at 34% 34%,#fff0a8 0 16%,transparent 17%),linear-gradient(135deg,#ffb3c6,#8fa7f1)}
  .hero-gallery .hero-preview-visual{background:linear-gradient(135deg,#f3f1ec,#a9a39a)}
  .hero-gallery .hero-preview-visual:before{
    content:"";position:absolute;inset:18px;border:5px solid rgba(255,255,255,.78);
    box-shadow:24px 18px 0 -10px rgba(64,55,51,.18);
  }

  .card-body{flex:0 0 auto;display:flex;flex-direction:column;padding:16px 18px 18px}
  .tpl-card .name{font-family:var(--display);font-size:1.24rem;letter-spacing:-.3px;line-height:1.22}
  .tpl-card .desc{color:var(--ink-soft);font-size:.87rem;margin-top:5px;min-height:0}
  .tpl-card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .tpl-card .tag{
    display:inline-flex;align-items:center;min-height:24px;padding:3px 9px;
    border-radius:999px;background:var(--cream);border:1px solid var(--line);
    color:var(--ink-soft);font-size:.76rem;font-weight:800;
  }
  .tpl-card .actions{display:flex;gap:8px;margin-top:auto;padding-top:14px}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    flex:1;min-height:40px;border:none;border-radius:999px;padding:10px 14px;
    background:var(--coral);color:#fff;font-weight:700;font-size:.88rem;
    font-family:var(--body);text-align:center;line-height:1.3;
    cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease;
    box-shadow:0 14px 28px -10px var(--coral-deep);
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:focus-visible{outline:3px solid rgba(255,138,107,.26);outline-offset:2px}
  .btn.ghost{background:#fff;color:var(--ink);box-shadow:none;border:1.5px solid #e7dccf}
  .btn.ghost:hover{background:#fff8f5;border-color:rgba(255,138,107,.38);color:var(--coral-deep)}

  .msg{margin-top:14px;font-size:.88rem;text-align:center}
  .msg.error{color:#D9534F}
  .msg.ok{color:var(--sage)}

  /* ── 모달 공통 ── */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal-box{
    background:var(--paper);border-radius:22px;padding:24px;
    width:100%;max-width:880px;max-height:90vh;overflow:auto;
    box-shadow:0 28px 80px -30px rgba(20,16,14,.48);
  }

  /* ── 미리보기 모달 ── */
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
  .modal-title{font-family:var(--display);font-size:1.15rem}
  .modal-head-actions{display:flex;align-items:center;gap:14px}
  .modal-link{color:var(--coral);font-size:.85rem;text-decoration:none;background:none;border:none;cursor:pointer;font-family:var(--body)}
  .preview-frame{width:100%;height:70vh;border:none;border-radius:14px;background:#f1e9e0;display:block}

  /* ── 결정 모달 ── */
  .modal-decide{text-align:center}
  .modal-box.modal-decide{max-width:520px}
  .modal-decide .modal-title{margin-bottom:14px}
  .modal-decide .modal-text{color:var(--ink-soft);font-size:.92rem}
  .modal-decide .modal-number{
    font-size:2.2rem;font-weight:700;color:var(--coral);margin:16px 0 20px;
  }
  .modal-actions{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .modal-actions .btn{flex:0 1 auto;min-width:132px}

  @media (max-width:760px){
    body{padding-bottom:42px}
    .wrap{padding:0 18px}
    .page-toolbar{padding:18px 0 4px}
    .head{padding:16px 0 20px;text-align:left}
    .section-title{font-size:1.58rem;margin-left:0;margin-right:0}
    .section-sub{font-size:.9rem}
    .tpl-list{grid-template-columns:1fr;gap:16px;max-width:430px}
    .tpl-card{border-radius:22px}
    .card-hero{min-height:0;max-height:460px}
    .card-hero:after{inset:14px;border-radius:16px}
    .card-hero .hero-name{bottom:16px;font-size:1.08rem}
    .hero-preview{width:min(74%,250px);height:auto;border-radius:16px}
    .hero-preview-main{top:34px;bottom:12px;left:12px;right:12px;gap:9px}
    .card-body{padding:15px 16px 17px}
    .tpl-card .actions{flex-direction:column;padding-top:13px}
    .btn{width:100%;min-height:42px}
    .modal-overlay{padding:14px}
    .modal-box{padding:18px;border-radius:20px}
    .modal-head{align-items:flex-start;flex-direction:column}
    .modal-head-actions{width:100%;justify-content:space-between;gap:10px}
    .modal-actions{flex-direction:column}
    .modal-actions .btn{width:100%}
    .preview-frame{height:68vh}
  }

  @media (min-width:1080px){
    .tpl-list{gap:26px}
  }

</style>
</head>
<body>

<div class="wrap">
  <div class="page-toolbar">
    <button type="button" class="back-link" id="backToAdminBtn">← 원 관리로 돌아가기</button>
  </div>

  <header class="head">
    <div class="section-eyebrow">우리 원 분위기 고르기</div>
    <h1 class="section-title">어떤 분위기가 우리 원에 맞나요?</h1>
    <p class="section-sub">미리보기로 직접 확인해보세요</p>
  </header>

  <div class="tpl-list" id="tplList"></div>
</div>

<!-- 미리보기 모달 -->
<div class="modal-overlay" id="previewModal" hidden>
  <div class="modal-box modal-preview">
    <div class="modal-head">
      <div class="modal-title" id="previewTitle"></div>
      <div class="modal-head-actions">
        <button type="button" class="modal-link" id="previewNewTabBtn">새 탭으로 열기</button>
        <button type="button" class="btn ghost" id="previewCloseBtn" style="flex:none;padding:8px 16px">닫기</button>
      </div>
    </div>
    <iframe class="preview-frame" id="previewFrame" title="템플릿 미리보기"></iframe>
  </div>
</div>

<!-- 결정 모달 -->
<div class="modal-overlay" id="decideModal" hidden>
  <div class="modal-box modal-decide">
    <div class="modal-title" id="decideTitle">선택 완료</div>
    <p class="modal-text" id="decideText"></p>
    <p class="modal-text" id="decideSubText">아래 번호를 운영자에게 알려주세요.</p>
    <div class="modal-number" id="decideNumber"></div>
    <div class="msg" id="decideMsg"></div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="decideAdminBtn" hidden>원 관리로 돌아가기</button>
      <button type="button" class="btn ghost" id="decidePublicBtn" hidden>원 페이지 보기</button>
      <button type="button" class="btn" id="decideCloseBtn">닫기</button>
    </div>
  </div>
</div>

<script>
(function(){
  var TEMPLATES = [
    { key:'sunshine', number:1, name:'햇살',     desc:'따뜻한 핑크톤, 하루의 빛 흐름',       file:'template-sunshine.html', tags:['따뜻함','부드러움','대표 추천'] },
    { key:'forest',   number:2, name:'숲',       desc:'초록 자연, 세로 타임라인',           file:'template-forest.html', tags:['자연','차분함'] },
    { key:'carnival', number:3, name:'놀이동산', desc:'알록달록, 책 넘기기 애니메이션',     file:'template-carnival.html', tags:['활동적','선명함'] },
    { key:'gallery',  number:4, name:'갤러리',   desc:'차콜 그레이, 가로 슬라이드',         file:'template-gallery.html', tags:['정돈감','사진 중심'] }
  ];

  var params   = new URLSearchParams(window.location.search);
  var slug     = params.get('slug');
  var authMode = params.get('auth') === 'true';

  var backToAdminBtn = document.getElementById('backToAdminBtn');
  var tplList   = document.getElementById('tplList');

  var previewModal     = document.getElementById('previewModal');
  var previewTitle     = document.getElementById('previewTitle');
  var previewFrame     = document.getElementById('previewFrame');
  var previewCloseBtn  = document.getElementById('previewCloseBtn');
  var previewNewTabBtn = document.getElementById('previewNewTabBtn');

  var decideModal     = document.getElementById('decideModal');
  var decideTitle     = document.getElementById('decideTitle');
  var decideText      = document.getElementById('decideText');
  var decideSubText   = document.getElementById('decideSubText');
  var decideNumber    = document.getElementById('decideNumber');
  var decideMsg       = document.getElementById('decideMsg');
  var decideAdminBtn  = document.getElementById('decideAdminBtn');
  var decidePublicBtn = document.getElementById('decidePublicBtn');
  var decideCloseBtn  = document.getElementById('decideCloseBtn');

  function previewUrl(t){
    if (authMode && !slug) return '';
    return slug ? t.file + '?slug=' + encodeURIComponent(slug) : t.file + '?preview=' + encodeURIComponent(t.key);
  }

  function publicUrl(t){
    return slug ? t.file + '?slug=' + encodeURIComponent(slug) : '';
  }

  function isOwnerChangeMode(){
    return authMode || !!slug;
  }

  function adminReturnUrl(){
    return 'admin.html';
  }

  function cameFromAdmin(){
    if (!document.referrer) return false;
    try {
      var ref = new URL(document.referrer, window.location.href);
      return /\/admin\.html$/.test(ref.pathname);
    } catch (_e) {
      return document.referrer.indexOf('admin.html') !== -1;
    }
  }

  backToAdminBtn.addEventListener('click', function(){
    goBackToAdmin();
  });

  function goBackToAdmin(){
    var fallbackUrl = adminReturnUrl();
    if (cameFromAdmin() && window.history.length > 1) {
      window.history.back();
      window.setTimeout(function(){
        if (!document.hidden) window.location.href = fallbackUrl;
      }, 600);
      return;
    }
    window.location.href = fallbackUrl;
  }

  // ── 카드 렌더 ──
  tplList.innerHTML = TEMPLATES.map(function(t){
    return '' +
      '<div class="tpl-card" data-key="' + t.key + '">' +
        '<div class="card-hero hero-' + t.key + '">' +
          '<div class="hero-preview" aria-hidden="true">' +
            '<div class="hero-preview-main">' +
              '<div class="hero-preview-visual"></div>' +
              '<div class="hero-preview-copy">' +
                '<span class="hero-preview-line mid"></span>' +
                '<span class="hero-preview-line"></span>' +
                '<span class="hero-preview-line short"></span>' +
                '<span class="hero-preview-pill"></span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<span class="hero-name">' + t.name + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="name">' + t.name + '</div>' +
          '<div class="desc">' + t.desc + '</div>' +
          '<div class="tags">' + t.tags.map(function(tag){ return '<span class="tag">' + tag + '</span>'; }).join('') + '</div>' +
          '<div class="actions">' +
            '<button type="button" class="btn ghost" data-action="preview" data-key="' + t.key + '">미리보기</button>' +
            '<button type="button" class="btn" data-action="decide" data-key="' + t.key + '">이 템플릿으로 결정</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }).join('');

  tplList.addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action]');
    if (!btn) return;
    var t = TEMPLATES.find(function(x){ return x.key === btn.getAttribute('data-key'); });
    if (!t) return;

    if (btn.getAttribute('data-action') === 'preview'){
      openPreviewModal(t);
      return;
    }
    decideTemplate(t, btn.closest('.tpl-card'));
  });

  function selectCard(cardEl){
    document.querySelectorAll('.tpl-card').forEach(function(c){ c.classList.remove('selected'); });
    cardEl.classList.add('selected');
  }

  // ── 모달 공통 ──
  function showModal(el){
    el.hidden = false;
    document.body.style.overflow = 'hidden';
  }
  function hideModal(el){
    el.hidden = true;
    document.body.style.overflow = '';
  }

  // ── 미리보기 모달 ──
  function openPreviewModal(t){
    var url = previewUrl(t);
    if (!url){
      decideTitle.textContent = '미리보기를 열 수 없어요';
      decideText.textContent = '현재 원 정보를 확인할 수 없습니다.';
      decideSubText.textContent = '원장 콘솔에서 다시 템플릿 선택 화면을 열어 주세요.';
      decideNumber.hidden = true;
      decideNumber.textContent = '';
      decideMsg.className = 'msg error';
      decideMsg.textContent = '원 slug가 없어 미리보기를 열지 않았습니다.';
      decideAdminBtn.hidden = true;
      decidePublicBtn.hidden = true;
      showModal(decideModal);
      return;
    }
    previewTitle.textContent = t.name;
    previewFrame.src = url;
    showModal(previewModal);
  }
  function closePreviewModal(){
    hideModal(previewModal);
    previewFrame.src = 'about:blank';
  }
  previewCloseBtn.addEventListener('click', closePreviewModal);
  previewModal.addEventListener('click', function(e){
    if (e.target === previewModal) closePreviewModal();
  });
  previewNewTabBtn.addEventListener('click', function(){
    window.open(previewFrame.src, '_blank');
  });

  // ── Supabase 지연 로드 (auth=true일 때만) ──
  var supabasePromise = null;
  function loadScript(src){
    return new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }
  function ensureSupabase(){
    if (!supabasePromise){
      supabasePromise = loadScript('supabase-config.js')
        .then(function(){ return loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'); })
        .then(function(){
          var cfg = window.__SUPABASE_CONFIG__;
          return supabase.createClient(cfg.url, cfg.anonKey);
        });
    }
    return supabasePromise;
  }

  // ── 결정 모달 ──
  function openDecideModal(t, msgClass, msgText){
    var ownerMode = isOwnerChangeMode();
    decideTitle.textContent = ownerMode ? '템플릿 변경 완료' : '선택 완료';
    decideText.textContent = ownerMode
      ? t.name + ' 템플릿으로 변경됐어요.'
      : t.name + ' 템플릿을 선택하셨어요.';
    decideSubText.textContent = ownerMode
      ? '기존 원 정보는 유지되고, 홈페이지 분위기만 바뀝니다.'
      : '아래 번호를 운영자에게 알려주세요.';
    decideNumber.hidden = ownerMode;
    decideNumber.textContent = ownerMode ? '' : (t.number + '번 · ' + t.name);
    decideMsg.className = 'msg' + (msgClass ? ' ' + msgClass : '');
    decideMsg.textContent = msgText || '';
    decideAdminBtn.hidden = !ownerMode;
    decidePublicBtn.hidden = !ownerMode || !publicUrl(t);
    decidePublicBtn.disabled = !publicUrl(t);
    decidePublicBtn.onclick = function(){
      var url = publicUrl(t);
      if (url) window.open(url, '_blank');
    };
    showModal(decideModal);
  }
  decideAdminBtn.addEventListener('click', goBackToAdmin);
  decideCloseBtn.addEventListener('click', function(){ hideModal(decideModal); });

  // ── 결정 버튼 동작 ──
  async function decideTemplate(t, cardEl){
    selectCard(cardEl);

    if (authMode && slug){
      try {
        var client  = await ensureSupabase();
        var session = (await client.auth.getSession()).data.session;
        if (session){
          var targetRes = await client.from('centers')
            .select('id')
            .eq('slug', slug)
            .eq('owner_id', session.user.id)
            .maybeSingle();
          if (targetRes.error) throw targetRes.error;
          if (!targetRes.data){
            openDecideModal(t, 'error', '변경할 원을 찾을 수 없어요. 관리자 화면에서 다시 시도해 주세요.');
            return;
          }

          var res = await client.from('centers')
            .update({ template: t.key })
            .eq('id', targetRes.data.id)
            .eq('owner_id', session.user.id)
            .select('id')
            .single();
          if (res.error) throw res.error;
          openDecideModal(t, 'ok', '템플릿이 변경됐어요');
          return;
        }
      } catch (e) {
        openDecideModal(t, 'error', '저장에 실패했어요. 다시 시도해주세요');
        return;
      }
    }

    // 로그인 없음 / auth 모드 아님 / slug 없음
    openDecideModal(t, '', '');
  }
})();
</script>
