<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 원장 콘솔</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .topbar{position:sticky;top:0;left:0;right:0;z-index:40;padding:14px 0;background:rgba(255,250,243,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 1px 0 rgba(180,140,110,.12)}
  .topbar-inner{max-width:560px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between}
  .topbar .brand{font-family:var(--display);font-size:1.25rem;color:var(--ink);text-decoration:none;letter-spacing:-.5px}
  .topbar .who{display:flex;align-items:center;gap:12px;font-size:.85rem;color:var(--ink-soft)}
  .center-links{display:flex;align-items:center;gap:12px}
  .topbar-link{color:var(--ink-soft);font-size:.85rem;text-decoration:none;transition:color .2s ease}
  .topbar-link:hover{color:var(--coral)}
  .topbar-sep{color:var(--ink-soft);opacity:.3}

  .wrap{max-width:480px;margin:0 auto;padding:40px 22px 60px}

  [hidden]{display:none!important}

  .section-eyebrow{font-family:var(--hand);font-size:1.1rem;color:var(--sage);font-weight:700}
  .section-title{font-family:var(--display);font-size:1.6rem;margin:6px 0 24px;letter-spacing:-.5px}

  .panel{background:var(--paper);border-radius:24px;padding:26px;box-shadow:0 18px 44px -22px rgba(120,80,60,.35)}

  label{display:block;font-size:.86rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .field{margin-bottom:18px}
  input[type=email],input[type=password],input[type=text],textarea{
    width:100%;border:1.5px solid #f1e9e0;border-radius:14px;padding:13px 16px;
    font-family:var(--body);font-size:.98rem;color:var(--ink);background:var(--cream);
    outline:none;transition:border-color .2s ease;
  }
  input:focus,textarea:focus{border-color:var(--coral)}
  textarea{resize:vertical;min-height:90px;line-height:1.6}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:100%;border:none;border-radius:30px;padding:14px;
    background:var(--coral);color:#fff;font-weight:700;font-size:1rem;
    cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;
    box-shadow:0 14px 28px -10px var(--coral-deep);
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn.ghost{background:transparent;color:var(--ink-soft);box-shadow:none;border:1.5px solid #e7dccf;width:auto;padding:8px 18px;font-size:.86rem}
  .btn.danger{background:#fff;color:#D9534F;border:1.5px solid #f5c6c4;box-shadow:none}
  .btn.danger:hover{background:#fff5f5}

  .msg{margin-top:14px;font-size:.88rem;text-align:center}
  .msg.error{color:#D9534F}
  .msg.ok{color:var(--sage)}

  .no-center{padding:30px 0;text-align:center;color:var(--ink-soft);font-size:.92rem}

  .consult-list{list-style:none}
  .consult-item{padding:14px 4px;border-bottom:1px solid #f1e9e0}
  .consult-item:last-child{border-bottom:none}
  .consult-item .row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .consult-item .who{font-weight:700;font-size:.98rem}
  .consult-item .kind{font-size:.76rem;font-weight:700;color:var(--coral-deep);background:#FFF1EA;border-radius:30px;padding:3px 10px;white-space:nowrap}
  .consult-item .detail{margin-top:5px;color:var(--ink-soft);font-size:.86rem}
  .consult-item .when{margin-top:3px;color:var(--ink-soft);font-size:.78rem}

  /* ── 원 등록 신청 목록 ── */
  .app-list{list-style:none}
  .app-item{padding:16px 4px;border-bottom:1px solid #f1e9e0}
  .app-item:last-child{border-bottom:none}
  .app-item .row1{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .app-item .who{font-weight:700;font-size:.98rem}
  .app-status{
    font-size:.74rem;font-weight:700;border-radius:30px;padding:3px 10px;white-space:nowrap;
    cursor:pointer;border:none;transition:background .15s,color .15s;
  }
  .app-status.new{background:#FFF1EA;color:var(--coral-deep)}
  .app-status.checked{background:#EDF5ED;color:#4a8a4a}
  .app-status.contacted{background:#E8EAF6;color:#3949AB}
  .app-item .detail{margin-top:6px;color:var(--ink-soft);font-size:.86rem;line-height:1.5}
  .app-item .msg-text{
    margin-top:6px;padding:10px 12px;
    background:var(--cream);border-radius:10px;
    font-size:.84rem;color:var(--ink);line-height:1.6;
  }
  .app-item .when{margin-top:4px;color:var(--ink-soft);font-size:.78rem}
  .app-count{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:20px;height:20px;border-radius:99px;
    background:var(--coral);color:#fff;font-size:.72rem;font-weight:700;
    padding:0 5px;margin-left:6px;vertical-align:middle;
  }

  /* ── 사진 업로드 ── */
  .upload-zone{
    border:2px dashed #f1e9e0;border-radius:18px;padding:28px 20px;
    text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
    background:var(--cream);
  }
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--coral);background:#fff8f5}
  .upload-zone .upload-icon{font-size:2rem;margin-bottom:8px}
  .upload-zone .upload-hint{font-size:.86rem;color:var(--ink-soft);line-height:1.5}
  .upload-zone .upload-hint strong{color:var(--coral-deep)}
  #fileInput{display:none}

  /* 업로드 진행바 */
  .upload-progress{margin-top:14px;display:none}
  .progress-bar-wrap{height:6px;background:#f1e9e0;border-radius:99px;overflow:hidden;margin-top:6px}
  .progress-bar{height:100%;background:var(--coral);border-radius:99px;transition:width .3s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--ink-soft);margin-top:5px}

  /* 사진 그리드 */
  .photo-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;
  }
  .photo-item{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;background:#f1e9e0}
  .photo-item img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-item .del-btn{
    position:absolute;top:5px;right:5px;
    width:24px;height:24px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;border:none;
    font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
    line-height:1;
  }
  .photo-item .del-btn:hover{background:rgba(217,83,79,.85)}
  .photo-type-badge{
    position:absolute;bottom:5px;left:5px;
    font-size:.68rem;font-weight:700;
    background:rgba(255,255,255,.82);color:var(--ink);
    border-radius:99px;padding:2px 7px;
  }
  .photo-empty{
    grid-column:1/-1;text-align:center;padding:20px;
    color:var(--ink-soft);font-size:.88rem;
  }

  /* 업로드 타입 선택 */
  .type-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .type-tab{
    padding:6px 14px;border-radius:99px;border:1.5px solid #f1e9e0;
    font-size:.82rem;font-weight:700;cursor:pointer;
    background:var(--cream);color:var(--ink-soft);transition:all .15s;
  }
  .type-tab.active{background:var(--coral);color:#fff;border-color:var(--coral)}

</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="admin.html">원이야 콘솔</a>
    <div class="who" id="whoBox" hidden>
      <span class="center-links" id="centerLinks" hidden>
        <a href="javascript:void(0)" class="topbar-link" id="viewSiteBtn">내 페이지 보기</a>
        <span class="topbar-sep">|</span>
        <a href="javascript:void(0)" class="topbar-link" id="changeTemplateBtn">템플릿 변경</a>
        <span class="topbar-sep">|</span>
      </span>
      <span id="userEmail"></span>
      <button class="btn ghost" id="logoutBtn">로그아웃</button>
    </div>
  </div>
</nav>

<div class="wrap">

  <!-- 로그인 화면 -->
  <section id="loginView">
    <div class="section-eyebrow">원장 전용</div>
    <h1 class="section-title">로그인</h1>
    <div class="panel">
      <form id="loginForm">
        <div class="field">
          <label for="email">이메일</label>
          <input type="email" id="email" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn">로그인</button>
        <div class="msg error" id="loginError"></div>
      </form>
    </div>
  </section>

  <!-- 콘솔 화면 (로그인 후에만 표시) -->
  <section id="adminView" hidden>
    <div class="section-eyebrow">원 정보 편집</div>
    <h1 class="section-title">우리 원 관리</h1>

    <div class="no-center" id="noCenter" hidden>
      이 계정에 연결된 원이 아직 없어요.<br>관리자에게 문의해주세요.
    </div>

    <!-- 원 정보 편집 -->
    <div class="panel" id="centerPanel" hidden>
      <form id="saveForm">
        <div class="field">
          <label for="f-name">원 이름</label>
          <input type="text" id="f-name" required>
        </div>
        <div class="field">
          <label for="f-intro">소개</label>
          <textarea id="f-intro" placeholder="우리 원을 한 줄로 소개해주세요"></textarea>
        </div>
        <div class="field">
          <label for="f-address">주소</label>
          <input type="text" id="f-address">
        </div>
        <div class="field">
          <label for="f-hours">운영시간</label>
          <input type="text" id="f-hours" placeholder="예: 07:30 ~ 19:30">
        </div>
        <button type="submit" class="btn">저장</button>
        <div class="msg ok" id="saveStatus"></div>
      </form>
    </div>

    <!-- 사진 관리 -->
    <div id="photoSection" hidden>
      <div class="section-eyebrow" style="margin-top:40px">사진 관리</div>
      <h2 class="section-title">원 사진 올리기</h2>
      <div class="panel">

        <!-- 사진 유형 선택 -->
        <label>사진 유형</label>
        <div class="type-tabs" id="typeTabs">
          <button type="button" class="type-tab active" data-type="hero">대표 사진</button>
          <button type="button" class="type-tab" data-type="day_story">하루 스토리</button>
          <button type="button" class="type-tab" data-type="album">앨범</button>
          <button type="button" class="type-tab" data-type="teacher">교사 프로필</button>
        </div>

        <!-- 드래그앤드롭 업로드 존 -->
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">+</div>
          <div class="upload-hint">
            <strong>클릭하거나 사진을 여기에 드래그</strong><br>
            JPG · PNG · WebP · 최대 10MB
          </div>
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>
        </div>

        <!-- 진행바 -->
        <div class="upload-progress" id="uploadProgress">
          <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
          <div class="progress-label" id="progressLabel">준비 중...</div>
        </div>

        <div class="msg error" id="uploadError" style="margin-top:10px"></div>

        <!-- 업로드된 사진 그리드 -->
        <div style="margin-top:22px">
          <label>업로드된 사진</label>
          <div class="photo-grid" id="photoGrid">
            <div class="photo-empty" id="photoEmpty">아직 사진이 없어요.</div>
          </div>
        </div>

      </div>
    </div>

    <!-- 상담 신청 목록 -->
    <div id="consultSection" hidden>
      <div class="section-eyebrow" style="margin-top:40px">신청 현황</div>
      <h2 class="section-title">상담·대기 신청 목록</h2>
      <div class="panel">
        <div id="consultEmpty" class="no-center" hidden>아직 들어온 신청이 없어요.</div>
        <ul class="consult-list" id="consultList"></ul>
      </div>
    </div>

    <!-- 원 등록 신청 목록 -->
    <div id="appSection" hidden>
      <div class="section-eyebrow" style="margin-top:40px">원 등록 신청</div>
      <h2 class="section-title">등록 신청 목록<span class="app-count" id="appCount" hidden>0</span></h2>
      <div class="panel">
        <div id="appEmpty" class="no-center" hidden>아직 들어온 신청이 없어요.</div>
        <ul class="app-list" id="appList"></ul>
      </div>
    </div>
  </section>

</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var cfg = window.__SUPABASE_CONFIG__;
  var client = supabase.createClient(cfg.url, cfg.anonKey);

  var BUCKET = 'center-images';

  // ── DOM refs ──
  var loginView    = document.getElementById('loginView');
  var adminView    = document.getElementById('adminView');
  var whoBox       = document.getElementById('whoBox');
  var userEmailEl  = document.getElementById('userEmail');
  var centerLinks      = document.getElementById('centerLinks');
  var viewSiteBtn       = document.getElementById('viewSiteBtn');
  var changeTemplateBtn = document.getElementById('changeTemplateBtn');
  var loginForm    = document.getElementById('loginForm');
  var loginError   = document.getElementById('loginError');
  var logoutBtn    = document.getElementById('logoutBtn');
  var noCenter     = document.getElementById('noCenter');
  var centerPanel  = document.getElementById('centerPanel');
  var saveForm     = document.getElementById('saveForm');
  var saveStatus   = document.getElementById('saveStatus');
  var consultSection = document.getElementById('consultSection');
  var consultList  = document.getElementById('consultList');
  var consultEmpty = document.getElementById('consultEmpty');

  var appSection   = document.getElementById('appSection');
  var appList      = document.getElementById('appList');
  var appEmpty     = document.getElementById('appEmpty');
  var appCount     = document.getElementById('appCount');

  var photoSection  = document.getElementById('photoSection');
  var uploadZone    = document.getElementById('uploadZone');
  var fileInput     = document.getElementById('fileInput');
  var uploadProgress= document.getElementById('uploadProgress');
  var progressBar   = document.getElementById('progressBar');
  var progressLabel = document.getElementById('progressLabel');
  var uploadError   = document.getElementById('uploadError');
  var photoGrid     = document.getElementById('photoGrid');
  var photoEmpty    = document.getElementById('photoEmpty');
  var typeTabs      = document.getElementById('typeTabs');

  var currentCenter = null;
  var selectedType  = 'hero';

  var TYPE_LABELS = { hero:'대표', day_story:'하루', album:'앨범', teacher:'교사' };
  var KIND_LABELS = { consult:'상담', waiting:'대기', info_session:'설명회' };
  var TEMPLATE_FILES = {
    sunshine: 'home.html',
    forest: 'template-forest.html',
    carnival: 'template-carnival.html',
    gallery: 'template-gallery.html'
  };

  // ── 이미지 압축 (Canvas API) ──
  function compressImage(file){
    return new Promise(function(resolve){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var MAX = 1920;
          var w = img.width, h = img.height;
          if (w > MAX || h > MAX){
            if (w >= h){ h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(function(blob){
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.webp', { type:'image/webp' }));
          }, 'image/webp', 0.85);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ── 서명 URL 발급 (1시간) ──
  async function signedUrl(path){
    var res = await client.storage.from(BUCKET).createSignedUrl(path, 3600);
    return res.data ? res.data.signedUrl : null;
  }

  // ── 사진 목록 로드 ──
  async function loadPhotos(){
    if (!currentCenter) return;
    var res = await client.from('center_media')
      .select('*')
      .eq('center_id', currentCenter.id)
      .order('sort_order', { ascending: true });

    var rows = (res.data || []);
    if (rows.length === 0){
      photoGrid.innerHTML = '<div class="photo-empty" id="photoEmpty">아직 사진이 없어요.</div>';
      return;
    }

    // 서명 URL 병렬 발급
    var items = await Promise.all(rows.map(async function(row){
      var url = await signedUrl(row.photo_url);
      return { row: row, signedUrl: url };
    }));

    photoGrid.innerHTML = items.map(function(item){
      if (!item.signedUrl) return '';
      return '<div class="photo-item" data-media-id="' + item.row.id + '" data-path="' + item.row.photo_url + '">' +
        '<img src="' + item.signedUrl + '" alt="' + (item.row.caption || '') + '" loading="lazy">' +
        '<span class="photo-type-badge">' + (TYPE_LABELS[item.row.media_type] || item.row.media_type) + '</span>' +
        '<button class="del-btn" data-media-id="' + item.row.id + '" data-path="' + item.row.photo_url + '" title="삭제">×</button>' +
      '</div>';
    }).join('');

    // 삭제 버튼 이벤트
    photoGrid.querySelectorAll('.del-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        deletePhoto(btn.dataset.mediaId, btn.dataset.path);
      });
    });
  }

  // ── 사진 삭제 ──
  async function deletePhoto(mediaId, storagePath){
    if (!confirm('이 사진을 삭제할까요?')) return;
    // Storage에서 제거
    await client.storage.from(BUCKET).remove([storagePath]);
    // DB에서 제거
    await client.from('center_media').delete().eq('id', mediaId);
    loadPhotos();
  }

  // ── 파일 업로드 처리 ──
  async function handleFiles(files){
    if (!currentCenter || files.length === 0) return;
    uploadError.textContent = '';

    // 타입별 최대 개수 제한
    var LIMITS = { hero: 1, album: 100, day_story: 12, teacher: 30 };
    var limit = LIMITS[selectedType] || 100;
    var countRes = await client.from('center_media')
      .select('id', { count: 'exact', head: true })
      .eq('center_id', currentCenter.id)
      .eq('media_type', selectedType);
    var currentCount = countRes.count || 0;
    if (currentCount + files.length > limit) {
      uploadError.textContent = '이 유형은 최대 ' + limit + '장까지 올릴 수 있어요. (현재 ' + currentCount + '장)';
      return;
    }

    uploadProgress.style.display = 'block';
    progressBar.style.width = '0%';

    var total = files.length;
    var done  = 0;

    for (var i = 0; i < files.length; i++){
      var file = files[i];
      progressLabel.textContent = '(' + (i+1) + '/' + total + ') 압축 중... ' + file.name;

      try {
        // 1) 압축
        var compressed = await compressImage(file);

        // 2) Storage 경로: {center_id}/{type}/{timestamp}_{filename}
        var ts   = Date.now();
        var path = currentCenter.id + '/' + selectedType + '/' + ts + '_' + compressed.name;
        console.log('upload path:', path, 'center id:', currentCenter ? currentCenter.id : 'NULL');

        progressLabel.textContent = '(' + (i+1) + '/' + total + ') 업로드 중... ' + compressed.name;
        progressBar.style.width = Math.round((i / total) * 80) + '%';

        var upRes = await client.storage.from(BUCKET).upload(path, compressed, {
          cacheControl: '3600', upsert: false
        });

        if (upRes.error) throw upRes.error;

        // 3) center_media 테이블에 기록
        var sortMax = await client.from('center_media')
          .select('sort_order')
          .eq('center_id', currentCenter.id)
          .order('sort_order', { ascending: false })
          .limit(1);
        var nextSort = ((sortMax.data && sortMax.data[0]) ? sortMax.data[0].sort_order : 0) + 1;

        await client.from('center_media').insert({
          center_id:  currentCenter.id,
          media_type: selectedType,
          photo_url:  path,
          caption:    '',
          sort_order: nextSort
        });

        done++;
        progressBar.style.width = Math.round(((i+1) / total) * 100) + '%';

      } catch(err) {
        uploadError.textContent = '업로드 실패: ' + (err.message || err);
      }
    }

    progressLabel.textContent = total + '장 중 ' + done + '장 완료';
    setTimeout(function(){
      uploadProgress.style.display = 'none';
    }, 2000);

    loadPhotos();
  }

  // ── 타입 탭 ──
  typeTabs.addEventListener('click', function(e){
    var tab = e.target.closest('.type-tab');
    if (!tab) return;
    typeTabs.querySelectorAll('.type-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    selectedType = tab.dataset.type;
  });

  // ── 드래그앤드롭 ──
  uploadZone.addEventListener('click', function(){ fileInput.click(); });
  fileInput.addEventListener('change', function(){ handleFiles(Array.from(fileInput.files)); fileInput.value=''; });
  uploadZone.addEventListener('dragover', function(e){ e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', function(){ uploadZone.classList.remove('drag-over'); });
  uploadZone.addEventListener('drop', function(e){
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files));
  });

  // ── 상담 목록 ──
  async function loadConsultations(centerId){
    var res = await client.from('consultations')
      .select('*')
      .eq('center_id', centerId)
      .order('created_at', { ascending: false });
    if (res.error || !res.data || res.data.length === 0){
      consultList.innerHTML = '';
      consultEmpty.hidden = false;
      return;
    }
    consultEmpty.hidden = true;
    consultList.innerHTML = res.data.map(function(row){
      var detailParts = [];
      if (row.wish_class) detailParts.push(row.wish_class);
      if (row.wish_time)  detailParts.push(row.wish_time);
      var when = new Date(row.created_at).toLocaleString('ko-KR');
      return '<li class="consult-item">' +
        '<div class="row1">' +
          '<span class="who">' + row.parent_name + ' · ' + row.phone + '</span>' +
          '<span class="kind">' + (KIND_LABELS[row.kind] || row.kind) + '</span>' +
        '</div>' +
        (detailParts.length ? '<div class="detail">' + detailParts.join(' · ') + '</div>' : '') +
        '<div class="when">' + when + '</div>' +
      '</li>';
    }).join('');
  }

  // ── 원 등록 신청 목록 ──
  var APP_STATUS_LABELS = { new:'신규', checked:'확인', contacted:'연락완료' };

  async function loadApplications(centerName){
    var res = await client.from('center_applications')
      .select('*')
      .eq('center_name', centerName)
      .order('consent_at', { ascending: false });

    if (res.error || !res.data || res.data.length === 0){
      appList.innerHTML = '';
      appEmpty.hidden = false;
      appCount.hidden = true;
      return;
    }

    appEmpty.hidden = true;

    // 신규 건수 배지
    var newCount = res.data.filter(function(r){ return !r.status || r.status === 'new'; }).length;
    if (newCount > 0){
      appCount.textContent = newCount;
      appCount.hidden = false;
    } else {
      appCount.hidden = true;
    }

    appList.innerHTML = res.data.map(function(row){
      var status  = row.status || 'new';
      var label   = APP_STATUS_LABELS[status] || status;
      var when    = new Date(row.consent_at).toLocaleString('ko-KR');
      var details = [];
      if (row.region)  details.push(row.region);
      if (row.phone)   details.push(row.phone);
      return '<li class="app-item" data-app-id="' + row.id + '">' +
        '<div class="row1">' +
          '<span class="who">' + (row.director_name || '이름 없음') + '</span>' +
          '<button class="app-status ' + status + '" data-app-id="' + row.id + '" data-status="' + status + '">' + label + '</button>' +
        '</div>' +
        (details.length ? '<div class="detail">' + details.join(' · ') + '</div>' : '') +
        (row.message ? '<div class="msg-text">' + row.message + '</div>' : '') +
        '<div class="when">' + when + '</div>' +
      '</li>';
    }).join('');

    // 상태 변경 버튼 이벤트
    appList.querySelectorAll('.app-status').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var appId  = btn.dataset.appId;
        var cur    = btn.dataset.status;
        var next   = cur === 'new' ? 'checked' : cur === 'checked' ? 'contacted' : 'new';
        btn.disabled = true;
        var upRes = await client.from('center_applications')
          .update({ status: next })
          .eq('id', appId);
        btn.disabled = false;
        if (!upRes.error) loadApplications(centerName);
      });
    });
  }

  // ── 인증 흐름 ──
  function showLoggedOut(){
    loginView.hidden = false;
    adminView.hidden = true;
    whoBox.hidden = true;
    centerLinks.hidden = true;
    loginForm.reset();
    loginError.textContent = '';
  }

  function showLoggedIn(session){
    loginView.hidden = true;
    adminView.hidden = false;
    whoBox.hidden = false;
    userEmailEl.textContent = session.user.email;
    loadCenter(session.user.id);
  }

  async function loadCenter(userId){
    saveStatus.textContent = '';
    var res = await client.from('centers').select('*').eq('owner_id', userId).single();
    if (res.error || !res.data){
      currentCenter = null;
      noCenter.hidden = false;
      centerPanel.hidden = true;
      photoSection.hidden = true;
      consultSection.hidden = true;
      appSection.hidden = true;
      centerLinks.hidden = true;
      return;
    }
    currentCenter = res.data;
    noCenter.hidden = true;
    centerPanel.hidden = false;

    var templateFile = TEMPLATE_FILES[currentCenter.template] || 'home.html';
    viewSiteBtn.onclick = function(){
      window.open(templateFile + '?slug=' + encodeURIComponent(currentCenter.slug), '_blank');
    };
    changeTemplateBtn.onclick = function(){
      location.href = 'template-select.html?slug=' + encodeURIComponent(currentCenter.slug) + '&auth=true';
    };
    centerLinks.hidden = false;
    document.getElementById('f-name').value    = currentCenter.name || '';
    document.getElementById('f-intro').value   = currentCenter.intro || '';
    document.getElementById('f-address').value = currentCenter.address || '';
    document.getElementById('f-hours').value   = currentCenter.operating_hours || '';

    photoSection.hidden = false;
    loadPhotos();

    consultSection.hidden = false;
    loadConsultations(currentCenter.id);

    appSection.hidden = false;
    loadApplications(currentCenter.name);
  }

  client.auth.onAuthStateChange(function(_event, session){
    if (session) showLoggedIn(session); else showLoggedOut();
  });

  client.auth.getSession().then(function(res){
    if (res.data.session) showLoggedIn(res.data.session); else showLoggedOut();
  });

  loginForm.addEventListener('submit', async function(e){
    e.preventDefault();
    loginError.textContent = '';
    var email    = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var res = await client.auth.signInWithPassword({ email:email, password:password });
    if (res.error){ loginError.textContent = '로그인에 실패했어요: ' + res.error.message; }
  });

  logoutBtn.addEventListener('click', async function(){ await client.auth.signOut(); });

  saveForm.addEventListener('submit', async function(e){
    e.preventDefault();
    if (!currentCenter) return;
    saveStatus.textContent = '저장 중...';
    var res = await client.from('centers').update({
      name:             document.getElementById('f-name').value,
      intro:            document.getElementById('f-intro').value,
      address:          document.getElementById('f-address').value,
      operating_hours:  document.getElementById('f-hours').value
    }).eq('id', currentCenter.id);
    saveStatus.className = res.error ? 'msg error' : 'msg ok';
    saveStatus.textContent = res.error ? ('저장 실패: ' + res.error.message) : '저장됐어요.';
  });

})();
</script>
</body>
</html>
