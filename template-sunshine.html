<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 햇살가득 어린이집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    /* 빛의 흐름: 스크롤에 따라 JS가 바꿔줌 */
    --sky-top:#FCE9D2;
    --sky-bottom:#FFF6EC;
    --sun-x:18%;
    --sun-y:22%;
    --sun-color:#FFE08A;
    --sun-glow:rgba(255,210,130,.55);
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
    --fs-hero:clamp(3rem,10vw,3.6rem);
    --fs-section-title:1.8rem;
    --fs-card-title:1.24rem;
    --fs-body:.98rem;
    --fs-caption:.9rem;
    --section-padding-default:72px 0 44px;
    --section-padding-tight:56px 0 36px;
    --section-padding-finale:84px 0 128px;
    --card-radius:20px;
    --card-radius-lg:22px;
    --card-shadow:0 16px 38px -22px rgba(120,80,60,.34);
    --card-shadow-hover:0 24px 48px -22px rgba(120,80,60,.46);
    --badge-bg:#FFF1EA;
    --badge-text:var(--coral-deep);
    --badge-border:#FFD7CB;
    --line-warm:#F1E2D8;
    --surface-pink:#FFF1EA;
    --surface-pink-soft:#FFF7F3;
    --status-warn:#D98A2B;
    --status-danger:#D85C57;

    /* ── T1 히어로 스크림 / 헤더 스크롤 / 원장 필 버튼 (M6.4~M6.5) ── */
    --topbar-bg-idle:rgba(255,255,255,.65);
    --topbar-bg-scrolled:rgba(255,255,255,.96);
    --topbar-blur-idle:8px;
    --topbar-blur-scrolled:10px;
    --topbar-text:var(--ink);
    --topbar-transition:background .35s ease,box-shadow .35s ease,backdrop-filter .35s ease;

    --hero-scrim-start:rgba(60,32,20,.72);
    --hero-scrim-mid:rgba(70,40,24,.32);
    --hero-scrim-end:rgba(80,46,28,0);

    --cloud-btn-bg:rgba(255,255,255,.92);
    --cloud-btn-text:var(--coral-deep);
    --cloud-btn-border:var(--badge-border);

    --day-frame-ratio:4/3;
    --day-frame-max-height:420px;

    --hero-glow-size:min(70vw,520px);
    --hero-glow-blur:60px;
    --hero-glow-duration:7s;

    --day-card-bg:var(--surface-pink-soft);
    --day-card-border:var(--badge-border);
    --day-text-gap:24px;

    --hero-fade-height:34%;
    --hero-glow-color:rgba(255,232,170,.5);
    --hero-text-shadow:0 2px 4px rgba(40,24,14,.5),0 8px 20px rgba(40,24,14,.4);
    --hero-text-stroke-width:.4px;

    --cloud-float-duration:3.6s;

    --day-badge-icon-size:14px;

    --mobile-side-padding:22px;
    --day-cloud-tail-size:18px;
  }

  @media (max-width:480px){
    :root{ --mobile-side-padding:20px; }
  }

  /* ── T2 차분한 내추럴 ── */
  [data-theme="natural"]{
    --cream:#F4F0E8;
    --ink:#2E2A1E;
    --ink-soft:#6B6347;
    --coral:#7EA86A;
    --coral-deep:#5C8A47;
    --sage:#A89060;
    --sky-top:#E8EFE0;
    --sky-bottom:#F4F0E8;
    --sun-color:#C8D89A;
    --sun-glow:rgba(160,200,120,.45);
  }
  [data-theme="natural"] .hero .eyebrow,
  [data-theme="natural"] .hero h1 .glow{ color:#5C8A47 }
  [data-theme="natural"] .cloud-link:hover{ color:#5C8A47 }
  [data-theme="natural"] .btn-big{ background:#7EA86A;box-shadow:0 16px 34px -10px #5C8A47 }
  [data-theme="natural"] .float a{ background:#3D5C2E }
  [data-theme="natural"] .float a .pulse{ background:#7EA86A;box-shadow:0 0 0 0 rgba(126,168,106,.6) }
  [data-theme="natural"] .menu-panel a.menu-cta{ background:#7EA86A }
  [data-theme="natural"] .tag-event{ background:#7EA86A }
  [data-theme="natural"] .day-cell.ev{ background:#EBF2E4;color:#5C8A47 }
  [data-theme="natural"] .day-cell.ev::after{ background:#7EA86A }
  [data-theme="natural"] .event-list .e-date{ color:#5C8A47 }
  [data-theme="natural"] .more-link{ color:#5C8A47 }
  [data-theme="natural"] .faq-q .chev{ border-color:#7EA86A }
  [data-theme="natural"] .section-eyebrow{ color:#A89060 }
  [data-theme="natural"] .topbar{ background:rgba(244,240,232,.72) }
  [data-theme="natural"] .back{ background:linear-gradient(135deg,#7EA86A,#5C8A47) }
  [data-theme="natural"] .frame{ background:linear-gradient(135deg,#d4e8c4,#b8d4a0) }
  [data-theme="natural"] .frame.alt{ background:linear-gradient(135deg,#e8d4a0,#d4bc80) }
  [data-theme="natural"] .frame.alt2{ background:linear-gradient(135deg,#c4d4b0,#a8c090) }
  [data-theme="natural"] .csl-field input:focus,
  [data-theme="natural"] .csl-field select:focus{ border-color:#7EA86A }

  /* ── T3 밝고 활기찬 ── */
  [data-theme="vivid"]{
    --cream:#F0F8FF;
    --ink:#1A2E3A;
    --ink-soft:#4A6070;
    --coral:#FF6B35;
    --coral-deep:#E8501A;
    --sage:#4AABCC;
    --sky-top:#C8E8F8;
    --sky-bottom:#F0F8FF;
    --sun-color:#FFE040;
    --sun-glow:rgba(255,210,60,.55);
  }
  [data-theme="vivid"] .hero .eyebrow,
  [data-theme="vivid"] .hero h1 .glow{ color:#E8501A }
  [data-theme="vivid"] .cloud-link:hover{ color:#E8501A }
  [data-theme="vivid"] .btn-big{ background:#FF6B35;box-shadow:0 16px 34px -10px #E8501A }
  [data-theme="vivid"] .float a{ background:#1A2E3A }
  [data-theme="vivid"] .float a .pulse{ background:#FF6B35;box-shadow:0 0 0 0 rgba(255,107,53,.6) }
  [data-theme="vivid"] .menu-panel a.menu-cta{ background:#FF6B35 }
  [data-theme="vivid"] .tag-event{ background:#FF6B35 }
  [data-theme="vivid"] .day-cell.ev{ background:#FFF0E8;color:#E8501A }
  [data-theme="vivid"] .day-cell.ev::after{ background:#FF6B35 }
  [data-theme="vivid"] .event-list .e-date{ color:#E8501A }
  [data-theme="vivid"] .more-link{ color:#E8501A }
  [data-theme="vivid"] .faq-q .chev{ border-color:#FF6B35 }
  [data-theme="vivid"] .section-eyebrow{ color:#4AABCC }
  [data-theme="vivid"] .topbar{ background:rgba(240,248,255,.72) }
  [data-theme="vivid"] .back{ background:linear-gradient(135deg,#FF6B35,#E8501A) }
  [data-theme="vivid"] .frame{ background:linear-gradient(135deg,#C8E8F8,#A0D4F0) }
  [data-theme="vivid"] .frame.alt{ background:linear-gradient(135deg,#FFE0A0,#FFD070) }
  [data-theme="vivid"] .frame.alt2{ background:linear-gradient(135deg,#C8F0D8,#A0E0BC) }
  [data-theme="vivid"] .csl-field input:focus,
  [data-theme="vivid"] .csl-field select:focus{ border-color:#FF6B35 }

  /* ── T4 모던 미니멀 ── */
  [data-theme="minimal"]{
    --cream:#F7F7F5;
    --ink:#1A1A1A;
    --ink-soft:#666660;
    --coral:#2B4C8C;
    --coral-deep:#1A3470;
    --sage:#8C8C8A;
    --sky-top:#E8E8E4;
    --sky-bottom:#F7F7F5;
    --sun-color:#D4D4CC;
    --sun-glow:rgba(180,180,170,.35);
  }
  [data-theme="minimal"] .hero .eyebrow,
  [data-theme="minimal"] .hero h1 .glow{ color:#1A3470 }
  [data-theme="minimal"] .cloud-link:hover{ color:#1A3470 }
  [data-theme="minimal"] .btn-big{ background:#2B4C8C;box-shadow:0 16px 34px -10px #1A3470 }
  [data-theme="minimal"] .float a{ background:#1A1A1A }
  [data-theme="minimal"] .float a .pulse{ background:#2B4C8C;box-shadow:0 0 0 0 rgba(43,76,140,.6) }
  [data-theme="minimal"] .menu-panel a.menu-cta{ background:#2B4C8C }
  [data-theme="minimal"] .tag-event{ background:#2B4C8C }
  [data-theme="minimal"] .day-cell.ev{ background:#E8EEF8;color:#1A3470 }
  [data-theme="minimal"] .day-cell.ev::after{ background:#2B4C8C }
  [data-theme="minimal"] .event-list .e-date{ color:#1A3470 }
  [data-theme="minimal"] .more-link{ color:#1A3470 }
  [data-theme="minimal"] .faq-q .chev{ border-color:#2B4C8C }
  [data-theme="minimal"] .section-eyebrow{ color:#8C8C8A }
  [data-theme="minimal"] .topbar{ background:rgba(247,247,245,.82) }
  [data-theme="minimal"] .back{ background:linear-gradient(135deg,#2B4C8C,#1A3470) }
  [data-theme="minimal"] .frame{ background:linear-gradient(135deg,#D8D8D4,#C4C4C0) }
  [data-theme="minimal"] .frame.alt{ background:linear-gradient(135deg,#D4D8E4,#B8C0D4) }
  [data-theme="minimal"] .frame.alt2{ background:linear-gradient(135deg,#D8E4D4,#C0D4BC) }
  [data-theme="minimal"] .csl-field input:focus,
  [data-theme="minimal"] .csl-field select:focus{ border-color:#2B4C8C }
  [data-theme="minimal"] .cloud-link{ filter:drop-shadow(0 6px 10px rgba(0,0,0,.12)) }
  [data-theme="minimal"] .sun{ opacity:0.3 }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    overflow-x:hidden;
    font-size:var(--fs-body);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 빛 배경 레이어 ── */
  .sky{
    position:fixed;inset:0;z-index:-2;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%);
    transition:background 1.2s ease;
  }
  .sun{
    position:fixed;z-index:-1;
    width:170px;height:170px;border-radius:50%;
    left:var(--sun-x);top:var(--sun-y);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 50%,var(--sun-color) 0%,var(--sun-color) 38%,transparent 70%);
    box-shadow:0 0 90px 50px var(--sun-glow);
    transition:left 1.4s ease,top 1.4s ease,background 1.4s ease,box-shadow 1.4s ease;
    pointer-events:none;
  }
  .cloud{
    position:fixed;z-index:-1;pointer-events:none;
    color:#fff;opacity:.7;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.04));
    transition:opacity 1.2s ease;
  }
  .cloud svg{display:block}

  /* ── 상단 메뉴바 — 기본부터 반투명 흰 배경, 스크롤 시 완전 불투명으로 전환. 텍스트는 항상 어두운 색 고정 ── */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:40;padding:12px 0;background:var(--topbar-bg-idle);backdrop-filter:blur(var(--topbar-blur-idle));-webkit-backdrop-filter:blur(var(--topbar-blur-idle));box-shadow:0 1px 0 rgba(180,140,110,.08);transition:var(--topbar-transition)}
  .topbar.scrolled{background:var(--topbar-bg-scrolled);backdrop-filter:blur(var(--topbar-blur-scrolled));-webkit-backdrop-filter:blur(var(--topbar-blur-scrolled));box-shadow:0 1px 0 rgba(180,140,110,.12)}
  .topbar .brand{font-family:var(--display);font-size:var(--fs-card-title);color:var(--topbar-text);text-decoration:none;letter-spacing:-.5px}
  .menu-btn{visibility:hidden;width:40px;height:40px;border:none;background:transparent;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;border-radius:10px}
  .menu-btn span{width:22px;height:2.5px;background:var(--ink);border-radius:2px;transition:transform .3s ease,opacity .3s ease}
  .menu-btn.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .menu-btn.open span:nth-child(2){opacity:0}
  .menu-btn.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .menu-panel{position:fixed;top:62px;right:14px;left:14px;z-index:41;background:var(--paper);border-radius:var(--card-radius);box-shadow:var(--card-shadow-hover);padding:10px;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(-10px);transition:opacity .3s ease,transform .3s ease,visibility .3s}
  .menu-panel.open{opacity:1;visibility:visible;transform:none}
  .menu-panel a{padding:14px 16px;text-decoration:none;color:var(--ink);font-weight:600;border-radius:12px;font-size:1rem}
  .menu-panel a:hover{background:var(--cream)}
  .menu-panel a.menu-cta{background:var(--coral);color:#fff;text-align:center;margin-top:6px}

  /* ── 공통 ── */
  .wrap{max-width:560px;margin:0 auto;padding:0 var(--mobile-side-padding);position:relative}
  .reveal{opacity:0;transform:translateY(34px);transition:opacity .9s ease,transform .9s cubic-bezier(.22,.9,.3,1)}
  .reveal.in{opacity:1;transform:none}

  /* ── 히어로 ── */
  .hero{min-height:78vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:8vh var(--mobile-side-padding) 4vh;position:relative;overflow:hidden}
  .hero>*{position:relative;z-index:2}
  .hero .hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
  .hero .hero-bg img{width:100%;height:100%;object-fit:cover;display:block}
  /* 히어로 이미지 오버레이 — 텍스트가 위치한 하단에서부터 어두운 웜톤 스크림이 위로 퍼지는 형태.
     사진이 완전히 가려지지 않도록 상단 30%는 스크림이 거의 없게 유지. */
  .hero-bg::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
      0deg,
      var(--hero-scrim-start) 0%,
      var(--hero-scrim-mid) 45%,
      var(--hero-scrim-end) 75%
    );
    z-index:1;
  }
  .hero-bg img{position:relative;z-index:0}
  /* 히어로 → 다음 섹션 배경색으로 이어지는 하단 페이드. --hero-scrim-*(텍스트 가독성용)와는 별도 레이어. */
  .hero::after{
    content:'';
    position:absolute;left:0;right:0;bottom:0;
    height:var(--hero-fade-height);
    z-index:1;pointer-events:none;
    background:linear-gradient(to bottom,transparent,var(--cream));
  }
  /* 히어로 텍스트 색상 — 사진 있을 때만 */
  .hero.has-photo .eyebrow{ color:#FFD9A0; }
  .hero.has-photo h1{ color:#FFFCF6; }
  .hero.has-photo h1 .glow{ color:#FFD9A0; }
  .hero.has-photo p{ color:rgba(255,250,240,.92); }
  /* 햇살 빛줄기 — 사진 없을 때(폴백)만 적용. 사진 있을 때는 .hero-bg::after가
     텍스트 가독성용 어둡게 처리를 전담하므로, 이 웜톤 오버레이가 위에 겹쳐 가독성을 깎지 않게 분리. */
  .hero:not(.has-photo)::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(160deg,rgba(255,220,100,.35) 0%,transparent 40%),linear-gradient(175deg,rgba(255,200,80,.2) 10%,transparent 50%),linear-gradient(155deg,rgba(255,230,120,.25) 5%,transparent 35%)}
  /* 하단 페이드(.hero::after)는 사진 유무 공통으로 위에서 정의됨 */
  .hero .eyebrow{font-family:var(--hand);font-size:1.35rem;color:var(--coral-deep);letter-spacing:.5px;margin-bottom:10px;font-weight:700}
  .hero h1{font-family:var(--display);font-size:var(--fs-hero);font-weight:400;line-height:1.18;letter-spacing:-1px}
  .hero h1 .glow{color:var(--coral-deep)}
  .hero p{margin-top:20px;font-size:var(--fs-body);color:var(--ink-soft);max-width:340px}
  /* 사진 위 텍스트 가독성 — 반투명 카드 대신 다중 text-shadow + 얇은 text-stroke로 대비 확보.
     배경 사진을 가리지 않으면서 텍스트 자체의 윤곽을 또렷하게 만든다. */
  .hero.has-photo .eyebrow,
  .hero.has-photo h1,
  .hero.has-photo p{
    text-shadow:var(--hero-text-shadow);
  }
  .hero.has-photo h1{
    -webkit-text-stroke:var(--hero-text-stroke-width) rgba(60,32,20,.35);
  }

  /* ── 히어로 빛 번짐 (시그니처 "하루의 빛") — 텍스트(z-index:2)보다 아래, 스크림(z-index:1)보다 위.
     회전 없는 고정 원형 radial-gradient + blur. 아주 미세한 밝기 변화만 유지. ── */
  .hero-glow{
    position:absolute;top:42%;left:50%;
    width:var(--hero-glow-size);aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    z-index:1;pointer-events:none;
    border-radius:50%;
    background:radial-gradient(circle,var(--hero-glow-color) 0%,rgba(255,224,150,.22) 45%,transparent 72%);
    filter:blur(var(--hero-glow-blur));
    animation:hero-glow-breathe var(--hero-glow-duration) ease-in-out infinite;
  }
  .hero:not(.has-photo) .hero-glow{--hero-glow-color:rgba(255,190,110,.4)}
  @keyframes hero-glow-breathe{0%,100%{opacity:.9}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .hero-glow{animation:none;opacity:1}
  }
  .cloud-menu{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:42px;max-width:430px;margin-left:auto;margin-right:auto}
  .cloud-link{position:relative;background:#fff;color:var(--ink-soft);font-weight:700;font-size:var(--fs-caption);text-decoration:none;padding:14px 22px;border-radius:30px;filter:drop-shadow(0 10px 14px rgba(180,140,110,.32));display:inline-block;animation:cloud-float var(--cloud-float-duration) ease-in-out infinite;animation-delay:var(--cloud-float-delay,0s)}
  .cloud-link::before,.cloud-link::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud-link::before{width:24px;height:24px;top:-10px;left:24%}
  .cloud-link::after{width:34px;height:34px;top:-15px;right:22%}
  .cloud-link:hover,.cloud-link:focus-visible{color:var(--coral-deep)}
  @keyframes cloud-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @media (prefers-reduced-motion:reduce){
    .cloud-link{animation:none}
  }
  .scroll-cue{margin-top:46px;font-family:var(--hand);font-size:1.05rem;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:8px}
  .scroll-cue .dot{width:26px;height:42px;border:2px solid var(--coral);border-radius:14px;position:relative}
  .scroll-cue .dot::after{content:"";position:absolute;left:50%;top:8px;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translateX(-50%);animation:drop 1.6s infinite}
  @keyframes drop{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}80%{opacity:0;transform:translate(-50%,16px)}100%{opacity:0}}

  /* ── 원장 인사 섹션 CSS 제거됨 — "우리 원 스토리" 책 페이지(.sb-director)로 통합.
     책 페이지 스타일은 아래 .sb-director 규칙에서 정의한다. ── */

  /* ── 하루 스토리: 동화책(storybook) ──
     moment 1개 = 책 페이지 1장. 표지 → 스토리 → 마무리 순으로 넘겨보는 인터랙티브 책.
     mockup-storybook-page.html에서 확정된 디자인을 sunshine 공통 토큰과 통합.
     데이터 구조(day_story)·라우팅은 불변, 렌더링 방식만 동화책으로 교체. */
  .day{
    /* .wrap의 max-width(560)/좌우 패딩을 벗어나 책이 넉넉히 펼쳐지도록 재정의 */
    max-width:960px;
    padding:var(--section-padding-tight);
    --page-paper:#FFFDFA;
    --page-line:#EBDFD4;
    --sb-lavender-deep:#D6C7EC;
    --fs-story-title:clamp(1.5rem,5vw,2rem);
  }
  .day .section-eyebrow{text-align:center}
  .day .day-head-title{
    font-family:var(--display);font-size:var(--fs-section-title);
    text-align:center;margin:6px 0 26px;letter-spacing:-.5px;
  }

  /* 책 펼침면 컨테이너: 한 화면 = 한 페이지 */
  .storybook{
    position:relative;width:100%;max-width:920px;margin:0 auto;
    aspect-ratio:16/10;max-height:min(78vh,660px);
  }
  /* 책장 두께(뒤에 겹친 페이지) 그림자 */
  .storybook::before,.storybook::after{
    content:"";position:absolute;inset:0;border-radius:22px;
    background:var(--page-paper);box-shadow:var(--card-shadow);
  }
  .storybook::before{transform:rotate(-1.4deg) translateY(6px);opacity:.5}
  .storybook::after{transform:rotate(.9deg) translateY(3px);opacity:.7}

  /* 페이지 트랙: 모든 sb-page를 겹쳐 두고 활성 페이지만 보인다 */
  .sb-stage{position:absolute;inset:0;z-index:2;overflow:hidden;border-radius:22px}

  .sb-page{
    position:absolute;inset:0;
    background:var(--page-paper);border-radius:22px;box-shadow:var(--card-shadow);
    padding:44px;display:grid;
    grid-template-columns:1fr 36px 1fr;align-items:center;overflow:hidden;
    /* 2D 플립: 활성 페이지만 보이고, JS가 scaleX 압축→교체→펼침으로 종이 넘김을 연출.
       기본은 숨김(비활성). 활성 페이지가 scaleX(1)로 펼쳐진 상태.
       box-shadow는 transform과 별개로 정적으로 유지 — filter를 쓰지 않으므로
       매 프레임 재도색(repaint) 없이 transform만 컴포지터에서 처리된다. */
    opacity:0;pointer-events:none;
    transform-origin:center center;
  }
  .sb-page.is-active{
    opacity:1;pointer-events:auto;
    transform:scaleX(1);
    /* 전체 전환 ~480ms의 절반씩(접힘 240ms / 펼침 240ms).
       will-change로 컴포지터 레이어를 미리 승격해 첫 프레임 버벅임을 줄인다. */
    transition:transform .24s cubic-bezier(.4,0,.6,1);
    will-change:transform;
  }
  /* 플립 중간(살짝 접힌) 상태 — JS가 순간적으로 토글. 압축 폭을 완화(.05→.45). */
  .storybook.sb-flipping .sb-page.is-active{
    transform:scaleX(.45);
  }
  /* 종이가 접히는 느낌의 은은한 명암 — filter:brightness 대신 opacity 오버레이로 구현.
     opacity는 transform과 함께 컴포지터에서만 처리되어 box-shadow 재도색을 유발하지 않는다. */
  .sb-page::before{
    content:"";position:absolute;inset:0;background:#000;border-radius:22px;
    opacity:0;pointer-events:none;transition:opacity .24s ease;will-change:opacity;
  }
  .storybook.sb-flipping .sb-page.is-active::before{opacity:.05}
  /* 안쪽 종이 점선 테두리 (동화책 프레임) */
  .sb-page::after{
    content:"";position:absolute;inset:16px;border:1.5px dashed var(--page-line);
    border-radius:16px;pointer-events:none;
  }

  /* 책갈피 리본 마스코트 — 텍스트 없이 새싹만 */
  .sb-bookmark{
    position:absolute;top:-8px;right:38px;z-index:4;width:40px;
    display:flex;align-items:center;justify-content:center;
    padding-top:12px;padding-bottom:18px;color:#fff;
    background:linear-gradient(180deg,var(--coral),var(--coral-deep));
    box-shadow:0 8px 16px -8px rgba(224,120,90,.7);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%);
    border-radius:3px 3px 0 0;
  }
  .sb-bookmark .m-icon{font-size:1.4rem;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}

  /* 사진(폴라로이드 액자) */
  .sb-photo{
    position:relative;z-index:1;width:100%;max-width:340px;justify-self:center;
    background:var(--paper);padding:12px 12px 14px;border-radius:6px;
    box-shadow:0 18px 34px -20px rgba(120,80,60,.5);transform:rotate(-1.5deg);
  }
  .sb-photo .pic{
    border-radius:4px;aspect-ratio:1/1;overflow:hidden;position:relative;
    background:linear-gradient(150deg,#ffe7d4,#ffd1bd 55%,var(--sb-lavender-deep));
    display:flex;align-items:flex-end;
  }
  .sb-photo .pic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .sb-photo .cap{
    position:relative;z-index:2;width:100%;padding:26px 16px 14px;
    background:linear-gradient(180deg,transparent,rgba(40,30,25,.5));
    color:#fff;font-family:var(--hand);font-size:1.15rem;line-height:1.4;
  }

  /* 책 펼침 중앙 접힘선 */
  .sb-fold{
    position:relative;align-self:stretch;z-index:1;
    background:linear-gradient(90deg,rgba(120,80,60,0) 0%,rgba(120,80,60,.05) 42%,
      rgba(120,80,60,.11) 50%,rgba(120,80,60,.05) 58%,rgba(120,80,60,0) 100%);
  }
  .sb-fold::before{
    content:"";position:absolute;top:6%;bottom:6%;left:50%;width:1px;
    background:linear-gradient(180deg,transparent,rgba(120,80,60,.16),transparent);
  }

  /* 텍스트 영역 */
  .sb-text{position:relative;z-index:1;padding:0 20px}
  .sb-text .time{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--hand);font-weight:700;font-size:var(--fs-caption);
    color:var(--badge-text);background:var(--badge-bg);border:1px solid var(--badge-border);
    border-radius:999px;padding:5px 14px;margin-bottom:16px;
  }
  .sb-text .time svg{width:15px;height:15px;flex:none}
  .sb-text .title{
    font-family:var(--display);font-size:var(--fs-story-title);
    line-height:1.28;letter-spacing:-.5px;margin-bottom:14px;
  }
  .sb-text .note{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.9}

  /* 표지 / 마무리 페이지: 단일 컬럼, 중앙 정렬 */
  .sb-page.sb-cover,.sb-page.sb-finale{
    grid-template-columns:1fr;text-align:center;justify-items:center;
    background:
      radial-gradient(120% 80% at 22% 12%, rgba(230,220,242,.7) 0%, transparent 55%),
      radial-gradient(120% 80% at 82% 90%, rgba(220,235,246,.7) 0%, transparent 55%),
      var(--page-paper);
  }
  .sb-cover .cover-eyebrow,.sb-finale .fin-eyebrow{
    font-family:var(--hand);font-size:1.15rem;color:var(--coral-deep);margin-bottom:6px;
  }
  .sb-cover .cover-title{
    font-family:var(--display);font-size:clamp(1.9rem,6vw,2.7rem);line-height:1.24;
    letter-spacing:-1px;margin-bottom:16px;
  }
  .sb-cover .cover-date{font-family:var(--hand);font-size:1.05rem;color:var(--ink-soft)}
  .sb-cover .cover-mascot,.sb-finale .fin-mascot{
    font-size:3.2rem;line-height:1;margin:28px 0 4px;
    filter:drop-shadow(0 8px 14px rgba(120,80,60,.28));
  }
  .sb-cover .cover-hint{
    margin-top:22px;font-family:var(--hand);font-size:var(--fs-caption);color:var(--ink-soft);opacity:.85;
  }
  .sb-finale .fin-title{
    font-family:var(--display);font-size:clamp(1.6rem,5vw,2.2rem);line-height:1.3;
    letter-spacing:-.5px;margin-bottom:14px;
  }
  .sb-finale .fin-text{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.8;max-width:360px}
  /* 통신문 연동 CTA 자리 — 이번엔 링크 없이 시각적 여백만 */
  .sb-finale .fin-cta-slot{
    margin-top:30px;min-height:52px;width:min(280px,80%);
    border:1.5px dashed var(--page-line);border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--hand);font-size:var(--fs-caption);color:var(--ink-soft);opacity:.7;
  }

  /* 원장 인사말 페이지: 원형 사진 + 이름/직함 + 인사말 + 더보기.
     스토리 페이지와 같은 폴라로이드+텍스트 톤을 유지하되, 사진만 원형으로. */
  .sb-director .sb-portrait{
    position:relative;z-index:1;justify-self:center;
    width:min(78%,220px);aspect-ratio:1/1;border-radius:50%;overflow:hidden;
    background:linear-gradient(135deg,#ffe7d4,#ffc4ac);
    box-shadow:0 0 0 10px rgba(255,255,255,.55),0 18px 34px -20px rgba(120,80,60,.5);
  }
  .sb-director .sb-portrait img{width:100%;height:100%;object-fit:cover;display:block}
  .sb-director .dir-badge{
    display:inline-block;font-family:var(--hand);font-weight:700;font-size:var(--fs-caption);
    color:var(--badge-text);background:var(--badge-bg);border:1px solid var(--badge-border);
    border-radius:999px;padding:5px 14px;margin-bottom:14px;
  }
  .sb-director .dir-sign{font-family:var(--body);font-size:var(--fs-caption);color:var(--ink-soft);line-height:1.4;margin-bottom:14px}
  .sb-director .dir-sign strong{display:block;font-family:var(--display);font-size:var(--fs-story-title);color:var(--ink);font-weight:400;letter-spacing:-.5px;margin-top:2px}
  .sb-director .dir-msg{font-family:var(--body);font-size:var(--fs-body);color:var(--ink-soft);line-height:1.85;margin-bottom:18px}
  .sb-director .dir-more{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    font-family:var(--body);font-weight:700;font-size:var(--fs-caption);
    color:var(--coral-deep);background:none;border:none;padding:0;
  }
  .sb-director .dir-more .btn-arrow{transition:transform .2s ease}
  .sb-director .dir-more:hover .btn-arrow{transform:translateX(3px)}

  /* 네비게이션: 원형 chevron 화살표 */
  .sb-arrow{
    width:48px;height:48px;border-radius:50%;border:1px solid var(--badge-border);cursor:pointer;
    background:linear-gradient(180deg,#fff,var(--badge-bg));
    box-shadow:0 10px 22px -10px rgba(224,120,90,.55),0 2px 5px -3px rgba(120,80,60,.3);
    color:var(--coral-deep);display:flex;align-items:center;justify-content:center;
    transition:background .2s ease,box-shadow .2s ease,transform .15s ease;
  }
  .sb-arrow svg{width:20px;height:20px;flex:none}
  .sb-arrow:hover{background:#fff;box-shadow:0 14px 28px -10px rgba(224,120,90,.6),0 2px 6px -3px rgba(120,80,60,.3);transform:scale(1.06)}
  .sb-arrow:active{transform:scale(.97)}
  .sb-arrow[disabled]{opacity:.35;cursor:default;box-shadow:none}
  .sb-arrow[disabled]:hover{transform:none;background:linear-gradient(180deg,#fff,var(--badge-bg))}

  /* 페이지 라벨: 스토리 페이지에만 "N번째 이야기 · 총 장수 중". 표지/마무리는 별도 표기 */
  .sb-label{
    position:absolute;left:34px;bottom:24px;z-index:3;
    display:flex;align-items:baseline;gap:7px;font-family:var(--hand);color:var(--ink-soft);
  }
  .sb-label .ord{font-size:1.05rem;color:var(--coral-deep)}
  .sb-label .total{font-size:.78rem;opacity:.75}

  .sb-dots{display:flex;gap:9px;z-index:5}
  .sb-dots button{
    width:10px;height:10px;padding:0;border:none;border-radius:50%;cursor:pointer;
    background:var(--sb-lavender-deep);
    transition:transform .2s ease,background .2s ease;
  }
  .sb-dots button.on{background:var(--coral);transform:scale(1.35)}

  /* 음소거 토글 (페이지 넘김 효과음) */
  .sb-mute{
    position:absolute;right:0;bottom:-38px;z-index:6;
    width:32px;height:32px;padding:0;border:none;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.85);color:var(--ink-soft);
    box-shadow:0 6px 14px -8px rgba(120,80,60,.5);
    display:flex;align-items:center;justify-content:center;
    transition:color .2s ease,background .2s ease;
  }
  .sb-mute:hover{background:#fff;color:var(--coral-deep)}
  .sb-mute svg{width:17px;height:17px}
  .sb-mute .icon-muted{display:none}
  .sb-mute.is-muted .icon-on{display:none}
  .sb-mute.is-muted .icon-muted{display:block}

  /* 데스크톱: 화살표는 책 좌우 가장자리에 절대배치, 점은 책 아래 중앙 */
  @media (min-width:720px){
    .sb-controls .sb-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6}
    .sb-controls .sb-arrow.prev{left:-14px}
    .sb-controls .sb-arrow.next{right:-14px}
    .sb-controls .sb-dots{position:absolute;left:50%;bottom:-30px;transform:translateX(-50%)}
  }
  /* 모바일: 세로 스택. 컨트롤은 책 아래 한 행으로 */
  @media (max-width:719px){
    .day{padding:var(--section-padding-tight) 0}
    .storybook{aspect-ratio:auto;max-height:none}
    .storybook::before,.storybook::after{display:none}
    .sb-stage{position:relative;inset:auto;overflow:visible}
    /* 모바일에선 각 페이지가 흐름에 참여하되, 비활성은 숨김.
       표지·원장·스토리·마무리 모두 같은 카드 폭(100%)과 동일한 최소 높이를 공유해
       페이지를 넘겨도 카드 크기가 들쭉날쭉하지 않게 통일한다. */
    .sb-page{position:relative;inset:auto;grid-template-columns:1fr;gap:22px;
      padding:28px var(--mobile-side-padding) 34px;display:none;
      min-height:min(560px,78vh);align-content:center}
    .sb-page.is-active{display:grid}
    .sb-fold{display:none}
    .sb-photo{transform:rotate(-1deg);max-width:300px;margin:0 auto}
    .sb-text{padding:0 var(--mobile-side-padding)}
    .sb-label{position:static;justify-content:center;margin-top:14px}
    .sb-controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:20px;position:relative}
    .sb-arrow{width:40px;height:40px}
    /* 모바일: 음소거 버튼을 컨트롤 행 오른쪽 끝에 */
    .sb-mute{position:absolute;right:8px;bottom:50%;transform:translateY(50%)}
  }
  /* prefers-reduced-motion: 플립 없이 단순 opacity 페이드만 */
  @media (prefers-reduced-motion: reduce){
    .sb-page.is-active{transition:opacity .2s ease;transform:none}
    .storybook.sb-flipping .sb-page.is-active{transform:none}
    .sb-page::before{transition:none}
    .storybook.sb-flipping .sb-page.is-active::before{opacity:0}
    .sb-arrow,.sb-dots button{transition:none}
  }

  /* ── 앨범 벽 ── */
  .album{padding:var(--section-padding-default);text-align:center}
  .section-eyebrow{font-family:var(--hand);font-size:1.2rem;color:var(--sage);font-weight:700}
  .section-title{font-family:var(--display);font-size:var(--fs-section-title);margin:6px 0 8px;letter-spacing:-.5px}
  .section-sub{color:var(--ink-soft);font-size:var(--fs-body);margin-bottom:34px}
  .polaroids{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .polaroid{
    background:var(--paper);padding:10px 10px 38px;border-radius:6px;
    box-shadow:var(--card-shadow);
    transition:transform .5s cubic-bezier(.22,.9,.3,1),box-shadow .4s ease;
    will-change:transform;
  }
  .polaroid .pic{border-radius:3px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:var(--fs-caption)}
  .polaroid .label{font-family:var(--hand);font-weight:700;font-size:var(--fs-body);margin-top:12px;color:var(--ink)}
  .polaroid:nth-child(1){transform:rotate(-3deg)}
  .polaroid:nth-child(2){transform:rotate(2.5deg);margin-top:22px}
  .polaroid:nth-child(3){transform:rotate(2deg)}
  .polaroid:nth-child(4){transform:rotate(-2.5deg);margin-top:-10px}
  .polaroid:nth-child(5){transform:rotate(-2deg)}
  .polaroid:nth-child(6){transform:rotate(3deg);margin-top:18px}
  .polaroid:hover,.polaroid:focus-within{transform:rotate(0) scale(1.04);box-shadow:var(--card-shadow-hover);z-index:2}
  .p1 .pic{background:linear-gradient(135deg,#ffd1bd,#ff9f86)}
  .p2 .pic{background:linear-gradient(135deg,#bfe0d2,#9CB89A)}
  .p3 .pic{background:linear-gradient(135deg,#ffe1a8,#ffc46b)}
  .p4 .pic{background:linear-gradient(135deg,#d6c7ec,#b59fe0)}
  .p5 .pic{background:linear-gradient(135deg,#a8d8e0,#7cc0cf)}
  .p6 .pic{background:linear-gradient(135deg,#ffc7c2,#ff9aa0)}

  /* ── 선생님 카드 플립 ── */
  .teachers{padding:var(--section-padding-default);text-align:center}
  .cards{display:flex;flex-direction:column;gap:18px;margin-top:30px}
  .flip{perspective:1200px;min-height:132px}
  .flip-inner{position:relative;width:100%;height:100%;min-height:inherit;transition:transform .7s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;cursor:pointer}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;min-height:inherit;backface-visibility:hidden;border-radius:var(--card-radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--card-shadow)}
  .front{background:var(--paper);flex-direction:row;justify-content:flex-start;align-items:center;text-align:left;gap:18px;padding:20px 24px}
  .front .t-info{flex:1;min-width:0}
  .front .avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#ffd1bd,#ff9f86);flex:none;margin:0}
  .cards .flip:nth-child(2) .front .avatar{background:linear-gradient(135deg,#bfe0d2,#9CB89A)}
  .cards .flip:nth-child(3) .front .avatar{background:linear-gradient(135deg,#ffe1a8,#ffc46b)}
  .front .name{font-family:var(--display);font-size:1.3rem}
  .front .role{color:var(--ink-soft);font-size:var(--fs-caption);margin-top:2px}
  .front .tap{font-family:var(--hand);color:var(--coral);font-size:var(--fs-caption);margin-top:8px;font-weight:700}
  .back{background:linear-gradient(135deg,var(--coral),var(--coral-deep));color:#fff;transform:rotateY(180deg);font-family:var(--hand);font-size:1.3rem;font-weight:700;line-height:1.5}

  /* ── 정보 메뉴 섹션 (공지/달력/FAQ) ── */
  [id]{scroll-margin-top:78px}
  .block{padding:var(--section-padding-tight);text-align:center}
  .block .panel{background:var(--paper);border-radius:var(--card-radius-lg);padding:22px;box-shadow:var(--card-shadow);text-align:left;margin-top:24px}

  .notice-list{list-style:none;text-align:left;margin-top:24px}
  .notice-item{display:flex;align-items:center;gap:14px;background:var(--paper);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--card-shadow)}
  .notice-item .tag{flex:none;font-size:.74rem;font-weight:700;padding:5px 10px;border-radius:30px;color:#fff}
  .tag-event{background:var(--coral)}
  .tag-info{background:var(--sage)}
  .tag-must{background:var(--status-warn)}
  .notice-item .n-title{font-weight:600;font-size:1rem;line-height:1.4}
  .notice-item .n-date{color:var(--ink-soft);font-size:.82rem;margin-top:3px}
  .more-link{display:inline-block;margin-top:8px;color:var(--coral-deep);font-weight:700;text-decoration:none;font-size:var(--fs-caption)}

  .cal{background:var(--paper);border-radius:var(--card-radius-lg);padding:20px 18px;box-shadow:var(--card-shadow);margin-top:24px}
  .cal-head{font-family:var(--display);font-size:var(--fs-card-title);margin-bottom:14px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-grid .dow{font-size:.78rem;color:var(--ink-soft);padding:6px 0;font-weight:600}
