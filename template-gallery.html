<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 갤러리 템플릿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --char:#2B2B2E;
    --char-soft:#5A5A60;
    --line:#E4E2DD;
    --paper:#FFFFFF;
    --bg:#F7F6F3;
    --bg-warm:#EFEDE8;
    --accent:#2B2B2E;
    --ink:#2B2B2E;
    --ink-soft:#75737A;

    --serif:'Noto Serif KR',serif;
    --body:'Pretendard',sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--bg);
    overflow-x:hidden;
    line-height:1.8;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 상단바: 얇고 미니멀 ── */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:40;padding:18px 0;background:rgba(247,246,243,.0);transition:background .4s ease,box-shadow .4s ease,padding .4s ease}
  .topbar.solid{background:rgba(247,246,243,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--line);padding:14px 0}
  .topbar .brand{font-family:var(--serif);font-weight:600;font-size:1.2rem;color:#fff;text-decoration:none;letter-spacing:.5px;transition:color .4s ease}
  .topbar.solid .brand{color:var(--char)}
  .menu-btn{visibility:hidden;width:40px;height:40px;border:none;background:transparent;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;cursor:pointer}
  .menu-btn span{width:24px;height:1.5px;background:#fff;transition:transform .3s ease,opacity .3s ease,background .4s ease}
  .menu-btn.solid span{background:var(--char)}
  .menu-btn.open span{background:var(--char)}
  .menu-btn.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .menu-btn.open span:nth-child(2){opacity:0}
  .menu-btn.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .menu-panel{position:fixed;top:60px;right:20px;left:20px;z-index:41;background:var(--paper);border:1px solid var(--line);box-shadow:0 24px 54px -20px rgba(43,43,46,.25);padding:10px;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(-10px);transition:opacity .3s ease,transform .3s ease,visibility .3s}
  .menu-panel.open{opacity:1;visibility:visible;transform:none}
  .menu-panel a{padding:14px 18px;text-decoration:none;color:var(--char);font-weight:500;font-size:.98rem;letter-spacing:.3px}
  .menu-panel a:hover{background:var(--bg)}
  .menu-panel a.menu-cta{background:var(--char);color:#fff;text-align:center;margin-top:6px}

  /* ── 공통 ── */
  .wrap{max-width:680px;margin:0 auto;padding:0 28px;position:relative}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity 1.1s ease,transform 1.1s cubic-bezier(.2,.7,.3,1)}
  .reveal.in{opacity:1;transform:none}

  .sec-label{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:12px}
  .sec-title{font-family:var(--serif);font-weight:600;font-size:1.9rem;color:var(--char);letter-spacing:-.3px;line-height:1.4}

  /* ── 1. 메인 배너: 풀스크린 ── */
  .banner{position:relative;height:100vh;min-height:560px;display:flex;align-items:flex-end;overflow:hidden}
  .banner .bg{position:absolute;inset:0;z-index:0}
  .banner .bg img{width:100%;height:100%;object-fit:cover;display:block}
  .banner .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,20,22,.28) 0%,transparent 32%,transparent 50%,rgba(20,20,22,.72) 100%)}
  .banner .bg.placeholder{background:linear-gradient(135deg,#3a3a40,#5a5a62)}
  .banner .content{position:relative;z-index:2;width:100%;max-width:680px;margin:0 auto;padding:0 28px 64px;color:#fff}
  .banner .eyebrow{font-size:.82rem;letter-spacing:3px;text-transform:uppercase;font-weight:600;opacity:.9;margin-bottom:18px}
  .banner h1{font-family:var(--serif);font-weight:600;font-size:clamp(2.6rem,9vw,3.6rem);line-height:1.25;letter-spacing:-.5px}
  .banner p{margin-top:18px;font-size:1.05rem;opacity:.92;max-width:420px;font-weight:300}
  /* 액자형 메뉴 버튼 (gallery 고유 — 모노톤·세련) */
  .banner .frame-menu{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
  .banner .frame-btn{font-size:.84rem;font-weight:600;letter-spacing:.5px;color:#fff;text-decoration:none;padding:10px 16px;border:1px solid rgba(255,255,255,.45);border-radius:8px;background:rgba(255,255,255,.08);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:background .2s ease,border-color .2s ease}
  .banner .frame-btn:hover{background:rgba(255,255,255,.2);border-color:#fff}

  /* ── 2. 갤러리 (앨범) — 가로 슬라이드 ── */
  .gallery{padding-top:90px;padding-bottom:70px}
  .gallery .sec-head{margin-bottom:36px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px}
  .gallery .g-count{font-family:var(--serif);font-size:.9rem;color:var(--ink-soft);white-space:nowrap}
  .gallery-rail{display:flex;gap:24px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:14px;scrollbar-width:thin}
  .gallery-rail::-webkit-scrollbar{height:4px}
  .gallery-rail::-webkit-scrollbar-track{background:var(--line)}
  .gallery-rail::-webkit-scrollbar-thumb{background:var(--char-soft)}
  .art{position:relative;flex:0 0 78%;max-width:420px;scroll-snap-align:center}
  .art .frame{overflow:hidden;background:var(--bg-warm);aspect-ratio:4/5}
  .art .frame img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1.2s cubic-bezier(.2,.7,.3,1)}
  .art:hover .frame img{transform:scale(1.03)}
  .art .meta{display:flex;align-items:baseline;gap:14px;margin-top:14px}
  .art .meta .no{font-family:var(--serif);font-size:.9rem;color:var(--ink-soft)}
  .art .meta .cap{font-family:var(--serif);font-size:1.1rem;color:var(--char)}
  .art .meta .line{flex:1;height:1px;background:var(--line)}
  .gallery-hint{margin-top:18px;font-size:.8rem;color:var(--ink-soft);letter-spacing:.5px;text-align:center}
  .gallery-hint .arrow{display:inline-block;margin:0 4px}

  /* ── 3. 우리 원 둘러보기 ── */
  .tour{padding-top:70px;padding-bottom:70px}
  .tour .sec-head{margin-bottom:40px}
  .space{margin-bottom:60px}
  .space:last-child{margin-bottom:0}
  .space .frame{overflow:hidden;background:var(--bg-warm);aspect-ratio:3/2}
  .space .frame img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1.2s cubic-bezier(.2,.7,.3,1)}
  .space:hover .frame img{transform:scale(1.03)}
  .space .frame.placeholder{background:linear-gradient(135deg,#d8d6d0,#c4c2bc)}
  .space .info{margin-top:20px}
  .space .info .idx{font-family:var(--serif);font-size:.85rem;color:var(--ink-soft);letter-spacing:1px}
  .space .info h3{font-family:var(--serif);font-weight:600;font-size:1.5rem;color:var(--char);margin:6px 0 10px;letter-spacing:-.3px}
  .space .info p{color:var(--char-soft);font-size:.98rem;line-height:1.75;max-width:480px;font-weight:300}

  /* ── 4. 우리 원 선생님 ── */
  .staff{padding-top:70px;padding-bottom:70px}
  .staff .sec-head{margin-bottom:40px}
  .staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px 24px}
  .person{text-align:left}
  .person .portrait{aspect-ratio:3/4;overflow:hidden;background:var(--bg-warm);margin-bottom:14px}
  .person .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(.3);transition:filter .6s ease,transform 1.1s cubic-bezier(.2,.7,.3,1)}
  .person:hover .portrait img{filter:grayscale(0);transform:scale(1.03)}
  .person .name{font-family:var(--serif);font-weight:600;font-size:1.15rem;color:var(--char)}
  .person .role{font-size:.85rem;color:var(--ink-soft);margin-top:2px;letter-spacing:.3px}
  .person .msg{font-size:.9rem;color:var(--char-soft);margin-top:10px;line-height:1.65;font-weight:300;font-style:italic;font-family:var(--serif)}

  /* ── 5. 원장 한마디 ── */
  .director{padding-top:90px;padding-bottom:90px;text-align:center}
  .director .quote-mark{font-family:var(--serif);font-size:3.5rem;color:var(--line);line-height:.6;margin-bottom:10px}
  .director .msg{font-family:var(--serif);font-weight:400;font-size:1.5rem;line-height:1.9;color:var(--char);max-width:520px;margin:0 auto;letter-spacing:-.2px;white-space:pre-line}
  .director .who{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:36px}
  .director .who .portrait{width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--bg-warm)}
  .director .who .portrait img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(.3)}
  .director .who .name{font-size:.9rem;color:var(--ink-soft);letter-spacing:.5px}
  .director .who .name strong{display:block;font-family:var(--serif);font-weight:600;font-size:1.05rem;color:var(--char);margin-top:2px}

  /* ── 6. 안내 (공지·일정·FAQ) ── */
  .info-desk{padding-top:70px;padding-bottom:40px}
  .info-desk .sec-head{margin-bottom:34px}
  .info-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:30px}
  .info-tab{padding:12px 22px;border:none;background:transparent;color:var(--ink-soft);font-family:var(--body);font-size:.96rem;font-weight:600;cursor:pointer;position:relative;letter-spacing:.3px;transition:color .25s}
  .info-tab.active{color:var(--char)}
  .info-tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--char)}
  .info-panel{display:none}
  .info-panel.active{display:block;animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .notice-list{list-style:none}
  .notice-item{display:flex;align-items:baseline;gap:16px;padding:18px 2px;border-bottom:1px solid var(--line)}
  .notice-item .tag{flex:none;font-size:.72rem;font-weight:600;letter-spacing:.5px;color:var(--char);min-width:46px}
  .notice-item .n-title{flex:1;font-weight:500;font-size:1rem;color:var(--char)}
  .notice-item .n-date{color:var(--ink-soft);font-size:.82rem;font-family:var(--serif)}
  .more-link{display:inline-block;margin-top:18px;color:var(--char);font-weight:600;text-decoration:none;font-size:.9rem;border-bottom:1px solid var(--char);padding-bottom:2px}

  .cal{border:1px solid var(--line);padding:24px 22px}
  .cal-head{font-family:var(--serif);font-weight:600;font-size:1.2rem;margin-bottom:16px;color:var(--char)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-grid .dow{font-size:.75rem;color:var(--ink-soft);padding:6px 0;font-weight:600;text-align:center}
  .day-cell{position:relative;padding:11px 0;font-size:.88rem;text-align:center;color:var(--char)}
  .day-cell.muted{color:var(--line)}
  .day-cell.ev{font-weight:700;color:var(--char)}
  .day-cell.ev::after{content:"";position:absolute;left:50%;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--char);transform:translateX(-50%)}
  .event-list{list-style:none;margin-top:20px}
  .event-list li{display:flex;align-items:baseline;gap:14px;padding:12px 2px;border-bottom:1px solid var(--line);font-size:.95rem}
  .event-list li:last-child{border-bottom:none}
  .event-list .e-date{font-weight:600;color:var(--char);font-size:.84rem;min-width:46px;font-family:var(--serif)}

  .faq-item{border-bottom:1px solid var(--line)}
  .faq-q{width:100%;border:none;background:transparent;text-align:left;padding:20px 2px;font-size:1rem;font-weight:500;color:var(--char);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:var(--body)}
  .faq-q .sign{flex:none;font-family:var(--serif);font-size:1.3rem;color:var(--ink-soft);transition:transform .35s ease;line-height:1}
  .faq-item.open .faq-q .sign{transform:rotate(45deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .faq-a p{padding:0 2px 20px;color:var(--char-soft);font-size:.94rem;line-height:1.8;font-weight:300}

  /* ── 7. 마무리 ── */
  .finale{padding-top:100px;padding-bottom:150px;text-align:center}
  .finale .quote-mark{font-family:var(--serif);font-size:2.5rem;color:var(--line);line-height:.6;margin-bottom:14px}
  .finale h2{font-family:var(--serif);font-weight:600;font-size:2rem;line-height:1.5;letter-spacing:-.3px;color:var(--char)}
  .finale p{color:var(--char-soft);margin:18px 0 40px;font-size:1rem;font-weight:300}
  .btn-big{display:inline-block;background:var(--char);color:#fff;font-weight:500;font-size:1rem;padding:18px 50px;text-decoration:none;letter-spacing:.5px;transition:opacity .3s ease,transform .3s ease;border:none;cursor:pointer;font-family:var(--body)}
  .btn-big:hover{opacity:.85;transform:translateY(-2px)}

  /* ── 플로팅 ── */
  .float{position:fixed;right:24px;bottom:24px;z-index:30;transform:translateY(120px);transition:transform .5s cubic-bezier(.22,.9,.3,1)}
  .float.show{transform:translateY(0)}
  .float.hide{transform:translateY(120px)}
  .float a{display:flex;align-items:center;gap:9px;background:var(--char);color:#fff;font-weight:500;padding:15px 26px;text-decoration:none;box-shadow:0 12px 30px -8px rgba(43,43,46,.5);font-size:.94rem;letter-spacing:.3px}
  .float a .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── 모달 ── */
  .csl-overlay{position:fixed;inset:0;z-index:50;background:rgba(20,20,22,.55);display:none;align-items:center;justify-content:center;padding:20px}
  .csl-overlay.open{display:flex}
  .csl-panel{position:relative;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;background:var(--paper);padding:38px 32px 32px}
  .csl-close{position:absolute;top:18px;right:18px;width:34px;height:34px;border:none;background:transparent;font-size:1.4rem;line-height:1;color:var(--ink-soft);cursor:pointer}
  .csl-title{font-family:var(--serif);font-weight:600;font-size:1.4rem;margin-bottom:6px;color:var(--char)}
  .csl-sub{font-size:.85rem;color:var(--ink-soft);margin-bottom:24px}
  .csl-field{margin-bottom:18px;text-align:left}
  .csl-field label{display:block;font-size:.8rem;font-weight:600;color:var(--char-soft);margin-bottom:7px;letter-spacing:.3px}
  .csl-field input[type=text],.csl-field input[type=tel],.csl-field select{
    width:100%;border:none;border-bottom:1.5px solid var(--line);border-radius:0;padding:10px 2px;
    font-family:var(--body);font-size:.96rem;color:var(--char);background:transparent;outline:none;transition:border-color .25s;
  }
  .csl-field input:focus,.csl-field select:focus{border-color:var(--char)}
  .csl-consent label{display:flex;align-items:flex-start;gap:8px;font-size:.82rem;font-weight:400;color:var(--char-soft);line-height:1.5}
  .csl-consent input{margin-top:3px;flex:none}
  .csl-submit{width:100%;margin-top:10px}
  .csl-msg.error{margin-top:12px;font-size:.84rem;color:#B0413E;text-align:center}
  .csl-done{text-align:center;font-family:var(--serif);font-size:1.3rem;color:var(--char);padding:36px 0;line-height:1.8}

  footer{text-align:center;padding:40px 28px 50px;color:var(--ink-soft);font-size:.8rem;border-top:1px solid var(--line)}
  footer .demo-tag{display:inline-block;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px}

  a:focus-visible,.info-tab:focus-visible{outline:2px solid var(--char);outline-offset:3px}

  @media (max-width:480px){
    .staff-grid{grid-template-columns:1fr 1fr;gap:20px 16px}
    .art:nth-child(even),.art:nth-child(odd){padding-left:0;padding-right:0}
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;scroll-behavior:auto!important}
    .reveal{opacity:1;transform:none}
  }

  .preview-banner{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:55;background:rgba(38,37,36,.94);color:#fff;border-radius:999px;padding:9px 16px;font-size:.84rem;font-weight:800;box-shadow:0 14px 34px -18px rgba(25,25,25,.5)}
  .preview-banner[hidden]{display:none}

</style>
</head>
<body>

<!-- topbar.js가 nav(brand+홈아이콘+이 메뉴버튼)를 만들어 body 최상단에 삽입 -->
<button class="menu-btn" id="menuBtn" aria-label="메뉴 열기" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div class="menu-panel" id="menuPanel"></div>
<div class="preview-banner" id="previewBanner" hidden>템플릿 미리보기</div>
<span id="top"></span>

<header class="banner" id="banner"></header>
<section class="director wrap" id="greeting"></section>
<section class="overview wrap" id="overviewSec"></section>
<section class="gallery wrap" id="day"></section>
<section class="facilities wrap" id="facilitiesSec"></section>
<section class="staff wrap" id="teachersSec"></section>
<section class="programs wrap" id="programSec"></section>
<section class="info-desk wrap" id="faq"></section>
<section class="info-block wrap" id="admissionsSec" hidden></section>
<section class="info-block wrap" id="directionsSec" hidden></section>
<section class="finale wrap" id="finale"></section>
<footer id="footerEl"></footer>

<div class="float" id="float" hidden><a href="#finale"><span class="dot"></span>입소 상담</a></div>

<button type="button" class="ask-fab" id="askFab" aria-label="무엇이든 물어보세요" title="무엇이든 물어보세요">?</button>

<div class="ask-modal-overlay" id="askModal" aria-hidden="true">
  <div class="ask-modal-panel" role="dialog" aria-modal="true" aria-labelledby="askModalTitle">
    <div class="ask-modal-header">
      <h3 class="ask-modal-title" id="askModalTitle">무엇이든 물어보세요</h3>
      <button type="button" class="ask-modal-close" id="askModalClose" aria-label="닫기">×</button>
    </div>
    <div class="ask-modal-body">
      <div class="ask-faq-list" id="askFaqList"></div>
      <p class="ask-empty" id="askFaqEmpty" hidden>궁금한 점은 상담으로 편하게 물어보세요.</p>
      <button type="button" class="ask-consult-btn" id="askConsultBtn">입소 상담</button>
    </div>
  </div>
</div>

<div class="csl-overlay" id="cslOverlay">
  <div class="csl-panel">
    <button type="button" class="csl-close" id="cslCloseBtn" aria-label="닫기">×</button>
    <div id="cslFormWrap">
      <h3 class="csl-title">입소 상담 신청</h3>
      <p class="csl-sub">편하게 남겨주시면 연락드릴게요.</p>
      <form id="cslForm">
        <div class="csl-field">
          <label for="csl-name">학부모 이름</label>
          <input type="text" id="csl-name" required>
        </div>
        <div class="csl-field">
          <label for="csl-phone">연락처</label>
          <input type="tel" id="csl-phone" placeholder="010-0000-0000" required>
        </div>
        <div class="csl-field">
          <label for="csl-kind">신청 종류</label>
          <select id="csl-kind" required>
            <option value="consult">상담</option>
            <option value="waiting">대기</option>
            <option value="info_session">설명회</option>
          </select>
        </div>
        <div class="csl-field">
          <label for="csl-class">희망 반</label>
          <select id="csl-class">
            <option value="">선택 안 함</option>
            <option value="만3세">만 3세</option>
            <option value="만4세">만 4세</option>
            <option value="만5세">만 5세</option>
          </select>
        </div>
        <div class="csl-field">
          <label for="csl-time">희망 시간</label>
          <input type="text" id="csl-time" placeholder="예: 평일 오후 2시">
        </div>
        <div class="csl-field csl-consent">
          <label>
            <input type="checkbox" id="csl-consent" required>

<script>
// 모든 렌더 함수(async IIFE, initInteractions 등)가 공유하는 escape 헬퍼.
// 최상단 스크립트 스코프에 둬야 initInteractions처럼 async IIFE 바깥에서 정의된
// 함수에서도 클로저로 접근할 수 있다.
const esc = (s) => {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};

function escWithBr(text){
  var normalized = (text || '').replace(/<br\s*\/?>/gi, '\n');
  return esc(normalized).replace(/\n/g, '<br>');
}

function heroTitleHtml(title, accent, accentClass){
  var titleHtml = escWithBr(title);
  var accentHtml = escWithBr(accent);
  if (!accentHtml) return titleHtml;
  var hasBreak = /<br\s*\/?>|\r?\n/i.test(title || '') || /^\s*(?:<br\s*\/?>|\r?\n)/i.test(accent || '');
  var joiner = hasBreak ? '' : (accentClass ? '<br>' : ' ');
  var cls = accentClass ? ' class="' + accentClass + '"' : '';
  return titleHtml + joiner + '<span' + cls + '>' + accentHtml + '</span>';
}

var SAMPLE_SPACES = [
  { name:'놀이방', desc:'블록과 역할놀이로 상상력이 자라는 우리 반의 공간입니다.', photo:null },
  { name:'바깥 놀이터', desc:'안전한 모래밭과 미끄럼틀에서 마음껏 뛰노는 시간.', photo:null },
  { name:'그림책 도서관', desc:'포근한 쿠션에 앉아 선생님과 그림책을 읽습니다.', photo:null },
  { name:'급식실', desc:'영양 가득한 식단을 친구들과 함께 나눕니다.', photo:null }
];

function mapRowToData(row){
  const media = row.center_media || [];
  const byType = (type) => {
    const seen = new Set();
    return media
      .filter(m => m.media_type === type)
      .sort((a,b) => a.sort_order - b.sort_order)
      .filter(m => { // DB에 중복 sort_order 행이 들어간 경우 방어 (같은 사진이 2번 보이는 문제)
        if (seen.has(m.sort_order)) return false;
        seen.add(m.sort_order);
        return true;
      });
  };
  const teacherFallbacks = [
    { name: '김햇살 선생님', role: '만 3세 햇살반 담임', message: '아이의 속도에 맞춰 기다려 줄게요.' },
    { name: '이초록 선생님', role: '만 4세 새싹반 담임', message: '매일의 작은 성장을 놓치지 않을게요.' },
    { name: '박노을 선생님', role: '만 5세 열매반 담임', message: '마음껏 궁금해하는 아이로 도울게요.' }
  ];
  const teacherItems = byType('teacher').map((m, i) => {
    const fallback = teacherFallbacks[i % teacherFallbacks.length];
    return {
      name: m.title || fallback.name,
      role: m.subtitle || fallback.role,
      photo: m.photo_url,
      message: m.caption || fallback.message
    };
  });
  const hero = byType('hero')[0] || null;
  return {
    center: {
      id: row.id, slug: row.slug, name: row.name, theme: row.theme,
      address: row.address, directions_text: row.directions_text,
      menu: row.menu || [],
      hero: row.hero || { eyebrow:'', title:'', title_accent:'', subtitle:'' },
      director: row.director || { badge:'', photo:'', photo_alt:'', message:'', sign_label:'', sign_name:'', scroll_cue:'' },
      philosophy: row.philosophy || null,
      programs: row.programs || null,
      facilities: row.facilities || null
    },
    heroPhoto: hero ? hero.photo_url : null,
    album: { items: byType('album').map(m => ({ label: m.title, photo: m.photo_url })) },
    teachers: { items: teacherItems },
    notices: row.notices || { eyebrow:'', title:'', items:[], more:'' },
    schedule: row.schedule || { eyebrow:'', title:'', month_label:'', days_in_month:30, event_days:[], trailing_muted:0, events:[] },
    faqs: row.faqs || { eyebrow:'', title:'', items:[] },
    finale: row.finale || { title:'', subtitle:'', cta:'입소 상담' },
    admission: (row.admissions || [])[0] || null,
    footer: row.footer || { tag:'원이야', text:'' }
  };
}

(async function(){
  let data;
  const cfg = window.__SUPABASE_CONFIG__;
  const client = supabase.createClient(cfg.url, cfg.anonKey);
  let isPreviewMode = false;
  const PREVIEW_TEMPLATE_IDS = ['sunshine', 'carnival', 'forest', 'gallery'];
  const PREVIEW_MESSAGE = '이것은 템플릿 미리보기입니다. 실제 신청은 접수되지 않습니다.';

  function normalizePreviewId(value){
    return PREVIEW_TEMPLATE_IDS.includes(value) ? value : '';
  }

  function publicTemplateUrl(path){
    if (!path || /^https?:\/\//.test(path) || /^data:/i.test(path)) return path;
    const res = client.storage.from('template-previews').getPublicUrl(path);
    return res && res.data && res.data.publicUrl ? res.data.publicUrl : path;
  }

  function resolveTemplateAssets(row){
    if (Array.isArray(row.center_media)){
      row.center_media = row.center_media.map(function(m){
        if (!m || !m.photo_url) return m;
        return Object.assign({}, m, { photo_url: publicTemplateUrl(m.photo_url) });
      });
    }
    if (row.director && row.director.photo){
      row.director = Object.assign({}, row.director, { photo: publicTemplateUrl(row.director.photo) });
    }
    ['facilities', 'programs'].forEach(function(key){
      if (!row[key] || !Array.isArray(row[key].items)) return;
      row[key] = Object.assign({}, row[key], {
        items: row[key].items.map(function(item){
          if (!item || !item.photo_url) return item;
          return Object.assign({}, item, { photo_url: publicTemplateUrl(item.photo_url) });
        })
      });
    });
    return row;
  }

  async function loadTemplatePreview(templateId){
    const centerRes = await client.from('template_centers').select('*').eq('template_id', templateId).single();
    if (centerRes.error) throw centerRes.error;
    const row = centerRes.data;
    const mediaRes = await client.from('template_center_media').select('*').eq('template_center_id', row.id).order('sort_order', { ascending: true });
    if (mediaRes.error) throw mediaRes.error;
    const admissionRes = await client.from('template_admissions').select('*').eq('template_center_id', row.id).maybeSingle();
    if (admissionRes.error) throw admissionRes.error;
    row.center_media = mediaRes.data || [];
    row.admissions = admissionRes.data ? [admissionRes.data] : [];
    return mapRowToData(resolveTemplateAssets(row));

  let isAdminPreviewMode = false;

  async function signPaths(paths){
    const unique = Array.from(new Set(paths.filter(function(path){
      return path && !/^https?:\/\//.test(path);
    })));
    const signedMap = new Map();
    if (unique.length){
      const res = await fetch(cfg.url + '/storage/v1/object/sign/center-images', {
        method: 'POST',
        headers: {
          apikey: cfg.anonKey,
          Authorization: 'Bearer ' + cfg.anonKey,
          'content-type': 'application/json'
        },
        body: JSON.stringify({ paths: unique, expiresIn: 3600 })
      });
      if (!res.ok) throw new Error('Failed to sign center images');
      const signed = await res.json();
      (signed || []).forEach(function(item, index){
        const signedUrl = item.signedURL ? cfg.url + '/storage/v1' + item.signedURL : (item.signedUrl || unique[index]);
        signedMap.set(item.path || unique[index], signedUrl);
      });
    }
    return function(path){ return signedMap.get(path) || path; };
  }

  var io = new IntersectionObserver(function(entries){

  var revealEls = document.querySelectorAll('.reveal');

    var open=menuPanel.classList.toggle('open');
    menuBtn.classList.toggle('open',open);
    menuBtn.setAttribute('aria-expanded',open?'true':'false');
  });
  menuPanel.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',closeMenu); });
  document.addEventListener('click',function(e){ if(!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) closeMenu(); });

  // FAQ
  document.querySelectorAll('.faq-item').forEach(function(item){
    var q=item.querySelector('.faq-q');
    var a=item.querySelector('.faq-a');
    q.addEventListener('click',function(){
      var open=item.classList.toggle('open');
      q.setAttribute('aria-expanded',open?'true':'false');
      a.style.maxHeight = open ? (a.scrollHeight+'px') : null;
    });
  });
}

function setupAskPanel(faqs){
  var fab = document.getElementById('askFab');
  var overlay = document.getElementById('askModal');
  var closeBtn = document.getElementById('askModalClose');
  var list = document.getElementById('askFaqList');
  var empty = document.getElementById('askFaqEmpty');
  var consultBtn = document.getElementById('askConsultBtn');
  if (!fab || !overlay || !list || !consultBtn) return;
  function askEsc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); }
  function askWithBr(s){ return askEsc(s).replace(/\n/g,'<br>'); }
  var items = (faqs && faqs.items) || [];
  list.innerHTML = items.map(function(it){
    return '<div class="ask-faq-item">'
      + '<button type="button" class="ask-faq-q" aria-expanded="false">' + askEsc(it.q) + '</button>'
      + '<div class="ask-faq-a"><p>' + askWithBr(it.a) + '</p></div>'
      + '</div>';
  }).join('');
  if (empty) empty.hidden = items.length > 0;
  function open(){ overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false'); }
  function close(){ overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true'); }
  fab.addEventListener('click', open);
  if (closeBtn) closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
  list.querySelectorAll('.ask-faq-item').forEach(function(item){
    var q = item.querySelector('.ask-faq-q');
    var a = item.querySelector('.ask-faq-a');
    q.addEventListener('click', function(){
      var openItem = item.classList.toggle('open');
      q.setAttribute('aria-expanded', openItem ? 'true' : 'false');
      a.style.maxHeight = openItem ? (a.scrollHeight + 'px') : null;
    });
  });
  consultBtn.addEventListener('click', function(){
    if (isPreviewMode){
      alert(PREVIEW_MESSAGE);
      return;
    }
    close();
    var target = document.getElementById('cslOpenBtn');
    if (target) target.click();
    else location.hash = '#finale';
  });
}

function initDeferredImages(){
  var imgs = document.querySelectorAll('img[data-src]');
  if (!imgs.length) return;
  function load(img){
    if (!img.dataset.src) return;
    img.src = img.dataset.src;
    img.removeAttribute('data-src');
  }
  if (!('IntersectionObserver' in window)){
    imgs.forEach(load);
    return;
  }
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (!entry.isIntersecting) return;
      load(entry.target);
      observer.unobserve(entry.target);
    });
  }, { rootMargin: '200px' });
  imgs.forEach(function(img){ observer.observe(img); });
}

// 카카오맵 JS SDK: 주소 검색 후 마커 표시. 키는 kakao-config.js(window.__KAKAO_CONFIG__)에서 주입.
function loadKakaoMap(address, containerId){
  var cfg = window.__KAKAO_CONFIG__;
  var container = document.getElementById(containerId);
  if (!container || !address) return;
  if (!cfg || !cfg.appkey){ console.warn('[kakao] appkey 없음 — 지도를 건너뜁니다.'); return; }
  function render(){
    kakao.maps.load(function(){
      var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 });
      var geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(address, function(result, status){
        if (status === kakao.maps.services.Status.OK){
          var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
          map.setCenter(coords);
          new kakao.maps.Marker({ map: map, position: coords });
        }
      });
    });
  }
  if (window.kakao && window.kakao.maps){ render(); return; }
  if (!window.__kakaoSDKPromise){
    window.__kakaoSDKPromise = new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(cfg.appkey) + '&libraries=services&autoload=false';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  window.__kakaoSDKPromise.then(render).catch(function(){ console.error('[kakao] SDK 로드 실패'); });
}

function initConsultationForm(client, centerId){
  var overlay = document.getElementById('cslOverlay');
  var openBtn = document.getElementById('cslOpenBtn');
  var closeBtn = document.getElementById('cslCloseBtn');
  var form = document.getElementById('cslForm');
  var errorEl = document.getElementById('cslError');
  var formWrap = document.getElementById('cslFormWrap');
  var doneWrap = document.getElementById('cslDoneWrap');

  function openModal(){ if (isPreviewMode){ alert(PREVIEW_MESSAGE); return; } overlay.classList.add('open'); formWrap.hidden = false; doneWrap.hidden = true; form.reset(); errorEl.textContent = ''; }
  function closeModal(){ overlay.classList.remove('open'); }

  if (openBtn) openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorEl.textContent = '';
    if (isPreviewMode){
      alert(PREVIEW_MESSAGE);
      return;
    }
    if (!document.getElementById('csl-consent').checked){ errorEl.textContent = '개인정보 수집 동의가 필요해요.'; return; }
    var payload = {
      center_id: centerId,
      parent_name: document.getElementById('csl-name').value,
      phone: document.getElementById('csl-phone').value,
      kind: document.getElementById('csl-kind').value,
      wish_class: document.getElementById('csl-class').value || null,
      wish_time: document.getElementById('csl-time').value || null,
      consent_at: new Date().toISOString()
    };
    var submitBtn = form.querySelector('.csl-submit');
    submitBtn.disabled = true;
    var { error } = await client.from('consultations').insert(payload);
    submitBtn.disabled = false;
    if (error){ console.error(error); errorEl.textContent = '접수 중 문제가 생겼어요. 다시 시도해주세요.'; return; }
    formWrap.hidden = true;
    doneWrap.hidden = false;
  });
}
