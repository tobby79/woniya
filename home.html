<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원이야 - 햇살가득 어린이집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>

  :root{
    --cream:#FBF6EE;
    --ink:#403733;
    --ink-soft:#6E625B;
    --coral:#FF8A6B;
    --coral-deep:#F2715A;
    --sage:#9CB89A;
    --paper:#FFFFFF;
    /* 빛의 흐름: 스크롤에 따라 JS가 바꿔줌 */
    --sky-top:#FCE9D2;
    --sky-bottom:#FFF6EC;
    --sun-x:18%;
    --sun-y:22%;
    --sun-color:#FFE08A;
    --sun-glow:rgba(255,210,130,.55);
    --display:'Gowun Dodum',sans-serif;
    --hand:'Gaegu',cursive;
    --body:'Pretendard',sans-serif;
  }

  /* ── T2 차분한 내추럴 ── */
  [data-theme="natural"]{
    --cream:#F4F0E8;
    --ink:#2E2A1E;
    --ink-soft:#6B6347;
    --coral:#7EA86A;
    --coral-deep:#5C8A47;
    --sage:#A89060;
    --sky-top:#E8EFE0;
    --sky-bottom:#F4F0E8;
    --sun-color:#C8D89A;
    --sun-glow:rgba(160,200,120,.45);
  }
  [data-theme="natural"] .hero .eyebrow,
  [data-theme="natural"] .hero h1 .glow{ color:#5C8A47 }
  [data-theme="natural"] .cloud-link:hover{ color:#5C8A47 }
  [data-theme="natural"] .btn-big{ background:#7EA86A;box-shadow:0 16px 34px -10px #5C8A47 }
  [data-theme="natural"] .float a{ background:#3D5C2E }
  [data-theme="natural"] .float a .pulse{ background:#7EA86A;box-shadow:0 0 0 0 rgba(126,168,106,.6) }
  [data-theme="natural"] .menu-panel a.menu-cta{ background:#7EA86A }
  [data-theme="natural"] .tag-event{ background:#7EA86A }
  [data-theme="natural"] .day-cell.ev{ background:#EBF2E4;color:#5C8A47 }
  [data-theme="natural"] .day-cell.ev::after{ background:#7EA86A }
  [data-theme="natural"] .event-list .e-date{ color:#5C8A47 }
  [data-theme="natural"] .more-link{ color:#5C8A47 }
  [data-theme="natural"] .faq-q .chev{ border-color:#7EA86A }
  [data-theme="natural"] .section-eyebrow{ color:#A89060 }
  [data-theme="natural"] .topbar{ background:rgba(244,240,232,.72) }
  [data-theme="natural"] .director .portrait{ background:linear-gradient(135deg,#d4e8c4,#b8d4a0) }
  [data-theme="natural"] .back{ background:linear-gradient(135deg,#7EA86A,#5C8A47) }
  [data-theme="natural"] .frame{ background:linear-gradient(135deg,#d4e8c4,#b8d4a0) }
  [data-theme="natural"] .frame.alt{ background:linear-gradient(135deg,#e8d4a0,#d4bc80) }
  [data-theme="natural"] .frame.alt2{ background:linear-gradient(135deg,#c4d4b0,#a8c090) }
  [data-theme="natural"] .csl-field input:focus,
  [data-theme="natural"] .csl-field select:focus{ border-color:#7EA86A }

  /* ── T3 밝고 활기찬 ── */
  [data-theme="vivid"]{
    --cream:#F0F8FF;
    --ink:#1A2E3A;
    --ink-soft:#4A6070;
    --coral:#FF6B35;
    --coral-deep:#E8501A;
    --sage:#4AABCC;
    --sky-top:#C8E8F8;
    --sky-bottom:#F0F8FF;
    --sun-color:#FFE040;
    --sun-glow:rgba(255,210,60,.55);
  }
  [data-theme="vivid"] .hero .eyebrow,
  [data-theme="vivid"] .hero h1 .glow{ color:#E8501A }
  [data-theme="vivid"] .cloud-link:hover{ color:#E8501A }
  [data-theme="vivid"] .btn-big{ background:#FF6B35;box-shadow:0 16px 34px -10px #E8501A }
  [data-theme="vivid"] .float a{ background:#1A2E3A }
  [data-theme="vivid"] .float a .pulse{ background:#FF6B35;box-shadow:0 0 0 0 rgba(255,107,53,.6) }
  [data-theme="vivid"] .menu-panel a.menu-cta{ background:#FF6B35 }
  [data-theme="vivid"] .tag-event{ background:#FF6B35 }
  [data-theme="vivid"] .day-cell.ev{ background:#FFF0E8;color:#E8501A }
  [data-theme="vivid"] .day-cell.ev::after{ background:#FF6B35 }
  [data-theme="vivid"] .event-list .e-date{ color:#E8501A }
  [data-theme="vivid"] .more-link{ color:#E8501A }
  [data-theme="vivid"] .faq-q .chev{ border-color:#FF6B35 }
  [data-theme="vivid"] .section-eyebrow{ color:#4AABCC }
  [data-theme="vivid"] .topbar{ background:rgba(240,248,255,.72) }
  [data-theme="vivid"] .director .portrait{ background:linear-gradient(135deg,#FFE0C8,#FFB894) }
  [data-theme="vivid"] .back{ background:linear-gradient(135deg,#FF6B35,#E8501A) }
  [data-theme="vivid"] .frame{ background:linear-gradient(135deg,#C8E8F8,#A0D4F0) }
  [data-theme="vivid"] .frame.alt{ background:linear-gradient(135deg,#FFE0A0,#FFD070) }
  [data-theme="vivid"] .frame.alt2{ background:linear-gradient(135deg,#C8F0D8,#A0E0BC) }
  [data-theme="vivid"] .csl-field input:focus,
  [data-theme="vivid"] .csl-field select:focus{ border-color:#FF6B35 }

  /* ── T4 모던 미니멀 ── */
  [data-theme="minimal"]{
    --cream:#F7F7F5;
    --ink:#1A1A1A;
    --ink-soft:#666660;
    --coral:#2B4C8C;
    --coral-deep:#1A3470;
    --sage:#8C8C8A;
    --sky-top:#E8E8E4;
    --sky-bottom:#F7F7F5;
    --sun-color:#D4D4CC;
    --sun-glow:rgba(180,180,170,.35);
  }
  [data-theme="minimal"] .hero .eyebrow,
  [data-theme="minimal"] .hero h1 .glow{ color:#1A3470 }
  [data-theme="minimal"] .cloud-link:hover{ color:#1A3470 }
  [data-theme="minimal"] .btn-big{ background:#2B4C8C;box-shadow:0 16px 34px -10px #1A3470 }
  [data-theme="minimal"] .float a{ background:#1A1A1A }
  [data-theme="minimal"] .float a .pulse{ background:#2B4C8C;box-shadow:0 0 0 0 rgba(43,76,140,.6) }
  [data-theme="minimal"] .menu-panel a.menu-cta{ background:#2B4C8C }
  [data-theme="minimal"] .tag-event{ background:#2B4C8C }
  [data-theme="minimal"] .day-cell.ev{ background:#E8EEF8;color:#1A3470 }
  [data-theme="minimal"] .day-cell.ev::after{ background:#2B4C8C }
  [data-theme="minimal"] .event-list .e-date{ color:#1A3470 }
  [data-theme="minimal"] .more-link{ color:#1A3470 }
  [data-theme="minimal"] .faq-q .chev{ border-color:#2B4C8C }
  [data-theme="minimal"] .section-eyebrow{ color:#8C8C8A }
  [data-theme="minimal"] .topbar{ background:rgba(247,247,245,.82) }
  [data-theme="minimal"] .director .portrait{ background:linear-gradient(135deg,#D4D8E4,#B8C0D4) }
  [data-theme="minimal"] .back{ background:linear-gradient(135deg,#2B4C8C,#1A3470) }
  [data-theme="minimal"] .frame{ background:linear-gradient(135deg,#D8D8D4,#C4C4C0) }
  [data-theme="minimal"] .frame.alt{ background:linear-gradient(135deg,#D4D8E4,#B8C0D4) }
  [data-theme="minimal"] .frame.alt2{ background:linear-gradient(135deg,#D8E4D4,#C0D4BC) }
  [data-theme="minimal"] .csl-field input:focus,
  [data-theme="minimal"] .csl-field select:focus{ border-color:#2B4C8C }
  [data-theme="minimal"] .cloud-link{ filter:drop-shadow(0 6px 10px rgba(0,0,0,.12)) }
  [data-theme="minimal"] .sun{ opacity:0.3 }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--cream);
    overflow-x:hidden;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 빛 배경 레이어 ── */
  .sky{
    position:fixed;inset:0;z-index:-2;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%);
    transition:background 1.2s ease;
  }
  .sun{
    position:fixed;z-index:-1;
    width:170px;height:170px;border-radius:50%;
    left:var(--sun-x);top:var(--sun-y);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 50%,var(--sun-color) 0%,var(--sun-color) 38%,transparent 70%);
    box-shadow:0 0 90px 50px var(--sun-glow);
    transition:left 1.4s ease,top 1.4s ease,background 1.4s ease,box-shadow 1.4s ease;
    pointer-events:none;
  }
  .cloud{
    position:fixed;z-index:-1;pointer-events:none;
    color:#fff;opacity:.7;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.04));
    transition:opacity 1.2s ease;
  }
  .cloud svg{display:block}

  /* ── 상단 메뉴바 ── */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:40;padding:12px 0;background:rgba(255,250,243,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 1px 0 rgba(180,140,110,.12)}
  .topbar .brand{font-family:var(--display);font-size:1.25rem;color:var(--ink);text-decoration:none;letter-spacing:-.5px}
  .menu-btn{visibility:hidden;width:40px;height:40px;border:none;background:transparent;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;border-radius:10px}
  .menu-btn span{width:22px;height:2.5px;background:var(--ink);border-radius:2px;transition:transform .3s ease,opacity .3s ease}
  .menu-btn.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
  .menu-btn.open span:nth-child(2){opacity:0}
  .menu-btn.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}
  .menu-panel{position:fixed;top:62px;right:14px;left:14px;z-index:41;background:var(--paper);border-radius:20px;box-shadow:0 22px 50px -18px rgba(120,80,60,.4);padding:10px;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(-10px);transition:opacity .3s ease,transform .3s ease,visibility .3s}
  .menu-panel.open{opacity:1;visibility:visible;transform:none}
  .menu-panel a{padding:14px 16px;text-decoration:none;color:var(--ink);font-weight:600;border-radius:12px;font-size:1rem}
  .menu-panel a:hover{background:var(--cream)}
  .menu-panel a.menu-cta{background:var(--coral);color:#fff;text-align:center;margin-top:6px}

  /* ── 공통 ── */
  .wrap{max-width:560px;margin:0 auto;padding:0 22px;position:relative}
  .reveal{opacity:0;transform:translateY(34px);transition:opacity .9s ease,transform .9s cubic-bezier(.22,.9,.3,1)}
  .reveal.in{opacity:1;transform:none}

  /* ── 히어로 ── */
  .hero{min-height:82vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:8vh 22px 4vh}
  .hero .eyebrow{font-family:var(--hand);font-size:1.35rem;color:var(--coral-deep);letter-spacing:.5px;margin-bottom:10px;font-weight:700}
  .hero h1{font-family:var(--display);font-size:clamp(2.7rem,11vw,3.8rem);font-weight:400;line-height:1.18;letter-spacing:-1px}
  .hero h1 .glow{color:var(--coral-deep)}
  .hero p{margin-top:20px;font-size:1.02rem;color:var(--ink-soft);max-width:340px}
  .cloud-menu{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:42px;max-width:430px;margin-left:auto;margin-right:auto}
  .cloud-link{position:relative;background:#fff;color:var(--ink-soft);font-weight:700;font-size:.95rem;text-decoration:none;padding:14px 22px;border-radius:30px;filter:drop-shadow(0 10px 14px rgba(180,140,110,.32));transition:transform .25s ease}
  .cloud-link::before,.cloud-link::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud-link::before{width:24px;height:24px;top:-10px;left:24%}
  .cloud-link::after{width:34px;height:34px;top:-15px;right:22%}
  .cloud-link:hover,.cloud-link:focus-visible{transform:translateY(-3px);color:var(--coral-deep)}
  .scroll-cue{margin-top:46px;font-family:var(--hand);font-size:1.05rem;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:8px}
  .scroll-cue .dot{width:26px;height:42px;border:2px solid var(--coral);border-radius:14px;position:relative}
  .scroll-cue .dot::after{content:"";position:absolute;left:50%;top:8px;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translateX(-50%);animation:drop 1.6s infinite}
  @keyframes drop{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}80%{opacity:0;transform:translate(-50%,16px)}100%{opacity:0}}

  /* ── 원장 인사 (배경과 어우러지게) ── */
  .director{padding-top:10px;padding-bottom:30px;text-align:center}
  .director .badge{font-family:var(--hand);font-weight:700;color:var(--coral-deep);font-size:1.22rem;margin-bottom:26px}
  .director .portrait{width:144px;height:144px;border-radius:50%;margin:0 auto 24px;background:linear-gradient(135deg,#ffe7d4,#ffc4ac);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.92);font-size:.78rem;box-shadow:0 0 0 9px rgba(255,255,255,.45),0 18px 38px -14px rgba(180,110,80,.45);overflow:hidden}
  .director .portrait span{border:1.5px dashed rgba(255,255,255,.9);border-radius:40px;padding:6px 13px}
  .director .msg{font-family:var(--hand);font-weight:700;font-size:1.52rem;line-height:1.72;color:var(--ink);max-width:440px;margin:0 auto}
  .director .sign{margin-top:26px;color:var(--ink-soft);font-size:.95rem}
  .director .sign strong{display:block;font-family:var(--display);font-size:1.2rem;color:var(--ink);font-weight:400;margin-top:4px}

  /* ── 하루 스토리 ── */
  .day{padding-top:30px;padding-bottom:10px}
  .moment{margin:64px 0;position:relative}
  .moment .time{font-family:var(--hand);font-weight:700;font-size:1.25rem;color:var(--coral-deep);margin-bottom:6px}
  .moment .title{font-family:var(--display);font-size:1.55rem;margin-bottom:18px;letter-spacing:-.5px}
  .frame{
    position:relative;border-radius:26px;overflow:hidden;
    background:linear-gradient(135deg,#ffe7d4,#ffd1bd);
    aspect-ratio:4/5;width:100%;
    box-shadow:0 24px 50px -20px rgba(180,110,80,.45);
    display:flex;align-items:flex-end;
  }
  .frame.alt{background:linear-gradient(135deg,#d6ecd9,#bfe0d2)}
  .frame.alt2{background:linear-gradient(135deg,#ffe9b8,#ffd9a3)}
  .frame.alt3{background:linear-gradient(135deg,#e6dcf2,#d6c7ec)}
  .frame .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:.85rem;letter-spacing:1px}
  .frame .ph span{border:1.5px dashed rgba(255,255,255,.8);border-radius:40px;padding:7px 16px;backdrop-filter:blur(2px)}
  .frame .cap{
    position:relative;z-index:2;width:100%;
    padding:22px 20px 20px;
    background:linear-gradient(180deg,transparent,rgba(40,30,25,.55));
    color:#fff;font-family:var(--hand);font-size:1.32rem;font-weight:700;line-height:1.4;
  }
  .moment .note{margin-top:16px;font-size:.98rem;color:var(--ink-soft);padding-left:4px}

  /* ── 앨범 벽 ── */
  .album{padding-top:70px;padding-bottom:40px;text-align:center}
  .section-eyebrow{font-family:var(--hand);font-size:1.2rem;color:var(--sage);font-weight:700}
  .section-title{font-family:var(--display);font-size:1.9rem;margin:6px 0 8px;letter-spacing:-.5px}
  .section-sub{color:var(--ink-soft);font-size:.96rem;margin-bottom:34px}
  .polaroids{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .polaroid{
    background:var(--paper);padding:10px 10px 38px;border-radius:6px;
    box-shadow:0 16px 34px -16px rgba(120,80,60,.4);
    transition:transform .5s cubic-bezier(.22,.9,.3,1),box-shadow .4s ease;
    will-change:transform;
  }
  .polaroid .pic{border-radius:3px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:.78rem}
  .polaroid .label{font-family:var(--hand);font-weight:700;font-size:1.05rem;margin-top:12px;color:var(--ink)}
  .polaroid:nth-child(1){transform:rotate(-3deg)}
  .polaroid:nth-child(2){transform:rotate(2.5deg);margin-top:22px}
  .polaroid:nth-child(3){transform:rotate(2deg)}
  .polaroid:nth-child(4){transform:rotate(-2.5deg);margin-top:-10px}
  .polaroid:nth-child(5){transform:rotate(-2deg)}
  .polaroid:nth-child(6){transform:rotate(3deg);margin-top:18px}
  .polaroid:hover,.polaroid:focus-within{transform:rotate(0) scale(1.04);box-shadow:0 26px 46px -16px rgba(120,80,60,.5);z-index:2}
  .p1 .pic{background:linear-gradient(135deg,#ffd1bd,#ff9f86)}
  .p2 .pic{background:linear-gradient(135deg,#bfe0d2,#9CB89A)}
  .p3 .pic{background:linear-gradient(135deg,#ffe1a8,#ffc46b)}
  .p4 .pic{background:linear-gradient(135deg,#d6c7ec,#b59fe0)}
  .p5 .pic{background:linear-gradient(135deg,#a8d8e0,#7cc0cf)}
  .p6 .pic{background:linear-gradient(135deg,#ffc7c2,#ff9aa0)}

  /* ── 선생님 카드 플립 ── */
  .teachers{padding-top:60px;padding-bottom:40px;text-align:center}
  .cards{display:flex;flex-direction:column;gap:18px;margin-top:30px}
  .flip{perspective:1200px;height:132px}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;cursor:pointer}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:0 18px 40px -18px rgba(120,80,60,.4)}
  .front{background:var(--paper);flex-direction:row;justify-content:flex-start;align-items:center;text-align:left;gap:18px;padding:20px 24px}
  .front .t-info{flex:1;min-width:0}
  .front .avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#ffd1bd,#ff9f86);flex:none;margin:0}
  .cards .flip:nth-child(2) .front .avatar{background:linear-gradient(135deg,#bfe0d2,#9CB89A)}
  .cards .flip:nth-child(3) .front .avatar{background:linear-gradient(135deg,#ffe1a8,#ffc46b)}
  .front .name{font-family:var(--display);font-size:1.3rem}
  .front .role{color:var(--ink-soft);font-size:.9rem;margin-top:2px}
  .front .tap{font-family:var(--hand);color:var(--coral);font-size:.95rem;margin-top:8px;font-weight:700}
  .back{background:linear-gradient(135deg,var(--coral),var(--coral-deep));color:#fff;transform:rotateY(180deg);font-family:var(--hand);font-size:1.3rem;font-weight:700;line-height:1.5}

  /* ── 정보 메뉴 섹션 (공지/달력/FAQ) ── */
  [id]{scroll-margin-top:78px}
  .block{padding-top:64px;padding-bottom:36px;text-align:center}
  .block .panel{background:var(--paper);border-radius:24px;padding:22px;box-shadow:0 18px 44px -22px rgba(120,80,60,.35);text-align:left;margin-top:24px}

  .notice-list{list-style:none;text-align:left;margin-top:24px}
  .notice-item{display:flex;align-items:center;gap:14px;background:var(--paper);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 12px 28px -18px rgba(120,80,60,.35)}
  .notice-item .tag{flex:none;font-size:.74rem;font-weight:700;padding:5px 10px;border-radius:30px;color:#fff}
  .tag-event{background:var(--coral)}
  .tag-info{background:var(--sage)}
  .tag-must{background:#E6A23C}
  .notice-item .n-title{font-weight:600;font-size:1rem;line-height:1.4}
  .notice-item .n-date{color:var(--ink-soft);font-size:.82rem;margin-top:3px}
  .more-link{display:inline-block;margin-top:8px;color:var(--coral-deep);font-weight:700;text-decoration:none;font-size:.95rem}

  .cal{background:var(--paper);border-radius:22px;padding:20px 18px;box-shadow:0 18px 44px -22px rgba(120,80,60,.35);margin-top:24px}
  .cal-head{font-family:var(--display);font-size:1.25rem;margin-bottom:14px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-grid .dow{font-size:.78rem;color:var(--ink-soft);padding:6px 0;font-weight:600}
  .cal-grid .dow:first-child{color:var(--coral-deep)}
  .day-cell{position:relative;padding:10px 0;font-size:.9rem;border-radius:10px}
  .day-cell.muted{color:#d8cfc7}
  .day-cell.ev{background:#FFF1EA;color:var(--coral-deep);font-weight:700}
  .day-cell.ev::after{content:"";position:absolute;left:50%;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translateX(-50%)}
  .event-list{list-style:none;text-align:left;margin-top:18px}
  .event-list li{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #f1e9e0;font-size:.96rem}
  .event-list li:last-child{border-bottom:none}
  .event-list .e-date{font-weight:700;color:var(--coral-deep);font-size:.86rem;min-width:46px}

  .faq-list{text-align:left;margin-top:24px}
  .faq-item{background:var(--paper);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 12px 28px -20px rgba(120,80,60,.35)}
  .faq-q{width:100%;border:none;background:transparent;text-align:left;padding:18px 20px;font-size:1rem;font-weight:600;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:var(--body)}
  .faq-q .chev{flex:none;width:11px;height:11px;border-right:2.5px solid var(--coral);border-bottom:2.5px solid var(--coral);transform:rotate(45deg);transition:transform .35s ease;margin-top:-4px}
  .faq-item.open .faq-q .chev{transform:rotate(-135deg);margin-top:2px}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .faq-a p{padding:0 20px 20px;color:var(--ink-soft);font-size:.95rem;line-height:1.7}

  /* ── 마무리 CTA ── */
  .finale{padding-top:80px;padding-bottom:140px;text-align:center}
  .finale h2{font-family:var(--display);font-size:2.1rem;line-height:1.3;letter-spacing:-.5px}
  .finale p{color:var(--ink-soft);margin:16px 0 34px;font-size:1rem}
  .btn-big{display:inline-block;background:var(--coral);color:#fff;font-weight:700;font-size:1.1rem;padding:18px 44px;border-radius:50px;text-decoration:none;box-shadow:0 16px 34px -10px var(--coral-deep);transition:transform .3s ease,box-shadow .3s ease}
  .btn-big:hover{transform:translateY(-3px);box-shadow:0 22px 40px -10px var(--coral-deep)}

  /* ── 플로팅 CTA ── */
  .float{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);z-index:30;transition:transform .5s cubic-bezier(.22,.9,.3,1)}
  .float.show{transform:translateX(-50%) translateY(0)}
  .float.hide{transform:translateX(-50%) translateY(120px)}
  .float a{display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-weight:700;padding:14px 26px;border-radius:50px;text-decoration:none;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);font-size:.98rem}
  .float a .pulse{width:9px;height:9px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 0 rgba(255,138,107,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,138,107,.6)}70%{box-shadow:0 0 0 10px rgba(255,138,107,0)}100%{box-shadow:0 0 0 0 rgba(255,138,107,0)}}

  /* ── 상담·대기 신청 모달 ── */
  button.btn-big{font:inherit;border:none;cursor:pointer}
  .csl-overlay{position:fixed;inset:0;z-index:50;background:rgba(64,55,51,.45);display:none;align-items:center;justify-content:center;padding:20px}
  .csl-overlay.open{display:flex}
  .csl-panel{position:relative;width:100%;max-width:380px;max-height:88vh;overflow-y:auto;background:var(--paper);border-radius:26px;padding:30px 26px;box-shadow:0 30px 60px -20px rgba(60,40,30,.5)}
  .csl-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border:none;background:var(--cream);border-radius:50%;font-size:1.2rem;line-height:1;color:var(--ink-soft);cursor:pointer}
  .csl-title{font-family:var(--display);font-size:1.35rem;margin-bottom:20px;letter-spacing:-.5px}
  .csl-field{margin-bottom:16px;text-align:left}
  .csl-field label{display:block;font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .csl-field input[type=text],.csl-field input[type=tel],.csl-field select{
    width:100%;border:1.5px solid #f1e9e0;border-radius:14px;padding:12px 14px;
    font-family:var(--body);font-size:.96rem;color:var(--ink);background:var(--cream);outline:none;
  }
  .csl-field input:focus,.csl-field select:focus{border-color:var(--coral)}
  .csl-consent label{display:flex;align-items:flex-start;gap:8px;font-size:.85rem;font-weight:400;color:var(--ink-soft);line-height:1.5}
  .csl-consent input{margin-top:3px;flex:none}
  .csl-submit{width:100%;margin-top:6px}
  .csl-msg.error{margin-top:12px;font-size:.85rem;color:#D9534F;text-align:center}
  .csl-done{text-align:center;font-family:var(--hand);font-size:1.25rem;font-weight:700;color:var(--ink);padding:30px 0;line-height:1.6}

  footer{text-align:center;padding:30px 22px 40px;color:var(--ink-soft);font-size:.82rem}
  footer .demo-tag{display:inline-block;background:#fff;border:1px solid #eee;border-radius:30px;padding:6px 16px;margin-bottom:14px;font-family:var(--hand);font-weight:700;color:var(--coral-deep)}

  a:focus-visible,.flip-inner:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:8px}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;scroll-behavior:auto!important}
    .reveal{opacity:1;transform:none}
  }

  /* ── 이미지 채움 ── */
  .director .portrait{overflow:hidden}
  .director .portrait img{width:100%;height:100%;object-fit:cover;display:block}
  .frame-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .polaroid .pic img{width:100%;height:100%;object-fit:cover;border-radius:3px;display:block}
  .front .avatar{overflow:hidden}
  .front .avatar img{width:100%;height:100%;object-fit:cover;display:block}

</style>
</head>
<body>

<!-- topbar.js가 nav(brand+홈아이콘+이 메뉴버튼)를 만들어 body 최상단에 삽입 -->
<button class="menu-btn" id="menuBtn" aria-label="메뉴 열기" aria-expanded="false">

<!-- 아래 섹션들은 비어있고, JS가 haetsal.json을 읽어 채웁니다 -->

<!-- 상담·대기 신청 모달 -->
<div class="csl-overlay" id="cslOverlay">
  <div class="csl-panel">
    <button type="button" class="csl-close" id="cslCloseBtn" aria-label="닫기">×</button>

    <div id="cslFormWrap">
      <h3 class="csl-title">입소 상담 신청</h3>
      <form id="cslForm">
        <div class="csl-field">

        <div class="csl-field">
          <label for="csl-kind">신청 종류</label>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js"></script>
<script>
// center_media(행 단위)를 기존 haetsal.json 모양(day_story[]/album.items[]/teachers.items[])으로 되돌린다.
// album/teachers의 eyebrow·title·sub는 아직 centers 테이블에 컬럼이 없어 고정 문구로 채운다.
function mapRowToData(row){
  const media = row.center_media || [];
  const byType = (type) => {
    const seen = new Set();
    return media
      .filter(m => m.media_type === type)
      .sort((a,b) => a.sort_order - b.sort_order)
      .filter(m => { // DB에 중복 sort_order 행이 들어간 경우 방어 (같은 사진이 2번 보이는 문제)
        if (seen.has(m.sort_order)) return false;
        seen.add(m.sort_order);
        return true;
      });
  };

  return {
    center: {
      id: row.id,
      slug: row.slug,
      name: row.name,
      theme: row.theme,
      menu: row.menu || [],
      hero: row.hero || { eyebrow:'', title:'', title_accent:'', subtitle:'' },
      director: row.director || { badge:'', photo:'', photo_alt:'', message:'', sign_label:'', sign_name:'', scroll_cue:'' }
    },
    day_story: byType('day_story').map(m => ({
      slot: m.slot,
      time: m.time_label,
      title: m.title,
      photo: m.photo_url,
      photo_alt: m.photo_alt,
      caption: m.caption,
      note: m.note
    })),
    album: {
      eyebrow: '우리 원의 추억',
      title: '사진으로 보는 일상',
      sub: '눌러서 더 가까이 들여다보세요',
      items: byType('album').map(m => ({ label: m.title, photo: m.photo_url }))
    },
    teachers: {
      eyebrow: '믿고 맡기는 사람들',
      title: '우리 반 선생님',
      items: byType('teacher').map(m => ({ name: m.title, role: m.subtitle, photo: m.photo_url, message: m.caption }))
    },
    notices: row.notices || { eyebrow:'', title:'', items:[], more:'' },
    schedule: row.schedule || { eyebrow:'', title:'', month_label:'', days_in_month:30, event_days:[], trailing_muted:0, events:[] },
    faqs: row.faqs || { eyebrow:'', title:'', items:[] },
    finale: row.finale || { title:'', subtitle:'', cta:'입소 상담' },
    footer: row.footer || { tag:'원이야', text:'' }
  };
}

(async function(){
  // ─────────────────────────────────────────────
  // 1) 데이터 불러오기 — Supabase에서 centers + center_media를 한 번에 조회
  // ─────────────────────────────────────────────
  let data;
  const cfg = window.__SUPABASE_CONFIG__;
  const client = supabase.createClient(cfg.url, cfg.anonKey);
  try {
    const slug = new URLSearchParams(location.search).get('slug') || 'haetsal';
    const { data: row, error } = await client
      .from('centers')
      .select('*, center_media(*)')
      .eq('slug', slug)
      .single();
    if (error) throw error;
    data = mapRowToData(row);

    // Storage 경로를 서명 URL로 변환
    async function signPath(path){
      if (!path || /^https?:\/\//.test(path)) return path;
      const { data: signed } = await client.storage.from('center-images').createSignedUrl(path, 3600);
      return signed ? signed.signedUrl : path;
    }
    for (const m of data.day_story){ m.photo = await signPath(m.photo); }
    for (const it of data.album.items){ it.photo = await signPath(it.photo); }
    for (const tc of data.teachers.items){ tc.photo = await signPath(tc.photo); }
    if (data.center.director){ data.center.director.photo = await signPath(data.center.director.photo); }

    const themeParam = new URLSearchParams(location.search).get('theme') || (data.center.theme || '');
    if (themeParam) document.documentElement.setAttribute('data-theme', themeParam);
  } catch (e) {
    console.error(e);
    document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">원 데이터를 불러오지 못했어요. supabase-config.js의 URL/키를 확인해주세요.</p>';
    return;
  }

  const $ = (id)=>document.getElementById(id);
  const esc = (s)=> s==null ? '' : s; // 데모 데이터는 신뢰. 실서비스에선 정화 처리.

  // ── 상단바 / 메뉴 ──
  const c = data.center;
  WoniyaTopbar.init({ centerName: c.name.replace(/\s*어린이집$/,'') || c.name });
  $('menuPanel').innerHTML = (c.menu || []).map(m =>
    `<a href="${esc(m.href)}"${m.cta?' class="menu-cta"':''}>${esc(m.label)}</a>`).join('');

  // ── 히어로 ──
  const h = c.hero;
  const cloudMenu = (c.menu || []).filter(m=>!m.cta)
    .map(m=>`<a class="cloud-link" href="${esc(m.href)}">${esc(m.label)}</a>`).join('');
  $('hero').innerHTML = `
    <div class="eyebrow reveal">${esc(h.eyebrow)}</div>
    <h1 class="reveal">${esc(h.title)}<br><span class="glow">${esc(h.title_accent)}</span></h1>
    <p class="reveal">${esc(h.subtitle)}</p>
    <nav class="cloud-menu reveal" aria-label="바로가기">${cloudMenu}</nav>`;

  // ── 원장 인사말 ──
  const d = c.director;
  $('greeting').innerHTML = `
    <div class="badge reveal">${esc(d.badge)}</div>
    <div class="portrait reveal"><img alt="${esc(d.photo_alt)}" src="${esc(d.photo)}"></div>
    <p class="msg reveal">${esc(d.message)}</p>
    <div class="sign reveal">${esc(d.sign_label)}<strong>${esc(d.sign_name)}</strong></div>
    <div class="scroll-cue reveal"><span>${esc(d.scroll_cue)}</span><span class="dot"></span></div>`;

  // ── 하루 스토리 ──
  const frameCls = ['frame','frame alt','frame alt2','frame alt3','frame'];
  $('day').innerHTML = (data.day_story || []).map((m,i)=>`
    <section class="moment" data-time="${esc(m.slot)}">
      <div class="time reveal">${esc(m.time)}</div>
      <div class="title reveal">${esc(m.title)}</div>
      <div class="${frameCls[i]||'frame'} reveal">
        <img class="frame-img" loading="lazy" alt="${esc(m.photo_alt)}" src="${esc(m.photo)}">
        <div class="cap">${esc(m.caption)}</div>
      </div>
      <p class="note reveal">${esc(m.note)}</p>
    </section>`).join('');

  // ── 앨범 벽 ──
  const al = data.album;
  const ALBUM_LIMIT = 12;
  const albumItems = al?.items || [];
  const visibleItems = albumItems.slice(0, ALBUM_LIMIT);
  const hiddenItems = albumItems.slice(ALBUM_LIMIT);
  $('albumSec').innerHTML = `
    <div class="section-eyebrow reveal">${esc(al?.eyebrow)}</div>
    <h2 class="section-title reveal">${esc(al?.title)}</h2>
    <p class="section-sub reveal">${esc(al?.sub)}</p>
    <div class="polaroids">${visibleItems.map((it,i)=>`
      <div class="polaroid p${i+1} reveal" tabindex="0">
        <div class="pic"><img loading="lazy" alt="${esc(it.label)}" src="${esc(it.photo)}"></div>
        <div class="label">${esc(it.label)}</div>
      </div>`).join('')}</div>
    ${hiddenItems.length?`<div class="polaroids album-hidden" hidden>${hiddenItems.map((it,i)=>`
      <div class="polaroid reveal" tabindex="0">
        <div class="pic"><img loading="lazy" alt="${esc(it.label)}" src="${esc(it.photo)}"></div>
        <div class="label">${esc(it.label)}</div>
      </div>`).join('')}</div>
    <button type="button" class="more-link album-more-btn" style="background:none;border:none;cursor:pointer;font-family:inherit" onclick="this.previousElementSibling.hidden=false;this.remove();">더 보기 (총 ${albumItems.length}장)</button>`:''}`;

  // ── 선생님 카드 ──
  const t = data.teachers;
  $('teachersSec').innerHTML = `
    <div class="section-eyebrow reveal">${esc(t?.eyebrow)}</div>
    <h2 class="section-title reveal">${esc(t?.title)}</h2>
    <div class="cards">${(t?.items || []).map(tc=>`
      <div class="flip reveal" tabindex="0" role="button" aria-label="${esc(tc.name)} 카드 뒤집기">
        <div class="flip-inner">
          <div class="face front">
            <div class="avatar"><img alt="${esc(tc.name)}" src="${esc(tc.photo)}"></div>
            <div class="t-info">
              <div class="name">${esc(tc.name)}</div>
              <div class="role">${esc(tc.role)}</div>
              <div class="tap">눌러서 한마디 보기</div>
            </div>
          </div>
          <div class="face back">${esc(tc.message)}</div>
        </div>
      </div>`).join('')}</div>`;

  // ── 공지사항 ──
  const n = data.notices;
  $('notice').innerHTML = `
    <div class="section-eyebrow reveal">${esc(n?.eyebrow)}</div>
    <h2 class="section-title reveal">${esc(n?.title)}</h2>
    <ul class="notice-list">${(n?.items || []).map(it=>`
      <li class="notice-item reveal">
        <span class="tag tag-${esc(it.tag_type)}">${esc(it.tag)}</span>
        <div><div class="n-title">${esc(it.title)}</div><div class="n-date">${esc(it.date)}</div></div>
      </li>`).join('')}</ul>
    <a class="more-link reveal" href="#notice">${esc(n?.more)}</a>`;

  // ── 행사 일정 (달력) ──
  const s = data.schedule;
  const dows = ['일','월','화','수','목','금','토'];
  let cells = dows.map(w=>`<span class="dow">${w}</span>`).join('');
  for(let day=1; day<=(s?.days_in_month || 0); day++){
    const ev = (s?.event_days || []).includes(day) ? ' ev' : '';
    cells += `<span class="day-cell${ev}">${day}</span>`;
  }
  for(let m=1; m<=(s?.trailing_muted || 0); m++){
    cells += `<span class="day-cell muted">${m}</span>`;
  }
  $('schedule').innerHTML = `
    <div class="section-eyebrow reveal">${esc(s?.eyebrow)}</div>
    <h2 class="section-title reveal">${esc(s?.title)}</h2>
    <div class="cal reveal">
      <div class="cal-head">${esc(s?.month_label)}</div>
      <div class="cal-grid">${cells}</div>
      <ul class="event-list">${(s?.events || []).map(e=>`
        <li class="reveal"><span class="e-date">${esc(e.date)}</span> ${esc(e.title)}</li>`).join('')}</ul>
    </div>`;

  // ── FAQ ──
  const f = data.faqs;
  $('faq').innerHTML = `
    <div class="section-eyebrow reveal">${esc(f?.eyebrow)}</div>
    <h2 class="section-title reveal">${esc(f?.title)}</h2>
    <div class="faq-list">${(f?.items || []).map(it=>`
      <div class="faq-item reveal">
        <button class="faq-q" aria-expanded="false">${esc(it.q)}<span class="chev"></span></button>
        <div class="faq-a"><p>${esc(it.a)}</p></div>
      </div>`).join('')}</div>`;

  // ── 마무리 ──
  const fin = data.finale || {};
  $('finale').innerHTML = `
    <h2 class="reveal">${esc(fin.title)}</h2>
    <p class="reveal">${esc(fin.subtitle)}</p>
    <button type="button" id="cslOpenBtn" class="btn-big reveal">${esc(fin.cta)}</button>`;

  // ── 푸터 ──
  $('footerEl').innerHTML = `
    <div class="demo-tag">${esc(data.footer?.tag)}</div>
    <div>${esc(data.footer?.text)}</div>`;

  document.title = `원이야 - ${esc(c.name) || '원이야'}`;

  // ─────────────────────────────────────────────
  // 2) 렌더가 끝난 뒤 인터랙션 초기화 (원본 동작 그대로)
  // ─────────────────────────────────────────────
  initInteractions();
  initConsultationForm(client, c.id);
})();

function initInteractions(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:0.15});
  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });

  var palettes = {
    'morning':   {top:'#FCE9D2',bot:'#FFF6EC',sx:'16%',sy:'20%',sc:'#FFE08A',glow:'rgba(255,210,130,.55)'},
    'mid-morning':{top:'#D8EEF6',bot:'#FBF6EE',sx:'40%',sy:'14%',sc:'#FFEFA8',glow:'rgba(255,225,150,.5)'},
    'noon':      {top:'#CDEAF2',bot:'#FFFDF6',sx:'50%',sy:'10%',sc:'#FFF6C2',glow:'rgba(255,240,170,.55)'},
    'afternoon': {top:'#E6E0F0',bot:'#FDEFE4',sx:'66%',sy:'18%',sc:'#FFD99A',glow:'rgba(255,200,140,.5)'},
    'dusk':      {top:'#F6C9A8',bot:'#FBE3D2',sx:'84%',sy:'30%',sc:'#FF9E66',glow:'rgba(255,150,90,.55)'}
  };
  var moments = Array.prototype.slice.call(document.querySelectorAll('.moment'));
  var root = document.documentElement.style;
  function applyPalette(p){
    root.setProperty('--sky-top',p.top);
    root.setProperty('--sky-bottom',p.bot);
    root.setProperty('--sun-x',p.sx);
    root.setProperty('--sun-y',p.sy);
    root.setProperty('--sun-color',p.sc);
    root.setProperty('--sun-glow',p.glow);
  }
  var current='morning';
  var pio = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var t=e.target.getAttribute('data-time');
        if(t && t!==current && palettes[t]){ current=t; applyPalette(palettes[t]); }
      }
    });
  },{rootMargin:'-45% 0px -45% 0px'});
  moments.forEach(function(m){ pio.observe(m); });

  var c1=document.getElementById('cloud1'), c2=document.getElementById('cloud2');
  var ticking=false;
  if(!reduce){
    window.addEventListener('scroll',function(){
      if(!ticking){ window.requestAnimationFrame(function(){
        var y=window.scrollY;
        c1.style.transform='translateX('+(-y*0.04)+'px)';
        c2.style.transform='translateX('+(y*0.05)+'px)';
        ticking=false;
      }); ticking=true; }
    },{passive:true});
  }

  document.querySelectorAll('.flip').forEach(function(card){
    function toggle(){ card.classList.toggle('flipped'); }
    card.addEventListener('click',toggle);
    card.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); toggle(); } });
  });

  var floatEl=document.getElementById('float');
  var hero=document.querySelector('.hero');
  var finale=document.getElementById('finale');
  var fio=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.target===hero){ if(e.isIntersecting){ floatEl.classList.remove('show'); } else { floatEl.classList.add('show'); } }
      if(e.target===finale){ if(e.isIntersecting){ floatEl.classList.add('hide'); } else { floatEl.classList.remove('hide'); } }
    });
  },{threshold:0.4});
  fio.observe(hero); fio.observe(finale);

  var menuBtn=document.getElementById('menuBtn');
  var menuPanel=document.getElementById('menuPanel');
  function closeMenu(){ menuBtn.classList.remove('open'); menuPanel.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false'); }
  menuBtn.addEventListener('click',function(){
    var open=menuPanel.classList.toggle('open');
    menuBtn.classList.toggle('open',open);
    menuBtn.setAttribute('aria-expanded',open?'true':'false');
  });
  menuPanel.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',closeMenu); });
  document.addEventListener('click',function(e){
    if(!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) closeMenu();
  });

  document.querySelectorAll('.faq-item').forEach(function(item){
    var q=item.querySelector('.faq-q');
    var a=item.querySelector('.faq-a');
    q.addEventListener('click',function(){
      var open=item.classList.toggle('open');
      q.setAttribute('aria-expanded',open?'true':'false');
      a.style.maxHeight = open ? (a.scrollHeight+'px') : null;
    });
  });
}

function initConsultationForm(client, centerId){
  var overlay = document.getElementById('cslOverlay');
  var openBtn = document.getElementById('cslOpenBtn');
  var closeBtn = document.getElementById('cslCloseBtn');
  var form = document.getElementById('cslForm');
  var errorEl = document.getElementById('cslError');
  var formWrap = document.getElementById('cslFormWrap');
  var doneWrap = document.getElementById('cslDoneWrap');

  function openModal(){
    overlay.classList.add('open');
    formWrap.hidden = false;
    doneWrap.hidden = true;
    form.reset();
    errorEl.textContent = '';
  }
  function closeModal(){ overlay.classList.remove('open'); }

  if (openBtn) openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorEl.textContent = '';

    var consentChecked = document.getElementById('csl-consent').checked;
    if (!consentChecked){
      errorEl.textContent = '개인정보 수집 동의가 필요해요.';
      return;
    }

    var payload = {
      center_id: centerId,
      parent_name: document.getElementById('csl-name').value,
      phone: document.getElementById('csl-phone').value,
      kind: document.getElementById('csl-kind').value,
      wish_class: document.getElementById('csl-class').value || null,
      wish_time: document.getElementById('csl-time').value || null,
      consent_at: new Date().toISOString()
    };

    var submitBtn = form.querySelector('.csl-submit');
    submitBtn.disabled = true;
    var { error } = await client.from('consultations').insert(payload);
    submitBtn.disabled = false;

    if (error){
      console.error(error);
      errorEl.textContent = '접수 중 문제가 생겼어요. 다시 시도해주세요.';
      return;
    }

    formWrap.hidden = true;
    doneWrap.hidden = false;
  });
}
</script>
