<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원이야 - 숲 템플릿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gaegu:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bark: #2F3D2A;
      --moss: #4A6B3A;
      --leaf: #7BA05B;
      --leaf-light: #A8C686;
      --sun: #F4D58D;
      --sun-warm: #E8B864;
      --soil: #5C4A3A;
      --paper: #FBFBF4;
      --paper-warm: #F4F1E4;
      --ink: #26331F;
      --ink-soft: #566049;
      --canopy-top: #DCE8CC;
      --canopy-bottom: #EEF2E0;

      --display: 'Gowun Batang', serif;
      --hand: 'Gaegu', cursive;
      --body: 'Pretendard', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--body);
      color: var(--ink);
      background: var(--canopy-bottom);
      overflow-x: hidden;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 숲 배경 ── */
    .forest-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      background: linear-gradient(180deg, var(--canopy-top) 0%, var(--canopy-bottom) 60%);
      transition: background 1.4s ease;
    }

    .light-rays {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(118deg, transparent 38%, rgba(244, 213, 141, .16) 42%, transparent 46%),
        linear-gradient(122deg, transparent 55%, rgba(244, 213, 141, .1) 59%, transparent 63%),
        linear-gradient(110deg, transparent 70%, rgba(244, 213, 141, .12) 73%, transparent 77%);
      opacity: .9;
      transition: opacity 1.4s ease;
    }

    .leaf-float {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      will-change: transform
    }

    .leaf-float svg {
      display: block;
      filter: drop-shadow(0 4px 6px rgba(47, 61, 42, .15))
    }

    /* ── 상단바 ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      padding: 14px 0;
      background: rgba(251, 251, 244, .74);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(74, 107, 58, .14)
    }

    .topbar .brand {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--bark);
      text-decoration: none;
      letter-spacing: -.5px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .topbar .brand::before {
      content: "";
      width: 18px;
      height: 18px;
      background: var(--leaf);
      border-radius: 0 50% 50% 50%;
      transform: rotate(45deg);
      flex: none
    }

    .menu-btn {
      visibility: hidden;
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      border-radius: 10px
    }

    .menu-btn span {
      width: 23px;
      height: 2.5px;
      background: var(--bark);
      border-radius: 2px;
      transition: transform .3s ease, opacity .3s ease
    }

    .menu-btn.open span:nth-child(1) {
      transform: translateY(7.5px) rotate(45deg)
    }

    .menu-btn.open span:nth-child(2) {
      opacity: 0
    }

    .menu-btn.open span:nth-child(3) {
      transform: translateY(-7.5px) rotate(-45deg)
    }

    .menu-panel {
      position: fixed;
      top: 64px;
      right: 16px;
      left: 16px;
      z-index: 41;
      background: var(--paper);
      border-radius: 22px;
      box-shadow: 0 24px 54px -18px rgba(47, 61, 42, .42);
      padding: 12px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity .3s ease, transform .3s ease, visibility .3s;
      border: 1px solid rgba(123, 160, 91, .16)
    }

    .menu-panel.open {
      opacity: 1;
      visibility: visible;
      transform: none
    }

    .menu-panel a {
      padding: 14px 18px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      border-radius: 14px;
      font-size: 1rem
    }

    .menu-panel a:hover {
      background: var(--paper-warm)
    }

    .menu-panel a.menu-cta {
      background: var(--moss);
      color: #fff;
      text-align: center;
      margin-top: 6px
    }

    /* ── 공통 ── */
    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease, transform 1s cubic-bezier(.22, .9, .3, 1)
    }

    .reveal.in {
      opacity: 1;
      transform: none
    }

    /* ── 히어로: 숲 입구 ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 14vh 24px 8vh;
      position: relative
    }

    .hero .eyebrow {
      font-family: var(--hand);
      font-size: 1.4rem;
      color: var(--moss);
      letter-spacing: .5px;
      margin-bottom: 16px;
      font-weight: 700
    }

    .hero h1 {
      font-family: var(--display);
      font-weight: 700;
      font-size: clamp(2.7rem, 12vw, 4rem);
      line-height: 1.3;
      letter-spacing: -1px;
      color: var(--bark)
    }

    .hero h1 .glow {
      color: var(--moss);
      position: relative;
      display: inline-block
    }

    .hero h1 .glow::after {
      content: "";
      position: absolute;
      left: -4%;
      right: -4%;
      bottom: 8px;
      height: 16px;
      background: var(--leaf-light);
      opacity: .5;
      z-index: -1;
      border-radius: 8px;
      transform: rotate(-1.2deg)
    }

    .hero p {
      margin-top: 24px;
      font-size: 1.06rem;
      color: var(--ink-soft);
      max-width: 380px
    }

    .hero .enter-cue {
      margin-top: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-family: var(--hand);
      font-size: 1.1rem;
      color: var(--moss);
      font-weight: 700
    }

    .hero .enter-cue .path {
      width: 2px;
      height: 50px;
      background: linear-gradient(180deg, var(--leaf), transparent);
      position: relative
    }

    .hero .enter-cue .path::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 8px;
      height: 8px;
      border-radius: 0 50% 50% 50%;
      background: var(--leaf);
      transform: translateX(-50%) rotate(45deg);
      animation: walk 1.8s infinite
    }

    @keyframes walk {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) rotate(45deg)
      }

      30% {
        opacity: 1
      }

      80% {
        opacity: 0;
        transform: translate(-50%, 42px) rotate(45deg)
      }

      100% {
        opacity: 0
      }
    }

    /* ── 히어로 사진: 연못 프레임 (forest 고유) ── */
    .hero-photo{
      position:relative;
      width:min(420px,88vw);
      aspect-ratio:1/1;
      margin:0 auto 24px;
    }
    /* 이미지 레이어 */
    .hero-photo .pond-img{
      width:100%;
      height:100%;
      border-radius:44% 56% 52% 48% / 46% 44% 56% 54%;
      overflow:hidden;
      position:relative;
      background:linear-gradient(140deg,var(--leaf-light),var(--leaf));
    }
    .hero-photo .pond-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    /* 연못 가장자리 페이드 오버레이 */
    .hero-photo::after{
      content:'';
      position:absolute;
      inset:-6%;
      border-radius:50%;
      background:radial-gradient(
        ellipse at center,
        transparent 42%,
        rgba(238,242,224,.55) 58%,
        rgba(220,232,204,.80) 72%,
        var(--canopy-bottom) 86%
      );
      pointer-events:none;
      z-index:2;
    }
    /* ── 나뭇잎 메뉴 버튼 (forest 고유) ── */
    .leaf-menu{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:34px;max-width:430px;margin-left:auto;margin-right:auto}
    .leaf-btn{font-family:var(--body);font-weight:700;font-size:.92rem;color:#fff;text-decoration:none;padding:13px 22px;background:var(--leaf);border-radius:2px 20px 2px 20px;box-shadow:0 8px 18px -8px rgba(74,107,58,.65);transition:transform .2s ease,background .2s ease}
    .leaf-btn:hover{transform:translateY(-2px);background:var(--moss)}

    /* ── 타임라인 시작: 원장 표지판 ── */
    .trail-start {
      padding-top: 30px;
      padding-bottom: 10px;
      text-align: center
    }

    .trail-start .signpost {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      background: var(--paper);
      border-radius: 20px;
      padding: 30px 32px;
      box-shadow: 0 20px 44px -20px rgba(74, 107, 58, .4);
      border: 1px solid rgba(123, 160, 91, .16);
      max-width: 440px
    }

    .trail-start .portrait {
      width: 96px;
      height: 96px;
      border-radius: 48% 52% 50% 50%;
      background: linear-gradient(135deg, var(--leaf-light), var(--leaf));
      overflow: hidden;
      box-shadow: 0 0 0 6px rgba(168, 198, 134, .25)
    }

    .trail-start .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .trail-start .badge {
      font-family: var(--hand);
      font-weight: 700;
      color: var(--moss);
      font-size: 1.1rem
    }

    .trail-start .msg {
      font-family: var(--display);
      font-weight: 400;
      font-size: 1.18rem;
      line-height: 1.8;
      color: var(--ink);
      white-space: pre-line
    }

    .trail-start .sign {
      color: var(--ink-soft);
      font-size: .9rem
    }

    .trail-start .sign strong {
      font-family: var(--display);
      font-weight: 700;
      color: var(--bark);
      margin-left: 4px
    }

    /* ── 핵심: 세로 타임라인 (숲길) ── */
    .timeline {
      position: relative;
      padding-top: 50px;
      padding-bottom: 40px
    }

    .timeline-head {
      text-align: center;
      margin-bottom: 30px
    }

    .timeline-head .eyebrow {
      font-family: var(--hand);
      font-size: 1.25rem;
      color: var(--moss);
      font-weight: 700
    }

    .timeline-head .eyebrow::before {
      content: "🌿 "
    }

    .timeline-head h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 2rem;
      color: var(--bark);
      letter-spacing: -.5px;
      margin-top: 4px
    }

    .trail-line {
      position: absolute;
      left: 50%;
      top: 130px;
      bottom: 70px;
      width: 3px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(180deg, var(--leaf) 0 10px, transparent 10px 22px);
      opacity: .4;
      z-index: 0
    }

    .stop {
      position: relative;
      margin: 0 0 54px;
      z-index: 1
    }

    .stop .node {
      position: absolute;
      left: 50%;
      top: 6px;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--paper);
      border: 2.5px solid var(--leaf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--hand);
      font-weight: 700;
      color: var(--moss);
      font-size: 1.05rem;
      z-index: 3;
      box-shadow: 0 8px 18px -8px rgba(74, 107, 58, .5)
    }

    .stop .card {
      width: calc(50% - 38px);
      background: var(--paper);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 40px -18px rgba(74, 107, 58, .45);
      border: 1px solid rgba(123, 160, 91, .14);
      position: relative
    }

    .stop.left .card {
      margin-right: auto
    }

    .stop.right .card {
      margin-left: auto
    }

    .stop .card::before {
      content: "";
      position: absolute;
      top: 24px;
      width: 30px;
      height: 2px;
      background: var(--leaf);
      opacity: .5;
      z-index: 2
    }

    .stop.left .card::before {
      right: -30px
    }

    .stop.right .card::before {
      left: -30px
    }

    .stop .card .pic {
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--leaf-light);
      position: relative
    }

    .stop .card .pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .stop .card .pic .cap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 14px 12px;
      background: linear-gradient(180deg, transparent, rgba(38, 51, 31, .62));
      color: #fff;
      font-family: var(--hand);
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.35
    }

    .stop .card .body {
      padding: 14px 16px 16px
    }

    .stop .card .time {
      font-family: var(--hand);
      font-weight: 700;
      color: var(--moss);
      font-size: 1.02rem
    }

    .stop .card .title {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--bark);
      margin: 2px 0 6px;
      letter-spacing: -.3px;
      line-height: 1.3
    }

    .stop .card .note {
      font-size: .88rem;
      color: var(--ink-soft);
      line-height: 1.55
    }

    .trail-end {
      text-align: center;
      padding: 10px 0 20px;
      position: relative;
      z-index: 1
    }

    .trail-end .glade {
      display: inline-block;
      font-family: var(--hand);
      font-weight: 700;
      color: var(--sun-warm);
      font-size: 1.15rem;
      background: var(--paper);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 12px 28px -14px rgba(232, 184, 100, .5)
    }

    .trail-end .glade::before {
      content: "☀️ "
    }

    /* ── 더 둘러보기: 탭 ── */
    .explore {
      padding-top: 60px;
      padding-bottom: 40px
    }

    .explore-head {
      text-align: center;
      margin-bottom: 26px
    }

    .explore-head .eyebrow {
      font-family: var(--hand);
      font-size: 1.2rem;
      color: var(--moss);
      font-weight: 700
    }

    .explore-head h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.85rem;
      color: var(--bark);
      letter-spacing: -.5px;
      margin-top: 4px
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 26px
    }

    .tab-btn {
      padding: 9px 18px;
      border-radius: 30px;
      border: 1.5px solid rgba(123, 160, 91, .3);
      background: var(--paper);
      color: var(--ink-soft);
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
      font-family: var(--body);
      transition: all .2s
    }

    .tab-btn.active {
      background: var(--moss);
      color: #fff;
      border-color: var(--moss)
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block;
      animation: fadein .5s ease
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .polaroids {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px
    }

    .polaroid {
      background: var(--paper);
      padding: 9px 9px 13px;
      border-radius: 8px;
      box-shadow: 0 16px 34px -16px rgba(74, 107, 58, .45);
      transition: transform .4s ease, box-shadow .4s ease
    }

    .polaroid .pic {
      border-radius: 5px;
      aspect-ratio: 1/1;
      overflow: hidden;
      background: var(--leaf-light)
    }

    .polaroid .pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .polaroid .label {
      font-family: var(--hand);
      font-weight: 700;
      font-size: 1rem;
      margin-top: 10px;
      color: var(--bark);
      text-align: center
    }

    .polaroid:nth-child(odd) {
      transform: rotate(-2deg)
    }

    .polaroid:nth-child(even) {
      transform: rotate(2deg);
      margin-top: 18px
    }

    .polaroid:hover,
    .polaroid:focus-within {
      transform: rotate(0) scale(1.04);
      box-shadow: 0 24px 44px -16px rgba(74, 107, 58, .5);
      z-index: 2
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .flip {
      perspective: 1200px;
      height: 128px
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform .7s cubic-bezier(.4, .2, .2, 1);
      transform-style: preserve-3d;
      cursor: pointer
    }

    .flip.flipped .flip-inner {
      transform: rotateY(180deg)
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      align-items: center;
      padding: 20px 22px;
      box-shadow: 0 16px 38px -18px rgba(74, 107, 58, .42)
    }

    .front {
      background: var(--paper);
      gap: 18px;
      border-left: 5px solid var(--leaf)
    }

    .front .avatar {
      width: 84px;
      height: 84px;
      border-radius: 46% 54% 50% 50%;
      background: linear-gradient(135deg, var(--leaf-light), var(--leaf));
      flex: none;
      overflow: hidden
    }

    .front .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .front .t-info {
      flex: 1;
      min-width: 0;
      text-align: left
    }

    .front .name {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--bark)
    }

    .front .role {
      color: var(--ink-soft);
      font-size: .88rem;
      margin-top: 2px
    }

    .front .tap {
      font-family: var(--hand);
      color: var(--moss);
      font-size: .92rem;
      margin-top: 7px;
      font-weight: 700
    }

    .back {
      background: linear-gradient(135deg, var(--moss), var(--bark));
      color: var(--paper-warm);
      transform: rotateY(180deg);
      font-family: var(--display);
      font-size: 1.18rem;
      line-height: 1.6;
      justify-content: center;
      text-align: center
    }

    .notice-list {
      list-style: none
    }

    .notice-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--paper);
      border-radius: 16px;
      padding: 15px 18px;
      margin-bottom: 12px;
      box-shadow: 0 12px 28px -18px rgba(74, 107, 58, .4);
      border: 1px solid rgba(123, 160, 91, .12)
    }

    .notice-item .tag {
      flex: none;
      font-size: .74rem;
      font-weight: 700;
      padding: 5px 11px;
      border-radius: 30px;
      color: #fff
    }

    .tag-event {
      background: var(--leaf)
    }

    .tag-info {
      background: var(--sun-warm)
    }

    .tag-must {
      background: var(--soil)
    }

    .notice-item .n-title {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.4
    }

    .notice-item .n-date {
      color: var(--ink-soft);
      font-size: .82rem;
      margin-top: 3px
    }

    .more-link {
      display: inline-block;
      margin-top: 8px;
      color: var(--moss);
      font-weight: 700;
      text-decoration: none;
      font-size: .92rem
    }

    .cal {
      background: var(--paper);
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 18px 44px -22px rgba(74, 107, 58, .4);
      border: 1px solid rgba(123, 160, 91, .12)
    }

    .cal-head {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 14px;
      color: var(--bark)
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px
    }

    .cal-grid .dow {
      font-size: .78rem;
      color: var(--ink-soft);
      padding: 6px 0;
      font-weight: 600
    }

    .cal-grid .dow:first-child {
      color: var(--soil)
    }

    .day-cell {
      position: relative;
      padding: 10px 0;
      font-size: .9rem;
      border-radius: 10px;
      text-align: center
    }

    .day-cell.muted {
      color: #cdd4c2
    }

    .day-cell.ev {
      background: #EDF3E2;
      color: var(--moss);
      font-weight: 700
    }

    .day-cell.ev::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--leaf);
      transform: translateX(-50%)
    }

    .event-list {
      list-style: none;
      margin-top: 18px
    }

    .event-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 4px;
      border-bottom: 1px solid var(--paper-warm);
      font-size: .95rem
    }

    .event-list li:last-child {
      border-bottom: none
    }

    .event-list .e-date {
      font-weight: 700;
      color: var(--moss);
      font-size: .86rem;
      min-width: 46px
    }

    .faq-item {
      background: var(--paper);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 12px 28px -20px rgba(74, 107, 58, .4);
      border: 1px solid rgba(123, 160, 91, .12)
    }

    .faq-q {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 17px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-family: var(--body)
    }

    .faq-q .chev {
      flex: none;
      width: 11px;
      height: 11px;
      border-right: 2.5px solid var(--leaf);
      border-bottom: 2.5px solid var(--leaf);
      transform: rotate(45deg);
      transition: transform .35s ease;
      margin-top: -4px
    }

    .faq-item.open .faq-q .chev {
      transform: rotate(-135deg);
      margin-top: 2px
    }

    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s ease
    }

    .faq-a p {
      padding: 0 20px 18px;
      color: var(--ink-soft);
      font-size: .94rem;
      line-height: 1.7
    }

    /* ── 마무리 ── */
    .finale {
      padding-top: 80px;
      padding-bottom: 150px;
      text-align: center
    }

    .finale h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 2.1rem;
      line-height: 1.4;
      letter-spacing: -.5px;
      color: var(--bark)
    }

    .finale p {
      color: var(--ink-soft);
      margin: 18px 0 36px;
      font-size: 1rem
    }

    .btn-big {
      display: inline-block;
      background: var(--moss);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 18px 46px;
      border-radius: 8px 30px 30px 30px;
      text-decoration: none;
      box-shadow: 0 16px 34px -10px rgba(74, 107, 58, .6);
      transition: transform .3s ease, box-shadow .3s ease;
      border: none;
      cursor: pointer;
      font-family: var(--body)
    }

    .btn-big:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 40px -10px rgba(74, 107, 58, .7)
    }

    /* ── 플로팅 CTA ── */
    .float {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(120px);
      z-index: 30;
      transition: transform .5s cubic-bezier(.22, .9, .3, 1)
    }

    .float.show {
      transform: translateX(-50%) translateY(0)
    }

    .float.hide {
      transform: translateX(-50%) translateY(120px)
    }

    .float a {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bark);
      color: var(--paper-warm);
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 12px 30px -8px rgba(38, 51, 31, .5);
      font-size: .98rem
    }

    .float a .pulse {
      width: 9px;
      height: 9px;
      border-radius: 0 50% 50% 50%;
      background: var(--leaf);
      transform: rotate(45deg);
      animation: leafpulse 1.8s infinite
    }

    @keyframes leafpulse {

      0%,
      100% {
        transform: rotate(45deg) scale(1)
      }

      50% {
        transform: rotate(45deg) scale(1.3)
      }
    }

    /* ── 모달 ── */
    .csl-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(38, 51, 31, .5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .csl-overlay.open {
      display: flex
    }

    .csl-panel {
      position: relative;
      width: 100%;
      max-width: 390px;
      max-height: 88vh;
      overflow-y: auto;
      background: var(--paper);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 30px 60px -20px rgba(38, 51, 31, .55)
    }

    .csl-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 34px;
      height: 34px;
      border: none;
      background: var(--paper-warm);
      border-radius: 50%;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--ink-soft);
      cursor: pointer
    }

    .csl-title {
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 22px;
      letter-spacing: -.5px;
      color: var(--bark)
    }

    .csl-field {
      margin-bottom: 16px;
      text-align: left
    }

    .csl-field label {
      display: block;
      font-size: .85rem;
      font-weight: 700;
      color: var(--ink-soft);
      margin-bottom: 6px
    }

    .csl-field input[type=text],
    .csl-field input[type=tel],
    .csl-field select {
      width: 100%;
      border: 1.5px solid rgba(123, 160, 91, .3);
      border-radius: 14px;
      padding: 12px 14px;
      font-family: var(--body);
      font-size: .96rem;
      color: var(--ink);
      background: var(--paper-warm);
      outline: none;
    }

    .csl-field input:focus,
    .csl-field select:focus {
      border-color: var(--leaf)
    }

    .csl-consent label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: .85rem;
      font-weight: 400;
      color: var(--ink-soft);
      line-height: 1.5
    }

    .csl-consent input {
      margin-top: 3px;
      flex: none
    }

    .csl-submit {
      width: 100%;
      margin-top: 6px
    }

    .csl-msg.error {
      margin-top: 12px;
      font-size: .85rem;
      color: #C0392B;
      text-align: center
    }

    .csl-done {
      text-align: center;
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--bark);
      padding: 30px 0;
      line-height: 1.7
    }

    footer {
      text-align: center;
      padding: 34px 22px 44px;
      color: var(--ink-soft);
      font-size: .82rem
    }

    footer .demo-tag {
      display: inline-block;
      background: var(--paper);
      border: 1px solid rgba(123, 160, 91, .2);
      border-radius: 30px;
      padding: 6px 16px;
      margin-bottom: 14px;
      font-family: var(--hand);
      font-weight: 700;
      color: var(--moss)
    }

    a:focus-visible,
    .flip-inner:focus-visible,
    .tab-btn:focus-visible {
      outline: 3px solid var(--leaf);
      outline-offset: 3px;
      border-radius: 8px
    }

    @media (max-width:480px) {
      .trail-line {
        left: 28px
      }

      .stop .node {
        left: 28px;
        transform: none;
        width: 42px;
        height: 42px
      }

      .stop .card {
        width: calc(100% - 70px) !important;
        margin-left: auto !important;
        margin-right: 0 !important
      }

      .stop.left .card::before,
      .stop.right .card::before {
        left: -30px !important;
        right: auto !important;
        top: 24px
      }
    }

    @media (prefers-reduced-motion:reduce) {
      * {
        transition: none !important;
        animation: none !important;
        scroll-behavior: auto !important
      }

      .reveal {
        opacity: 1;
        transform: none
      }

      .leaf-float {
        display: none
      }
    }
  </style>
</head>

<body>

  <!-- topbar.js가 nav(brand+홈아이콘+이 메뉴버튼)를 만들어 body 최상단에 삽입 -->

          <div class="csl-field">

          </div>
          <div class="csl-field">

          </div>
          <div class="csl-field">

  </style>
  <script src="supabase-config.js"></script>
  <script src="kakao-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="topbar.js"></script>
  <script>
    function mapRowToData(row) {
      const media = row.center_media || [];
      const byType = (type) => {
        const seen = new Set();
        return media
          .filter(m => m.media_type === type)
          .sort((a, b) => a.sort_order - b.sort_order)
          .filter(m => { // DB에 중복 sort_order 행이 들어간 경우 방어 (같은 사진이 2번 보이는 문제)
            if (seen.has(m.sort_order)) return false;
            seen.add(m.sort_order);
            return true;
          });
      };
      const teacherFallbacks = [
        { name: '김햇살 선생님', role: '만 3세 햇살반 담임', message: '"아이의 속도에<br>맞춰 기다려 줄게요."' },
        { name: '이초록 선생님', role: '만 4세 새싹반 담임', message: '"매일의 작은 성장을<br>놓치지 않을게요."' },
        { name: '박노을 선생님', role: '만 5세 열매반 담임', message: '"마음껏 궁금해하는<br>아이로 도울게요."' }
      ];
      const teacherItems = byType('teacher').map((m, i) => {
        const fallback = teacherFallbacks[i % teacherFallbacks.length];
        return {
          name: m.title || fallback.name,
          role: m.subtitle || fallback.role,
          photo: m.photo_url,
          message: m.caption || fallback.message
        };
      });
      return {
        heroPhoto: (byType('hero')[0] || {}).photo_url || null,
        center: {
          id: row.id, slug: row.slug, name: row.name, theme: row.theme,
          address: row.address, directions_text: row.directions_text,
          menu: row.menu || [],
          hero: row.hero || { eyebrow:'', title:'', title_accent:'', subtitle:'' },
          director: row.director || { badge:'', photo:'', photo_alt:'', message:'', sign_label:'', sign_name:'', scroll_cue:'' },
          philosophy: row.philosophy || null,
          programs: row.programs || null,
          facilities: row.facilities || null
        },
        day_story: byType('day_story').map(m => ({ slot: m.slot, time: m.time_label, title: m.title, photo: m.photo_url, photo_alt: m.photo_alt, caption: m.caption, note: m.note })),
        album: { items: byType('album').map(m => ({ label: m.title, photo: m.photo_url })) },
        teachers: { items: teacherItems },
        notices: row.notices || { eyebrow:'', title:'', items:[], more:'' },
        schedule: row.schedule || { eyebrow:'', title:'', month_label:'', days_in_month:30, event_days:[], trailing_muted:0, events:[] },
        faqs: row.faqs || { eyebrow:'', title:'', items:[] },
        finale: row.finale || { title:'', subtitle:'', cta:'입소 상담' },
        admission: (row.admissions || [])[0] || null,
        footer: row.footer || { tag:'원이야', text:'' }
      };
    }

    (async function () {
      let data;
      const cfg = window.__SUPABASE_CONFIG__;
      const client = supabase.createClient(cfg.url, cfg.anonKey);
      try {
        const slug = new URLSearchParams(location.search).get('slug') || 'haetsal';
        const { data: row, error } = await client.from('centers').select('*, center_media(*), admissions(*), philosophy, programs, facilities').eq('slug', slug).single();
        if (error) throw error;
        data = mapRowToData(row);

        // Storage 경로를 한 번의 batch 서명 요청으로 변환
        async function signPaths(paths){
          const unique = Array.from(new Set(paths.filter(function(path){
            return path && !/^https?:\/\//.test(path);
          })));
          const signedMap = new Map();
          if (unique.length){
            const res = await fetch(cfg.url + '/storage/v1/object/sign/center-images', {
              method: 'POST',
              headers: {
                apikey: cfg.anonKey,
                Authorization: 'Bearer ' + cfg.anonKey,
                'content-type': 'application/json'
              },
              body: JSON.stringify({ paths: unique, expiresIn: 3600 })
            });
            if (!res.ok) throw new Error('Failed to sign center images');
            const signed = await res.json();
            (signed || []).forEach(function(item, index){
              const signedUrl = item.signedURL ? cfg.url + '/storage/v1' + item.signedURL : (item.signedUrl || unique[index]);
              signedMap.set(item.path || unique[index], signedUrl);
            });
          }
          return function(path){ return signedMap.get(path) || path; };
        }
        const resolveSignedPath = await signPaths([]
          .concat((data.day_story || []).map(m => m.photo))
          .concat((data.album?.items || []).map(it => it.photo))
          .concat((data.teachers?.items || []).map(tc => tc.photo))
          .concat(data.center.director ? [data.center.director.photo] : [])
          .concat(data.heroPhoto ? [data.heroPhoto] : []));
        if (data.heroPhoto){ data.heroPhoto = resolveSignedPath(data.heroPhoto); }
        for (const m of data.day_story){ m.photo = resolveSignedPath(m.photo); }
        for (const it of data.album.items){ it.photo = resolveSignedPath(it.photo); }
        for (const tc of data.teachers.items){ tc.photo = resolveSignedPath(tc.photo); }
        if (data.center.director){ data.center.director.photo = resolveSignedPath(data.center.director.photo); }
      } catch (e) {
        console.error(e);
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">원 데이터를 불러오지 못했어요. supabase-config.js를 확인해주세요.</p>';
        return;
      }

      const $ = (id) => document.getElementById(id);
      const esc = (s) => s == null ? '' : s;
      const c = data.center;
      // sunshine 기준 구조 통일: 공지·행사일정 제거 → 메뉴 필터. 하루(#day)·FAQ(#faq) 섹션 유지.
      // 시설 소개/교육프로그램(인페이지 섹션) + 입학안내/오시는 길(새 페이지) 런타임 주입
      (function(){
        var qs = c.slug ? ('?slug=' + encodeURIComponent(c.slug)) : '';
        c.menu = (c.menu || []).filter(function(m){
          return m.href !== '#notice' && m.href !== '#schedule';
        });
        var extra = [];
        extra.push({ href:'#facilitiesSec', label:'시설 소개' });
        extra.push({ href:'#programSec', label:'교육프로그램' });
        if (data.admission) extra.push({ href: 'admissions.html' + qs, label: '입학안내' });
        if ((c.directions_text || '').trim()) extra.push({ href: 'directions.html' + qs, label: '오시는 길' });
        if (extra.length){
          var m = c.menu.slice();
          var i = m.findIndex(function(x){ return x.cta; });
          if (i < 0) i = m.length;
          c.menu = m.slice(0, i).concat(extra, m.slice(i));
        }
      })();

      WoniyaTopbar.init({ centerName: c.name.replace(/\s*어린이집$/, '') || c.name });
      $('menuPanel').innerHTML = (c.menu || []).map(m => `<a href="${esc(m.href)}"${m.cta ? ' class="menu-cta"' : ''}${m.id ? ' id="'+m.id+'"' : ''}>${esc(m.label)}</a>`).join('');

      const h = c.hero;
      const leafMenu = (c.menu || []).filter(m => !m.cta)
        .map(m => `<a class="leaf-btn" href="${esc(m.href)}">${esc(m.label)}</a>`).join('');
      $('hero').innerHTML = `
    <div class="hero-photo reveal">
      <div class="pond-img">
        ${data.heroPhoto ? `<img alt="${esc(c.name)}" src="${esc(data.heroPhoto)}">` : ''}
      </div>
    </div>
    <div class="eyebrow reveal">${esc(h.eyebrow)}</div>
    <h1 class="reveal">${esc(h.title)}<br><span class="glow">${esc(h.title_accent)}</span></h1>
    <p class="reveal">${esc(h.subtitle)}</p>
    <nav class="leaf-menu reveal" aria-label="바로가기">${leafMenu}</nav>
    <div class="enter-cue reveal"><span>숲길을 따라 걸어요</span><span class="path"></span></div>`;

      const d = c.director;
      const msgLines = (d.message||'').replace(/<br\s*\/?>/gi,'\n').split('\n');
      const msgPreview = msgLines.slice(0, 4).join('\n');
      $('greeting').innerHTML = `
    <div class="signpost reveal">
      <div class="portrait"><img alt="${esc(d.photo_alt)}" src="${esc(d.photo)}"></div>
      <div class="badge">${esc(d.badge)}</div>
      <p class="msg">${esc(msgPreview)}</p>
      <div class="sign">${esc(d.sign_label)}<strong>${esc(d.sign_name)}</strong></div>
      <button type="button" class="director-more-btn" id="directorModalOpenBtn">원장 인사말 더보기</button>
    </div>`;

      // 우리 원 현황 카드
      const ovFac = data.center.facilities;
      const ovStats = (ovFac && ovFac.stats) || [];
      const OVERVIEW_LABEL_ALIASES = { '교직원':'선생님' };
      const overviewItems = ovStats.map(function(s){ return { label: OVERVIEW_LABEL_ALIASES[s.label] || s.label, value:s.value }; });
      if (overviewItems.length) {
        $('overviewSec').innerHTML = `
      <div class="overview-card reveal">
        <h2 class="overview-title">우리 원 현황</h2>
        <p class="overview-sub">한눈에 보는 ${esc(c.name)}</p>
        <div class="overview-grid">
          ${overviewItems.map(it=>`
            <div class="overview-item"><div class="o-label">${esc(it.label)}</div><div class="o-value">${esc(it.value)}</div></div>`).join('')}
        </div>
        ${c.address ? `<div class="overview-address"><span class="addr-icon">●</span><span>${esc(c.address)}</span></div>` : ''}
      </div>`;
      } else { document.getElementById('overviewSec').hidden = true; }

      const stops = (data.day_story || []).map((m, i) => {
        const side = i % 2 === 0 ? 'left' : 'right';
        return `
      <div class="stop ${side} reveal">
        <div class="node">${i + 1}</div>
        <div class="card">
          <div class="pic">
            <img decoding="async" alt="${esc(m.photo_alt)}" data-src="${esc(m.photo)}">
            <div class="cap">${esc(m.caption)}</div>
          </div>
          <div class="body">
            <div class="time">${esc(m.time)}</div>
            <div class="title">${esc(m.title)}</div>
            <div class="note">${esc(m.note)}</div>
          </div>
        </div>
      </div>`;
      }).join('');
      $('day').innerHTML = `
    <div class="trail-line"></div>
    <div class="timeline-head reveal">
      <div class="eyebrow">아이의 하루</div>
      <h2>숲길 따라 하루 산책</h2>
    </div>
    ${stops}
    <div class="trail-end reveal"><span class="glade">햇살 비치는 빈터에 도착했어요</span></div>`;

      const t = data.teachers, f = data.faqs;
      const albumImgs = data.album?.items || [];

      // 우리 원 시설 (배지 + 썸네일 + 모달)
      const fac = data.center.facilities;
      if (fac) {
        const badgesHtml = (fac.items||[]).map(ff=>`<span class="fac-badge">${esc(ff.name)}</span>`).join('');
        const thumbHtml = albumImgs.slice(0,4).map(it=>`<div class="fac-thumb"><img data-src="${esc(it.photo)}" alt="${esc(it.label)}"></div>`).join('');
        $('facilitiesSec').innerHTML = `
      <div class="explore-head reveal">
        <div class="eyebrow">🌿 우리 원 시설</div>
        <h2>안전하고 따뜻한 공간</h2>
      </div>
      <p class="fac-intro reveal" style="text-align:center;color:var(--ink-soft);font-size:.96rem;line-height:1.75;margin-bottom:8px">${esc(fac.intro)}</p>
      <div class="fac-badges reveal">${badgesHtml}</div>
      <div class="fac-thumb-grid reveal">${thumbHtml}</div>
      <button type="button" class="fac-more-btn reveal" id="facilityModalOpenBtn">시설 전체 보기</button>`;
      } else { document.getElementById('facilitiesSec').hidden = true; }

      // 선생님
      $('teachersSec').innerHTML = `
    <div class="explore-head reveal">
      <div class="eyebrow">🍃 우리 반 선생님</div>
      <h2>우리 원 선생님</h2>
    </div>
    <div class="cards">${(t?.items || []).map(tc => `
      <div class="flip" tabindex="0" role="button" aria-label="${esc(tc.name)} 카드 뒤집기"><div class="flip-inner">
        <div class="face front"><div class="avatar"><img alt="${esc(tc.name)}" data-src="${esc(tc.photo)}"></div>
          <div class="t-info"><div class="name">${esc(tc.name)}</div><div class="role">${esc(tc.role)}</div><div class="tap">눌러서 한마디 보기</div></div></div>
        <div class="face back">${esc(tc.message)}</div></div></div>`).join('')}</div>`;

      // 교육프로그램 (이미지 카드 + 모달)
      const prog = data.center.programs;
      if (prog) {
        const previewItems = (prog.items||[]).slice(0,2);
        const cardsHtml = previewItems.map((it,i)=>{
          const img = albumImgs[i+4] || albumImgs[i] || null;
          return `<div class="prog-card reveal">
        <div class="prog-img">${img?`<img data-src="${esc(img.photo)}" alt="${esc(it.name)}">`:''}</div>
        <div class="prog-body"><div class="prog-name">${esc(it.name)}</div><div class="prog-desc">${esc(it.desc)}</div></div>
      </div>`;
        }).join('');
        $('programSec').innerHTML = `
      <div class="explore-head reveal">
        <div class="eyebrow">🌱 교육프로그램</div>
        <h2>우리 원의 교육</h2>
      </div>
      <p class="prog-intro reveal" style="text-align:center;color:var(--ink-soft);font-size:.96rem;line-height:1.75;margin-bottom:24px">${esc(prog.intro)}</p>
      ${cardsHtml}
      <button type="button" class="prog-more-btn reveal" id="programModalOpenBtn">교육프로그램 전체 보기</button>`;
      } else { document.getElementById('programSec').hidden = true; }

      // FAQ
      $('faq').innerHTML = `
    <div class="explore-head reveal">
      <div class="eyebrow">🍂 자주 묻는 질문</div>
      <h2>둘러보기</h2>
    </div>
    <div class="faq-wrap">${(f?.items || []).map(it => `
      <div class="faq-item reveal"><button class="faq-q" aria-expanded="false">${esc(it.q)}<span class="chev"></span></button>
        <div class="faq-a"><p>${esc(it.a)}</p></div></div>`).join('')}</div>`;

      const fin = data.finale || {};
      $('finale').innerHTML = `
    <h2 class="reveal">${esc(fin.title)}</h2>
    <p class="reveal">${esc(fin.subtitle)}</p>
    <button type="button" id="cslOpenBtn" class="btn-big reveal">${esc(fin.cta)}</button>`;

      $('footerEl').innerHTML = `<div class="demo-tag">${esc(data.footer?.tag)}</div><div>${esc(data.footer?.text)}</div>`;
      document.title = `원이야 - ${esc(c.name) || '원이야'}`;

      window.__directorData__ = c.director;
      window.__philosophyData__ = data.center.philosophy;
      window.__facilityData__ = data.center.facilities;
      window.__programData__ = data.center.programs;
      window.__albumImgs__ = data.album?.items || [];
      initInteractions();
      renderInfoSections(data, c, esc);
      initConsultationForm(client, c.id);
    })();

    function initInteractions() {
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      initDeferredImages();

      // ── 원장 인사말 모달 ──
      (function(){
        var overlay = document.getElementById('directorModal');
        var closeBtn = document.getElementById('directorModalClose');
        var openBtn = document.getElementById('directorModalOpenBtn');
        if (!overlay) return;
        function open(){
          var d = window.__directorData__;
          var phil = window.__philosophyData__;
          if (d) {
            document.getElementById('directorModalMsg').textContent = (d.message || '').replace(/<br\s*\/?>/gi,'\n');
            var photoEl = document.getElementById('directorModalPhoto');
            if (photoEl) photoEl.innerHTML = d.photo ? '<img alt="'+(d.photo_alt||'')+'" src="'+d.photo+'">' : '';
          }
          var mottoEl = document.getElementById('directorModalMotto');
          var valEl = document.getElementById('directorModalValues');
          if (phil && mottoEl) { mottoEl.textContent = phil.motto || ''; mottoEl.hidden = !phil.motto; }
          if (phil && valEl) { valEl.innerHTML = (phil.values||[]).map(function(v){ return '<span class="info-modal-value">'+v+'</span>'; }).join(''); }
          overlay.classList.add('open');
        }
        function close(){ overlay.classList.remove('open'); }
        if (openBtn) openBtn.addEventListener('click', open);
        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
        document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
      })();

      // ── 시설 모달 ──
      (function(){
        var overlay = document.getElementById('facilityModal');
        var closeBtn = document.getElementById('facilityModalClose');
        var openBtn = document.getElementById('facilityModalOpenBtn');
        if (!overlay) return;
        function open(){
          var fac = window.__facilityData__;
          var albumImgs = window.__albumImgs__ || [];
          if (!fac) return;
          document.getElementById('facilityIntro').textContent = fac.intro || '';
          document.getElementById('facilityList').innerHTML = (fac.items||[]).map(function(f, i){
            var img = albumImgs[i] || null;
            return '<div class="fac-modal-item">'
              + (img ? '<div class="fm-img"><img src="'+img.photo+'" alt="'+f.name+'"></div>' : '')
              + '<div class="fm-body"><div class="fm-name">'+f.name+'</div><div class="fm-desc">'+(f.desc||'')+'</div></div>'
              + '</div>';
          }).join('');
          overlay.classList.add('open');
        }
        function close(){ overlay.classList.remove('open'); }
        if (openBtn) openBtn.addEventListener('click', open);
        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
        document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
      })();

      // ── 교육프로그램 모달 ──
      (function(){
        var overlay = document.getElementById('programModal');
        var closeBtn = document.getElementById('programModalClose');
        var openBtn = document.getElementById('programModalOpenBtn');
        if (!overlay) return;
        function open(){
          var prog = window.__programData__;
          var albumImgs = window.__albumImgs__ || [];
          if (!prog) return;
          document.getElementById('programModalIntro').textContent = prog.intro || '';
          document.getElementById('programModalList').innerHTML = (prog.items||[]).map(function(it, i){
            var img = albumImgs[i+4] || albumImgs[i] || null;
            return '<div class="prog-modal-item">'
              + (img ? '<div class="pm-img"><img src="'+img.photo+'" alt="'+it.name+'"></div>' : '')
              + '<div class="pm-body"><div class="pm-name">'+it.name+'</div><div class="pm-desc">'+it.desc+'</div></div>'
              + '</div>';
          }).join('');
          overlay.classList.add('open');
        }
        function close(){ overlay.classList.remove('open'); }
        if (openBtn) openBtn.addEventListener('click', open);
        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
        document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
      })();

      // ── 라이트박스 ──
      (function(){
        var overlay = document.getElementById('lightbox');
        var closeBtn = document.getElementById('lightboxClose');
        var img = document.getElementById('lightboxImg');
        var cap = document.getElementById('lightboxCap');
        if (!overlay) return;
        function open(src, alt){
          img.src = src; img.alt = alt || '';
          cap.textContent = alt || '';
          overlay.classList.add('open');
        }
        function close(){ overlay.classList.remove('open'); img.src=''; }
        window.__openLightbox__ = open;
        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
        document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
      })();

      // ── '우리 반' 버튼 → ourclass.html ──
      var ourclassBtn = document.getElementById('ourclassBtn');
      if (ourclassBtn) ourclassBtn.addEventListener('click', function(e){
        e.preventDefault();
        location.href = 'ourclass.html';
      });

      // ── 앨범 이미지 라이트박스 연결 ──
      document.querySelectorAll('.polaroid img, .snap img, .art img, .photo-grid img').forEach(function(img){
        img.style.cursor = 'pointer';
        img.addEventListener('click', function(){
          if (window.__openLightbox__ && img.src) window.__openLightbox__(img.src, img.alt);
        });
      });

      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      var revealEls = document.querySelectorAll('.reveal');
      revealEls.forEach(function (el) { io.observe(el); });
      requestAnimationFrame(function () {
        revealEls.forEach(function (el) { el.classList.add('in'); });
      });

      var bg = document.querySelector('.forest-bg');
      var rays = document.querySelector('.light-rays');
      var depths = [
        { top: '#DCE8CC', bot: '#EEF2E0', rays: .9 },
        { top: '#C4D8B0', bot: '#DCE8CC', rays: .8 },
        { top: '#A8C690', bot: '#C4D8B0', rays: .7 },
        { top: '#8CB074', bot: '#A8C690', rays: .65 },
        { top: '#F4E8C4', bot: '#DCE8CC', rays: 1 }
      ];
      var stops = Array.prototype.slice.call(document.querySelectorAll('.stop'));
      var current = -1;
      var dio = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            var idx = stops.indexOf(e.target);
            var step = Math.min(idx, depths.length - 1);
            if (step !== current) {
              current = step; var p = depths[step];
              bg.style.background = 'linear-gradient(180deg,' + p.top + ' 0%,' + p.bot + ' 60%)';
              rays.style.opacity = p.rays;
            }
          }
        });
      }, { rootMargin: '-45% 0px -45% 0px' });
      stops.forEach(function (s) { dio.observe(s); });

      // 떠다니는 나뭇잎
      if(!reduce){
        var leafColors = ['#7BA05B','#A8C686','#4A6B3A','#E8B864'];
        for(var i=0;i<5;i++){
          (function(idx){
            var leaf = document.createElement('div');
            leaf.className = 'leaf-float';
            var size = 14 + Math.random()*12;
            var col = leafColors[idx % leafColors.length];
            leaf.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24"><path d="M12 2 Q22 8 12 22 Q2 8 12 2Z" fill="'+col+'"/><path d="M12 4 V20" stroke="rgba(255,255,255,.4)" stroke-width="1"/></svg>';
            leaf.style.top = '0px';
            document.body.appendChild(leaf);
            var baseX = Math.random()*100;
            var y = -40 - Math.random()*window.innerHeight;
            var speed = 0.4+Math.random()*0.5, sway = 14+Math.random()*22, phase = Math.random()*6.28, rot = Math.random()*360;
            function fall(){
              y += speed; phase += 0.015; rot += 0.4;
              if(y > window.innerHeight + 40){ y = -40; baseX = Math.random()*100; }
              leaf.style.left = baseX + '%';
              leaf.style.transform = 'translate('+(Math.sin(phase)*sway)+'px,'+y+'px) rotate('+rot+'deg)';
              requestAnimationFrame(fall);
            }
            fall();
          })(i);
        }
      }

      var tabBtns = document.querySelectorAll('.tab-btn');
      var tabPanels = document.querySelectorAll('.tab-panel');
      tabBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var tab = btn.getAttribute('data-tab');
          tabBtns.forEach(function (b) { b.classList.remove('active'); });
          tabPanels.forEach(function (p) { p.classList.remove('active'); });
          btn.classList.add('active');
          document.querySelector('.tab-panel[data-panel="' + tab + '"]').classList.add('active');
        });
      });

      document.querySelectorAll('.flip').forEach(function (card) {
        function toggle() { card.classList.toggle('flipped'); }
        card.addEventListener('click', toggle);
        card.addEventListener('keydown', function (ev) { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle(); } });
      });

      var floatEl = document.getElementById('float');
      var hero = document.querySelector('.hero');
      var finale = document.getElementById('finale');
      var fio = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.target === hero) { if (e.isIntersecting) { floatEl.classList.remove('show'); } else { floatEl.classList.add('show'); } }
          if (e.target === finale) { if (e.isIntersecting) { floatEl.classList.add('hide'); } else { floatEl.classList.remove('hide'); } }
        });
      }, { threshold: 0.4 });
      fio.observe(hero); fio.observe(finale);

      var menuBtn = document.getElementById('menuBtn');
      var menuPanel = document.getElementById('menuPanel');
      function closeMenu() { menuBtn.classList.remove('open'); menuPanel.classList.remove('open'); menuBtn.setAttribute('aria-expanded', 'false'); }
      menuBtn.addEventListener('click', function () {
        var open = menuPanel.classList.toggle('open');
        menuBtn.classList.toggle('open', open);
        menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
      menuPanel.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', closeMenu); });
      document.addEventListener('click', function (e) { if (!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) closeMenu(); });

      document.querySelectorAll('.faq-item').forEach(function (item) {
        var q = item.querySelector('.faq-q');
        var a = item.querySelector('.faq-a');
        q.addEventListener('click', function () {
          var open = item.classList.toggle('open');
          q.setAttribute('aria-expanded', open ? 'true' : 'false');
          a.style.maxHeight = open ? (a.scrollHeight + 'px') : null;
        });
      });
    }

    function initDeferredImages(){
      var imgs = document.querySelectorAll('img[data-src]');
      if (!imgs.length) return;
      function load(img){
        if (!img.dataset.src) return;
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      if (!('IntersectionObserver' in window)){
        imgs.forEach(load);
        return;
      }
      var observer = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if (!entry.isIntersecting) return;
          load(entry.target);
          observer.unobserve(entry.target);
        });
      }, { rootMargin: '200px' });
      imgs.forEach(function(img){ observer.observe(img); });
    }

    // ── 입학안내(admissions) + 오시는 길(directions) 렌더 (M1) ──
    function renderInfoSections(data, c, esc){
      // M2: 입학안내·오시는 길은 공개형 새 페이지로 분리. 메인에는 요약+이동 버튼만 남긴다.
      var qs = c.slug ? ('?slug=' + encodeURIComponent(c.slug)) : '';
      var admSec = document.getElementById('admissionsSec');
      if (admSec){
        if (!data.admission){ admSec.hidden = true; }
        else {
          admSec.hidden = false;
          var adm = data.admission;
          admSec.innerHTML = '<h2 class="info-title">입학안내</h2>'
            + '<div class="adm-preview" style="background:var(--paper);border-radius:16px;padding:18px 20px;box-shadow:0 12px 28px -18px rgba(47,61,42,.25);margin:0 0 16px;text-align:left">'
            + (adm.target ? '<div style="font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-bottom:4px">모집 대상</div><div style="font-size:.96rem;color:var(--ink);margin-bottom:12px">'+esc(adm.target)+'</div>' : '')
            + (adm.period ? '<div style="font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-bottom:4px">모집 기간</div><div style="font-size:.96rem;color:var(--ink)">'+esc(adm.period)+'</div>' : '')
            + '</div>'
            + '<a class="info-link-btn" href="admissions.html' + qs + '">입학안내 자세히 보기 →</a>';
        }
      }
      var dirSec = document.getElementById('directionsSec');
      if (dirSec){
        if (!(c.directions_text || '').trim()){ dirSec.hidden = true; }
        else {
          dirSec.hidden = false;
          dirSec.innerHTML = '<h2 class="info-title">오시는 길</h2>'
            + '<p class="info-lead">지도와 교통편·주차 안내를 확인하세요.</p>'
            + '<a class="info-link-btn" href="directions.html' + qs + '">오시는 길 보기 →</a>';
        }
      }
    }

    // 카카오맵 JS SDK: 주소 검색 후 마커 표시. 키는 kakao-config.js(window.__KAKAO_CONFIG__)에서 주입.
    function loadKakaoMap(address, containerId){
      var cfg = window.__KAKAO_CONFIG__;
      var container = document.getElementById(containerId);
      if (!container || !address) return;
      if (!cfg || !cfg.appkey){ console.warn('[kakao] appkey 없음 — 지도를 건너뜁니다.'); return; }
      function render(){
        kakao.maps.load(function(){
          var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 });
          var geocoder = new kakao.maps.services.Geocoder();
          geocoder.addressSearch(address, function(result, status){
            if (status === kakao.maps.services.Status.OK){
              var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
              map.setCenter(coords);
              new kakao.maps.Marker({ map: map, position: coords });
            }
          });
        });
      }
      if (window.kakao && window.kakao.maps){ render(); return; }
      if (!window.__kakaoSDKPromise){
        window.__kakaoSDKPromise = new Promise(function(resolve, reject){
          var s = document.createElement('script');
          s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(cfg.appkey) + '&libraries=services&autoload=false';
          s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      window.__kakaoSDKPromise.then(render).catch(function(){ console.error('[kakao] SDK 로드 실패'); });
    }

    function initConsultationForm(client, centerId) {
      var overlay = document.getElementById('cslOverlay');
      var openBtn = document.getElementById('cslOpenBtn');
      var closeBtn = document.getElementById('cslCloseBtn');
      var form = document.getElementById('cslForm');
      var errorEl = document.getElementById('cslError');
      var formWrap = document.getElementById('cslFormWrap');
      var doneWrap = document.getElementById('cslDoneWrap');

      function openModal() { overlay.classList.add('open'); formWrap.hidden = false; doneWrap.hidden = true; form.reset(); errorEl.textContent = ''; }
      function closeModal() { overlay.classList.remove('open'); }

      if (openBtn) openBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.textContent = '';
        if (!document.getElementById('csl-consent').checked) { errorEl.textContent = '개인정보 수집 동의가 필요해요.'; return; }
        var payload = {
          center_id: centerId,
          parent_name: document.getElementById('csl-name').value,
          phone: document.getElementById('csl-phone').value,
          kind: document.getElementById('csl-kind').value,
          wish_class: document.getElementById('csl-class').value || null,
          wish_time: document.getElementById('csl-time').value || null,
          consent_at: new Date().toISOString()
        };
        var submitBtn = form.querySelector('.csl-submit');
        submitBtn.disabled = true;
        var { error } = await client.from('consultations').insert(payload);
        submitBtn.disabled = false;
        if (error) { console.error(error); errorEl.textContent = '접수 중 문제가 생겼어요. 다시 시도해주세요.'; return; }
        formWrap.hidden = true;
        doneWrap.hidden = false;
      });
    }
  </script>
