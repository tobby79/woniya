<script>
// 모든 렌더 함수(async IIFE, initInteractions 등)가 공유하는 escape 헬퍼.
// 최상단 스크립트 스코프에 둬야 initInteractions처럼 async IIFE 바깥에서 정의된
// 함수에서도 클로저로 접근할 수 있다.
const esc = (s) => {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};

function escWithBr(text){
  var normalized = (text || '').replace(/<br\s*\/?>/gi, '\n');
  return esc(normalized).replace(/\n/g, '<br>');
}

function heroTitleHtml(title, accent, accentClass){
  var titleHtml = escWithBr(title);
  var accentHtml = escWithBr(accent);
  if (!accentHtml) return titleHtml;
  var hasBreak = /<br\s*\/?>|\r?\n/i.test(title || '') || /^\s*(?:<br\s*\/?>|\r?\n)/i.test(accent || '');
  var joiner = hasBreak ? '' : (accentClass ? '<br>' : ' ');
  var cls = accentClass ? ' class="' + accentClass + '"' : '';
  return titleHtml + joiner + '<span' + cls + '>' + accentHtml + '</span>';
}

// center_media(행 단위)를 기존 haetsal.json 모양(day_story[]/album.items[]/teachers.items[])으로 되돌린다.
// album/teachers의 eyebrow·title·sub는 아직 centers 테이블에 컬럼이 없어 고정 문구로 채운다.
function mapRowToData(row){
  const media = row.center_media || [];
  const byType = (type) => {
    const seen = new Set();
    return media
      .filter(m => m.media_type === type)
      .sort((a,b) => a.sort_order - b.sort_order)
      .filter(m => { // DB에 중복 sort_order 행이 들어간 경우 방어 (같은 사진이 2번 보이는 문제)
        if (seen.has(m.sort_order)) return false;
        seen.add(m.sort_order);
        return true;
      });
  };
  const teacherFallbacks = [
    { name: '김햇살 선생님', role: '만 3세 햇살반 담임', message: '"아이의 속도에<br>맞춰 기다려 줄게요."' },
    { name: '이초록 선생님', role: '만 4세 새싹반 담임', message: '"매일의 작은 성장을<br>놓치지 않을게요."' },
    { name: '박노을 선생님', role: '만 5세 열매반 담임', message: '"마음껏 궁금해하는<br>아이로 도울게요."' }
  ];
  const teacherItems = byType('teacher').map((m, i) => {
    const fallback = teacherFallbacks[i % teacherFallbacks.length];
    return {
      name: m.title || fallback.name,
      role: m.subtitle || fallback.role,
      photo: m.photo_url,
      message: m.caption || fallback.message
    };
  });

  return {
    heroPhoto: (byType('hero')[0] || {}).photo_url || null,
    center: {
      id: row.id,
      slug: row.slug,
      name: row.name,
      theme: row.theme,
      address: row.address,
      directions_text: row.directions_text,
      menu: row.menu || [],
      hero: row.hero || { eyebrow:'', title:'', title_accent:'', subtitle:'' },
      director: row.director || { badge:'', photo:'', photo_alt:'', message:'', sign_label:'', sign_name:'', scroll_cue:'' },
      philosophy: row.philosophy || null,
      programs: row.programs || null,
      facilities: row.facilities || null
    },
    day_story: byType('day_story').map(m => ({
      slot: m.slot,
      time: m.time_label,
      title: m.title,
      photo: m.photo_url,
      photo_alt: m.photo_alt,
      caption: m.caption,
      note: m.note
    })),
    album: {
      eyebrow: '우리 원의 추억',
      title: '사진으로 보는 일상',
      sub: '눌러서 더 가까이 들여다보세요',
      items: byType('album').map(m => ({ label: m.title, photo: m.photo_url }))
    },
    teachers: {
      eyebrow: '믿고 맡기는 사람들',
      title: '우리 반 선생님',
      items: teacherItems
    },
    notices: row.notices || { eyebrow:'', title:'', items:[], more:'' },
    schedule: row.schedule || { eyebrow:'', title:'', month_label:'', days_in_month:30, event_days:[], trailing_muted:0, events:[] },
    faqs: row.faqs || { eyebrow:'', title:'', items:[] },
    finale: row.finale || { title:'', subtitle:'', cta:'입소 상담' },
    admission: (row.admissions || [])[0] || null,
    footer: row.footer || { tag:'원이야', text:'' }
  };
}

(async function(){
  // ─────────────────────────────────────────────
  // 1) 데이터 불러오기 — Supabase에서 centers + center_media를 한 번에 조회
  // ─────────────────────────────────────────────
  let data;
  const cfg = window.__SUPABASE_CONFIG__;
  const client = supabase.createClient(cfg.url, cfg.anonKey);
  let isPreviewMode = false;
  const PREVIEW_TEMPLATE_IDS = ['sunshine', 'carnival', 'forest', 'gallery'];
  const PREVIEW_MESSAGE = '이것은 템플릿 미리보기입니다. 실제 신청은 접수되지 않습니다.';

  function normalizePreviewId(value){
    return PREVIEW_TEMPLATE_IDS.includes(value) ? value : '';
  }

  function publicTemplateUrl(path){
    if (!path || /^https?:\/\//.test(path) || /^data:/i.test(path)) return path;
    const res = client.storage.from('template-previews').getPublicUrl(path);
    return res && res.data && res.data.publicUrl ? res.data.publicUrl : path;
  }

  function resolveTemplateAssets(row){
    if (Array.isArray(row.center_media)){
      row.center_media = row.center_media.map(function(m){
        if (!m || !m.photo_url) return m;
        return Object.assign({}, m, { photo_url: publicTemplateUrl(m.photo_url) });
      });
    }
    if (row.director && row.director.photo){
      row.director = Object.assign({}, row.director, { photo: publicTemplateUrl(row.director.photo) });
    }
    ['facilities', 'programs'].forEach(function(key){
      if (!row[key] || !Array.isArray(row[key].items)) return;
      row[key] = Object.assign({}, row[key], {
        items: row[key].items.map(function(item){
          if (!item || !item.photo_url) return item;
          return Object.assign({}, item, { photo_url: publicTemplateUrl(item.photo_url) });
        })
      });
    });
    return row;
  }

  async function loadTemplatePreview(templateId){
    const centerRes = await client.from('template_centers').select('*').eq('template_id', templateId).single();
    if (centerRes.error) throw centerRes.error;
    const row = centerRes.data;
    const mediaRes = await client.from('template_center_media').select('*').eq('template_center_id', row.id).order('sort_order', { ascending: true });
    if (mediaRes.error) throw mediaRes.error;
    const admissionRes = await client.from('template_admissions').select('*').eq('template_center_id', row.id).maybeSingle();
    if (admissionRes.error) throw admissionRes.error;
    row.center_media = mediaRes.data || [];
    row.admissions = admissionRes.data ? [admissionRes.data] : [];
    return mapRowToData(resolveTemplateAssets(row));
  }

  let isAdminPreviewMode = false;

  // Storage 경로를 한 번의 batch 서명 요청으로 변환
  async function signPaths(paths){
    const unique = Array.from(new Set(paths.filter(function(path){
      return path && !/^https?:\/\//.test(path);
    })));
    const signedMap = new Map();
    if (unique.length){
      const res = await fetch(cfg.url + '/storage/v1/object/sign/center-images', {
        method: 'POST',
        headers: {
          apikey: cfg.anonKey,
          Authorization: 'Bearer ' + cfg.anonKey,
          'content-type': 'application/json'
        },
        body: JSON.stringify({ paths: unique, expiresIn: 3600 })
      });
      if (!res.ok) throw new Error('Failed to sign center images');
      const signed = await res.json();
      (signed || []).forEach(function(item, index){
        const signedUrl = item.signedURL ? cfg.url + '/storage/v1' + item.signedURL : (item.signedUrl || unique[index]);
        signedMap.set(item.path || unique[index], signedUrl);
      });
    }
    return function(path){ return signedMap.get(path) || path; };
  }

  async function signCenterPhotos(data){
    const resolveSignedPath = await signPaths([]
      .concat((data.day_story || []).map(m => m.photo))
      .concat((data.album?.items || []).map(it => it.photo))
      .concat((data.teachers?.items || []).map(tc => tc.photo))
      .concat(data.center.director ? [data.center.director.photo] : [])
      .concat(data.heroPhoto ? [data.heroPhoto] : []));
    if (data.heroPhoto){ data.heroPhoto = resolveSignedPath(data.heroPhoto); }
    for (const m of data.day_story){ m.photo = resolveSignedPath(m.photo); }
    for (const it of data.album.items){ it.photo = resolveSignedPath(it.photo); }
    for (const tc of data.teachers.items){ tc.photo = resolveSignedPath(tc.photo); }
    if (data.center.director){ data.center.director.photo = resolveSignedPath(data.center.director.photo); }
  }

  try {
    const params = new URLSearchParams(location.search);
    const slugParam = params.get('slug');
    const previewCenterSlug = (!slugParam) ? (params.get('preview_center') || '').trim() : '';
    const previewId = (slugParam || previewCenterSlug) ? '' : normalizePreviewId(params.get('preview'));

    if (previewId){
      // ── 기존: 템플릿 샘플 미리보기 (?preview=sunshine 등) — 절대 변경 금지 ──
      isPreviewMode = true;
      data = await loadTemplatePreview(previewId);
    } else if (previewCenterSlug){
      // ── 신규: 관리자 draft 원 미리보기 (?preview_center=slug) ──
      const sessionRes = await client.auth.getSession();
      const session = sessionRes.data ? sessionRes.data.session : null;
      const isAdmin = !!(session && (session.user.email || '').toLowerCase() === 'tobby79@naver.com');
      if (!isAdmin){
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">관리자 로그인이 필요합니다.</p>';
        return;
      }
      const previewRes = await client.rpc('get_center_preview', { p_slug: previewCenterSlug });
      if (previewRes.error) throw previewRes.error;
      if (!previewRes.data){
        document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">원 데이터를 불러오지 못했어요. slug를 확인해주세요.</p>';
        return;
      }
      isAdminPreviewMode = true;
      data = mapRowToData(previewRes.data);
      await signCenterPhotos(data);
    } else {
      // ── 기존: 공개 원 조회 (?slug=slug) — 절대 변경 금지 ──
      const slug = slugParam || 'haetsal';
      const { data: row, error } = await client
        .from('centers')
        .select('*, center_media(*), admissions(*), philosophy, programs, facilities')
        .eq('slug', slug)
        .single();
      if (error) throw error;
      data = mapRowToData(row);
      await signCenterPhotos(data);
    }

    const previewBanner = document.getElementById('previewBanner');
    if (previewBanner) {
      if (isAdminPreviewMode) {
        previewBanner.textContent = '관리자 미리보기 — 비공개 상태';
        previewBanner.hidden = false;
      } else {
        previewBanner.textContent = '템플릿 미리보기';
        previewBanner.hidden = !isPreviewMode;
      }
    }

    const themeParam = new URLSearchParams(location.search).get('theme') || (data.center.theme || '');
    if (themeParam) document.documentElement.setAttribute('data-theme', themeParam);
  } catch (e) {
    console.error(e);
    document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">원 데이터를 불러오지 못했어요. supabase-config.js의 URL/키를 확인해주세요.</p>';
    return;
  }

  const $ = (id)=>document.getElementById(id);

  // ── 상단바 / 메뉴 ──
  const c = data.center;
  // 공지·행사일정 섹션은 제거됨 → 메뉴에서 필터. 하루 스토리(#day)는 복원되어 유지.
  // 시설 소개/교육프로그램(인페이지 섹션) + 입학안내/오시는 길(새 페이지) 런타임 주입
  (function(){
    var qs = c.slug ? ('?slug=' + encodeURIComponent(c.slug)) : '';
    c.menu = (c.menu || []).filter(function(m){
      return m.href !== '#notice' && m.href !== '#schedule';
    });
    var extra = [];
    extra.push({ href:'#facilitiesSec', label:'시설 소개' });
    extra.push({ href:'#programSec', label:'교육프로그램' });
    if (data.admission) extra.push({ href: 'admissions.html' + qs, label: '입학안내' });
    if ((c.directions_text || '').trim()) extra.push({ href: 'directions.html' + qs, label: '오시는 길' });
    extra.push({ href: 'parent.html', label: '우리 반 미니홈피' });
    if (extra.length){
      var m = c.menu.slice();
      m = m.filter(function(x){ return x.href !== 'parent.html'; });
      var i = m.findIndex(function(x){ return x.cta; });
      if (i < 0) i = m.length;
      c.menu = m.slice(0, i).concat(extra, m.slice(i));
    }
  })();
  WoniyaTopbar.init({ centerName: c.name.replace(/\s*어린이집$/,'') || c.name });
  $('menuPanel').innerHTML = (c.menu || []).map(m =>
    `<a href="${esc(m.href)}"${m.cta?' class="menu-cta"':''}${m.id?' id="'+m.id+'"':''}>${esc(m.label)}</a>`).join('');

  // ── 히어로 ──
  const h = c.hero;
  const cloudMenu = (c.menu || []).filter(m=>!m.cta)
    .map((m,i)=>`<a class="cloud-link" style="--cloud-float-delay:${(i%5)*0.6}s;animation-duration:${3.4+(i%3)*0.5}s" href="${esc(m.href)}">${esc(m.label)}</a>`).join('');
  if (data.heroPhoto) $('hero').classList.add('has-photo');
  $('hero').innerHTML = `
    ${data.heroPhoto ? `<div class="hero-bg"><img alt="${esc(c.name)}" src="${esc(data.heroPhoto)}"></div>` : ''}
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="eyebrow reveal">${escWithBr(h.eyebrow)}</div>
    <h1 class="reveal">${heroTitleHtml(h.title, h.title_accent, 'glow')}</h1>
    <p class="reveal">${escWithBr(h.subtitle)}</p>
    <nav class="cloud-menu reveal" aria-label="바로가기">${cloudMenu}</nav>`;

  // ── 원장 인사말 ──
  // 기존 별도 #greeting 섹션은 제거됨. 원장 인사말은 "우리 원 스토리" 책의
  // 2번째 페이지(.sb-director)로 통합되어 아래 하루 스토리 렌더 블록에서 그린다.
  // 모달용 데이터(window.__directorData__)는 하단에서 계속 노출된다.

  // ── 우리 원 현황 카드 ──
  // (facilities는 아래 시설 섹션에서 const fac으로 다시 쓰므로 여기선 ovFac로 분리)
  const ovFac = data.center.facilities;
  const stats = (ovFac && ovFac.stats) || [];
  const OVERVIEW_LABEL_ALIASES = { '교직원':'선생님' };
  const overviewItems = stats.map(function(s){ return { label: OVERVIEW_LABEL_ALIASES[s.label] || s.label, value:s.value }; });
  if (overviewItems.length) {
    $('overviewSec').innerHTML = `
      <div class="overview-card reveal">
        <h2 class="overview-title">우리 원 현황</h2>
        <p class="overview-sub">한눈에 보는 ${esc(c.name)}</p>
        <div class="overview-grid">
          ${overviewItems.map(it=>`
            <div class="overview-item">
              <div class="o-label">${esc(it.label)}</div>
              <div class="o-value">${esc(it.value)}</div>
            </div>`).join('')}
        </div>
        ${c.address ? `<div class="overview-address"><span class="addr-icon">●</span><span>${esc(c.address)}</span></div>` : ''}
      </div>`;
  } else {
    document.getElementById('overviewSec').hidden = true;
  }

  // ── 하루 스토리 (동화책: 표지 → moment별 스토리 → 마무리) ──
  const SUN_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>';
  const MOON_ICON_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.4 14.7A8.5 8.5 0 1 1 9.3 3.6a7 7 0 0 0 11.1 11.1z"/></svg>';
  const CHEVRON_L = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 5 8 12 15 19"/></svg>';
  const CHEVRON_R = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 5 16 12 9 19"/></svg>';
  const BOOKMARK_HTML = '<div class="sb-bookmark" aria-hidden="true"><span class="m-icon">🌱</span></div>';
  const ORDINALS = ['첫','두','세','네','다섯','여섯','일곱','여덟','아홉','열'];
  function ordName(n){ return (ORDINALS[n-1] || (n + '')) + ' 번째 이야기'; }

  // "오전/오후 N시" 표기를 24시간제 시각(0~23)으로 정확히 변환.
  // 오전 12시=자정(0시), 오후 12시=정오(12시)라는 12시간제 규칙을 반영해야
  // "오후 12시"(정오)가 저녁으로 오판되지 않는다.
  function parseHour24(timeStr){
    const t = timeStr || '';
    const m = t.match(/(오전|오후)\s*(\d{1,2})시/);
    if (!m) return null;
    const period = m[1];
    let hour = Number(m[2]) % 12; // 12시는 0으로 정규화
    if (period === '오후') hour += 12;
    return hour;
  }
  // 06:00~17:59는 해, 18:00~05:59는 달. time 파싱 실패 시에만 slot(dusk)으로 폴백.
  function isDuskTime(m){
    const hour = parseHour24(m.time);
    if (hour != null) return hour >= 18 || hour < 6;
    return m.slot === 'dusk';
  }

  const dayMoments = data.day_story || [];
  const centerName = (c.name || '우리 원').replace(/\s*어린이집$/, '') || c.name;
  const todayLabel = (function(){
    const d = new Date();
    return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  })();

  // 원장 인사말: 기존 별도 섹션 대신 책 2번째 페이지로 통합. 데이터는 c.director 재사용.
  const dir = c.director || {};
  const dirMsgLines = (dir.message || '').replace(/<br\s*\/?>/gi, '\n').split('\n');
  const dirMsgPreview = dirMsgLines.slice(0, 4).join('\n');
  const hasDirector = !!(dir.photo || (dir.message || '').trim() || dir.sign_name);

  if (!dayMoments.length){
    // moment가 없으면 섹션 숨김 (기존 동작과 동일한 안전 처리)
    $('day').hidden = true;
  } else {
    const total = dayMoments.length;
    // 표지 페이지
    const coverPage = `
      <article class="sb-page sb-cover" data-slot="morning" data-kind="cover" aria-roledescription="book page" aria-label="표지">
        ${BOOKMARK_HTML}
        <div>
          <div class="cover-eyebrow">그림책처럼 보는</div>
          <h3 class="cover-title">${esc(centerName)}의<br>우리 원 이야기</h3>
          <div class="cover-date">${esc(todayLabel)}</div>
          <div class="cover-mascot" aria-hidden="true">🐻</div>
          <div class="cover-hint">책장을 넘겨 보세요 →</div>
        </div>
      </article>`;
    // 원장 인사말 페이지 (표지 다음). 화면에 보이는 별도 텍스트 라벨은 없음(표지와 동일하게 라벨 생략).
    // 접근성 라벨(aria-label)만 페이지 성격을 알려준다.
    const directorPage = hasDirector ? `
      <article class="sb-page sb-director" data-slot="mid-morning" data-kind="director" aria-roledescription="book page" aria-label="원장님 이야기">
        ${BOOKMARK_HTML}
        <div class="sb-portrait">${dir.photo ? `<img alt="${esc(dir.photo_alt)}" data-src="${esc(dir.photo)}">` : ''}</div>
        <div class="sb-fold" aria-hidden="true"></div>
        <div class="sb-text">
          ${dir.badge ? `<span class="dir-badge">${esc(dir.badge)}</span>` : ''}
          <div class="dir-sign">${esc(dir.sign_label)}<strong>${esc(dir.sign_name)}</strong></div>
          <p class="dir-msg" id="sbDirectorMsg">${escWithBr(dirMsgPreview)}</p>
          <button type="button" class="dir-more" id="directorModalOpenBtn">인사말 더보기<span class="btn-arrow" aria-hidden="true">→</span></button>
        </div>
      </article>` : '';
    // 스토리 페이지들.
    // 데이터에 따라 note가 비어있고 caption에 설명 문장이 들어오는 경우가 있다.
    // 본문(.note)에는 항상 설명 문장(note || caption)을 싣고, 사진 오버레이(.cap)는
    // note와 caption이 서로 다른 별도 문구일 때만 짧은 감성 문구로 표시해 중복/오버플로를 막는다.
    const storyPages = dayMoments.map((m,i)=>{
      const noteText = (m.note && m.note.trim()) ? m.note : (m.caption || '');
      const overlayText = (m.note && m.note.trim() && m.caption && m.caption.trim() && m.caption.trim() !== m.note.trim())
        ? m.caption : '';
      return `
      <article class="sb-page sb-story" data-slot="${esc(m.slot)}" data-kind="story" aria-roledescription="book page" aria-label="${esc(ordName(i+1))}">
        ${BOOKMARK_HTML}
        <div class="sb-photo">
          <div class="pic">
            <img alt="${esc(m.photo_alt)}" data-src="${esc(m.photo)}">
            ${overlayText ? `<div class="cap">${escWithBr(overlayText)}</div>` : ''}
          </div>
        </div>
        <div class="sb-fold" aria-hidden="true"></div>
        <div class="sb-text">
          <div class="time">${isDuskTime(m) ? MOON_ICON_SVG : SUN_ICON_SVG}${esc(m.time)}</div>
          <h3 class="title">${escWithBr(m.title)}</h3>
          <p class="note">${escWithBr(noteText)}</p>
        </div>
        <span class="sb-label" aria-label="${esc(total)}장 중 ${esc(ordName(i+1))}">
          <span class="ord">${esc(ordName(i+1))}</span>
          <span class="total">${esc(total)}장 중</span>
        </span>
      </article>`;
    }).join('');
    // 마무리 페이지
    const finalePage = `
      <article class="sb-page sb-finale" data-slot="dusk" data-kind="finale" aria-roledescription="book page" aria-label="마지막 이야기">
        ${BOOKMARK_HTML}
        <div>
          <div class="fin-eyebrow">마지막 이야기</div>
          <div class="fin-mascot" aria-hidden="true">🐻</div>
          <h3 class="fin-title">오늘 하루도<br>잘 보냈어요</h3>
          <p class="fin-text">내일 이야기도 기대해주세요.<br>${esc(centerName)}에서 아이의 반짝이는 순간을 계속 담아둘게요.</p>
          <div class="fin-cta-slot" aria-hidden="true">알림장으로 이어가기</div>
        </div>
      </article>`;

    // 점 인디케이터: 표지 + (원장) + 스토리 + 마무리 전체 페이지 수
    const pageCount = total + 2 + (hasDirector ? 1 : 0);
    const dotsHtml = Array.from({length: pageCount}, (_,i)=>
      `<button type="button" role="tab" aria-label="${i+1}번째 페이지로 이동" data-goto="${i}"></button>`).join('');

    $('day').innerHTML = `
      <div class="section-eyebrow reveal">우리 원 스토리</div>
      <h2 class="day-head-title reveal">${esc(centerName)}의 하루를 한 장씩</h2>
      <div class="storybook reveal" role="region" aria-roledescription="storybook" aria-label="${esc(centerName)} 우리 원 이야기책">
        <div class="sb-stage">
          ${coverPage}
          ${directorPage}
          ${storyPages}
          ${finalePage}
        </div>
        <div class="sb-controls">
          <button class="sb-arrow prev" type="button" aria-label="이전 페이지">${CHEVRON_L}</button>
          <div class="sb-dots" role="tablist" aria-label="페이지 이동">${dotsHtml}</div>
          <button class="sb-arrow next" type="button" aria-label="다음 페이지">${CHEVRON_R}</button>
          <button class="sb-mute" type="button" aria-label="페이지 넘김 소리 켜기/끄기" aria-pressed="false">
            <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
            <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
          </button>
        </div>
      </div>`;
  }

  // ── 원 시설 (배지 + 썸네일 + 모달) ──
  const fac = data.center.facilities;
  const albumImgs = data.album?.items || [];
  if (fac) {
    const badgesHtml = (fac.items||[]).map(f=>
      `<span class="fac-badge">${esc(f.name)}</span>`).join('');
    const thumbHtml = albumImgs.slice(0,4).map(it=>
      `<div class="fac-thumb"><img data-src="${esc(it.photo)}" alt="${esc(it.label)}"></div>`).join('');
    $('facilitiesSec').innerHTML = `
      <div class="section-eyebrow reveal">우리 원 시설</div>
      <h2 class="section-title reveal">안전하고 따뜻한 공간</h2>
      <p class="section-intro compact reveal">${escWithBr(fac.intro)}</p>
      <div class="fac-badges reveal">${badgesHtml}</div>
      <div class="fac-thumb-grid reveal">${thumbHtml}</div>
      <button type="button" class="fac-more-btn reveal" id="facilityModalOpenBtn">시설 전체 보기</button>`;
  } else {
    document.getElementById('facilitiesSec').hidden = true;
  }

  // ── 선생님 카드 ──
  const t = data.teachers;
  $('teachersSec').innerHTML = `
    <div class="section-eyebrow reveal">${escWithBr(t?.eyebrow)}</div>
    <h2 class="section-title reveal">${escWithBr(t?.title)}</h2>
    <div class="cards">${(t?.items || []).map(tc=>`
      <div class="flip reveal" tabindex="0" role="button" aria-label="${esc(tc.name)} 카드 뒤집기">
        <div class="flip-inner">
          <div class="face front">
            <div class="avatar"><img alt="${esc(tc.name)}" data-src="${esc(tc.photo)}"></div>
            <div class="t-info">
              <div class="name">${esc(tc.name)}</div>
              <div class="role">${esc(tc.role)}</div>
              <div class="tap">눌러서 한마디 보기</div>
            </div>
          </div>
          <div class="face back">${escWithBr(tc.message)}</div>
        </div>
      </div>`).join('')}</div>`;

  // ── 교육프로그램 (이미지 카드 + 모달) ──
  const prog = data.center.programs;
  if (prog) {
    const previewItems = (prog.items||[]).slice(0,2);
    const cardsHtml = previewItems.map((it,i)=>{
      const img = albumImgs[i+4] || albumImgs[i] || null;
      return `<div class="prog-card reveal">
        <div class="prog-img">${img?`<img data-src="${esc(img.photo)}" alt="${esc(it.name)}">`:''}</div>
        <div class="prog-body">
          <div class="prog-name">${esc(it.name)}</div>
          <div class="prog-desc">${escWithBr(it.desc)}</div>
        </div>
      </div>`;
    }).join('');
    $('programSec').innerHTML = `
      <div class="section-eyebrow reveal">교육프로그램</div>
      <h2 class="section-title reveal">우리 원의 교육</h2>
      <p class="section-intro reveal">${escWithBr(prog.intro)}</p>
      ${cardsHtml}
      <button type="button" class="prog-more-btn reveal" id="programModalOpenBtn">교육프로그램 전체 보기</button>`;
  } else {
    document.getElementById('programSec').hidden = true;
  }

  // ── FAQ ──
  const f = data.faqs;
  $('faq').innerHTML = `
    <div class="section-eyebrow reveal">${escWithBr(f?.eyebrow)}</div>
    <h2 class="section-title reveal">${escWithBr(f?.title)}</h2>
    <div class="faq-list">${(f?.items || []).map(it=>`
      <div class="faq-item reveal">
        <button class="faq-q" aria-expanded="false">${esc(it.q)}<span class="chev"></span></button>
        <div class="faq-a"><p>${escWithBr(it.a)}</p></div>
      </div>`).join('')}</div>`;

  // ── 마무리 ──
  const fin = data.finale || {};
  $('finale').innerHTML = `
    <h2 class="reveal">${escWithBr(fin.title)}</h2>
    <p class="reveal">${escWithBr(fin.subtitle)}</p>
    <button type="button" id="cslOpenBtn" class="btn-big reveal">${esc(fin.cta)}</button>`;

  // ── 푸터 ──
  $('footerEl').innerHTML = `
    <div class="demo-tag">${esc(data.footer?.tag)}</div>
    <div>${escWithBr(data.footer?.text)}</div>`;

  document.title = `원이야 - ${esc(c.name) || '원이야'}`;

  // ─────────────────────────────────────────────
  // 2) 렌더가 끝난 뒤 인터랙션 초기화 (원본 동작 그대로)
  // ─────────────────────────────────────────────
  window.__directorData__ = c.director;
  window.__philosophyData__ = data.center.philosophy;
  window.__facilityData__ = data.center.facilities;
  window.__programData__ = data.center.programs;
  window.__albumImgs__ = data.album?.items || [];
  if (isPreviewMode){
    document.addEventListener('click', function(e){
      var action = e.target.closest('#cslOpenBtn, #askConsultBtn, #admissionsSec .info-link-btn');
      if (!action) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      alert(PREVIEW_MESSAGE);
    }, true);
  }
  initInteractions();
  renderInfoSections(data, c, esc);
  setupAskPanel(data.faqs);
  initConsultationForm(client, c.id);
})();

function initInteractions(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  initDeferredImages();

  // ── 원장 인사말 모달 ──
  (function(){
    var overlay = document.getElementById('directorModal');
    var closeBtn = document.getElementById('directorModalClose');
    var openBtn = document.getElementById('directorModalOpenBtn');
    if (!overlay) return;
    function open(){
      var d = window.__directorData__;
      var phil = window.__philosophyData__;
      if (d) {
        document.getElementById('directorModalMsg').textContent = (d.message || '').replace(/<br\s*\/?>/gi,'\n');
        var photoEl = document.getElementById('directorModalPhoto');
        if (photoEl) photoEl.innerHTML = d.photo ? '<img alt="'+esc(d.photo_alt||'')+'" src="'+esc(d.photo || '')+'">' : '';
      }
      var mottoEl = document.getElementById('directorModalMotto');
      var valEl = document.getElementById('directorModalValues');
      if (phil && mottoEl) {
        mottoEl.textContent = phil.motto || '';
        mottoEl.hidden = !phil.motto;
      }
      if (phil && valEl) {
        valEl.innerHTML = (phil.values||[]).map(function(v){
          return '<span class="info-modal-value">'+esc(v)+'</span>';
        }).join('');
      }
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); }
    if (openBtn) openBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // ── 시설 모달 ──
  (function(){
    var overlay = document.getElementById('facilityModal');
    var closeBtn = document.getElementById('facilityModalClose');
    var openBtn = document.getElementById('facilityModalOpenBtn');
    if (!overlay) return;
    function open(){
      var fac = window.__facilityData__;
      var albumImgs = window.__albumImgs__ || [];
      if (!fac) return;
      document.getElementById('facilityIntro').textContent = fac.intro || '';
      document.getElementById('facilityList').innerHTML = (fac.items||[]).map(function(f, i){
        var img = albumImgs[i] || null;
        return '<div class="fac-modal-item">'
          + (img && img.photo ? '<div class="fm-img"><img src="'+esc(img.photo || '')+'" alt="'+esc(f.name)+'"></div>' : '')
          + '<div class="fm-body"><div class="fm-name">'+esc(f.name)+'</div><div class="fm-desc">'+escWithBr(f.desc||'')+'</div></div>'
          + '</div>';
      }).join('');
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); }
    if (openBtn) openBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // ── 교육프로그램 모달 ──
  (function(){
    var overlay = document.getElementById('programModal');
    var closeBtn = document.getElementById('programModalClose');
    var openBtn = document.getElementById('programModalOpenBtn');
    if (!overlay) return;
    function open(){
      var prog = window.__programData__;
      var albumImgs = window.__albumImgs__ || [];
      if (!prog) return;
      document.getElementById('programModalIntro').textContent = prog.intro || '';
      document.getElementById('programModalList').innerHTML = (prog.items||[]).map(function(it, i){
        var img = albumImgs[i+4] || albumImgs[i] || null;
        return '<div class="prog-modal-item">'
          + (img && img.photo ? '<div class="pm-img"><img src="'+esc(img.photo || '')+'" alt="'+esc(it.name)+'"></div>' : '')
          + '<div class="pm-body"><div class="pm-name">'+esc(it.name)+'</div><div class="pm-desc">'+escWithBr(it.desc)+'</div></div>'
          + '</div>';
      }).join('');
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); }
    if (openBtn) openBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // ── 라이트박스 ──
  (function(){
    var overlay = document.getElementById('lightbox');
    var closeBtn = document.getElementById('lightboxClose');
    var img = document.getElementById('lightboxImg');
    var cap = document.getElementById('lightboxCap');
    if (!overlay) return;
    function open(src, alt){
      img.src = src; img.alt = alt || '';
      cap.textContent = alt || '';
      overlay.classList.add('open');
    }
    function close(){ overlay.classList.remove('open'); img.src=''; }
    window.__openLightbox__ = open;
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  })();

  // ── '우리 반' 버튼 → ourclass.html ──
  var ourclassBtn = document.getElementById('ourclassBtn');
  if (ourclassBtn) ourclassBtn.addEventListener('click', function(e){
    e.preventDefault();
    location.href = 'ourclass.html';
  });

  // ── 앨범 이미지 라이트박스 연결 ──
  document.querySelectorAll('.polaroid img, .snap img, .art img, .photo-grid img').forEach(function(img){
    img.style.cursor = 'pointer';
    img.addEventListener('click', function(){
      if (window.__openLightbox__ && img.src) window.__openLightbox__(img.src, img.alt);
    });
  });

  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:0.15});
  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });

  // (원장 인사말 줄 단위 페이드인은 섹션 통합으로 제거됨 — 책 페이지의 .reveal이 담당)

  var palettes = {
    'morning':   {top:'#FCE9D2',bot:'#FFF6EC',sx:'16%',sy:'20%',sc:'#FFE08A',glow:'rgba(255,210,130,.55)'},
    'mid-morning':{top:'#D8EEF6',bot:'#FBF6EE',sx:'40%',sy:'14%',sc:'#FFEFA8',glow:'rgba(255,225,150,.5)'},
    'noon':      {top:'#CDEAF2',bot:'#FFFDF6',sx:'50%',sy:'10%',sc:'#FFF6C2',glow:'rgba(255,240,170,.55)'},
    'afternoon': {top:'#E6E0F0',bot:'#FDEFE4',sx:'66%',sy:'18%',sc:'#FFD99A',glow:'rgba(255,200,140,.5)'},
    'dusk':      {top:'#F6C9A8',bot:'#FBE3D2',sx:'84%',sy:'30%',sc:'#FF9E66',glow:'rgba(255,150,90,.55)'}
  };
  var root = document.documentElement.style;
  function applyPalette(p){
    root.setProperty('--sky-top',p.top);
    root.setProperty('--sky-bottom',p.bot);
    root.setProperty('--sun-x',p.sx);
    root.setProperty('--sun-y',p.sy);
    root.setProperty('--sun-color',p.sc);
    root.setProperty('--sun-glow',p.glow);
  }

  // ── 동화책 페이지 전환 컨트롤러 (2D 플립 + 페이지 넘김 효과음) ──
  // 표지→원장→스토리→마무리를 순수 scaleX 압축/펼침(2D 플립, perspective 없음)으로 넘긴다.
  // 활성 페이지의 data-slot으로 기존 시간대 빛 흐름(palettes)을 재사용해 시그니처를 유지한다.
  (function(){
    var book = document.querySelector('.storybook');
    if (!book) return;
    var pages = Array.prototype.slice.call(book.querySelectorAll('.sb-page'));
    var dots  = Array.prototype.slice.call(book.querySelectorAll('.sb-dots button'));
    var prevBtn = book.querySelector('.sb-arrow.prev');
    var nextBtn = book.querySelector('.sb-arrow.next');
    var muteBtn = book.querySelector('.sb-mute');
    if (!pages.length) return;

    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var HALF = 240; // 접힘/펼침 각 240ms → 전체 ~480ms (CSS transition과 일치)

    // ── 페이지 넘김 효과음 (Web Audio API로 합성, 외부 파일 없음) ──
    // "물방울이 톡 떨어지는" 소리 — sine 오실레이터의 피치를 900Hz→250Hz로 빠르게
    // 떨어뜨려 "톡" 타격감을 만들고, 아주 짧은 클릭 트랜지언트로 어택을 더하며,
    // 40ms 뒤 조용한 2차 톤으로 "퐁~" 파문 잔향을 은은하게 얹는다.
    // reduced-motion 사용자는 기본 음소거(단, 토글로 다시 켤 수 있음).
    var audioCtx = null;
    var STORAGE_KEY = 'woniya_sb_muted';
    var stored = null;
    try { stored = localStorage.getItem(STORAGE_KEY); } catch(e){}
    // 저장값이 있으면 그 값을, 없으면 reduced-motion일 때 기본 음소거
    var muted = (stored === '1') ? true : (stored === '0') ? false : !!reduceMotion;

    function persistMuted(){ try { localStorage.setItem(STORAGE_KEY, muted ? '1' : '0'); } catch(e){} }
    function reflectMute(){
      if (!muteBtn) return;
      muteBtn.classList.toggle('is-muted', muted);
      muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    }
    function synthFlipSound(){
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var ctx = audioCtx, now = ctx.currentTime;

        // 1) 메인 "톡" 톤 — sine, 900Hz→250Hz 지수 하강(100ms), 8ms 어택 후 지수 감쇠(~180ms)
        var mainDur = 0.18;
        var osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(900, now);
        osc.frequency.exponentialRampToValueAtTime(250, now + 0.1);
        var mainGain = ctx.createGain();
        mainGain.gain.setValueAtTime(0.0001, now);
        mainGain.gain.exponentialRampToValueAtTime(0.22, now + 0.008); // 8ms 어택
        mainGain.gain.exponentialRampToValueAtTime(0.0001, now + mainDur); // 자연스러운 감쇠
        osc.connect(mainGain); mainGain.connect(ctx.destination);
        osc.start(now); osc.stop(now + mainDur);

        // 2) 클릭 트랜지언트 — 아주 짧은(4ms) 고음 triangle 블립으로 타격감의 어택을 더함
        var clickDur = 0.004;
        var click = ctx.createOscillator();
        click.type = 'triangle';
        click.frequency.value = 1800;
        var clickGain = ctx.createGain();
        clickGain.gain.setValueAtTime(0.12, now);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, now + clickDur);
        click.connect(clickGain); clickGain.connect(ctx.destination);
        click.start(now); click.stop(now + clickDur);

        // 3) "퐁~" 파문 잔향 — 40ms 뒤, 더 조용하고 낮은 톤으로 짧게(~90ms)
        var rippleStart = now + 0.04;
        var rippleDur = 0.09;
        var ripple = ctx.createOscillator();
        ripple.type = 'sine';
        ripple.frequency.setValueAtTime(500, rippleStart);
        ripple.frequency.exponentialRampToValueAtTime(300, rippleStart + rippleDur);
        var rippleGain = ctx.createGain();
        rippleGain.gain.setValueAtTime(0.0001, rippleStart);
        rippleGain.gain.exponentialRampToValueAtTime(0.05, rippleStart + 0.006); // 은은하게
        rippleGain.gain.exponentialRampToValueAtTime(0.0001, rippleStart + rippleDur);
        ripple.connect(rippleGain); rippleGain.connect(ctx.destination);
        ripple.start(rippleStart); ripple.stop(rippleStart + rippleDur);
        // 전체 재생 시간: 메인(180ms) 기준, 잔향까지 포함해도 40+90=130ms로 200~250ms 이내
      } catch(e){ /* 오디오 실패는 조용히 무시 */ }
    }
    function playFlipSound(){
      if (muted) return;
      // 오디오 노드 생성/연결은 requestAnimationFrame으로 한 틱 미뤄, 전환 시작 프레임의
      // 스타일 계산·컴포지팅과 같은 틱에서 실행되어 메인 스레드를 블로킹하지 않게 한다.
      if (window.requestAnimationFrame) requestAnimationFrame(synthFlipSound);
      else synthFlipSound();
    }
    reflectMute();
    if (muteBtn) muteBtn.addEventListener('click', function(){
      muted = !muted; persistMuted(); reflectMute();
      if (!muted) playFlipSound(); // 켤 때 짧게 미리듣기 (사용자 제스처 컨텍스트에서 오디오 활성화)
    });

    var idx = 0;
    var flipping = false;

    function render(next){
      if (next < 0 || next >= pages.length || next === idx || flipping) return;
      var incoming = pages[next];
      var outgoing = pages[idx];

      if (reduceMotion){
        playFlipSound();
        // 플립 없이 단순 opacity 페이드 (CSS가 .is-active opacity 전환 담당)
        outgoing.classList.remove('is-active');
        incoming.classList.add('is-active');
        idx = next; sync();
        return;
      }

      flipping = true;
      // 1단계: 현재 페이지를 가로로 접는다 (scaleX 1→.45).
      // 효과음 합성(playFlipSound)은 requestAnimationFrame으로 미뤄지므로 여기서 호출해도
      // 클래스 토글(스타일 변경)이 먼저 반영되고, 오디오 노드 생성은 같은 프레임 뒤로 미뤄진다.
      book.classList.add('sb-flipping');
      playFlipSound();
      // 2단계: 접힌 시점에 콘텐츠 교체 (접힌 incoming을 활성화하고 outgoing 비활성화)
      window.setTimeout(function(){
        outgoing.classList.remove('is-active');
        incoming.classList.add('is-active'); // .sb-flipping 상태라 incoming도 scaleX(.45)
        void incoming.offsetWidth; // 리플로우
        idx = next; sync();
        // 3단계: 펼친다 (scaleX .45→1)
        book.classList.remove('sb-flipping');
        window.setTimeout(function(){ flipping = false; }, HALF + 40);
      }, HALF);
    }

    function sync(){
      dots.forEach(function(d,i){
        d.classList.toggle('on', i === idx);
        d.setAttribute('aria-selected', i === idx ? 'true' : 'false');
      });
      if (prevBtn) prevBtn.disabled = (idx === 0);
      if (nextBtn) nextBtn.disabled = (idx === pages.length - 1);
      var slot = pages[idx].getAttribute('data-slot');
      if (slot && palettes[slot]) applyPalette(palettes[slot]);
      pages.forEach(function(p,i){ p.setAttribute('aria-hidden', i === idx ? 'false' : 'true'); });
      predecodeNeighbors();
    }

    // 인접 페이지(이전/다음) 이미지를 미리 디코딩해 플립 도중 이미지 디코딩으로 인한
    // 지연이 생기지 않게 한다. img.decode()는 별도 스레드에서 비동기로 수행된다.
    // (참고: 실제로는 초기 로드 시 img[data-src]가 IntersectionObserver(rootMargin:200px)로
    // 이미 전부 src가 채워져 있어 이 단계에서는 디코딩만 남아있는 경우가 대부분이다.)
    function predecodeNeighbors(){
      [idx - 1, idx + 1].forEach(function(i){
        var p = pages[i];
        if (!p) return;
        var img = p.querySelector('img[src]');
        if (img && img.decode) img.decode().catch(function(){});
      });
    }

    pages[0].classList.add('is-active');
    sync();

    if (prevBtn) prevBtn.addEventListener('click', function(){ render(idx - 1); });
    if (nextBtn) nextBtn.addEventListener('click', function(){ render(idx + 1); });
    dots.forEach(function(d,i){ d.addEventListener('click', function(){ render(i); }); });

    // 키보드 화살표(←/→). 책이 뷰포트에 보일 때만 반응.
    document.addEventListener('keydown', function(e){
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      var r = book.getBoundingClientRect();
      var visible = r.top < window.innerHeight * 0.8 && r.bottom > window.innerHeight * 0.2;
      if (!visible) return;
      if (e.key === 'ArrowRight') render(idx + 1);
      else render(idx - 1);
    });

    // 모바일 스와이프
    var tx = 0, ty = 0;
    book.addEventListener('touchstart', function(e){
      tx = e.changedTouches[0].clientX; ty = e.changedTouches[0].clientY;
    }, {passive:true});
    book.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - tx;
      var dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
        if (dx < 0) render(idx + 1);
        else render(idx - 1);
      }
    }, {passive:true});
  })();

  var c1=document.getElementById('cloud1'), c2=document.getElementById('cloud2');
  var ticking=false;
  if(!reduce){
    window.addEventListener('scroll',function(){
      if(!ticking){ window.requestAnimationFrame(function(){
        var y=window.scrollY;
        c1.style.transform='translateX('+(-y*0.04)+'px)';
        c2.style.transform='translateX('+(y*0.05)+'px)';
        ticking=false;
      }); ticking=true; }
    },{passive:true});
  }

  document.querySelectorAll('.flip').forEach(function(card){
    function toggle(){ card.classList.toggle('flipped'); }
    card.addEventListener('click',toggle);
    card.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); toggle(); } });
  });

  var floatEl=document.getElementById('float');
  var hero=document.querySelector('.hero');
  var finale=document.getElementById('finale');
  var fio=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.target===hero){ if(e.isIntersecting){ floatEl.classList.remove('show'); } else { floatEl.classList.add('show'); } }
      if(e.target===finale){ if(e.isIntersecting){ floatEl.classList.add('hide'); } else { floatEl.classList.remove('hide'); } }
    });
  },{threshold:0.4});
  fio.observe(hero); fio.observe(finale);

  // 헤더 스크롤 전환 (투명 → 흰 배경). 순수 표시용 클래스 토글, 데이터/로직 아님.
  var topbarScrollEl=document.getElementById('topbar');
  if (topbarScrollEl){
    var handleTopbarScroll=function(){
      topbarScrollEl.classList.toggle('scrolled', window.scrollY > 24);
    };
    window.addEventListener('scroll', handleTopbarScroll, {passive:true});
    handleTopbarScroll();
  }

  var menuBtn=document.getElementById('menuBtn');
  var menuPanel=document.getElementById('menuPanel');
  function closeMenu(){ menuBtn.classList.remove('open'); menuPanel.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false'); }
  menuBtn.addEventListener('click',function(){
    var open=menuPanel.classList.toggle('open');
    menuBtn.classList.toggle('open',open);
    menuBtn.setAttribute('aria-expanded',open?'true':'false');
  });
  menuPanel.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',closeMenu); });
  document.addEventListener('click',function(e){
    if(!menuPanel.contains(e.target) && !menuBtn.contains(e.target)) closeMenu();
  });

  document.querySelectorAll('.faq-item').forEach(function(item){
    var q=item.querySelector('.faq-q');
    var a=item.querySelector('.faq-a');
    q.addEventListener('click',function(){
      var open=item.classList.toggle('open');
      q.setAttribute('aria-expanded',open?'true':'false');
      a.style.maxHeight = open ? (a.scrollHeight+'px') : null;
    });
  });
}

function setupAskPanel(faqs){
  var fab = document.getElementById('askFab');
  var overlay = document.getElementById('askModal');
  var closeBtn = document.getElementById('askModalClose');
  var list = document.getElementById('askFaqList');
  var empty = document.getElementById('askFaqEmpty');
  var consultBtn = document.getElementById('askConsultBtn');
  if (!fab || !overlay || !list || !consultBtn) return;
  function askEsc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]; }); }
  function askWithBr(s){ return askEsc(s).replace(/\n/g,'<br>'); }
  var items = (faqs && faqs.items) || [];
  list.innerHTML = items.map(function(it){
    return '<div class="ask-faq-item">'
      + '<button type="button" class="ask-faq-q" aria-expanded="false">' + askEsc(it.q) + '</button>'
      + '<div class="ask-faq-a"><p>' + askWithBr(it.a) + '</p></div>'
      + '</div>';
  }).join('');
  if (empty) empty.hidden = items.length > 0;
  function open(){ overlay.classList.add('open'); overlay.setAttribute('aria-hidden','false'); }
  function close(){ overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true'); }
  fab.addEventListener('click', open);
  if (closeBtn) closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
  list.querySelectorAll('.ask-faq-item').forEach(function(item){
    var q = item.querySelector('.ask-faq-q');
    var a = item.querySelector('.ask-faq-a');
    q.addEventListener('click', function(){
      var openItem = item.classList.toggle('open');
      q.setAttribute('aria-expanded', openItem ? 'true' : 'false');
      a.style.maxHeight = openItem ? (a.scrollHeight + 'px') : null;
    });
  });
  consultBtn.addEventListener('click', function(){
    if (isPreviewMode){
      alert(PREVIEW_MESSAGE);
      return;
    }
    close();
    var target = document.getElementById('cslOpenBtn');
    if (target) target.click();
    else location.hash = '#finale';
  });
}

function initDeferredImages(){
  var imgs = document.querySelectorAll('img[data-src]');
  if (!imgs.length) return;
  function load(img){
    if (!img.dataset.src) return;
    img.src = img.dataset.src;
    img.removeAttribute('data-src');
  }
  if (!('IntersectionObserver' in window)){
    imgs.forEach(load);
    return;
  }
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (!entry.isIntersecting) return;
      load(entry.target);
      observer.unobserve(entry.target);
    });
  }, { rootMargin: '200px' });
  imgs.forEach(function(img){ observer.observe(img); });
}

// 카카오맵 JS SDK: 주소 검색 후 마커 표시. 키는 kakao-config.js(window.__KAKAO_CONFIG__)에서 주입.
function loadKakaoMap(address, containerId){
  var cfg = window.__KAKAO_CONFIG__;
  var container = document.getElementById(containerId);
  if (!container || !address) return;
  if (!cfg || !cfg.appkey){ console.warn('[kakao] appkey 없음 — 지도를 건너뜁니다.'); return; }
  function render(){
    kakao.maps.load(function(){
      var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 3 });
      var geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(address, function(result, status){
        if (status === kakao.maps.services.Status.OK){
          var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
          map.setCenter(coords);
          new kakao.maps.Marker({ map: map, position: coords });
        }
      });
    });
  }
  if (window.kakao && window.kakao.maps){ render(); return; }
  if (!window.__kakaoSDKPromise){
    window.__kakaoSDKPromise = new Promise(function(resolve, reject){
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + encodeURIComponent(cfg.appkey) + '&libraries=services&autoload=false';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  window.__kakaoSDKPromise.then(render).catch(function(){ console.error('[kakao] SDK 로드 실패'); });
}

function initConsultationForm(client, centerId){
  var overlay = document.getElementById('cslOverlay');
  var openBtn = document.getElementById('cslOpenBtn');
  var closeBtn = document.getElementById('cslCloseBtn');
  var form = document.getElementById('cslForm');
  var errorEl = document.getElementById('cslError');
  var formWrap = document.getElementById('cslFormWrap');
  var doneWrap = document.getElementById('cslDoneWrap');

  function openModal(){
    if (isPreviewMode){
      alert(PREVIEW_MESSAGE);
      return;
    }
    overlay.classList.add('open');
    formWrap.hidden = false;
    doneWrap.hidden = true;
    form.reset();
    errorEl.textContent = '';
  }
  function closeModal(){ overlay.classList.remove('open'); }

  if (openBtn) openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorEl.textContent = '';
    if (isPreviewMode){
      alert(PREVIEW_MESSAGE);
      return;
    }

    var consentChecked = document.getElementById('csl-consent').checked;
    if (!consentChecked){
      errorEl.textContent = '개인정보 수집 동의가 필요해요.';
      return;
    }

    var payload = {
      center_id: centerId,
      parent_name: document.getElementById('csl-name').value,
      phone: document.getElementById('csl-phone').value,
      kind: document.getElementById('csl-kind').value,
      wish_class: document.getElementById('csl-class').value || null,
      wish_time: document.getElementById('csl-time').value || null,
      consent_at: new Date().toISOString()
    };

    var submitBtn = form.querySelector('.csl-submit');
    submitBtn.disabled = true;
    var { error } = await client.from('consultations').insert(payload);
    submitBtn.disabled = false;

    if (error){
      console.error(error);
      errorEl.textContent = '접수 중 문제가 생겼어요. 다시 시도해주세요.';
      return;
    }

    formWrap.hidden = true;
    doneWrap.hidden = false;
  });
}
</script>
</body>
</html>
